source_name: '"Tether, Bitfinex to pay $18.5M to NYAG, cease trading in New York"'
source_url: https://amycastor.com/2021/02/23/tether-bitfinex-to-pay-18-5m-to-nyag-cease-trading-in-new-york/
date_of_breach: '2021-02-03'
date_of_disclosure: '2021-02-03'
category: other
vendor_product: Tether pays penalty to New York
notes: The stablecoin Tether swears up and down that it's fully backed by actual currency, but the New York Attorney General
  doesn't agree. Tether paid $18.5 million in penalties, was banned from trading in New York, and agreed to submit transparency
  reports for two years in exchange for ending the long-running legal dispute.
