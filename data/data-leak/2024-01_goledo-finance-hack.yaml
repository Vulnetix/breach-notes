notes: 'Goledo Finance, an Aave-based lending protocol, was exploited through a flash loan attack. The attacker stole assets
  estimated by CertiK at around $1.7 million.Goledo Finance contacted the attacker to offer a 10% "bounty" for the return
  of the remaining assets. In a message on January 29, the attacker wrote: "I hacked Goledo and want to negotiate".


  Total loss estimated at $1,700,000.'
