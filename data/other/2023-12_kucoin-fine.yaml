source_name: '"Kucoin agrees to ban New York residents and pay $22 million in settlement"'
source_url: https://cointelegraph.com/news/kucoin-cryptoccurrency-exchange-ban-new-york-residents-pay-22-million-settlement
date_of_breach: '2023-12-12'
date_of_disclosure: '2023-12-12'
category: other
notes: The KuCoin cryptocurrency exchange has agreed to a settlement in which it will
  pay a $22 million fine and ban residents of New York state from its platform. The
  New York Attorney General sued KuCoin in March, alleging they had been serving New
  York customers despite not being registered in the state.KuCoin has admitted to
  allowing New Yorkers to trade securities and commodities on the platform, and representing
  themselves as an "exchange" without having registered as such.In addition to paying
  the fine, KuCoin has agreed to shut down all New Yorkers' accounts in the coming
  months and prevent residents of the state from signing up for new accounts.
