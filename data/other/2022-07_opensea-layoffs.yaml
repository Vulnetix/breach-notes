source_name: '"Giant NFT marketplace OpenSea lays off about 20 percent of its staff"'
source_url: https://www.theverge.com/2022/7/14/23219076/opensea-nft-layoffs-web3-crypto
date_of_breach: '2022-07-14'
date_of_disclosure: '2022-07-14'
category: other
notes: OpenSea, the largest NFT marketplace, announced that they would be laying off
  around 20% of their employees, or around 60 people. CEO Devin Finzer blamed "crypto
  winter" for necessitating the decision, a common phrase that has been referenced
  by multiple CEOs who have announced layoffs in the past two months.
