source_name: '"Madison Cawthorn implicated in potential insider trading scheme, experts
  say"'
source_url: https://www.washingtonexaminer.com/news/house/madison-cawthorn-implicated-in-potential-insider-trading-scheme-experts-say
date_of_breach: '2022-04-26'
date_of_disclosure: '2022-04-26'
category: other
notes: 'North Carolina Representative Madison Cawthorn was one of several influential
  people who helped to promote the "Let''s Go Brandon" memecoin, which has since become
  the subject of a class-action lawsuit due to a reported pump-and-dump scheme. Cawthorn
  is not named in the lawsuit, but he may face his own troubles: although he has claimed
  to own the currency, he has never publicly disclosed any stake in the coin as is
  likely required by ethics legislation. Cawthorn also commented "Tomorrow we go to
  the moon!" on a post about the coin from his official Instagram account, the day
  before the team of NASCAR driver Brandon Brown announced the cryptocurrency would
  be the primary partner for the 2022 season. "This looks really, really bad," said
  governmental watchdog group member Dylan Hedtler-Gaudette. "This does look like
  a classic case of you got some insider information and acting on that information.
  And that''s illegal."'
