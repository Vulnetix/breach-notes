notes: '"DAO delusion was at its peak when the community went into this journey together",
  wrote SpiceDAO founder Soban "Soby" Saqib. SpiceDAO (named for the Dune drug) won
  an auction to buy a copy of the Dune script bible in January — at $3 million, far
  above its usual selling price, likely because it was public knowledge how much the
  DAO had raised. DAO members celebrated afterwards, excitedly anticipating an animated
  television series based on the book, apparently not realizing that buying a book
  (even for a very high price) does not confer rights to publish derivative works.The
  DAO has stumbled along somewhat since its January victory, encountering issues with
  making the bible viewable to DAO members without breaking copyright laws, a diminishing
  treasury due to declining crypto prices, and controversy after Soby was linked to
  the Remilia Collective.After all that, the project leader suddenly and apparently
  unilaterally announced a plan where members could redeem their SPICE for ETH, and
  stated that they would be removing project leaders, converting the DAO to a private
  company, and selling the Dune bible (likely at a major loss). It was nice knowing
  you, SpiceDAO.'
