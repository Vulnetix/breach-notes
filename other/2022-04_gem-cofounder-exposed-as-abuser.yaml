notes: A pseudonymous co-founder of the NFT startup Gem, who was previously known only as "Neso", has been revealed to be
  Josh Thompson. Using the handles "Joshpriest" and "MethodJosh", Thompson is a once-prominent World of Warcraft streamer
  who has been accused by at least five people of rape, sexual harassment, and grooming of minors. Gem announced to their
  community on April 9 that they had reviewed allegations against Neso and "exited" him from the team, though a report by
  BuzzFeed News showed that the Gem team had known about his identity since at least mid-March.Following the publication of
  the BuzzFeed article on April 16, the Gem Discord erupted in anger — apparently discovering for the first time that Gem
  had known Thompson's real identity for quite a lot longer than they had let on. Some members accused the team of lying and
  trying to cover up who Thompson was, demanding the team explain themselves. The Gem Discord bot was subsequently configured
  to block links to BuzzFeed.com, so people couldn't post the exposé article.Crypto culture has embraced pseudonymity to such
  an enormous degree that not only is it common for everyday traders to cloak their identities behind wallet addresses or
  pseudonyms, but for founders and prominent members of major projects to do so as well. This is not the first time this has
  enabled deception, such as in the case where a chief developer of a defi project later being unmasked as a man with a history
  of financial crimes and other shadiness.
