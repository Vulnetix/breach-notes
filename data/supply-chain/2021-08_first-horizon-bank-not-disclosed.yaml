notes: First Horizon Bank Customers Have Account Funds Drained. Attackers stole under
  $1 million after breaching internal security. A leading US bank has revealed a data
  breach in which over 100 online customers had their funds accessed by an unauthorized
  intruder. First Horizon Bank claimed in a filing with the Securities and Exchange
  Commission (SEC) yesterday that less than $1 million was stolen in total from those
  accounts.
