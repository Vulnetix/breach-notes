date_of_breach: '2026-03-03'
date_of_disclosure: '2026-03-03'
category: data-leak
initial_attack_vector: Seed phrase / wallet compromise
vendor_product: Returned crypto stolen again from Korean authorities
financial_loss_usd: 4920000
notes: 'After a thief drained a crypto wallet of 4 million PRTG (notionally priced at $4.9 million, but highly illiquid) after
  blundering Korean tax officials posted the wallet''s seed phrase to social media in a photo among other seized items, the
  thief returned the assets. However, the tokens were quickly stolen again by a second thief, as they''d been returned to
  the same vulnerable wallet. The first thief turned themselves in and was arrested by Korean law enforcement shortly after
  taking the funds; the second thief has not been identified.


  Total loss estimated at $4,920,000.'
