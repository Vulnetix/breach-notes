source_name: '"Alameda wallets funnel over $1.7M via crypto mixers overnight"'
source_url: https://cointelegraph.com/news/alameda-wallets-funnel-over-1-7m-via-crypto-mixers-overnight
date_of_breach: '2022-12-28'
date_of_disclosure: '2022-12-28'
category: other
notes: 'Wallets known to be controlled by Alameda Research, the crypto trading firm
  founded by Sam Bankman-Fried and currently in bankruptcy with the other FTX companies,
  suddenly began selling off large quantities of mostly small altcoins on December
  28. Whoever controls the wallets swapped the tokens for Tether stablecoins or Ethereum,
  then tumbled the funds through cryptocurrency mixers — a strong sign that this was
  probably not just the FTX liquidators consolidating wallets.Altogether, an estimated
  $1.7 million was moved through various services to obfuscate the flow of funds.


  Total loss estimated at $1,700,000.'
