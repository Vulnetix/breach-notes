source_name: '"Bored Ape NFT Spinoff Venture Gone Sour Sparks Legal Fight"'
source_url: https://www.bloomberg.com/news/articles/2022-03-21/bored-ape-nft-spinoff-venture-gone-sour-sparks-legal-fight
date_of_breach: '2022-03-23'
date_of_disclosure: '2022-03-23'
category: other
notes: Two lawsuits were filed nearly simultaneously, each alleging misconduct by
  the other party with respect to the "Caked Apes" NFT project — a project full of
  illustrations that were very clearly derived from the popular Bored Apes project,
  but feature neon colors and psychedelic motifs. Caked Apes so far has done around
  $1.9 million in sales.Both lawsuits center on Taylor Whitley and his departure from
  the project, but they diverge considerably from there. Whitley's suit claims that
  he was wrongly ousted from the project; the other lawsuit claims that Whitley engaged
  in "unhinged, destructive, and egotistical acts... to sabotage... "Caked Apes",
  after Whitley failed to usurp ownership and control of the project entirely for
  himself". They also allege that Whitley misused DMCA takedowns to have the collection
  removed from online marketplaces. The lawsuits are liable to be complicated somewhat
  by the fact that a partnership agreement doesn't appear to have ever been written
  up.
