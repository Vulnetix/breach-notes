notes: NFT collector and influencer Franklin posted a tweet thread about how he had hyped a project that later rugpulled.
  He was paid about 18 ETH (about $63,000) to promote the "Expansion Phunks", but did very little to acknowledge that he was
  being paid to promote the project. He also wrote, "I didn't do any research of Fly nor try to dox the anon team+devs and
  for that I'm very sorry and regret not researching." Elsewhere in the thread he mentions that "I'd say 99% of projects that
  I promote fail", a statement which might prompt some self-reflection if he was as ashamed of fleecing his followers as he
  claims to be.
