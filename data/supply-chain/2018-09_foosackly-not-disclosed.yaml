notes: Foosackly's reports payment-card data breach. Mobile-based chicken-finger chain
  Foosackly's is warning customers of a data breach in its payment system. According
  to information released by Three Fingers, Inc., which does business in the Mobile
  and Pensacola area under the Foosackly's name, its cash register system was affected.
  That system is managed by a third party vendor, according to the company. "The security
  incident resulted in unauthorized access to customer payment card information,"
  the company said. "No other personal information was involved.".
