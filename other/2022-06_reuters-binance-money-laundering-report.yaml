source_name: '"How crypto giant Binance became a hub for hackers, fraudsters and drug
  traffickers"'
source_url: https://www.reuters.com/investigates/special-report/fintech-crypto-binance-dirtymoney
date_of_breach: '2022-06-06'
date_of_disclosure: '2022-06-06'
category: other
notes: A Reuters investigation alleged that Binance "served as a conduit for the laundering
  of at least $2.35 billion in illicit funds" between 2017 and 2021. Binance is the
  largest cryptocurrency exchange in the world. Reuters tracked hundreds of millions
  in funds passing through a Russian darknet drugs market called Hydra thanks to Binance,
  and pointed to Binance as facilitating the laundering of money from German investment
  fraud schemes and North Korean cybercrime groups.
