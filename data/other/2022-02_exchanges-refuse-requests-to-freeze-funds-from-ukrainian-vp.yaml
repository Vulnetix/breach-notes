initial_attack_vector: Regulatory / legal action
vendor_product: Exchanges refuse requests to freeze funds from Ukrainian VP
blockchain: bitcoin
notes: Ukrainian Vice President Mykhailo Fedorov publicly requested major cryptocurrency exchanges to freeze addresses of
  all Russian and Belarusian users, to increase economic pressure on Russia to end its attacks on Ukraine. Several crypto
  exchanges including Binance, Kraken, and KuCoin publicly refused to do so. CEO and co-founder of the U.S.-based Kraken Exchange,
  Jesse Powell, wrote a Twitter thread in which he stated that Bitcoin was "the embodiment of libertarian values" and supposed
  to be "a weapon for peace, not for war".Although perhaps unsurprising that these exchanges refused a request like Fedorov's,
  it will be interesting to see if and how sanctions may affect various cryptocurrency exchanges' actions. Binance, the largest
  crypto exchange, has already indicated it will comply with sanctions. Kraken, whose executives have tended towards more
  ideological stances, has also indicated that it will comply with legal requirements to freeze accounts.
