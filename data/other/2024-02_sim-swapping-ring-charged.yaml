source_name: '"FTX’s Missing $400 Million Were Stolen in SIM-Swapping Hack, DOJ Says"'
source_url: https://www.bloomberg.com/news/articles/2024-02-01/ftx-s-missing-400-million-stolen-in-sim-swapping-hack-doj-says
date_of_breach: '2024-02-01'
date_of_disclosure: '2024-02-01'
category: other
notes: Three people running a SIM swapping operation have been charged with fraud
  and identity theft. By gaining access to the personal information of their victims
  and then convincing cell phone providers to "swap" victims' phone numbers to phones
  they controlled, they were then able to gain access to various accounts controlled
  by their victims.Although the indictment does not name FTX, Bloomberg has reported
  that "victim company-1" named in the court filings was FTX, which was hacked for
  around $400 million amid the chaos as the company was collapsing.
