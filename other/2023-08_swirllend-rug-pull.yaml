notes: 'Despite the fact that Coinbase''s Base blockchain was only officially launched a week ago, and a relatively small
  amount of funds are locked on the chain, it''s already racking up its own tally of scams and hacks.SwirlLend was a lending
  protocol operating on both Base and the similarly newborn Linea chain. Shortly after its launch, the project drained a combined
  $460,000 from the two chains, then deleted its social media accounts.


  Total loss estimated at $460,000.'
