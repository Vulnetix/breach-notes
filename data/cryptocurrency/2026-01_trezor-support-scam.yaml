notes: 'A crypto holder has lost $282 million in bitcoin and litecoin after a scammer impersonating a customer support employee
  for the Trezor hardware wallet manufacturer successfully convinced them into revealing their seed phrase. After gaining
  access to the assets, they quickly swapped them to the Monero privacycoin. The volume of assets was so large that the Monero
  price spiked as the scammer laundered the finds. The scammer also swapped assets using the THORChain project, which boasted
  on social media about the "World record speedrun. ⚡️" (presumably without realizing they were bragging about a thief using
  their project to launder money).Around $700,000 of the stolen assets were frozen thanks to intervention by a security firm
  called ZeroShadow, although this represents only 0.2% of the total loss.


  Total loss estimated at $281,300,000.'
