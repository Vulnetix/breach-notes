notes: Bybit, a Dubai-based cryptocurrency exchange, is reportedly joining the group
  of crypto companies laying off employees amidst plummeting cryptocurrency markets.
  Journalist Colin Wu reported that Bybit plans to lay off about 20–30% of its 2,000
  employees, or around 400–600 people.
