source_name: '"An artist blew up a Lamborghini to protest ‘greed’ in crypto culture.
  The charred remains are now being sold as NFTs"'
source_url: https://fortune.com/2022/02/22/nft-artist-blew-up-lamborghini-protest/
date_of_breach: '2022-02-17'
date_of_disclosure: '2022-02-17'
category: other
notes: The person known on Twitter by the name SHL0MS bought a used Lamborghini Huracan,
  drove it to the desert, and recorded the enormous fireball as they blew up the car.
  The explosion, they said, was meant to be a "criticism of greed and short-termism
  in crypto".SHL0MS then gathered 888 pieces of the wrecked car, took rotating videos
  of each one, and created NFTs from them. The NFTs were to be released on February
  25 in an auction starting at 0.01 ETH (about $26), but the auction was delayed due
  to the news of Russia's military invasion of Ukraine.It's likely SHL0MS will profit
  handsomely off the Lamborghini NFT. Their previous NFT collection, FNTN, involved
  similar rotating videos, in that case of an exploded toilet. The NFTs in that 185-piece
  collection have recently been trading at 1–2 ETH (several thousand dollars).
