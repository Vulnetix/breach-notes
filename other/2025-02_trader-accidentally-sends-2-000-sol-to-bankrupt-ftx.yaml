vendor_product: Trader accidentally sends 2,000 SOL to bankrupt FTX
financial_loss_usd: 396000
notes: 'A former FTX customer made an expensive mistake in October 2023 when he transferred 2,000 SOL (~$64,000 at the time,
  almost $400,000 today) to an old FTX account, about a year after the company went bankrupt. Unlike you might expect with
  an attempt to wire traditional funds to a bank account that''s been closed, the funds didn''t bounce back. Instead, they''ve
  been sitting around under control of the FTX bankruptcy estate, requiring the former customer to seek a court order to get
  his funds back.All in all, this customer is actually pretty lucky as far as erroneous transfers go. FTX''s bankruptcy team
  still has access to FTX wallets, and are still actively working on recovering and disbursing assets to creditors. In some
  cases in the crypto world, erroneous transfers are lost forever.


  Total loss estimated at $396,000.'
