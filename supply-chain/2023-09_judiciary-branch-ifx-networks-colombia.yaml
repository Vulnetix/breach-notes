notes: 'Several Colombian government ministries hampered by ransomware attack. A cyberattack
  on a technology provider caused a range of problems for government agencies in Colombia,
  including the ministry of health and the judiciary. Multiple prominent government
  ministries in Colombia are responding to a ransomware attack that is forcing officials
  to make significant operational changes. This week, the Ministry of Health and Social
  Protection, the country’s Judiciary Branch and the Superintendency of Industry and
  Commerce announced that a cyberattack on technology provider IFX Networks Colombia
  had caused a range of problems limiting the ability of both departments to function.
  Third-party company: IFX Networks Colombia.'
