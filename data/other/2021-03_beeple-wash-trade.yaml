source_name: '"Metakovan, the mystery Beeple art buyer, and his NFT/DeFi scheme"'
source_url: https://amycastor.com/2021/03/14/metakovan-the-mystery-beeple-art-buyer-and-his-nft-defi-scheme/
date_of_breach: '2021-03-11'
date_of_disclosure: '2021-03-11'
category: other
notes: Vignesh Sundaresan's $69 million purchase of an NFT by artist Beeple made headlines.
  However, Amy Castor outlined a few days later that Sundaresan is a business partner
  of Beeple's, and that Beeple himself owns 2% of the B20 tokens created by Sundaresan's
  cryptocurrency investment firm. She speculates that money may not have exchanged
  hands at all, but that Sundaresan and Beeple orchestrated the purchase to artificially
  inflate the value of the work, increase Beeple's popularity, and draw attention
  to Sundaresan and his company.
