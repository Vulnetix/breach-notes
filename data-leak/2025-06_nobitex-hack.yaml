notes: 'The Iran-based Nobitex cryptocurrency exchange suffered a $90 million hack, and the attacker has also promised to
  imminently release data and source code from the platform. The hacking group appears to have burned the crypto assets, effectively
  destroying them rather than taking them for their own profits.Gonjeshke Darande (also "Predatory Sparrow"), a hacking group
  with links to Israel, claimed responsibility for the theft, accusing the platform of serving as a "key regime tool" to finance
  terror and violate sanctions. The cyberattack comes shortly after Israel launched air strikes on Iran.


  Total loss estimated at $90,000,000.'
