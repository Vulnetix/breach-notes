notes: 'Only days after the Hypervault yield farming platform announced on Twitter that they''d surpassed $5 million in total
  value locked, the platform suddenly shut down its website and social media accounts. Simultaneously, the crypto security
  firm PeckShield observed an "abnormal withdrawal" of a large quantity of various crypto assets priced at around $3.6 million,
  which were swapped to 752 ETH (~$3.1 million) and laundered through Tornado Cash.The project had attracted customers by
  advertising yields of 76–95%.


  Total loss estimated at $3,600,000.'
