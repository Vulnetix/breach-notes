notes: 'Data breach involving former Polk County Schools vendor could impact thousands.
  This issue involves a company hired by Polk Schools to collect information about
  students using the school’s free and discount meal program. BARTOW, Fla. — A personal
  data breach could impact thousands of current and former Polk County students. Carol
  Martell is among the hundreds, perhaps thousands, of parents and students in the
  Polk school system concerned about a data breach. The information includes names,
  dates of birth, and student identification numbers. Third-party company: PCS Revenue
  Systems.'
