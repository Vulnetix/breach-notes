notes: Popular French retailers confirm hackers stole customer data. Targets of the
  cyberattacks include electronics and home appliances store Boulanger and the retailer
  Cultura. Several well-known French retail brands reported having data stolen by
  a cyberattack late last week. The targets include Boulanger, which specializes in
  electronics and home appliances, and the retailer Cultura. Several French media
  outlets reported the list of victims could be even longer.
