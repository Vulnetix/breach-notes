notes: |-
  The Minnesota Department of Human Services notified approximately 304,000 people — primarily Medicaid and
  public benefits recipients — of a data breach involving a third-party vendor. The breach exposed sensitive
  government benefits data including names, Medicaid ID numbers, dates of birth, addresses, and in some cases
  Social Security numbers and medical information. Minnesota DHS administers Medicaid (Medical Assistance), SNAP
  (food assistance), and other public benefits programs. Government agency vendor breaches are particularly
  impactful as they expose data of vulnerable populations who cannot opt out of sharing information required to
  receive government benefits. The Minnesota Attorney General and HHS OCR were notified.
