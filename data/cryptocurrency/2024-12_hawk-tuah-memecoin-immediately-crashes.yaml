notes: Who could have guessed that buying up a token based around the long-past-its-expiration-date hawk tuah meme might turn
  out to be an unwise investment? Haliey Welch, the originator of the raunchy catchphrase, launched a memecoin that she insisted
  was not a cash grab but a "good way to interact with her fans". (The "interaction" in question here was limited to " fans
  give money", because she had no other specific plans for the token).The token followed the typical pattern of quickly pumping,
  then crashing spectacularly, losing around 90% of its "value". This is often an indicator of a pump-and-dump scheme by insiders,
  but Welch vehemently denied such wrongdoing, blaming the crash on "snipers"."I really lost $43k apeing in 'hawk tuah' coin,"
  wrote one buyer on Twitter. Other Twitter users marveled at a wallet that swapped $1.4 million worth of MOODENG (a memecoin
  based on the tiny hippo of the same name) only to lose it all on the $HAWK token.
