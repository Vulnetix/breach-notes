source_name: '"Ferrari subdomain hijacked to push fake Ferrari NFT collection"'
source_url: https://www.bleepingcomputer.com/news/security/ferrari-subdomain-hijacked-to-push-fake-ferrari-nft-collection/
date_of_breach: '2022-05-06'
date_of_disclosure: '2022-05-06'
category: cryptocurrency
initial_attack_vector: Smart contract exploit / hack
vendor_product: Ferrari domain hijacked
blockchain: ethereum
financial_loss_usd: 800
notes: 'Someone was able to gain control of a ferrari.com subdomain to create a scam NFT mint. Most scam NFT projects rely
  on eager NFT collectors not noticing a URL that isn''t quite right — for example, something like ferrari-nft.com. This one
  was able to gain some additional legitimacy by using an actual ferrari.com subdomain. Additionally, Ferrari had recently
  announced an upcoming NFT project, making the scam project seem more plausible.Sadly for the scammer, the scam was discovered
  and shut down when they had only managed to scam one person. The unsuspecting collector sent 0.3 ETH ($800), which the scammer
  transferred to Tornado Cash.


  Total loss estimated at $800.'
