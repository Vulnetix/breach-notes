notes: Melania Trump launched a new NFT in January, following her December unveiling of the series. The January NFT involved
  a white hat that Ms. Trump wore during a state visit, as well as a watercolor painting of her wearing it. The press release
  announcing it also announced that the opening bid would be "the equivalent of $250,000", or around 1,800 SOL. Ultimately
  the auction drew only a few bids, all around the starting price. A Vice investigation subsequently found that the winning
  buyer bought the NFT with funds that came from the same address that had created the NFT to begin with. Pesky public transaction
  records...
