source_name: '"Hilarious ''Web 3 Console'' Will Never, Ever Happen"'
source_url: https://kotaku.com/polium-one-console-web3-nft-metaverse-crypto-blockchain-1849140057
date_of_breach: '2022-07-05'
date_of_disclosure: '2022-07-05'
category: other
notes: Vaporware is hardly a new phenomenon in the web3 space, but the Polium project
  is bringing it to new heights. They announced their product — a "multi-chain console
  for Web 3 Gaming" — with no extant console, no design for one, and no games for
  it.The website advertises specifications for an eventual console that contradict
  — it will be both 4K and 8K, for example — and promises to integrate Apple's TouchID
  (despite the fact that Apple does not allow non-Apple products to use that technology).
  The product's Medium page describes their plans to take pre-orders before the console
  hardware is built (good sign), and estimates a release date of Q3 2024.Polium has
  also gotten flak for its logo, which quite resembles the GameCube logo. Although
  they claimed in a tweet that "we did not copy the Nintendo's GameCube logo", they
  also promised to "illustrate a new logo that is original" — apparently acknowledging
  that theirs is not.
