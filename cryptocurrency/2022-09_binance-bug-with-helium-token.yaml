source_name: '"Binance Bungles Accounting for Helium Tokens, Overpays Clients Millions"'
source_url: https://www.coindesk.com/business/2022/09/16/binance-bungles-accounting-for-helium-tokens-overpays-clients-millions/
date_of_breach: '2022-09-16'
date_of_disclosure: '2022-09-16'
category: cryptocurrency
initial_attack_vector: Software bug / unintentional loss
vendor_product: Binance bug with Helium token
blockchain: ethereum
financial_loss_usd: 19000000
notes: 'Helium has two different tokens: HNT, which is paid out to people who run Helium hotspots, and MOBILE, which is paid
  to those maintaining the new Helium 5G network. However, Binance erroneously treated both tokens as HNT within their exchange.
  As a result, anyone who sent MOBILE to Binance wound up with that same number of HNT tokens in their wallet — a big benefit,
  given that HTN has traded between $4 and $7 this past month, and MOBILE is not yet easily tradable.Binance distributed around
  4.8 million HNT before discovering and patching the bug, valued at around $19 million.


  Total loss estimated at $19,000,000.'
