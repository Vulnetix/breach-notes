notes: 'Farmers Insurance data breach impacts 1.1M people after Salesforce attack.
  U.S. insurance giant Farmers Insurance has disclosed a data breach impacting 1.1
  million customers, with BleepingComputer learning that the data was stolen in the
  widespread Salesforce attacks. Farmers Insurance is a U.S.-based insurer that provides
  auto, home, life, and business insurance products. It operates through a network
  of agents and subsidiaries, serving more than 10 million households nationwide.
  The company disclosed the data breach in an advisory on its website, saying that
  its database at a third-party vendor was breached on May 29, 2025. Third-party company:
  Salesforce.'
