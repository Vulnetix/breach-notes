notes: "On 3 October 2022, CommonSpirit Health — the second-largest nonprofit hospital system in the United States with 140 hospitals and over 1,000 care sites across 21 states — was hit by a Hive ransomware attack. CommonSpirit disclosed the 'IT security issue' on 4 October, initially calling it an IT disruption. The attack forced hospitals to take electronic health record (EHR) systems offline, revert to paper-based procedures, and cancel or reschedule non-urgent appointments and procedures. Affected hospitals included CHI Memorial Hospital (Chattanooga), St. Luke's Medical Center (Houston), Virginia Mason Franciscan Health, and dozens of others. A documented patient safety incident occurred at CHI Memorial Hospital in Tennessee where a nurse, unable to access EHR systems during the attack, administered a tenfold overdose of pain medication to a patient — the patient survived but the incident highlighted acute risks of ransomware to patient safety. CommonSpirit notified the HHS OCR that 623,774 patient records were compromised, including names, dates of birth, phone numbers, addresses, and internal medical record numbers. The investigation determined attackers had access to certain files from 16 September to 3 October 2022 — 17 days before the attack was detected. The Hive ransomware group was later disrupted by the FBI in January 2023, which had infiltrated Hive's network for seven months and decrypted victims' data using recovered keys."
