vendor_product: Mailchimp bans crypto newsletters
affected_count: 100
notes: The email marketing company Mailchimp reportedly suspended accounts belonging to several prominent companies and individuals
  in the crypto sphere, including crypto analytics tool Messari, blog Decrypt, wallet provider Edge, NFT artist Jesse Friedland,
  and the founder of the Cryptoon Goonz NFT collection.Daniel Roberts, CEO of Decrypt, wrote on Twitter that they had used
  Mailchimp for more than four years, but that the company had "deactivated our newsletter account with no warning or explanation".Mailchimp's
  acceptable use policy bans businesses offering "Cryptocurrencies, virtual currencies, and any digital assets related to
  an Initial Coin Offering". It's listed among other industries that they identify as having "higher-than-average abuse complaints,
  which can jeopardize deliverability" including work-at-home scams, make money online, and lead generation opportunities;
  gambling services or products; and multi-level or affiliate marketing. In an email reportedly sent to Friedland regarding
  his suspension, Mailchimp wrote, "We cannot allow businesses involved in the sale, transaction, trading, exchange, storage,
  marketing, or production of cryptocurrencies, virtual currencies and any digital assets."In April, Mailchimp had experienced
  a security breach in which audience data was taken from around 100 accounts in finance and crypto-related industries.
