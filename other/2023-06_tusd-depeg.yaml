source_name: '"TrueUSD stops minting via Prime Trust, loses dollar peg"'
source_url: https://cointelegraph.com/news/tusd-stops-minting-via-prime-trust-loses-dollar-peg
date_of_breach: '2023-06-10'
date_of_disclosure: '2023-06-10'
category: other
vendor_product: TUSD depeg
notes: 'On June 10, TrueUSD announced on Twitter: "TUSD mints via Prime Trust are paused for further notification." They offered
  no further explanation. TUSD is the fifth largest stablecoin by market capitalization.The decision may have been related
  to insolvency rumors surrounding Prime Trust, a US-based fintech company. On June 8, BitGo announced a non-binding letter
  of intent to acquire Prime Trust.After the announcement, the TUSD stablecoin dipped as low as $0.9951. This is a seemingly
  small deviation from the $1 peg, but in the stablecoin world, such small variances can be serious.'
