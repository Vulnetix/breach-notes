notes: 'Egyptian Health Department Cyberattack Affects Up to 100,000 Individuals.
  Egyptian Health Department (EHD) in Eldorado, IL, has recently announced a data
  breach affecting up to 100,000 patients. EHD suffered a cyberattack on Egyptian
  Health Department says up to 100,000 individuals have been affected by a December
  cyberattack. Data breaches have also been reported by McKenzie County Healthcare
  System, Forward Healthcare, Maryville Addiction Treatment Centers, the California
  Department of State Hospitals, and Cencora. Third-party company: Philips Respironics.'
