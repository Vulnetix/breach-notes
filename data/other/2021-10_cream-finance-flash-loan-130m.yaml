initial_attack_vector: "Flash loan attack exploiting a price oracle manipulation vulnerability in Cream Finance's lending protocol; attackers used flash loans from multiple DeFi protocols to manipulate the price oracle for the yUSD token (a Yearn Finance vault token), inflating its reported collateral value and enabling the attacker to borrow far more than the actual collateral value across multiple transactions"
