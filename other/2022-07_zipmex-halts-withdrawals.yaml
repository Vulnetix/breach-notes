vendor_product: Zipmex
notes: Singapore-based crypto exchange Zipmex is the latest in a long string of crypto platforms to suspend customer withdrawals.
  "Due to a combination of circumstances beyond our control including volatile market conditions, and the resulting financial
  difficulties of our key business partners, to maintain the integrity of our platform, we would be pausing withdrawals until
  further notice," they wrote on Twitter.According to CoinDesk, Zipmex faces an enormous loss on a loan of $100 million worth
  of assets to Babel Finance, an exchange that suspended withdrawals in mid-June and is now hiring restructuring attorneys.On
  July 21, the Thai Securities and Exchange Commission sent a letter to Zipmex asking them to explain their decision, requesting
  details on customer assets under custody and where they were invested — particularly around any assets deposited in Celsius
  or Babel Finance.
