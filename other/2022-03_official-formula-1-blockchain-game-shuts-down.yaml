vendor_product: Official Formula 1 blockchain game
blockchain: ethereum
notes: F1 Delta Time, a crypto car racing game that was officially licensed with F1 racing, shut down in mid-March. The game
  had previously generated a lot of hype — one of its car NFTs was the most expensive NFT sold in 2019 (more than $100,000).
  However, game owner Animoca was unable to renew their license to use the F1 brand, resulting in a sudden and unceremonious
  shut down. Players were given a single day of notice before the game went offline. Users, of course, keep their NFTs, but
  their ostensible use is now no more. The developers have tried to placate their players by offering various replacement
  options, primarily based around Animoca's Polygon-based "REVV Racing" game.
