source_name: "Snowflake UNC5537 Mass Customer Breach Campaign"
source_url: "https://cloud.google.com/blog/topics/threat-intelligence/unc5537-snowflake-data-theft-extortion"
date_of_breach: "2024-04-01"
date_of_disclosure: "2024-05-30"
date_of_customer_notification: "2024-06-01"
category: "credential-theft"
initial_attack_vector: "UNC5537 (Scattered Spider / ShinyHunters) used credentials harvested by infostealer malware (Lumma, Vidar, RedLine, RisePro, Raccoon) to log into Snowflake customer accounts that lacked MFA; no breach of Snowflake's own platform"
cve: []
vendor_product: "Snowflake (cloud data warehouse)"
software_package: ""
malware: "Lumma; Vidar; RedLine; RisePro; Raccoon (infostealers used to harvest credentials)"
supply_chain_claimed: false
notes: "UNC5537 compromised approximately 165 Snowflake customer tenants in a mass credential-stuffing campaign from April 2024. Known victims include AT&T (110M records), Ticketmaster (560M), Santander, Neiman Marcus, LendingTree/QuoteWizard, LAUSD, Pure Storage, Advance Auto Parts, and Cylance. Credentials dated back to 2020. Connor Moucka ('judische') arrested Canada October 2024; John Erin Binns arrested Turkey. Mandiant (Google) published detailed threat intelligence report on UNC5537. Snowflake itself was not breached; all compromised accounts lacked MFA."
