source_name: '"Founder and Majority Owner of Bitzlato, a Cryptocurrency Exchange,
  Charged with Unlicensed Money Transmitting"'
source_url: https://www.justice.gov/usao-edny/pr/founder-and-majority-owner-bitzlato-cryptocurrency-exchange-charged-unlicensed-money
date_of_breach: '2023-01-18'
date_of_disclosure: '2023-01-18'
category: other
notes: US authorities arrested and charged Anatoly Legkodymov, the founder of the
  Bitzlato cryptocurrency exchange. Although the exchange is relatively unknown, the
  justice department alleges that it was instrumental to darknet criminal marketplaces,
  including Hydra Market. The DOJ alleges that users of Hydra Market processed more
  than $700 million in cryptocurrency through Bitzlato, which also helped to facilitate
  more than $15 million in ransomware proceeds. Although Bitzlato claimed not to serve
  users in the United States, the DOJ claims that the exchange "did substantial business
  with U.S.-based customers".
