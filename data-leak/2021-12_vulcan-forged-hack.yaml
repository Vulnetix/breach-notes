date_of_breach: '2021-12-13'
date_of_disclosure: '2021-12-13'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Vulcan Forged
financial_loss_usd: 135000000
notes: 'Stolen private keys from the blockchain gaming platform Vulcan Forged enabled attackers to siphon funds out of just
  shy of 100 user wallets. Rather than users managing their own private keys, this is done by the platform, suggesting the
  issue was not user error. The project says it plans to reimburse users.


  Total loss estimated at $135,000,000.'
