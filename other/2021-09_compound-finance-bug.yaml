source_name: '"Bug puts $162 million up for grabs, says founder of DeFi platform Compound"'
source_url: https://www.cnbc.com/2021/10/03/162-million-up-for-grabs-after-bug-in-defi-protocol-compound-.html
date_of_breach: '2021-09-30'
date_of_disclosure: '2021-09-30'
category: other
initial_attack_vector: Software bug / unintentional loss
vendor_product: Compound Finance bug
financial_loss_usd: 147000000
notes: 'Robert Leshner, the founder of Compound Labs, took an unusual approach when trying to recoup funds that were mistakenly
  distributed through a $160 million bug in the protocol. He tweeted, "Please return [the funds]. Keep 10% as a white-hat.
  Otherwise, it''s being reported as income to the IRS". The threats were not received particularly well, with some questioning
  what assumptions Leshner was making about his typical user''s tax status, and Leshner subsequently apologized for his "bone-headed"
  tweet.


  Total loss estimated at $147,000,000.'
