initial_attack_vector: "Multiple attack vectors over multiple years: (1) 2011 auditor laptop compromise allowed private key theft and price manipulation; (2) ongoing transaction malleability exploitation allowed attackers to claim non-received Bitcoin withdrawals were unprocessed and have them re-sent; (3) internal control failures and alleged insider theft; Mt. Gox repeatedly processed duplicate withdrawal requests due to mishandling of Bitcoin transaction IDs"
