source_name: '"$8.2M Lost as Visor Finance Suffers Latest DeFi Hack"'
source_url: https://cryptobriefing.com/8-2m-lost-visor-finance-suffers-latest-defi-hack/
date_of_breach: '2021-12-21'
date_of_disclosure: '2021-12-21'
category: data-leak
initial_attack_vector: Reentrancy attack on smart contract
vendor_product: Visor Finance
blockchain: ethereum
financial_loss_usd: 8200000
notes: 'A reentrancy exploit in the Ethereum-based Visor Finance DeFi protocol allowed hackers to pull 8.8 million VISR tokens
  out of the network, equivalent to about $8.2 million. The VISR token went from trading at around $0.93 to around $0.04,
  losing more than 95% of its value. The Visor team subsequently announced that they would perform a token migration to compensate
  affected users. Visor has suffered other hacks since its launch earlier in 2021, despite having undergone several audits.


  Total loss estimated at $8,200,000.'
