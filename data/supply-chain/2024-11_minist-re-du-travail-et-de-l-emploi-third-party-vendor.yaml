notes: Young people’s data feared stolen in cyberattack on French government contractor.
  The French government said an incident directly impacted an unnamed service provider
  used by the network of “Local Missions” — places that offer advice and support to
  people between the ages of 16 and 25 about work and training. France’s Ministry
  of Labor and Employment announced on Thursday that it discovered a cyberattack suspected
  to have impacted the data of young people it was helping get into employment. According
  to the ministry’s statement , the attack directly impacted an unnamed service provider
  used by the department’s network of “Local Missions” — places that offer advice
  and support to people between the ages of 16 and 25 about work and training.
