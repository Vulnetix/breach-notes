notes: 'The defi yield aggregator project Kannagi Finance rug pulled on July 29 as
  its creators drained the $2.13 million total value locked. Kannagi Finance deleted
  its website and social media accounts following the exit scam.Blockchain security
  firm SolidProof had audited Kannagi in June.


  Total loss estimated at $2,130,000.'
