notes: Brian Shroder, the CEO of Binance's US entity, has left the crypto exchange as it faces an existential lawsuit from
  the U.S. SEC. Shroder is only the latest exec to leave Binance and its various regional arms in what is becoming a mass
  exodus in recent months. The company has also lost its general counsel, chief strategy officer, head of investigations,
  a senior VP of compliance, and two leaders of Binance's Russian arm.Simultaneously, Binance.US announced it would be cutting
  1/3 of its employees, or more than 100 people. This is the second staffing cut since the SEC lawsuit was filed in June —
  Binance.US cut around 50 positions, then around 10% of employees, shortly after the lawsuit was announced. The primary Binance
  entity also fired more than 1,000 people in July.
