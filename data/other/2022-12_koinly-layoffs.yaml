notes: UK-based crypto tax company Koinly announced they would be letting go of 14%
  of their team. This amounted to more than 100 employees, including the entire London-
  and Sydney-based teams. The company attributed the decision to the crypto market
  decline, as well as "fewer people reporting crypto on their tax returns". Hmm.The
  layoffs were reportedly "terribly" executed, with days of uncertainty and employees
  receiving little or no notice before being fired.
