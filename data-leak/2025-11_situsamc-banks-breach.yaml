notes: "SitusAMC (a financial technology provider serving 1,500+ clients including major US banks, real estate firms, and insurers) became aware of a breach on November 12, 2025, and notified all clients on November 22. Compromised data included corporate information such as accounting records, legal agreements, and potentially customer data of SitusAMC's clients. Major affected institutions include JPMorgan Chase, Citigroup, and Morgan Stanley. No encrypting malware was involved; the incident was described as contained. No ransomware group claimed responsibility and no ransom demands were disclosed. The FBI stated no operational impact to banking services was identified. SitusAMC processes billions of documents related to real estate loans annually."
