source_name: '"Socket, Bungee Restart Operations After Apparent $3.3M Exploit"'
source_url: https://www.coindesk.com/tech/2024/01/17/socket-bungee-restart-operations-after-apparent-33m-exploit/
date_of_breach: '2024-01-16'
date_of_disclosure: '2024-01-16'
category: data-leak
notes: 'The Socket cross-chain infrastructure protocol was hacked for around $3.3
  million in an attack that exploited its Bungee bridge. The thieves were able to
  exploit a bug that allowed them to take assets from those who had granted approval
  to a portion of the system called SocketGateway.A little over 700 victims were affected,
  and the highest loss from a single wallet was around $657,000. 121 wallets lost
  assets priced at more than $10,000.On January 23, the protocol announced they had
  recovered 1,032 ETH (~$2.23 million) of the stolen funds.


  Total loss estimated at $3,300,000.'
