notes: 'Terraform Labs develops two cryptocurrencies: TerraUSD ($UST), an algorithmic
  stablecoin meant to be pegged to the U.S. dollar, and $LUNA, a crypto asset used
  both for speculation and to help maintain the UST peg. As UST dramatically lost
  its peg throughout early May, Luna plummeted in value alongside it. Luna was trading
  between $80 and $90 in the first days of May, but as of May 11 had lost 98% of its
  value and was hovering between $2 and $3. By midday on May 12, the token was trading
  at or below $0.01.Such a dramatic crash in a cryptocurrency that was in the top
  ten by market cap has been devastating to some. Some members of the Terra/Luna community
  on Reddit have spoken of being massively over-invested in Luna, with some describing
  losing their life savings and appearing to be in crisis.'
