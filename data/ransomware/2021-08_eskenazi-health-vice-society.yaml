notes: "On 4 August 2021, Eskenazi Health — Indianapolis's primary safety-net hospital serving the city's most vulnerable and uninsured populations — suffered a ransomware attack. Eskenazi detected the attack and immediately took its systems offline. The rapid detection prevented full encryption of systems, keeping essential medical services operational. However, the attackers had already exfiltrated patient data during the weeks prior to the attempted encryption. Vice Society published stolen patient data on its dark web leak site when Eskenazi did not pay a ransom. The leaked data included patient names, Social Security numbers, addresses, and medical information. The exact number of patients affected was not precisely disclosed; Eskenazi serves approximately 500,000 patients annually. Eskenazi Health operates Indiana's only Level I adult trauma center serving the Indianapolis metro area of 2 million people. The attack during August 2021 — while the Delta COVID-19 variant was causing record hospitalisations — was particularly impactful. Eskenazi had to divert patients from its emergency department during initial response. The breach was filed with HHS OCR covering a significant number of patients. The case is particularly significant ethically: safety-net hospitals primarily serve low-income, uninsured, and underinsured patients who have fewer resources to respond to identity theft or medical data exposure."
