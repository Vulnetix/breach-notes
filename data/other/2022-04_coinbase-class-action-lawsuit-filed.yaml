source_name: 'Lifshitz Law Firm, P.C. Announces Investigations of Cassava Sciences,
  Inc. (NASDAQCM: SAVA), Coinbase Global, Inc. (NASDAQGS: COIN), HyreCar, Inc. (NASDAQCM:
  HYRE), and Longeveron Inc. (NASDAQCM: LGVN)'
source_url: https://www.globenewswire.com/news-release/2022/04/13/2422266/0/en/Lifshitz-Law-Firm-P-C-Announces-Investigations-of-Cassava-Sciences-Inc-NASDAQCM-SAVA-Coinbase-Global-Inc-NASDAQGS-COIN-HyreCar-Inc-NASDAQCM-HYRE-and-Longeveron-Inc-NASDAQCM-LGVN.html
date_of_breach: '2022-04-13'
date_of_disclosure: '2022-04-13'
category: other
notes: A group of shareholders have filed a class-action lawsuit against Coinbase,
  alleging that the registration and prospectus statements provided for the company's
  IPO were false and misleading. The suit alleges that Coinbase failed to disclose
  that the company would require a large cash injection, and that it was susceptible
  to outages that were becoming more common as the company scaled. They described
  the company's positive statements about its outlook as "materially misleading and/or
  lack[ing] a reasonable basis".
