notes: Jake Paul, who is already in hot water after being named in the class-action
  lawsuit against SafeMoon, has now been implicated by YouTube detective CoffeeZilla
  in $2.2 million worth of undisclosed promotions for multiple different projects.
  Influencers are required by the FTC to disclose when they financially benefit from
  promoting a project, though the crypto space seems rife with celebrities deciding
  that rule just doesn't apply.Paul allegedly tried to cover his steps by creating
  a new crypto wallet to receive payments for each promotion, but then transferred
  the money a wallet he controlled to cash out. Oops. Some of the projects that Paul
  hyped in his undisclosed promotions included League of Sacred Devils, $MILF, and
  $YUMMY.
