notes: "Italian Serie A football club Bologna FC was attacked by RansomHub in November 2024. RansomHub claimed to have stolen 200 GB of data including player contracts, passports, financial records (sponsorship revenue breakdowns), medical records of players, and confidential customer and employee data. The club was given a three-day deadline and an extension, but ultimately did not pay; RansomHub published the full dataset on its dark web leak site on November 29, 2024. Notable as a media/entertainment/sports sector breach exposing sensitive athlete health and contract information."
