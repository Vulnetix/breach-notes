notes: 'The Vee Finance decentralized finance platform was hacked for $35 million worth of Ethereum and Bitcoin. The platform
  suspended trading after the hack was discovered, and also tried to tempt the hackers with promises of a bug bounty if they''d
  just be so kind as to return the funds. The platform had only launched a week earlier, though boasted of having $300 million
  worth of assets locked on their exchange.


  Total loss estimated at $35,000,000.'
