notes: 'Government Contractor Stormshield Suffers Double Breach. French security company
  warns of customer data and source code theft. A French cybersecurity company with
  government clients revealed this week that an unauthorized third party has stolen
  customer data and some of its source code. Airbus subsidiary Stormshield counts
  the French government among its public sector client list. It claimed that attackers
  targeted a customer portal used by customers and partners to manage support tickets.
  Third-party company: Stormshield.'
