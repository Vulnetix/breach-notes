source_name: '"Community Update on the Future of Reignmakers"'
source_url: https://reignmakers.draftkings.com/reignmakers-faqs
date_of_breach: '2024-07-30'
date_of_disclosure: '2024-07-30'
category: other
notes: American sports gambling behemoth DraftKings announced the shutdown of its
  Reignmakers NFT game and NFT marketplace, effective immediately. Reignmakers was
  a fantasy sports game that allowed players to purchase digital trading cards used
  for digital fantasy leagues.In an announcement in the project Discord and on their
  website, DraftKings wrote that the shutdown was "due to recent developments". They
  offered holders the ability to cash out their Reignmakers cards "based on factors
  that include, but are not limited to, the relative size and quality of your digital
  game piece collection". Holders were also invited to transfer their NFTs to their
  own cryptocurrency wallets, although the DraftKings-run "contests" in which people
  used their NFTs to try to earn rewards and win prizes will no longer exist. It's
  also unclear whether some NFTs, built to not be transferrable off-marketplace, will
  be able to be retained by their holders.Members of the DraftKings Discord reacted
  with chagrin to the news, and doubt that the vague promises of cash payments would
  amount to much. "What kind of compensation u think we get coming to us? Pennies?"
  wrote one. "Yeah I'm out like $20k," said another. Some blamed the shutdown on a
  recent lawsuit from a holder of the Reignmakers NFTs who lost $14,000 — a lawsuit
  which recently survived the motion to dismiss stage.
