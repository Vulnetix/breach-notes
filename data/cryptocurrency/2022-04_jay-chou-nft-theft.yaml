notes: 'Taiwanese singer Jay Chou fell victim to an apparent phishing scam, in which a malicious actor transferred his pricey
  Bored Ape NFT to their own wallet. The scammer then flipped the NFT for sale on LooksRare for 130 ETH (~$425,000).The theft
  prompted security researchers at Check Point Research to investigate what ended up being a serious bug in Rarible, where
  malicious NFTs could execute JavaScript and trick users into signing a contract that would then empty their wallets.


  Total loss estimated at $424,541.'
