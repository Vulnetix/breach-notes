notes: 'Oracle Health breach compromises patient data at US hospitals. A breach at
  Oracle Health impacts multiple US healthcare organizations and hospitals after a
  threat actor stole patient data from legacy servers. Oracle Health has not yet publicly
  disclosed the incident, but in private communications sent to impacted customers
  and from conversations with those involved, BleepingComputer confirmed that patient
  data was stolen in the attack. Oracle Health, formerly known as Cerner, is a healthcare
  software-as-a-service (SaaS) company offering Electronic Health Records (EHR) and
  business operations systems to hospitals and healthcare organizations. After being
  acquired by Oracle in 2022, Cerner was merged into Oracle Health, with its systems
  migrated to Oracle Cloud. Third-party company: Oracle Health (formerly Cerner).'
