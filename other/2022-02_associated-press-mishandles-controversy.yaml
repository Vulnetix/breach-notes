notes: After the fiasco the previous day in which some group of people at the Associated
  Press apparently decided turning an image of human suffering into an NFT was a brilliant
  idea, some at the Associated Press seem to be intent on tarnishing the organization's
  reputation even further. Horrified individuals took to the project's Discord, as
  the AP had previously invited people to use that as a way to give feedback and ask
  questions. The AP's "Director of Blockchain" Dwayne Desaulniers spent a while trying
  (but not really succeeding) to explain why the AP has decided to turn some of its
  photojournalism into NFTs. However, around 24 hours after the initial NFT tweet
  had been made, he apparently decided enough was enough and nearly everyone who'd
  asked a question was banned from the Discord, with their messages were removed.
  Some of Desaulniers' replies were also removed, such as where he had replied "Fucking
  right" to a user who said, "Dwayne wants a world without adblock, without archive.is,
  without a possibility that someone somewhere might wring a tiny bit of the AP's
  journalistic output out of them without paying for the privilege."
