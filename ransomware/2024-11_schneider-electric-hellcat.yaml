notes: "Hellcat ransomware group breached Schneider Electric's internal Atlassian Jira project tracking platform in November 2024, stealing over 40 GB of compressed data including 75,000 unique email addresses and 400,000+ rows of user/project data. Attackers demanded $125,000 paid in Monero (mockingly framed as 'baguettes'). After Schneider declined, Hellcat published the 40 GB dataset on 31 December 2024. This was Schneider Electric's third cybersecurity incident in 18 months."
