notes: Banq, a subsidiary of the Prime Trust crypto custodian, has filed for bankruptcy.
  Banq is a "crypto-friendly" payment processor based in Nevada, though according
  to the bankruptcy documents, former CEO Scott Purcell decided to try to pivot the
  company away from payments and into NFTs without approval from the board of directors.
  Banq's parent company, Prime Trust, has also been the subject of insolvency rumors
  recently.In the bankruptcy filings, Banq alleges that $17.5 million in assets were
  stolen by former officers, described in the listing as "computers, trade secrets,
  proprietary information and technology, business records, etc." The transfer allegedly
  was made to Fortress NFT Group, a rival company founded by the former CEO, CTO,
  and CPO. A lawsuit from Banq filed against Fortress and the executives in May 2022
  alleges that the executives "stole not only Banq's technology, but also significant
  other value of Banq's, and used the purloined property to launch Defendants Fortress
  NFT and Planet NFT using Banq's assets, employees, trade secrets and proprietary
  technology, claiming all of it to be their own." They also claim that the defendants
  deleted files and engaged in other fraudulent activity to try to cover up the theft.
