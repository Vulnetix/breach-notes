notes: 'A developer brought on to run a presale for the $TICKER token stole $900,000 from the project. 15% of the token supply
  was sent to the developer to distribute via an airdrop, but instead of doing so, the developer sold the majority of the
  tokens for around $900,000.After the thief was identified by blockchain sleuth zachxbt, they posted a long message on Twitter,
  writing, "im not sorry for any of you, tbh. you are all morons if you believe all it needs to make it here is to send your
  money to a custodial address and get rich". The thief later spent some of the money on Milady NFTs and memecoins.zachxbt
  stated that he had identified the developer, including his full name, location, and other details. He encouraged those who
  were scammed to contact him if they were interested in pursuing legal action.


  Total loss estimated at $900,000.'
