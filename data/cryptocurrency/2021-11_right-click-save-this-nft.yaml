source_name: '"NFT Collector Sells People''s Fursonas for $100K In Right-Click Mindset War"'
source_url: https://www.vice.com/en/article/pkpbay/nft-collector-sells-peoples-fursonas-for-dollar100k-in-right-click-mindset-war
date_of_breach: '2021-11-13'
date_of_disclosure: '2021-11-13'
category: cryptocurrency
vendor_product: Right Click Save This NFT
blockchain: ethereum
notes: In an apparent "fuck you" to members of the furry community who have been critical of NFTs, and to those who have pointed
  out that you can right-click and save files that people are paying enormous amounts for pointers to, someone minted an NFT
  titled "Right Click Save This". It features an image of Pepe the Frog overlaid on a collage of 100 stolen furry Twitter
  profile photos. The NFT sold for around $100,000, though after mass DMCA requests it was delisted from the OpenSea and Foundation
  marketplaces. The creator later promised to pay any owner of an image used in the collage $5,000, but only if the owner
  minted a token of their artwork and sent it to the collage creator.
