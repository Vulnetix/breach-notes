source_name: “eToro Reaches Settlement with SEC and Will Cease Trading Activity in Nearly All Crypto Assets”
source_url: https://www.sec.gov/newsroom/press-releases/2024-125
date_of_breach: '2024-09-12'
date_of_disclosure: '2024-09-12'
category: other
initial_attack_vector: Regulatory / legal action
vendor_product: eToro settlement
notes: The eToro stock and crypto trading platform settled with the U.S. Securities and Exchange Commission on charges that
  it was operating an unregistered broker and unregistered clearing agency, and facilitating trading certain crypto assets
  as securities. The platform agreed to pay $1.5 million in fines. As a part of the settlement, the platform will also restrict
  crypto trading for its U.S.-based customers to only bitcoin, bitcoin cash, and ether.
