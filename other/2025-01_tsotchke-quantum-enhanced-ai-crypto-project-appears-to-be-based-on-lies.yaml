initial_attack_vector: AI-assisted attack or AI-generated exploit
vendor_product: Tsotchke "quantum-enhanced AI" crypto project appears to be based on lies
notes: 'A project called "Tsotchke" has convinced a lot of people to buy up its token based on claims that it uses "spin-based
  quantum computing" to "enable quantum-enhanced AI at room temperature". However, cryptographers and quantum computer scientists
  have serious doubts about the claims made by the project''s anonymous developers. "[If they] just said it was an advanced
  random number generator, it would be moderately accurate", remarked the CEO of a separate quantum/crypto crossover company.
  Another reviewer described the project as "primarily marketing language around a conventional PRNG."Tsotchke''s developers
  have reacted as any reputable scientists would to those questioning their lofty claims: "Disrespect me again and you''re
  gone", threatened someone in charge of the project''s Twitter account.'
