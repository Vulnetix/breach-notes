notes: The two co-founders of blockchain gaming company Gala Games are suing each
  other. One lawsuit, filed by Gala Games CEO Eric Schiermeyer, alleges that Gala's
  director Wright Thurston stole $130 million in $GALA, directing it through his company
  and then into a "complex web of obfuscatory transactions" between September 2022
  and May 2023. According to the lawsuit, at one point, Thurston explained that he
  was selling some of the $GALA tokens in order to purchase ammunition for firearms.
  The lawsuit also outlines how Gala issued the GALA v2 token in May 2023 in order
  to hide the alleged theft from Gala's token holders.In a competing lawsuit, Wright
  Thurston alleges that Schiermeyer unilaterally misused over $600 million in company
  funds in wasteful actions that were "often for his own personal benefit", including
  to buy a private jet and hire architects and designers for personal real estate
  projects.The $GALA token dropped 5% on the news of the lawsuits.
