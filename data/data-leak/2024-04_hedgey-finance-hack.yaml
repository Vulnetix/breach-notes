notes: 'Hedgey Finance, a platform used to manage token claims, lockups, and vesting,
  was hit with a flash loan attack that drained $44.7 million of customer funds from
  the platform.The majority of assets were stolen from Hedgey on the Arbitrum layer-2
  network, although around $2.1 million of them were stolen from the version deployed
  on the Ethereum mainnet.Hedgey Finance confirmed the exploit, and sent an optimistic
  and congratulatory message on-chain: "Well done for finding it! We''re assuming
  you executed this exploit as a white hat, so we''d like to get in touch with you
  to discuss next steps." No on-chain response thus far.


  Total loss estimated at $44,700,000.'
