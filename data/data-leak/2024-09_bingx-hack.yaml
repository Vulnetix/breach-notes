notes: 'Singaporean cryptocurrency exchange BingX suffered a $52 million loss across a broad range of cryptocurrencies. The
  thefts occurred across two attacks that were hours apart. The attack appears to have targeted one of the exchange''s hot
  wallets.Some accused the exchange of trying to cover up the theft by announcing "temporary wallet maintenance" without disclosing
  that a theft had occurred. The team later announced that "there has been minor asset loss", and stated that the lost funds
  would be restored out of the company''s capital.Around $10 million of the stolen assets were frozen during recovery efforts
  after the theft.


  Total loss estimated at $52,000,000.'
