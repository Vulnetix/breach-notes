notes: "TriZetto, a healthcare technology subsidiary of Cognizant Technology Solutions, disclosed in late 2024 that a data breach had affected over 3 million individuals. TriZetto provides healthcare benefits administration, claims processing, and revenue cycle management software used by health insurance payers and providers across the US. The breach exposed sensitive patient and member data including names, Social Security numbers, dates of birth, medical records, health insurance information, and financial account details. Multiple health insurance payers and providers notified their members about exposure via TriZetto systems. The breach reinforced systemic concerns about the concentration of healthcare data in large health IT vendors and the cascade effect when such vendors are compromised."
