notes: 'The Toronto Comic Arts Festival angered artists and fans alike when they invited
  Saba Moeel, the artist behind the Pink Cat NFT collection, to attend as a featured
  guest. This was in part because of opinions around NFTs more generally, but much
  of the ire was directed at Moeel specifically when she was found to have traced
  much of her work from sources including Tank Girl, Tom and Jerry, and various artists
  on Instagram without providing any credit. Others were concerned with various transphobic
  or racist statements Moeel has made in the past, as well as the creation of artwork
  by a non-Black artist that appeared to be caricaturing Black people.Moeel responded
  to the criticism in a slew of tweets, writing in one: "Why did i trace tank girl
  art? Why did Occidental soldiers raid the Iraqi national museum of art and steal
  all of our cultural artifacts and history? Many questions to answer". Moeef also
  accused those expressing concerns about her appearance of racism, and described
  them all as "people who love the central banking system". "Big organizations come
  out to try to destroy my community of 90% women, mostly WOC like me", she wrote.One
  other TCAF featured guest, Ngozi Ukazu, withdrew from the Festival, writing, "Not
  only do I disagree with the platforming of NFTS, but I also will not be a featured
  guest alongside an influencer who traces art and explicitly commodifies Black culture."
  TCAF wrote on Twitter that they were preparing a response to "valid concerns", and
  the subsequent day announced that they had rescinded the invitation due to "code
  of conduct violations and the concerns expressed by the comics community".'
