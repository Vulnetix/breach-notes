notes: University of Sydney data breach impacts recent applicants. The University
  of Sydney (USYD) has announced it has suffered a data breach through a third-party
  service provider, exposing the personal data of recently applied and enrolled international
  applicants. The University of Sydney (USYD) announced that a breach at a third-party
  service provider exposed personal information of recently applied and enrolled international
  applicants. The public university started operations in 1850 and has nearly 70,000
  students and about 8,500 academic and administrative personnel. It is considered
  one of Australia's most important educational institutes.
