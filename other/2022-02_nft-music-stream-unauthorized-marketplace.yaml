notes: Following close on the heels of the disaster of an idea that was HitPiece, a new project called "NFT Music Stream"
  cropped up. Like HitPiece, the project appeared to be scraping Spotify to list music by an enormous number of artists, all
  apparently without the consent of the musicians. Crypto critics and musicians who questioned the project quickly found themselves
  blocked.Also like HitPiece, NFT Music Stream claimed to be doing artists a favor, tweeting, "We are on YOUR SIDE and are
  going to flip the industry on it's[sic] head by cutting out the middle man &amp; giving control back to you profit wise."
  They also wrote, "I think a lot of people are missing the point of the project", apparently not understanding why musicians
  might be less than thrilled to see their work resold without permission.
