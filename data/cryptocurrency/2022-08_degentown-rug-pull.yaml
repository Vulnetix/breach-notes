notes: 'DegenTown, a collection of brightly-colored cel shaded humanoid figures, launched with much promotion from Magic Eden
  on their Launchpad minting service. Magic Eden aims to provide collectors with a level of trust in the project by requiring
  creators to disclose their identities to the company.DegenTown first suffered issues in July, when the project''s Twitter
  account was allegedly hacked, and users were tricked into approving a contract that drained their wallets. One individual
  behind the project promised they would compensate the users whose wallets were drained, but never did.The project ultimately
  rug pulled instead, with Magic Eden acknowledging it in a blog post and Twitter thread on August 17. They wrote that they
  were "urging the original Degen Town founders to return the funds" — however, this is complicated somewhat by the fact that
  the identity of one of them is not known to Magic Eden. They explained, "Our prior policy was that we doxxed founders. NFTRamo
  claimed to be an advisor but we learned that he was actually the founder of the project and used being an advisor as a way
  of skirting our doxxing processes." This is not the first time their identity verification process was sidestepped — they
  introduced it after a serial rugpuller used their platform to anonymously sell and then rug pull another NFT project, but
  that same person was able to do it again only a few months later.The DegenTown project minted 8,000 NFTs for 3 SOL apiece,
  bringing in $923,000. Beyond that, the creators took 7.5% in royalties on secondary sales. Magic Eden has said that they
  were able to get one of the two founders to return the funds they''d earned from the mint, and that they planned to use
  them to compensate buyers.


  Total loss estimated at $923,000.'
