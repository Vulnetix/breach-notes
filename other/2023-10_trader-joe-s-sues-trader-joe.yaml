notes: The American supermarket chain and cookie butter paradise, Trader Joe's, has filed a lawsuit against the popular Trader
  Joe decentralized exchange. According to the lawsuit, the supermarket believes the exchange is trying to benefit off the
  supermarket's popularity.This is actually the second such lawsuit by the supermarket against the exchange, after the first
  was thrown out when defendants claimed that they had simply named the project after the co-founder's brother, Joe. However,
  shortly after the victory, a co-founder admitted on their blog that they "just named it Trader Joe, after the supermarket".Trader
  Joe's is seeking all profits made by the exchange, plus damages and compensation for the failed lawsuit last year.
