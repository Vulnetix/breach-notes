source_name: '"Viral ''WTF'' Crypto Coin Launch Immediately Devolves Into Chaos, Pain"'
source_url: https://www.vice.com/en/article/93bqap/viral-wtf-crypto-coin-launch-immediately-devolves-into-chaos-pain
date_of_breach: '2022-01-13'
date_of_disclosure: '2022-01-13'
category: cryptocurrency
vendor_product: fees.wtf token drop disaster
blockchain: ethereum
notes: fees.wtf, a platform allowing people to see how much money a given cryptocurrency wallet has spent in gas fees, decided
  it was time to release their own token, and promised to follow it up with NFTs. They tempted people with an initial airdrop,
  where people recruited their friends in exchange for more "WTF" tokens. However, with a small initial liquidity pool and
  trading bots quickly entering the fray, enormous volatility led to absolute chaos. Some traders who were unfamiliar with
  setting up tolerances for slippage found their orders executed for substantially less than expected, with one user trading
  42 ETH ($135,000) for what ended up being less than 1¢ of WTF. Edward Ongweso Jr wrote for Vice, "Like so many other crypto
  projects, it was so poorly planned, capitalized, and executed, that it's almost indistinguishable from a scam."
