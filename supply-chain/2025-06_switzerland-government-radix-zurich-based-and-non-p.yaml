notes: 'Switzerland says government data stolen in ransomware attack. The government
  in Switzerland is informing that sensitive information from various federal offices
  has been impacted by a ransomware attack at the third-party organization Radix.
  The hackers have stolen data from Radix systems and later leaked it on the dark
  web, the Swiss government says. The exposed data is being analyzed with the help
  of the country’s National Cyber Security Centre (NCSC) to determine which government
  agencies are impacted and to what effect. Third-party company: Radix (Zurich based
  and non-profit organization).'
