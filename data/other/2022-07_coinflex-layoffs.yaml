notes: CoinFLEX, a yield farming platform that stopped withdrawals in late June, announced they had made major staff cuts
  to reduce their cost base by 50–60%. "The intention is to  remain right-sized for any entity considering a potential acquisition
  of or partnership opportunity with CoinFLEX," they wrote in a blog post.
