notes: 'After an attacker began exploiting a vulnerability in the Nomad bridge, many
  people rushed to replicate the attack and steal some of the roughly $190 million
  of various cryptocurrencies in the bridge. Some didn''t seem to think through the
  consequences of using wallets tied to their real-life identities to exploit the
  vulnerability, which should be interesting to watch.Nomad posted on Discord and
  tweeted that they were "aware of the incident" and "investigating", but the attack
  was ongoing over an hour after the acknowledgement.Four days before the attack,
  Nomad announced that they''d raised a $22.4 million seed round from investors including
  Coinbase, OpenSea, and Crypto.com.


  Total loss estimated at $153,000,000.'
