date_of_breach: '2024-04-30'
date_of_disclosure: '2024-04-30'
category: other
notes: Roger Ver, an early bitcoin investor who later became an outspoken evangelist
  for the fork Bitcoin Cash, has been arrested on tax fraud charges. According to
  the Department of Justice, Ver evaded almost $50 million in owed taxes by concealing
  income and lying to tax preparers about his bitcoin assets as he attempted to renounce
  his US citizenship and become a citizen of the tax haven St. Kitts and Nevis.Ver
  was arrested in Spain, and the United States will seek his extradition.Besides his
  tax woes, Ver has also been caught up in accusations by CoinFLEX that he owed the
  platform around $84 million after failing to meet a margin call. Ver has in turn
  claimed that CoinFLEX owed him money. CoinFLEX filed for restructuring in August
  2022.
