notes: 'A Canadian named Dan, who goes by "Soup" online, made more than $1 million
  through various phishing scams targeting Discord projects including those belonging
  to the Pika Protocol and Orbiter Finance. In one scam, he impersonated crypto journalist
  Luke Hamilton, trying to convince victims to join a fake Decrypt Discord server
  so he could steal their credentials.Soup was exposed by crypto sleuth zachxbt, who
  also described how the scammer had spent some of his ill-gotten funds on exclusive
  Roblox items that sell for "high 5 figs".


  Total loss estimated at $1,000,000.'
