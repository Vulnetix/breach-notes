vendor_product: Apecoin launches
notes: Bored Ape Yacht Club decided to release "ApeCoin", a new cryptocurrency token. The token distribution heavily favors
  current BAYC owners, truly underscoring the fantasy about a fairer distribution of wealth that some people thought crypto
  would somehow magically bring about. Holders of Bored Ape NFTs — already priced at several hundred thousand dollars apiece
  — received airdropped tokens in proportion to their holdings of Yuga Labs NFTs; one holder of 12 Bored Apes, 10 Mutant Apes,
  and 11 Kennel Club NFTs reported receiving 150,964 APE (valued at $1.3 million when $APE was at $8.56).The $APE price briefly
  soared to around $40 shortly after launch, before crashing precipitously to around $8.50 not long after, presumably as people
  cashed out their free money. Even many cryptocurrency enthusiasts were nonplussed by the launch, with many describing it
  as a "money grab" or an attempt to enrich the founders, which apparently is a bad thing (despite many crypto projects openly
  doing the same). One angry Redditor wrote, "Owners of Bored Ape NFTs were given the coin first(very rich people), then it
  was sold to the normies who got FOMO and pumped the price, then it crashed. Yet again, leaving regular people holding bags
  of pure garbage while the coin pushers wave bye-bye from their lambos."
