notes: 'Scammers were able to compromise the Discord account of a Bored Apes community
  manager, then use it to post an announcement of an "exclusive giveaway" to anyone
  who held a Bored Ape, Mutant Ape, or Otherside NFT. When users went to mint their
  free NFT, the scammers were able to steal their pricey NFTs. The scammer quickly
  flipped the stolen NFTs for a total of around 200 ETH (about $360,000), then began
  transferring funds to Tornado Cash.The Bored Apes Discord was also compromised on
  April 1, along with those of several other big-name NFT projects.


  Total loss estimated at $250,000.'
