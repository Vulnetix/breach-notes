notes: The FixedFloat cryptocurrency exchange was exploited again, this time for around $2.8 million. This follows shortly
  after a February 18 hack in which attackers made off with $26 million.FixedFloat acknowledged the theft in a Twitter post,
  and blamed the same thieves. They claimed that this theft was enabled by a vulnerability in a third-party service.
