notes: "LexisNexis, the major legal research and information services platform used extensively by law firms, government agencies, and courts, confirmed a data breach in early 2026. Hackers claimed access to government and law firm user data. LexisNexis stated the breach had been contained. Full scope of affected records and users not yet publicly confirmed at time of writing (April 2026). Notable due to the sensitivity of legal research activity data; LexisNexis serves virtually all large law firms and many government entities. Details limited as incident is very recent."
