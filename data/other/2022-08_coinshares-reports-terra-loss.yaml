source_name: '"CoinShares reports $21.7M loss tied to Terra implosion"'
source_url: https://cointelegraph.com/news/coinshares-reports-21-7m-loss-tied-to-terra-implosion
date_of_breach: '2022-08-02'
date_of_disclosure: '2022-08-02'
category: other
notes: In their Q2 earnings report, European cryptocurrency investment firm CoinShares
  reported that they'd only made $120,000 in net income in the most recent quarter,
  down from more than $32 million in Q1. They explained this was largely because of
  an enormous loss that resulted from the May collapse of the Terra ecosystem, costing
  the firm £17.7 million ($21.5 million).
