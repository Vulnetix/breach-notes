source_name: '"‘Forgive him Satoshi’ — Trump’s pastor ripped for memecoin that crashed 93% after launch"'
source_url: https://www.dlnews.com/articles/markets/trump-pastor-memecoin-tanks/
date_of_breach: '2025-01-20'
date_of_disclosure: '2025-01-20'
category: other
vendor_product: Tweet by Pastor Lorenzo Sewell
blockchain: solana
notes: 'Reverand Lorenzo Sewell, a pastor and vocal Trump supporter who delivered the benediction at Donald Trump''s inauguration,
  followed in his hero''s footsteps by trying to shill a memecoin to his followers. In a video posted to Twitter hours after
  his speech, in which he seemed to still be wearing the same outfit, Sewell urged: "I need you to do me a favor right now.
  I need you to go buy the official Lorenzo Sewell coin."The reaction to his post was not exactly warm, with lawyer Ari Cohn
  tweeting: "🎶Look at this grift, isn''t it neat?  Wouldn''t you say God''s debasement''s complete? 🎶"After a very brief spike
  in token price, the memecoin collapsed.'
