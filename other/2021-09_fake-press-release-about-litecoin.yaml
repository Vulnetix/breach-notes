source_name: '"No, Walmart will not be accepting Litecoin. Here''s how people were
  duped."'
source_url: https://mashable.com/article/litecoin-walmart-fake-news
date_of_breach: '2021-09-13'
date_of_disclosure: '2021-09-13'
category: other
notes: A press release distributed via GlobeNewswire claimed Walmart was announcing
  a partnership with Litecoin to begin accepting the cryptocurrency as a payment method.
  The value of Litecoin spiked before tumbling after Walmart said the announcement
  was fake.
