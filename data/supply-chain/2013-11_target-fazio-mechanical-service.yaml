initial_attack_vector: Attackers stole network credentials from Fazio Mechanical Services
  — a Pennsylvania HVAC (heating, ventilation, and air conditioning) contractor —
  by infecting Fazio employee computers with Citadel malware; these credentials provided
  access to Target's vendor portal, from which attackers pivoted to Target's POS network
  and installed BlackPOS RAM-scraping malware
