notes: 'Only hours after Do Kwon was arrested in Montenegro, federal prosecutors in New York filed eight criminal charges
  against him: conspiracy to defraud, conspiracy to defraud and engage in market manipulation, and two counts each of commodities
  fraud, securities fraud, and wire fraud. Prosecutors accuse Kwon of defrauding people by selling LUNA and UST (Terra) based
  on false claims about the technology, degree of adoption, and effectiveness of the algorithm intended to maintain Terra''s
  stability.The criminal charges out of the US add to civil charges he''s facing from the SEC, as well as an investigation
  out of South Korea.'
