notes: 'Nitro PDF Suffered A Data Breach Impacting Google, Apple, Amazon, And More.
  Popular PDF service provider Nitro PDF has recently suffered a massive data breach.
  While, they apparently strive to downplay the incident, it turns out that the breach
  also affected tech giants including Apple, Google, Amazon,. Reportedly, Nitro Software,
  the entity behind Nitro PDF has disclosed a data breach. As revealed via a statement
  to the Australia Stock Exchange, Nitro noticed some unauthorized access to an isolated
  database. However, according to the firm, the affected database didn’t include any
  information that could affect its clients. As mentioned in their statement,. Third-party
  company: NITRO.'
