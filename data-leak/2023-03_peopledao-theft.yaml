notes: 'PeopleDAO is the successor to ConstitutionDAO, a group that made an ill-fated
  attempt to buy a copy of the US Constitution in November 2021. When the accounting
  lead for PeopleDAO accidentally shared an editable accounting spreadsheet link in
  a public Discord channel, an enterprising member of the Discord decided to take
  advantage. They inserted a row with their own wallet address for a 76 ETH (~$120,000)
  payment, then hid the row so it wouldn''t display to the other viewers.When team
  leads reviewed the spreadsheet to sign off on the payments, they didn''t see the
  row, and there was no rollup showing total payments or anything else that would''ve
  helped them catch the malicious activity. The transactions were uploaded to a tool
  allowing asset transfers via CSV, and the required six out of nine multisig members
  approved the transaction.PeopleDAO have reported that they''re working with various
  security researchers to track the funds, and have reported the theft to the FBI
  and FTC.


  Total loss estimated at $120,000.'
