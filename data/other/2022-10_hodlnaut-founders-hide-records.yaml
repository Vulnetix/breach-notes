source_name: '"Hodlnaut founders hid financial documents, new Singapore court report
  says"'
source_url: https://www.techinasia.com/hodlnaut-founders-hid-financial-documents-singapore-court-report
date_of_breach: '2022-10-28'
date_of_disclosure: '2022-10-28'
category: other
notes: Hodlnaut, a crypto lending platform that halted withdrawals on August 8, has
  been undergoing court proceedings while it's determined if the insolvent company
  has a path to stabilization or if they will need to be liquidated. A Singaporean
  court document shows that the company founders tried to hide financial documents
  from the court, and that the records that do exist "have not been properly maintained".
  According to the Interim Judicial Managers, the founders and some other employees
  were uncooperative, obstructed the advisors' work, and tried to stop them from "taking
  into possession various key books and records of the Company".Sounds like everything's
  above board over there! It was also exposed in August that the company had lied
  to its users about their exposure to the Terra collapse.
