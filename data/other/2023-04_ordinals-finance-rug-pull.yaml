notes: 'Ordinals Finance was a short-lived project, emerging in late February with
  promises to help build out a defi ecosystem on the Bitcoin blockchain.On April 24,
  the project developer withdrew 256 million OFI tokens and swapped them to ETH worth
  around $1 million. They then laundered the funds through the Tornado Cash crypto
  mixer. The project creator deleted the project''s Twitter account and took down
  its website.


  Total loss estimated at $1,000,000.'
