notes: If it wasn't already nauseating to watch a huge corporation like Coca-Cola
  use LGBTQ Pride Month to market their products and pay lip service to supporting
  LGBTQ rights while supporting anti-LGBTQ politicians, now they're doing it with
  NFTs. Coca-Cola launched "The Coca-Cola Pride Collection" of 136 NFTs, which are
  minting for 335 MATIC (~$158). The website states that all proceeds will go to LGBTQ+
  charities.At that price, Coca-Cola will only be earning about $21,500 (minus any
  expenses) if the project mints out, plus any resale fees. A many-billion-dollar
  company like Coca-Cola might consider just donating the 20 grand themselves.
