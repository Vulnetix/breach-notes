notes: 'Grand Base, a real world assets platform built on the Base layer-2 blockchain, has seen $2 million exit the platform
  in a hack or rug pull.The team behind the project claimed that the deployer wallet had been compromised, allowing an attacker
  to drain the project''s liquidity pool. Altogether, 615 ETH (~$2 million) was taken from the project.Grand Base is a platform
  where users can trade "gAssets", which are crypto tokens that represent stocks in tech companies including Amazon, Apple,
  Google, Meta, and Microsoft.


  Total loss estimated at $1,972,305.'
