notes: 'After refusing to pay ransom, US-based auto parts distributor has sensitive
  data leaked by cybercriminals. NameSouth is the latest victim of NetWalker, a ransomware
  gang that appeared on the cybercrime scene sometime in 2019. A 3GB archive that
  purportedly belongs to NameSouth, a US-based auto parts shop, has been publicly
  leaked by the NetWalker ransomware group. NameSouth seems to be the latest victim
  of the ransomware gang that surfaced sometime in 2019. NetWalker’s targets range
  across multiple industries, with archives of stolen data from about a hundred victimized
  businesses publicly posted on the gang’s darknet website to date. Third-party company:
  NameSouth.'
