source_name: '"Crypto firm Wyre winding down after failed Bolt deal"'
source_url: https://www.axios.com/2023/01/03/wyre-shutdown-crypto-winter
date_of_breach: '2023-01-03'
date_of_disclosure: '2023-01-03'
category: other
notes: Crypto payments platform Wyre inked a deal to be acquired by Bolt in a $1.5
  billion deal in April 2022, but the acquisition was canceled in September after
  the two firms "mutually agreed to continue their partnership as independent businesses".
  However, Wyre only made it a few more months before CEO Ioannis Giannaros abruptly
  emailed employees on December 30 to inform them that he would be liquidating the
  company, terminating services, and that nearly all employees would be let go.Giannaros
  told Axios that the company was "still operating but will be scaling back".
