source_name: '"Minecraft and NFTs"'
source_url: https://www.minecraft.net/en-us/article/minecraft-and-nfts
date_of_breach: '2022-07-20'
date_of_disclosure: '2022-07-20'
category: other
vendor_product: Minecraft disallows NFTs
notes: Minecraft is a massively popular sandbox-style video game that had almost 140 million monthly active users as of 2021.
  Its developer, Mojang Studios, published a blog post detailing upcoming guidelines to clarify their position on NFTs and
  blockchain more generally. They wrote that "NFTs ... can create models of scarcity and exclusion that conflict with our
  Guidelines and the spirit of Minecraft." They announced that "blockchain technologies are not permitted to be integrated
  inside our client and server applications, nor may Minecraft in-game content such as worlds, skins, persona items, or other
  mods, be utilized by blockchain technology to create a scarce digital asset."
