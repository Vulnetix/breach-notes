notes: 'Some crypto advocates have long promoted crypto as a proper digital equivalent
  to cash. Physical dollars have a lot of benefits, including that you don''t need
  a bank account to use them and they provide a lot of privacy. Although bank transfers
  and apps like Venmo offer digital ways to transfer money, they typically require
  a bank account to use, and they leave a digital record of the transaction. Crypto
  advocates have long promised that crypto is a proper digital equivalent to cash,
  despite its own accessibility and privacy concerns.Anyway, a project called Offline
  Cash has sprung up. In a stunning example of Poe''s Law, the project seeks to provide
  a physical form of that digital physical cash people have spent so much time working
  on.Hear me out: imagine you had paper notes that you could transfer to people in
  lieu of making a Bitcoin transaction! And unlike regular cash, it has an expiration
  date to keep track of!'
