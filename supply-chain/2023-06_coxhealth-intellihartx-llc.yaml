notes: 'UPMC contractor detects patient data breach. A contractor for UPMC said it
  discovered a data breach that could have impacted customer and patient information.
  Tennessee-based Intellihartx LLC said it found that its secure file transfer service
  provider, Fortra, &ldquo;experienced a data security incident.&rdquo; The company
  undertook an investigation to figure out the scope of the incident. Intellihartx
  is notifying those potentially affected. It said it so far is unaware of anyone
  misusing the information. UPMC, along with other health care companies, uses Intellihartx’s
  services as part of its billing and collections. The breach occurred in February,
  UPMC said Friday. Third-party company: Intellihartx LLC.'
