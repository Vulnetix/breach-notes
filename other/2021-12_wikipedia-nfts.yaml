source_name: '"Jimmy Wales Is Auctioning the ''Birth of Wikipedia'' as an NFT"'
source_url: https://slate.com/technology/2021/12/jimmy-wales-birth-of-wikipedia-nft-auction.html
date_of_breach: '2021-12-03'
date_of_disclosure: '2021-12-03'
category: other
vendor_product: Wikipedia NFTs
blockchain: ethereum
notes: Wales announced he would be auctioning an NFT of a website representing the first edit to Wikipedia. This was not taken
  well by some in the Wikimedia communities — some felt he was misusing Wikipedia to advertise a commercial opportunity for
  himself that benefits the Wikimedia movement in no way, others felt that NFTs and the artificial scarcity intrinsic to the
  idea are antithetical to the Wikimedia ideology. Wales is also auctioning off a strawberry-colored iMac (pictured) he used
  to work on the site, and most people seem to agree that is pretty cool. The NFT ultimately sold for $750,000; the iMac went
  for $187,500.
