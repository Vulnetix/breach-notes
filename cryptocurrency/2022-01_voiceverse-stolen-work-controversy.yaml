vendor_product: Voiceverse stolen work controversy
blockchain: ethereum
notes: Troy Baker, the voice actor behind video game characters in The Last of Us, Far Cry, and various Batman games, announced
  he would be partnering with "voice NFT" company Voiceverse. Voiceverse is pretty vague as to what it's actually offering,
  but it has something to do "provid[ing] you an ownership to a unique voice in the Metaverse". Baker's announcement tweet
  ended, "You can hate. Or you can create. What'll it be?", which didn't seem to help with the already-negative reaction to
  the idea. Things were further soured when it was revealed that Voiceverse had stolen work without crediting it from a computer-generated
  voice project called 15.ai. Voiceverse subsequently apologized for the theft, and Baker acknowledged that his initial tweet
  "might have been a bit antagonistic".
