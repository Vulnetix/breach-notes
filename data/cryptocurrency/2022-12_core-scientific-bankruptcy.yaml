date_of_breach: '2022-12-21'
date_of_disclosure: '2022-12-21'
category: cryptocurrency
initial_attack_vector: Protocol collapse / insolvency
vendor_product: Core Scientific bankruptcy
blockchain: bitcoin
notes: Core Scientific warned in October that it was teetering on the edge of bankruptcy, so it was no huge surprise when
  the company filed for bankruptcy protection on December 21. Core Scientific is one of the largest Bitcoin miners, responsible
  for around 10% of the computing power on the Bitcoin blockchain. The company operates around 143,000 miners, and host an
  additional 100,000.Core Scientific is only one of many Bitcoin miners in distress, as low Bitcoin prices and other factors
  make mining much less profitable. Other mining firms, including Argo Blockchain and Greenidge Generation, have warned that
  they may face bankruptcy in the near future. Some firms, such as Iris Energy, have powered off a significant amount of their
  mining capacity.
