notes: A group of crypto enthusiasts promoting a memecoin have claimed responsibility for a string of incidents in which neon
  green sex toys were thrown onto professional women's basketball courts during at least six WNBA games since July 29. The
  group described the stunts as coordinated "pranks" intended to draw attention to the coin, in an ecosystem where memecoin
  prices are often heavily tied to virality.The incidents have been widely condemned as both dangerous and misogynistic by
  players, coaches, and the league, which has since implemented penalties including immediate ejection, a minimum one-year
  ban, and possible felony charges for offenders."It's super disrespectful," said Chicago Sky player Elizabeth Williams. "The
  sexualization of women is what's used to hold women down, and this is no different," stated coach Cheryl Reeve of the Minnesota
  Lynx. "The intent is to sexualize and demean the women players because they are women," wrote Glamour."This is empowering
  to every fucking crypto community to start thinking outside the box. Get creative and fucking do something that makes people
  actually laugh," said a member of the memecoin community, cheering the incidents for their virality and the subsequent impact
  on the coin price. The meme was even amplified by Donald Trump Jr., who posted to Instagram a photoshopped image of President
  Trump dropping one of the green sex toys off the roof of the White House and onto a group of women playing basketball below.
