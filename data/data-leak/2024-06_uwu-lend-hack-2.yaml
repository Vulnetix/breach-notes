notes: 'After suffering a $20 million loss in a June 10 hack, the UwU Lend defi lending protocol has now seen another $3.7
  million in suspicious outflows only days later. Although UwU Lend paused the protocol after the attack, they re-enabled
  it on June 12, claiming to have identified and resolved the vulnerability. This apparently wasn''t the case, given the same
  attacker quickly repeated their exploit.UwU Lend was created by Michael Patryn, aka Omar Dhanani, aka "0xSifu", who has
  been behind several cryptocurrency projects that have suffered major exploits. This is not exactly helping concerns among
  some observers that perhaps Sifu is the common denominator in these suspicious losses.


  Total loss estimated at $3,700,000.'
