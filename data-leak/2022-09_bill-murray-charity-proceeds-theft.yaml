vendor_product: Bill Murray charity proceeds theft
blockchain: ethereum
financial_loss_usd: 185000
notes: 'Bill Murray auctioned off an NFT representing the right to drink a beer with him, during which a painter will paint
  a picture of the scene that the buyer can keep. The auction benefits Chive Charities, which is a veteran- and first responder-focused
  non-profit. The NFT sold for 119.2 ETH (~$185,000).However, hours after the auction, a hacker gained access to Murray''s
  crypto wallet and snagged the ETH for themselves. They also attempted to steal 800 NFTs from the remaining collection by
  Bill Murray, though a wallet security team was able to safeguard those NFTs in time.Murray''s team confirmed the theft,
  and said they are working with the police and Chainalysis to identify the hacker.


  Total loss estimated at $185,000.'
