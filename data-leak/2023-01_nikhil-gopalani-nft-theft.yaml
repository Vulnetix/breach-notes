notes: 'An attacker drained the wallet of Nikhil Gopalani, the COO of the Nike-owned crypto organization RTFKT. Most of the
  stolen NFTs were RTFKT NFTs, and the priciest were the nineteen CloneX NFTs that the thief flipped for between $5,850 and
  $13,960 each, for a total of 112.3 ETH ($136,000). Gopalani''s wallet was also relieved of nineteen RTFKT Animus Eggs (priced
  at a cumulative ~$20,000 based on floor price) and eleven RTFKT x Nike Dunk Genesis CRYPTOKICKS NFTs (priced at a cumulative
  $3,300).Gopalani tweeted that "I was hacked by a clever Phisher (same phone # as apple ID) &amp; sold all my clone x / some
  other nfts... Obviously pretty upset and hurt by this and I havent really been able to move all day." He didn''t provide
  further details, but a tweet by RTFKT CTO Samuel Cardillo suggested that Gopalani may have provided passwords or private
  keys to a phisher.


  Total loss estimated at $159,300.'
