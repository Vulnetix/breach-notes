notes: 'Protected Health Information Stolen in HealthEquity SharePoint Breach. HealthEquity
  has confirmed a breach of its SharePoint data, which included protected health information.
  HIPAA compliance data breaches have also been HealthEquity has confirmed a breach
  of its SharePoint data, which included protected health information. Data breaches
  have also been reported by Kairos Health Arizona and Ambulnz. HealthEquity, a Draper,
