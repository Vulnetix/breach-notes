notes: A multi-agency hammer came down on the bankrupt cryptocurrency lender and alleged Ponzi scheme that was Celsius. The
  co-founder and former CEO of the company, Alex Mashinsky, was arrested and charged with seven counts including securities
  and commodities fraud, wire fraud, and conspiracy to manipulate the price of Celsius' CEL token. The indictment also named
  Roni Cohen-Pavon, Celsius' former Chief Revenue Officer.Alongside the indictment from the DOJ, the Securities and Exchange
  Commission (SEC), Commodity Futures Trading Commission (CFTC), and Federal Trade Commission (FTC) each filed their own separate
  lawsuits against Mashinsky and Celsius.These latest lawsuits join an existing lawsuit, filed in January 2023, against Mashinsky
  by the New York Attorney General.
