notes: Cyberattack on Help at Home Affects 26,700 Current & Former Patients. Data
  breaches have been reported by Help at Home, Kinsler Family Dentistry, ParkTree
  Community Health Center, and Providence Pediatrics Manito. Help at Data breaches
  have been reported by Help at Home, Kinsler Family Dentistry, ParkTree Community
  Health Center, and Providence Pediatrics Manito. HAH Group Holding Company, a home
  healthcare provider that does business as Help at Home, has discovered the protected
  health information of 26,744 individuals has been exposed at one of its vendors.
  The vendor notified Help at Home about the intrusion on March 21, 2021; however,
  at the time, it was unclear to what extent personal information was involved.
