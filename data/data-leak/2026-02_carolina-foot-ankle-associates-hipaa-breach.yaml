notes: 'Carolina Foot & Ankle Associates (NC), a Healthcare Provider, submitted a
  HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2026-02-09
  for a breach affecting 501 individuals. Breach type: Hacking/IT Incident. Information
  location: Network Server. Source: HHS OCR Breach Portal (HIPAA Breach Notification
  Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected
  health information (PHI) affecting 500 or more individuals.'
