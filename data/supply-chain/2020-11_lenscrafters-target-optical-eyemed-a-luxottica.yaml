notes: 'Black Kite third-party breach timeline entry for LensCrafters, Target Optical,
  EyeMed, and other eye care practices. Data breached: Contact details, health insurance
  policy numbers, and appointment notes related to treatment, such as health conditions,
  procedures, and prescriptions, as well as other sensitive data, including the credit
