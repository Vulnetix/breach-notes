notes: 'As many as 6,000 people may be affected by data breach in Saint John parking
  ticket system. The third-party software product Click2Gov, run by CentralSquare
  Technologies, was hacked. As many as 6,000 people in Saint John, N.B., could have
  had their personal information exposed, an analyst group said as the city announced
  it was one of dozens of municipalities affected by a data breach to its online parking
  ticket payment system. The city said it learned about a breach to the third-party
  software product Click2Gov, run by CentralSquare Technologies. . The product gives
  customers the option to pay parking tickets through the city’s website. Third-party
  company: Click2Gov.'
