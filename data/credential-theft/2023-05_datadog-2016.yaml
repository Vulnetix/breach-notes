notes: 'In July 2016, SaaS provider DataDog suffered a breach affecting its AWS customers.
  The breach stemmed from an attacker targeting production infrastructure servers
  and a database that stores user credentials. AWS users who attempted to use AWS
  credentials shared with Datadog also reported issues. DataDog immediately mitigated
  and notified users of the breach and ensured any precautions needed to be taken.


  Sourced from breaches.cloud'
