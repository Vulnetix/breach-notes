source_name: '"NFT trader accidentally bids 100 eth on a freely minted NFT"'
source_url: https://reddit.com/r/CryptoCurrency/comments/12cqy6b/nft_trader_accidentally_bids_100_eth_on_a_freely/
date_of_breach: '2023-04-05'
date_of_disclosure: '2023-04-05'
category: other
notes: 'OpenSea launched a collection of "Gemesis" NFTs to celebrate the launch of
  their Pro platform and their acquisition of Gem, a rival NFT platform. Anyone who
  bought NFTs from the Gem platform was eligible to mint the NFT for free. The NFTs
  have been trading on the secondary market for around 0.06 ETH (~$110).A trader apparently
  trying to bid $100 for one of the NFTs seems to have mistakenly entered 100 ETH,
  or around $190,000. The trade was of course quickly accepted by a seller who made
  a tidy 1666x the typical floor price.Some have speculated the massive offer was
  money laundering, but the fact that the bid was an open offer that could be accepted
  by anyone seems to make that theory less likely.


  Total loss estimated at $190,000.'
