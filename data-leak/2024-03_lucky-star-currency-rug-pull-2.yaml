notes: 'The astrology-based Lucky Star Currency project rug-pulled for $1.1 million
  in October 2023. You''d think that might be the end of it, but on March 22, 2024,
  ownership of the project was transferred to a malicious smart contract that then
  drained tokens priced at almost $300,000 from those who still held them.You almost
  have to admire the tenacity.


  Total loss estimated at $297,000.'
