notes: DNP3 is a streamer known for giving away large sums of money to other streamers.
  He is also a crypto founder behind projects including CluCoin, the Xenia play-to-earn
  game, the Gridcraft play-to-earn game platform, and the Goobers NFT project.On January
  3, he released a statement on Twitter explaining that he had become addicted to
  gambling over the past year — specifically mentioning his use of the Stake cryptocurrency
  casino. He wrote, "Every dollar I could find I would put into Stake in hopes of
  winning big. Even when the big wins did happen it wasn’t enough. Eventually I lost
  everything. In addition to my own life savings, I also irresponsibly used investor
  funds to try and 'get my money back' from the casino which was wrong for so many
  reasons."The impact on the projects he created — and those who put money into them
  — is not yet fully clear.
