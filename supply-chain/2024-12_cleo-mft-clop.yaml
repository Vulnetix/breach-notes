notes: "Clop ransomware group exploited CVE-2024-50623 in Cleo's MFT products starting November 2024, bypassing the initial patch. Huntress identified active exploitation 3 December 2024 and disclosed publicly. Active targeting began 6 December, hitting 50+ hosts in North America, primarily retail sector. Clop claimed responsibility 13 December 2024, adding 66 obfuscated victim names to its leak site; final victim count exceeded 200 companies. Blue Yonder (a supply chain management platform used by Fortune 500 companies) was impacted, cascading to downstream customers including major grocery retailers. CVE-2024-55956 (the bypassed patch) was fully addressed in version 5.8.0.24. Pattern mirrors Clop's prior campaigns against Accellion FTA (2020), GoAnywhere (2023), and MOVEit (2023)."
