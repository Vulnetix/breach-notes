category: other
notes: French blockchain firm The Blockchain Group announced that they had requested
  trading be halted on the company's shares and postponed a planned company meeting.
  The announcement disclosed "financial difficulties" that had caused the company
  to try to obtain rescue financing. They also said that they had begun discussions
  with creditors around possible restructuring.The Blockchain Group is behind a number
  of different services, including a crypto wallet called Eniblock and an open source
  software bounty project called Bountysource. Users of the Bountysource project have
  been complaining about issues receiving payments since as far back as May 2023.
