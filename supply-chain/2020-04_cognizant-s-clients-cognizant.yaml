notes: 'IT services giant Cognizant suffers Maze Ransomware cyber attack. Information
  technologies services giant Cognizant suffered a cyber attack Friday night allegedly
  by the operators of the Maze Ransomware, BleepingComputer has learned. Cognizant
  is one of the largest IT managed services company in the world with close to 300,000
  employees and over $15 billion in revenue. As part of its operations, Cognizant
  remotely manages its clients through end-point clients, or agents, that are installed
  on customer''s workstations to push out patches, software updates, and perform remote
  support services. Third-party company: Cognizant.'
