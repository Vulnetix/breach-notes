notes: Archie Comics announced they would be launching an NFT project called "Archieverse", which centers around their spooky
  "Madam Satan" character and invites people to "unlock the universe of Archie Comics to play, create, and be credited on
  a forthcoming comic book title". The project's creators have some pretty high hopes, aiming to mint 66,666 NFTs at $66.66
  each, which would earn them $4.4 million from the mint alone if they were to sell all of them.Reception to the project was
  swift and overwhelmingly negative. Even the biggest Archie fans who already populated the existing Archie Comics Discord
  (which saw the addition of crypto channels on the day of the announcement) seemed largely unhappy with the news, and a plan
  to migrate to their own server free from the NFT and crypto chat was quickly hatched.
