supply_chain_claimed: false
notes: "CISA issued an urgent advisory on 11 April 2024 warning Sisense customers to immediately rotate all credentials used with the platform. Sisense (a business intelligence/analytics SaaS serving critical infrastructure, defense, and Fortune 500 clients) had tokens, API keys, email account passwords, and SSL certificates stolen, giving attackers access to Sisense customers' connected third-party platforms including Salesforce, GitHub, Box, and BigQuery. The scale of downstream impact was unknown. CISA coordinated the response with Sisense and private sector partners."
