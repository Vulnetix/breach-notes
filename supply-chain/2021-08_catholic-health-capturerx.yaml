notes: 'Catholic Health Impacted by CaptureRx Data Breach, Patients’ PHI Exposed |
  TechTarget. The CaptureRx data breach is impacting 17K Catholic Health patients
  in New York. Catholic Health announced that the recent CaptureRx data breach is
  impacting some of its patients’ protected health information (PHI.). A total of
  17,002 patients are being impacted by the data breach, according to the US Department
  of Health and Human Services Office for Civil Rights. Third-party company: CaptureRx.'
