notes: The UK branch of the World Wildlife Fund (WWF) announced their upcoming "Tokens For Nature" NFT project, which is meant
  to support endangered species. The WWF was quick to tout that its project would be eco-friendly because it uses the Polygon
  blockchain, though commenters were skeptical. One commenter wrote, "This is like if David Attenborough did a piece to camera
  about his environmental activism while politely snapping swans' necks throughout." Other commenters expressed that it was
  irresponsible of the WWF to engage with NFTs at all, given the overall environmental damage of the concept, and because
  it brings more people into a space full of predatory projects. The WWF ended up shuttering the project on February 4, after
  all the negative feedback.This was not the WWF's first foray into NFTs — the German arm of the WWF released a "Non-Fungible
  Animals" NFT project in November 2021, which has enjoyed less than $10,000 in trading volume. It also did't appear to be
  the only project the WWF UK had planned — their NFT website advertised upcoming collaborations with CyberKongz (built on
  the Ethereum blockchain) and World of Women (also built on the Ethereum blockchain).
