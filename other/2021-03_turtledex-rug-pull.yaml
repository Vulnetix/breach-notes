notes: '24 hours after pre-sale, the team behind Turtledex drained $2.5 million from
  the liquidity pool and disappeared. Turtledex''s smart contract had been audited
  shortly before the sale, with no major issues found, leading some to question the
  point of such audits.


  Total loss estimated at $2,500,000.'
