date_of_disclosure: '2022-06-06'
category: other
vendor_product: Grit blockchain game demo fails to impress
notes: You might think that, since Epic Games has decided to distinguish itself from its major competitor Steam by welcoming
  blockchain games to its platform, they might try to make a splash with a few flashy titles to be the first listed on the
  platform. Alas, it is not to be, as the first known game that will be offered, Grit, has been described by Kotaku as "gimmicky"
  and "remarkably beige". The trailer mostly looks like a worse version of Red Dead Redemption, featuring horses that appear
  to hover through grassland. A gameplay teaser posted by an NFT games enthusiast to Twitter features him narrating that the
  game "is looking insane in the membrane", as he does nothing other than fire a gun into an empty room and spin.500 attendees
  of the "Galaverse" event (a gathering put on by Grit's creators, Gala Games) were airdropped "epic" rarity horse NFTs, which
  those with keen eyes were quick to observe are simply a premade asset the developers purchased from the Unreal Engine Marketplace.
