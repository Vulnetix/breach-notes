source_name: '"Funds on MangoFarmSOL drained, community alleges rug pull"'
source_url: https://cointelegraph.com/news/funds-mangofarmsol-drained-community-rug-pull
date_of_breach: '2024-01-07'
date_of_disclosure: '2024-01-07'
category: other
notes: 'A Solana yield farming project called MangoFarmSOL encouraged people to deposit
  Solana tokens into the protocol to earn airdrops by January 10. However, on January
  6, the project appeared to make off with all the tokens — around $2 million worth.
  They subsequently deleted their website and Twitter account, and closed their Telegram
  channel to new members.MangoFarmSOL is unrelated to the other Solana-based mango-themed
  project, Mango Markets, which was exploited in October 2022 for more than $100 million.


  Total loss estimated at $2,000,000.'
