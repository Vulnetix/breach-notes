source_name: '"Binance served crypto traders in Iran despite U.S. sanctions, clients
  say"'
source_url: https://www.reuters.com/technology/exclusive-binance-served-crypto-traders-iran-years-despite-us-sanctions-clients-2022-07-11/
date_of_breach: '2022-07-11'
date_of_disclosure: '2022-07-11'
category: other
notes: The latest Reuters investigation into Binance has alleged that the company
  processed transactions for Iranian users, despite U.S. sanctions and the company's
  claim to be compliant with them. Iranian traders interviewed by Reuters stated that
  they were able to take advantage of Binance's poor KYC checks to use the service
  despite the sanctions.The usage of the exchange by residents of sanctioned countries
  could draw the attention of US regulators. It's also the latest in several investigative
  reports by Reuters into Binance, in addition to a June report that the exchange
  facilitated $2.35 billion in illicit transfers from 2017–2021, and an April report
  that Binance supplied the Putin regime with information about crypto donors to opposition
  leader Alexei Navalny.
