notes: "On March 26, 2026, the Qilin ransomware group (described as Russian-speaking and both financially and politically motivated) attacked Die Linke, a left-wing democratic socialist party in the German Bundestag. The party confirmed a 'serious cyberattack' and temporarily shut down parts of its IT infrastructure. Attackers aim to publish sensitive data from internal party operations and personal information of headquarters employees; the party's member database was not accessed. Die Linke filed a criminal complaint with German authorities. The party stated the attack 'does not appear to be coincidental' given the political context and characterized it as part of hybrid warfare tactics. Qilin has been active since 2022 targeting hospitals, government agencies, and organizations across Europe."
