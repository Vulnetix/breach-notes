notes: 'Bahrain-based cryptocurrency exchange Rain was exploited for around $16.13
  million dollars on April 29. The exchange did not publicly disclose the hack until
  the suspicious outflows across wallets on multiple blockchains were noticed by blockchain
  investigator zachxbt.After zachxbt sounded the alarm on May 13, Rain admitted that
  they had had a "security incident", but stressed that customer funds were safe,
  and stated that the Rain Group had "covered any potential losses resulting from
  this incident".The attack was later attributed to North Korean state-sponsored attackers.


  Total loss estimated at $14,800,000.'
