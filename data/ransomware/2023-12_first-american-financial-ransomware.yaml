notes: "First American Financial Corp (one of the largest US title insurance providers) shut down its systems in late December 2023 after attackers accessed and encrypted non-production data. 44,000 individuals' names, addresses, SSNs, driver's license numbers, government IDs, financial information, and dates of birth were compromised. Disclosed via SEC 8-K. The disruption impacted real estate closings across the US. First American had also paid a $1 million NYDFS penalty in 2024 for its earlier 2019 data exposure incident."
