notes: A letter-writer seeking advice from the Financial Times wrote, "I got divorced
  last year and as part of the financial agreement, my ex-wife and I agreed that I
  would keep my cryptocurrency assets while she got the lion's share of my pension
  and other investments, and we split the family home. When we negotiated last autumn,
  the crypto market was riding high and I was convinced it would go higher still,
  but following the recent crash my digital assets have more than halved in value.
  I'm now considerably worse off than my ex and worried about my financial future.
  She says I only have myself to blame and won't discuss the matter further. Can I
  go to court to renegotiate our financial order?"As expected, the lawyer consulted
  by the FT informed them that their chances of a do-over were pretty slim, and suggested
  that individuals negotiating a split with a partner don't take on all the high-risk
  assets like this person did.As of August 20, Bitcoin was trading at around $21,200–70%
  lower than at its all-time-high of $69,000 in November 2021. Other major cryptocurrencies
  are faring similarly poorly, with ETH down 67% to $1,630 from its all-time-high
  of $4,890.
