source_name: '"Ozzy Osbourne''s NFT project shared a scam link, and followers lost thousands of dollars"'
source_url: https://www.theverge.com/2022/1/21/22895126/ozzy-osbourne-nft-scam-cryptobatz-hack-ethereum
date_of_breach: '2022-01-21'
date_of_disclosure: '2022-01-21'
category: cryptocurrency
initial_attack_vector: Phishing attack
vendor_product: CryptoBatz phishing attack
blockchain: ethereum
financial_loss_usd: 40894
notes: 'Ozzy Osbourne''s NFT project, CryptoBatz, changed to a slightly different Discord URL ("cryptobatz" rather than "cryptobatznft")
  some time after the new year. However, they forgot to take down at least one tweet mentioning the previous URL, and scammers
  were able to set up a new server at that location. Users were instructed to "verify", which redirected them to a phishing
  site where the contents of their wallets were stolen.


  Total loss estimated at $40,894.'
