notes: 'Mangatoon data breach exposes data from 23 million accounts. Manga comic reading
  app Mangatoon has suffered a data breach that exposed the account information of
  23 million users after a hacker stole it from an Elasticsearch database. Comic reading
  platform Mangatoon has suffered a data breach that exposed information belonging
  to 23 million user accounts after a hacker stole it from an unsecured Elasticsearch
  database. Mangatoon is also a very popular iOS and Android app used by millions
  of users to read online Manga comics. Third-party company: Elasticsearch.'
