notes: After cutting around 10% of their employees in May, the Latin American crypto
  exchange Bitso has performed another round of layoffs.The company didn't reveal
  how many employees were affected by the layoffs, but Portal do Bitcoin estimated
  that around 100 employees were let go — around 15–20% of the company's remaining
  staff. One employee wrote on LinkedIn that he was among "dozens" who were laid off.
