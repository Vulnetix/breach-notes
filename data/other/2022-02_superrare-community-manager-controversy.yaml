notes: 'The same week as bigoted tweets from an ENS director Brantly Millegan surfaced,
  so too did racist tweets by Ashni Christenson, then-community manager for the NFT
  platform SuperRare. Christenson, who is white, had presented herself as an ally
  to people of color and other members of marginalized communities in her work with
  SuperRare. The first tweets to appear were from 2011, where in several instances
  Christenson used the n-word when quoting rap lyrics. SuperRare quickly announced
  that they had "parted ways" with her, and Christenson tweeted that she had "stepped
  down". Unlike Millegan, who doubled down on his statements after they resurfaced,
  Christenson appeared apologetic for what she had written in the past. She expressed
  on Twitter: "wish I got the chance to take accountability &amp; talk about this".
  She apparently decided to try to do so by hosting a Twitter Space, oddly called
  "a warning to all web3". The Space went well for her in the beginning, with several
  people speaking up in support of Christenson and condemning SuperRare for the firing,
  and with Christenson championing a project she led at SuperRare to highlight Black
  creators and expressing how upset she was over "the situation". Several commenters
  expressed that they thought this was "cancel culture" at work, and that web3 was
  supposed to be resistent to "censorship" and "canceling".However, as the Space continued
  and amassed several thousand listeners, several Black women stepped up to express
  that her apologies didn''t seem genuine or self-reflective, and that the Space appeared
  to be little more than an opportunity for other white people in the web3 community
  to "forgive" her and pat her on the back, as she gained followers throughout. The
  women who spoke up immediately began to receive extraordinarily racist and threatening
  mentions and direct messages on Twitter from various people in the Space.As the
  Space was ongoing, more of Christenson''s past tweets surfaced, several considerably
  more recent than 2011, and none involving song lyrics: several that were racist
  towards Mexicans and one that appeared to be questioning the experiences of rape
  survivors. When one speaker asked how old Christenson had been when she made the
  2016 tweets about Mexicans, Christenson initially dodged. When another listener
  repeated the question she answered that she had been 26, but that research shows
  that your frontal lobe isn''t fully developed until you''re 25... or something.
  As the Space continued, Black web3 community member mec. kindly suggested that Christenson
  end the Space and take some time to genuinely reflect. As more Black speakers expressed
  that they felt hurt by Christenson''s actions, the Space abruptly ended. Although
  the Space was being recorded, Christenson took down the recording shortly after.'
