notes: 'Hackers compromised a computer belonging to EasyFi founder Ankitt Gaur, accessing
  his private keys which allowed them to transfer $6 million in stablecoins and $120
  million worth of EASY. The price of EASY crashed as a result of the low liquidity,
  limiting the hacker''s total payout to around $80 million. EasyFi followed the breach
  with a hard fork to "EZ 2.0", and compensated users with a mix of stablecoins and
  "IOU tokens" that could later be redeemed for discounted EZ.


  Total loss estimated at $80,000,000.'
