notes: One might think that a social media lead might have a grasp on his own social media accounts, and might have scrubbed
  damning tweets made only shortly before they began their position.One also might think that a company embroiled in constant
  racism accusations might be cautious about screening its employees.Neither of these things happened, though, and someone
  dug up vile tweets by Shpend Salihu, better known as NGBxShpend. Salihu resigned shortly after the tweets came to light,
  writing that they had "become a distraction from the [Bored Ape Yacht] Club and what we're all about."
