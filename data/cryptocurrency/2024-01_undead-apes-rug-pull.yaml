notes: 'The creator of a Solana-based NFT project called Undead Apes Society has been charged with money laundering conspiracy
  and making false statements to investigators after rug-pulling fans of his NFT project. Devin Rhoden, an active duty Senior
  Airman in the US Air Force, had created the project and minted two collections: UndeadApes and Undead Lady Apes. They promised
  to then mint a third collection, "Undead Tombstones", which was highly anticipated. However, the project turned out to be
  a rug pull, and the prices of the two previous collections also plummeted as a result of their connection to a scam project.
  The Undead Tombstones project raised 1,250 SOL in April 2022, which was at the time priced at around $128,000.When investigators
  subpoenaed Discord for Rhoden''s chat logs, they found messages celebrating the rug pull. "good shit on us making a fuck
  ton of money," he wrote to his co-conspirator.


  Total loss estimated at $128,000.'
