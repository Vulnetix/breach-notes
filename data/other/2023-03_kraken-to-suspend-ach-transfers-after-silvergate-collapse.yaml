source_name: '"Kraken to Suspend ACH Deposits and Withdrawals Following Silvergate
  Shutdown"'
source_url: https://www.coindesk.com/business/2023/03/22/kraken-suspends-ach-withdrawals-amid-silvergate-shutdown/
date_of_breach: '2023-03-22'
date_of_disclosure: '2023-03-22'
category: other
notes: The Kraken cryptocurrency exchange announced to its users that it will be suspending
  ACH transfers on March 27, as a result of the collapse of its banking partner, Silvergate.
  Based on their communications, it sounds like they have been unsuccessful in finding
  a new banking provider since Silvergate's March 8 collapse, which will impact customers'
  abilities to perform bank transfers to and from the exchange.
