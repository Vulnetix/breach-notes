source_name: '"PolkaWorld Hits Pause as Founder Faults Polkadot Governance Change"'
source_url: https://decrypt.co/197507/polkaworld-hits-pause-as-founder-faults-polkadot-governance-change
date_of_breach: '2023-09-15'
date_of_disclosure: '2023-09-15'
category: other
notes: PolkaWorld, a major community within the Polkadot blockchain project, has announced
  that they will have to suspend operations as a funding proposal was overwhelmingly
  rejected. In June, Polkadot changed their governance model to community voting,
  away from a model in which small groups of ostensible experts made decisions for
  the network. PolkaWorld has blamed the failure of their request for 16,842 DOT (~$70,000)
  to fund Q4 2023 operations on this new voting model, which shut down their request
  with 93.3% "no" votes."Personally, we believe decentralization only works for the
  'informed', it's not for everyone, no offense meant," wrote PolkaWorld on Twitter.
