source_name: '"NFT lending protocol Gondi says platform secured after $230K exploit"'
source_url: https://cointelegraph.com/news/nft-platform-gondi-secure-after-230k-hack
date_of_breach: '2026-03-09'
date_of_disclosure: '2026-03-09'
category: data-leak
notes: 'A thief exploited a smart contract belonging to the Gondi NFT platform to
  steal 78 NFTs priced at $230,000. Perhaps the most shocking part of the theft is
  that the attacker managed to find NFTs still holding any value at all. Around half
  of the stolen NFTs were taken from a single wallet.According to Gondi, the exploiter
  took advantage of functionality that allowed users to sell their NFTs to automatically
  repay loans.Gondi has said it has reimbursed customers by buying them "comparable
  items" from the same collections as their stolen NFTs, although it seems questionable
  that this will satisfy customers who purchased products whose whole selling point
  is that they aren''t interchangeable.


  Total loss estimated at $230,000.'
