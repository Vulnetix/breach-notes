notes: 'New passive voice Hall of Fame contender just dropped: "There were mistakes made in a wallet that I controlled." You
  would think someone who got their start as a writer might know better.Writer, journalist, and now web3 influencer Nicole
  Behnam helped pump Dogecoin founder Billy Marcus'' new free-to-mint "Blocky Doge 3" NFT project, writing on Twitter, "No
  roadmap or utility? I''m in 👀" and talking it up on large Twitter spaces. A wallet belonging to her then received 250 NFTs
  from Marcus early on, then dumped around 220 of the NFTs on the market all at once, tanking the secondary market price while
  earning her around 20 ETH (~$38,000). At the moment, the NFTs are selling for an average of 0.031 ETH apiece (~$59).After
  being found out, she wrote on Twitter that "There were mistakes made in a wallet that I controlled," but claimed that she
  had tried to make it up by returning the profits and buying up low-priced NFTs. "How the last 24 hours went down was not
  cool and I’m doing my best to rectify the situation," she wrote. "Listening, learning, moving forward." Shortly afterwards,
  she was removed from a "NFT100" list that had published only days prior by NFT Now, for what they described as violations
  of their ethics policy.


  Total loss estimated at $38,000.'
