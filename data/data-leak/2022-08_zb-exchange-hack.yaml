notes: 'The self-described "world''s most secure digital asset exchange", ZB, suffered an exploit in which attackers stole
  a large number of different cryptocurrencies, estimated by various researchers to be valued at around $3.6 million and $4.8
  million.ZB announced that they were suspending deposit and withdrawal services due to "sudden failure of some core applications".


  Total loss estimated at $3,600,000.'
