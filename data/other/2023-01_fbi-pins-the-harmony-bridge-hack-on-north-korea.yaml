initial_attack_vector: Nation-state attack (Lazarus/DPRK) — private key or social engineering compromise
vendor_product: FBI pins the Harmony Bridge
blockchain: bsc, ethereum
notes: A June 2022 hack saw cryptocurrency notionally worth $100 million stolen from Harmony's Horizon Bridge. At the time,
  blockchain research firm Ellipsis concluded that there were "strong indications" that the hack had been perpetrated by the
  North Korea state-sponsored Lazarus hacking group. Lazarus has been responsible for several major crypto hacks before this
  one, including the massive Axie Infinity hack in March 2022.Now, the FBI has accused two groups of North Korean hackers
  — Lazarus and APT38 — of perpetrating the Harmony hack. The groups then used Tornado Cash and RAILGUN to launder the funds.
