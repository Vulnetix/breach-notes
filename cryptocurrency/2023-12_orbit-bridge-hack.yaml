financial_loss_usd: 81000000
notes: 'The Orbit Bridge project, a cross-chain bridge for the Orbit Chain project, was exploited on December 31 for around
  $81 million. The attacker made off with around 26,742 ETH (~$64 million) and $18 million in the DAI stablecoin. Orbit Chain''s
  total value locked plummeted from $152 million to $71 million as over half the funds were drained.Orbit began sending the
  attacker on-chain messages, writing that "we will track you down and restore the damage you incurred to the ecosystem. And
  we will not stop." Orbit also wrote on Twitter that they were working with various law enforcement agencies.


  Total loss estimated at $81,000,000.'
