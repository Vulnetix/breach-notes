notes: Crypto-powered poker website CoinPoker was apparently exploited for around $2 million when an attacker was able to
  compromise a hot wallet controlled by the platform. The attacker then laundered most of the funds through the Tornado Cash
  mixer.The platform sent a message to the exploiter attempting to negotiate a return of some of the funds.
