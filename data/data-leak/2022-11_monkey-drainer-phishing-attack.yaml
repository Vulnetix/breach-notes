notes: 'The "Monkey Drainer" NFT phishing scammer first identified by blockchain detective zachxbt has struck again. They
  successfully emptied 7 CryptoPunks and 20 Otherside NFTs, which they flipped for 522 ETH (~$867,000). The scammer then laundered
  the funds through the Tornado Cash cryptocurrency mixer.


  Total loss estimated at $867,042.'
