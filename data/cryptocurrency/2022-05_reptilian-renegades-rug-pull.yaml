notes: The serial rug-puller who was behind the Balloonsville rug pull in February and Doodled Dragons rug pull in January
  has popped up once again, this time with a Solana NFT project called Reptilian Renegades. A project called Hydra Launchpad,
  which had recently announced they would be adding Reptilian Renegades to their lineup, were the ones to expose the project
  team member, who went by "Fuopist" on this project. Hydra claimed that they had been able to take control of the project's
  mint authority and cut off Fuopist from receiving further proceeds from the project.After the Balloonsville rug pull, which
  used the Magic Eden NFT marketplace, Magic Eden announced they would no longer be accepting anonymous projects on their
  platform. Despite that, this person was able to launch Reptilian Renegades on Magic Eden, where they were able to get their
  account verified.Following the unmasking, the Reptilian Renegades Twitter account posted a slew of tweets supposedly exposing
  various NFT influencers for shady behavior including undisclosed promotions. "I'm literally the Batman. I stop crime whilst
  committing crimes," they wrote in response to a person who tweeted, "The balloonsville guy is back and he's ready to tell
  you how corrupt NFTs are while he steals from you. The lack of self awareness is truly next level."
