notes: 'In November 2014 BrowserStack, a cloud testing platform for cross-platform
  testing of different applications, was breached through an old prototype machine
  that had not been updated and was vulnerable to the shellshock exploit. The attacker
  created an IAM user and generated a keypair. The attacker accessed the email list
  and used AWS Simple Email Service to send emails to 5,000 users falsely stating
  BrowserStack was shutting down.


  Sourced from breaches.cloud'
