source_name: '"Bitcoin mining pool BTC.com reports $3M cyberattack"'
source_url: https://cointelegraph.com/news/bitcoin-mining-pool-btc-com-reports-3m-cyberattack
date_of_breach: '2022-12-26'
date_of_disclosure: '2022-12-26'
category: data-leak
notes: 'In a press release, BIT Mining reported that their subsidiary BTC.com had
  experienced a "cyberattack" in which $700,000 of customer assets were stolen. They
  also reported that $2.3 million of company assets were stolen, though they said
  that some of these funds had been recovered. They wrote that they were working with
  Shenzhen law enforcement to investigate the attack, but provided few details on
  the attack vector.BTC.com is the seventh largest Bitcoin mining pool, which also
  operates other crypto mining services. Its parent company, BIT Mining, is publicly
  traded on the NSYE.


  Total loss estimated at $3,000,000.'
