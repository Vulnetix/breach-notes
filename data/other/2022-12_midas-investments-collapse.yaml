notes: 'Midas Investments announced suddenly that they would be shutting down their
  platform, which previously enabled users to deposit cryptocurrencies which would
  then be invested in various defi projects. The team revealed that they had only
  $51.7 million in assets compared to $115 million in liabilities, a fact they had
  not disclosed to most of their employees.Users with assets on the platform will
  see a significant haircut in what they are allowed to withdraw. Midas intends to
  keep 55% of the Bitcoin, ETH, or stablecoins held by users in their accounts, as
  well as any rewards users had earned.Lest the users be too upset that more than
  half of their assets no longer belong to them, fear not: Midas will be making up
  the difference in a new, valueless token that does not yet exist, but that will
  be associated with some future project that Midas has not described yet. You''re
  welcome!They''ve also announced they will be pivoting to "CeDeFi". Yes, that is
  indeed short for "centralized decentralized finance". No, I am not joking.


  Total loss estimated at $63,300,000.'
