notes: "REvil (Russian) ransomware attack on JBS S.A., world's largest meat processor, May 30 2021. Disrupted beef and pork slaughter facilities in US, Canada, Australia. JBS paid $11M USD in Bitcoin. CEO cited risk to customers as reason for paying. DHS internal records later revealed JBS cybersecurity was 'unusually poor' before attack. FBI identified REvil as responsible. Attack occurred just weeks after Colonial Pipeline incident. No evidence of customer data theft."
