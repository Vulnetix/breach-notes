source_name: '"TrueFi Issues Notice of Default to Blockwater Technologies"'
source_url: https://blog.truefi.io/truefi-issues-notice-of-default-to-blockwater-technologies-19088a9b2570
date_of_breach: '2022-10-09'
date_of_disclosure: '2022-10-09'
category: other
initial_attack_vector: Protocol collapse / insolvency
vendor_product: Blockwater Technologies insolvency
notes: Blockwater Technologies, a crypto investment firm based in South Korea, missed a payment on their $3.4 million loan
  from TrueFi, a decentralized borrowing platform. According to TrueFi, the group had previously amended their loan to extend
  the loan period and increase the borrowing rate, but were still unable to meet their required payment. TrueFi wrote that
  they intended to undergo a "court-supervised administrative proceeding", a route they said they chose due to "the complexity
  around the sudden insolvency".TrueFi claims the default is not a major risk to them, making up 2% of the platform's total
  value outstanding. They announced that the loan was "currently in an active restructuring to maximize recovery for affected
  BUSD lenders".
