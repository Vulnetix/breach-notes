notes: "Unauthorized access to Insight Hospital and Medical Center's (Chicago) network occurred between August 22 and September 11, 2025. The hospital issued a substitute notice on January 26, 2026. LockBit 5.0 initially claimed responsibility on December 5, 2025, claiming 200 GB of data and threatening to publish within two weeks. Termite (a separate ransomware group) subsequently also claimed the attack and leaked approximately 360 GB of stolen data on the dark web in late February 2026. Compromised data includes names, Social Security numbers, dates of birth, driver's license numbers, passport numbers, financial account information, and treatment-related health insurance information. Multiple class action law firms launched investigations following the delayed public disclosure."
