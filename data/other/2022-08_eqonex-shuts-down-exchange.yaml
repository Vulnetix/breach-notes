category: other
initial_attack_vector: Protocol collapse / insolvency
vendor_product: Eqonex
notes: The Nasdaq-listed firm Eqonex has announced they will close their "underperforming" crypto exchange, hoping to change
  their money allocation to "reflect the current market conditions and the opportunities that we are best placed to capture".
  They cited " extreme market volatility and declining trading volumes" as making it challenging to keep the exchange afloat.They
  announced that the exchange will stop trading on August 22, and customers have a month to withdraw their funds.
