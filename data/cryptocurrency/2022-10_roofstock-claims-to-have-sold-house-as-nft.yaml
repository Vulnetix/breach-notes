notes: If you've ever wished you could put the same amount of thought into buying a $100,000+ home as you do ordering another
  bag of dog food from your online retailer of choice, you're in luck! A company called Roofstock claims to have achieved
  its first house-as-NFT sale on a platform it promises will "provide a radically simple way for [single-family rental] properties
  to be purchased and sold with one-click using web3 technology". The home in question was a $175,000 single-family residence
  in Columbia, South Carolina.Needless to say, there were more than a few questions around the legal and tax ramifications
  of this. Some of the more crypto-minded spoke excitedly of "the ability to easily fractionalize your properties or take
  loans against it in a decentralized way" that this might unlock, while the rest of us were left wondering what a defi loan
  default and foreclosure would look like.As much as I agree the real estate system could use some improvements, introducing
  the ability for someone to hack my crypto wallet and take my house is not quite what I had in mind.
