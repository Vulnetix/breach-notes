notes: The "Let's Go Brandon" $LGB coin tied to NASCAR driver Brandon Brown, and created as an apparent way to support "the
  American dream" and stick it to Joe Biden (somehow), suddenly dropped 50% in value. This appeared to be the death knell
  of a coin that had been dropping precipitously since the early January announcement by NASCAR that they would be rescinding
  their approval for LGBcoin to sponsor Brown.
