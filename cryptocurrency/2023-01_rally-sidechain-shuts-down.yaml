notes: Rally is an Ethereum sidechain built to support "social tokens" — typically, tokens intended for fans of various celebrities
  or groups.Fans of creators including Felicia Day (actress and famous nerd), Brandon Powell (LA Rams wide receiver), and
  Portugal. The Man (rock band) may be disappointed, however, because Rally announced with under one day of notice that they
  would be shutting down. "This means that after today, the site will no longer be supported and you may experience a degradation
  in services or it may simply become inoperable. Additionally, since NFTs on the Rally sidechain are not transferable to
  mainnet, these will not be accessible once the site shuts down," they wrote in an email. The project also deleted its Twitter
  account.The group behind the Rally Network had raised $57 million in funding in 2021, and was backed by VCs including Andreessen
  Horowitz.
