source_name: '"SEC Charges Three Media Companies with Illegal Offerings of Stock and Digital Assets"'
source_url: https://www.sec.gov/news/press-release/2021-175
date_of_breach: '2021-09-13'
date_of_disclosure: '2021-09-13'
category: other
initial_attack_vector: Regulatory / legal action
vendor_product: GTV Media Group SEC settlement
notes: The SEC filed charges against GTV Media Group and related entities, alleging they engaged in an unregistered ICO when
  they offered investors the opportunity to buy "G-Coins" (also called "G-Dollars"). GTV immediately settled with the SEC,
  agreeing to pay over $539 million.GTV Media Group is a media company co-founded by Steve Bannon and Guo Wengui, both figures
  in the American far right who have close ties to Donald Trump.
