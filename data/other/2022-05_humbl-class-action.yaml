notes: A litigation firm filed a class action lawsuit against HUMBL, a financial services company that touts its web3 and
  defi products. The lawsuit alleges that HUMBL and its executives made false and misleading statements about the company
  and its prospects, made "selectively timed announcements to keep Humbl stock price high so that Company insiders could sell
  off their holdings into artificially created volume", and sold its BLOCK ETX assets in violation of securities laws.HUMBL
  stock has dropped from a high of $6.84 per share to a low of $0.11. Similarly the BLOCK ETX asset has dropped more than
  87% from its high.
