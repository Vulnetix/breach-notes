date_of_breach: '2022-11-30'
date_of_disclosure: '2022-11-30'
category: other
vendor_product: Kraken layoffs
affected_count: 1100
notes: The US cryptocurrency exchange Kraken announced that it had laid off 30% of its employees, or about 1,100 people. They
  blamed "macroeconomic and geopolitical factors" resulting in less trading and fewer clients. "Unfortunately, negative influences
  on the financial markets have continued and we have exhausted preferable options for bringing costs in line with demand,"
  they wrote.
