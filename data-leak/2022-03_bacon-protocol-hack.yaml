notes: 'Bacon Protocol, a defi project seeking to provide NFT mortgage liens (yes,
  really) was hacked. A reentrancy bug in their smart contract enabled attackers to
  get more lending credits than they should have been allowed, and was exploited for
  a total loss to Bacon Protocol of around $1 million.


  Total loss estimated at $1,000,000.'
