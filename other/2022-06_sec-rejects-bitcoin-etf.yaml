source_name: '"Grayscale Investments Suing SEC After Its Bitcoin ETF Rejected"'
source_url: https://www.bloomberg.com/news/articles/2022-06-30/sec-rejects-grayscale-bid-to-turn-biggest-bitcoin-fund-into-etf
date_of_breach: '2022-06-29'
date_of_disclosure: '2022-06-29'
category: other
notes: The U.S. Securities and Exchange Commission rejected a proposal from Grayscale
  Investing that would turn their Bitcoin trust into an exchange-traded fund (ETF).
  If accepted, this would have been the first Bitcoin ETF. However, the SEC determined
  that the listing plan did not sufficiently prevent fraud or manipulation.Also on
  the 29th, the SEC rejected an application from Bitwise to create a Bitcoin exchange-traded
  product (ETP).Grayscale immediately announced they would be suing the SEC, a course
  of action they'd been suggesting for several months. Don't hold your breath, though
  — a litigation analyst estimated such a lawsuit would take 12–18 months to reach
  resolution.
