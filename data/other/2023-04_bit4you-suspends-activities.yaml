notes: The only Belgian crypto platform, the Bit4You crypto lender, announced they would be suspending activities after the
  CoinLoan crypto exchange was ordered to suspend activities after being declared insolvent."To date we have no indication
  that the virtual currencies held on behalf of our customers with CoinLoan will not be recovered," they wrote in their announcement.
