notes: The Flybuys loyalty program (Coles Group / Wesfarmers joint venture) was targeted
  by credential stuffing attacks in early 2020, where attackers used lists of usernames
  and passwords from prior breaches to access customer accounts. Affected customers
  had Flybuys points stolen or redeemed fraudulently. Notified to OAIC under NDB scheme.
  Representative of a broader wave of credential stuffing attacks against Australian
  loyalty programs in 2020.
