notes: '"The DAO", one of the first DAOs, was famously hacked in 2016, requiring a hard fork of the Ethereum blockchain to
  "undo" the breach. (So immutable!) Had Ethereum not forked, members of The DAO would have lost 3.6 million ETH — then worth
  around $50 million.Journalist and researcher Laura Shin reported on February 22 that she had successfully used a forensics
  tool from Chainalysis to discover the identity of the hacker: Toby Hoenisch, a co-founder of the TenX "crypto debit card"
  project. Hoenisch refused to speak with Shin, and has denied the allegation.For a technology that makes lofty promises of
  anonymity and privacy, increasingly-powerful technology is being released that at least claims to be able to unwind crypto
  mixing and make other connections between wallets and transactions that were previously extremely difficult, if not next
  to impossible. I imagine there may be a few people behind various crypto crimes sweating a bit as these technologies progress
  and threaten to unmask those behind other hacks and scams.'
