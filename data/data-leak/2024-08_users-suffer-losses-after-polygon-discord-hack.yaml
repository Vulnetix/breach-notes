notes: 'Some fans of the Polygon blockchain, or those looking for help with using it, suffered losses after hackers successfully
  compromised the project''s Discord server. Discord hacks have become a major issue in the cryptocurrency world, and although
  Polygon is one of the largest projects to suffer a Discord compromise, it''s far from the only project to do so.One member
  of the Discord described losing more than $140,000 in tokens after clicking a link shared by a person appearing to be a
  member of the Polygon team, which advertised a token distribution to serve as a "pre-migration celebration".


  Total loss estimated at $140,000.'
