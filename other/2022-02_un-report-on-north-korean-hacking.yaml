notes: A report by the United Nations identified cyberattacks as an "important revenue source". At least three cryptocurrency
  exchanges were targeted by North Korean hackers, and a January Chainalysis report suggested that cyberattacks originating
  from North Korea could have provided the country with as much as $400 million in stolen cryptocurrency.
