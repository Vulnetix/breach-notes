vendor_product: Ooki DAO sued by CFTC
blockchain: bsc, ethereum, polygon
notes: The Commodity Futures Trading Commission fined the bZeroX blockchain project and its founders $250,000 for allowing
  illegal trading of digital assets, engaging in activities only allowed by registered futures commission merchants, and not
  performing proper KYC. They have also filed a civil suit against Ooki DAO, the successor to bZeroX, for violating the same
  laws.This will certainly be interesting to watch. DAOs  —  decentralized autonomous organizations  —  are a popular form
  of web3 project governance where (typically) anyone who holds the governance token can vote on the actions of the DAO. There
  is little precedent in the way of filing charges against a DAO, and DAOs often don't have the liability protections of more
  traditional organizational structures.
