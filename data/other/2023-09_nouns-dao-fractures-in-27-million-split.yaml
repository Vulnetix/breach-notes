vendor_product: Nouns DAO fractures in $27 million split
blockchain: ethereum
notes: Nouns DAO, one of the most prominent Ethereum DAOs, has split into two projects after holders of around 56% of the
  Nouns NFTs in circulation voted to "ragequit". This means that they have forked into a new DAO, taking 16,757 ETH (~$27.3
  million) of the original DAO's treasury with them.Nouns NFTs have been popular since the project's launch in 2021, and in
  mid-2022 enjoyed a floor price of over 100 ETH (then over $150,000). Now they tend to sell for around 35 ETH (~$57,000).
  The DAO has used its substantial treasury to fund a wide range of projects, from creating Nouns short films, to distributing
  eyeglasses to kids, to partnering with Bud Light for a Super Bowl commercial in 2022.Now, however, more than half of the
  project has opted to leave, with some leavers citing flawed decisionmaking and lack of leadership. As for the new fork,
  some Nouns owners may choose to "ragequit" — that is, forfeit their NFT and cash out their portion of the treasury (around
  35.5 ETH, or $57,850, apiece). Some arbitrageurs have been buying Noun NFTs for months, hoping to use this ragequit functionality
  to profit.
