source_name: '"Iowa regulator orders BlockFi to pay $943K over alleged unregistered
  securities offering"'
source_url: https://cointelegraph.com/news/iowa-regulator-orders-blockfi-to-pay-943k-over-alleged-unregistered-securities-offering
date_of_breach: '2022-06-14'
date_of_disclosure: '2022-06-14'
category: other
notes: The Iowa Insurance Division announced that they had levied a $943,000 fine
  against BlockFi for failing to register securities they offered on their platform.
  The regulator also accused BlockFi of making "misrepresentations and omissions about
  the level of risk in its loan portfolio", particularly pertaining to statements
  that their loans were "typically" overcollateralized when in reality only around
  16–17% were.
