notes: 'A trader using the Aave interface attempted to swap $50 million USDT for AAVE.
  However, due to the enormous size of the order, the purchase had dramatic impact
  on the aave price. The Aave interface warned the customer about the price impact,
  and the trader clicked a checkbox to accept the order terms. Ultimately, they received
  only 324 AAVE (~$37,600) in return for their $50 million, losing 99.9% of their
  assets in the process.The Aave founder offered to refund the user the $600,000 in
  fees collected from the transaction, and acknowledged "there are additional guardrails
  the industry can build to better protect users".


  Total loss estimated at $49,962,385.'
