notes: "North Korean TraderTraitor hackers stole 4,502.9 BTC (~$308 million) from Japanese crypto exchange DMM Bitcoin on 31 May 2024 — the third-largest crypto theft in history. FBI, DC3, and Japan NPA jointly attributed the attack in December 2024. The compromise flowed through Ginco, a third-party wallet provider. DMM Bitcoin was unable to recover and shut down in December 2024, transferring accounts to SBI VC Trade."
