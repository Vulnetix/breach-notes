vendor_product: Axie Infinity downplays job creation claims
blockchain: ethereum
notes: After playing up how Axie Infinity had "created hundreds of thousands of jobs in the Philippines" and other locations
  where salaries are low, Axie Infinity has crumbled. Some players had quit their traditional jobs to become full-time Axie
  players, and for a few months in 2021, some skilled players could make more than the average wage in the Philippines by
  playing the game.Even without the $625 million hack in March, Axie's economy was in trouble. A November 2021 report from
  Naavik, titled "Infinite Opportunity or Infinite Peril?" wrote that the game's "economic policies are fundamentally unsustainable"
  and that "the value of new Axies and SLP is propped up by new players putting fresh money into the game".As of May, even
  top-ranked players were making around $0.68 a day — certainly well below the $41.50 average daily wage in the Philippines
  that the game was once beating. Now, Axie Infinity downplays the financial promises of its game, with the company's head
  of product writing, "Axie Infinity first and foremost needs to be a game".
