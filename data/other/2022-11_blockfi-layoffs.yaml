notes: Cryptocurrency lending company BlockFi suspended withdrawals on November 10 after the FTX collapse, an expected move
  since they had stayed afloat after the previous crypto meltdown only thanks to hundreds of millions in loans from FTX.Now,
  the Wall Street Journal reports that BlockFi has been considering layoffs, and has been in talks with bankruptcy attorneys
  about a possible Chapter 11 filing.Although BlockFi disputed reports that they had been custodying client assets at FTX,
  they acknowledged that they had "significant exposure to FTX and associated corporate entities that encompasses obligations
  owed to us by Alameda, assets held at FTX.com, and undrawn amounts from our credit line with FTX.US".
