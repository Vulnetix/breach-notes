notes: 'Bo Shen, a general partner at Fenbushi Capital and an early adopter of cryptocurrencies, tweeted on November 22 that
  two weeks prior, someone had stolen $42 million in cryptocurrencies from his personal wallet. "The stolen assets are personal
  funds and do not affect on Fenbushi related entities," he wrote.Analysis by the crypto security firm SlowMist attributed
  the theft to a compromise of Shen''s seed phrase. Shen had been using the Trust Wallet software, though the theft does not
  appear to be related to security issues with the wallet software.


  Total loss estimated at $42,000,000.'
