source_name: '"Compass Mining CEO and CFO Resign Amid ''Setbacks and Disappointments''"'
source_url: https://www.coindesk.com/business/2022/06/28/compass-mining-ceo-and-cfo-resign-amid-setbacks-and-disappointments/
date_of_breach: '2022-06-28'
date_of_disclosure: '2022-06-28'
category: other
notes: The CEO and CFO of Compass Mining, a Bitcoin mining hosting and brokerage services
  firm, both resigned suddenly on June 28. The sudden departures followed accusations
  the previous week from Dynamics Mining, who alleged that Compass owed them more
  than $600,000, and that employees had tried to break into a Bitcoin mining facility
  to steal back Bitcoin miners. Compass denied the allegations. Shortly afterward,
  the company closed its Discord channel with one day's notice, prompting allegations
  that they were attempting to thwart customers sharing information and complaints.
