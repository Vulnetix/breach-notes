notes: 'friesDAO describes itself as a "a decentralized social experiment where a crypto community builds and governs a fast
  food franchise empire via wisdom of the crowd". Welcome to the future.Anyway, friesDAO seems to have fallen victim to the
  same Profanity vulnerability that has affected projects who used the tool to generate vanity wallet addresses. friesDAO
  wanted a wallet address beginning with 51D35 ("SIDES"), and as a result they opened themselves up to a major loss.The project
  had previously announced that they had raised $5.4 million in funding, suggesting this attack drained almost half of the
  project''s funds.


  Total loss estimated at $2,328,659.'
