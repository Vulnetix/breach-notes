notes: 'An Ethereum holder who had been staking their ETH through a liquid restaking protocol called Ether.fi suffered a 501
  ETH (~$2.025 million) loss when they fell victim to a phishing scam. They inadvertently signed a malicious transaction that
  granted the attacker "increase allowance" permissions, enabling them to siphon almost the entire sum of funds from the wallet.
  The individual was left with less than $1,500 in the wallet.


  Total loss estimated at $2,025,000.'
