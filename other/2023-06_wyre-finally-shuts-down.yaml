notes: The crypto payments platform Wyre finally announced they would be winding down "due to market conditions". This came
  after a January announcement from the CEO, where it was not entirely clear whether the company was shutting down or just
  massively "scaling back".Wyre had been a partner of Binance US, through which Binance was able to accept USD deposits. However,
  Binance US is now the target of SEC regulatory action, and has suspended US dollar deposits. Wyre wrote in their announcement
  that the closure "is not due to any regulatory agency direction". Sure thing.
