notes: 'Ragnarok is a metaverse role-playing game that launched its character NFTs in April 2022. The project received $1.75
  million in seed funding, plus another $17.5 million from NFT sales and royalties.On August 26, CEO Fanfaron published a
  Substack post providing a breakdown of the project''s finances, which he began by saying, "As a previous business owner,
  and because Ragnarok is a startup and not a DAO, our initial plan was never to operate our finances in public, which is
  why we have historically been closed and unwilling to share full accounting of our balance sheet." As the post went on,
  it became clear there might be other reasons they were reticent to publish it.The post revealed that Fanfaron had lost $1.827
  million buying ETH during the crypto downturn: "I made mistakes by buying ETH multiple times when I thought it was an advantageous
  investment for the project, but then to protect downside risk and with the plan to reinvest at a better time, I sold our
  position in ETH, multiple times.."It also revealed that the project is paying its team members apparently enormous salaries:
  $5.4 million in team compensation, plus another $1.5 million spent to buy out a co-founder. "We''re a scrappy startup,"
  he wrote, after also acknowledging that he pays himself $50,000 a month ($600,000 a year) — a number he already reduced
  by $600,000 from his original salary of $1.2 million per year. He ultimately promised in the post to pay back his trading
  losses.As for the game, well, it exists, which means it''s already ahead of a lot of crypto games. They launched an alpha
  version of the game in late July after multiple delays, with Fanfaron explaining, "Our vision was to create something similar
  to WoW... we were, however, overeager and optimistic with regards to how much time it takes to create such a world." The
  alpha is a multiplayer pixel art world where characters can walk around and talk to each other, and interact with buildings.
  Battling, leveling, quests, missions, and breeding are apparently all yet to come.


  Total loss estimated at $1,827,000.'
