source_name: '"Crypto Crash Leaves NWSL Players Empty Handed as League Mulls Cash
  Payout"'
source_url: https://www.sportico.com/business/sponsorship/2022/nwsl-voyager-crpyto-deal-2-1234684402/
date_of_breach: '2022-08-01'
date_of_disclosure: '2022-08-01'
category: other
notes: Half of the money in a large deal between the crypto platform Voyager Digital
  and the National Women's Soccer League was supposed to be distributed to players
  in cryptocurrency accounts. According to a press release from Voyager, this was
  intended to "provide NWSL players with financial education on crypto, including
  key lessons and tools, to help develop long-term financial growth opportunities
  for players potentially well after their competitive playing careers have ended."Those
  players have certainly learned something about crypto, as the league informed them
  that they're not likely to get the funds they were promised after Voyager Digital
  filed for bankruptcy in early July.
