notes: A project called NFTBOOKS has cropped up, promising to "transform the world of book-readings" by creating an NFT economy
  of authors, book-lenders, readers, translators, and, of course, investors. A writer named Tiffany Hutchinson contacted the
  project to politely inquire about how it intended to prevent the theft that is so rampant in the NFT space, and received
  some pretty disappointing answers. After trying several times to wave her off with vague answers about "there will be a
  review process" to check ownership of the work, they explained that they would implement "a filter on our system" that would
  check against identical copies. When she asked how that system would work if the original author was not the first person
  to create an NFT of the work, or how they would prevent someone from making small changes to the work to trick the filters,
  the project first gave staggeringly poor answers, then wrote that Hutchinson simply didn't understand, then became combative
  with her.Fortunately there doesn't actually appear to be much to the project yet — actually creating a platform and an app
  to allow people to borrow books doesn't come until the fifth and sixth stages of their roadmap. The project is currently
  on the fourth step, and has been focusing their attentions on things like "marketing campaign" (stage 1), "aggressive marketing
  rollout" (stage 2), and "extreme marketing campaign" (stage 3). The stage 3 "extreme marketing campaign" also came with
  a "website relaunch", which we have to thank for one of the most outrageous pie charts I have ever seen (pictured) (which
  was later determined to have been a stock photo of a pie chart where they'd just changed the numbers). Perhaps they should
  focus some of their marketing efforts on coming up with answers to the simplest of questions that they should probably expect
  from authors — the type of people they're claiming to help.
