notes: After announcing earlier in the month that they were close to defaulting on a $100 million+ loan, Iris Energy has defaulted.
  Unable to pay the $7 million/month in debt obligations with their $2 million/month gross profit, Iris Energy has powered
  off 3.6 EH/s worth of mining capacity.Iris Energy's stock has plummeted to $1.66, down 93% from its $24.80 peak when the
  stock first began trading a year ago.
