source_name: '"Crypto Lender Celsius Files for Bankruptcy After Cash Crunch"'
source_url: https://www.bloomberg.com/news/articles/2022-07-14/crypto-lender-celsius-files-for-bankruptcy-in-cash-crunch
date_of_breach: '2022-07-13'
date_of_disclosure: '2022-07-13'
category: other
notes: 'One month after pausing customer withdrawals, crypto lending firm Celsius
  Network filed for Chapter 11 bankruptcy. Celsius had recently hired a new group
  of restructuring lawyers from Kirkland &amp; Ellis, the same group counseling Voyager
  Digital in their bankruptcy proceedings announced on July 6.


  Total loss estimated at $1,700,000,000.'
