notes: 'A crypto phisher hit it big today when they lured in a victim with a massive
  wallet balance. The victim wallet was drained of 4,851 rETH and 9,579 stETH, both
  wrapped versions of ETH used for staking. Altogether, the tokens are priced at around
  $24 million.The wallet address used by the phisher has been associated with multiple
  crypto phishing websites which attempt to convince users to authorize transactions,
  often by impersonating known crypto projects or promising token airdrops.


  Total loss estimated at $24,000,000.'
