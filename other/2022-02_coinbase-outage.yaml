notes: 'People were apparently tempted by Coinbase''s Super Bowl ad — which was just a QR code bouncing around the screen
  like the DVD screensaver — so much so that it took the Coinbase website down. Super Bowl levels of traffic are difficult
  to handle, granted, but you''d think a company with billions in revenue still might be able to figure it out. Travis Kimmel
  noted on Twitter that Coinbase''s error message read, "Planned maintenance in progress": "Loving how ''planned maintenance''
  is just like their default 404 page. ''Don''t worry everything is under control — we intentionally took the site offline
  while running an ad during the most expensive airtime ever.'' " Coinbase subsequently tried to sweeten the pot by announcing
  that anyone who downloaded their app would receive $15 in Bitcoin.This Super Bowl was the first to feature crypto advertisements.
  In addition to Coinbase''s spot, Bud Light announced a beer-related NFT collection, Larry David appeared in an ad for the
  FTX exchange, and Crypto.com of course had a spot. What better time to make well-researched financial decisions than from
  your phone after a bunch of Super Bowl beers?'
