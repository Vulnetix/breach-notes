notes: Bob Byrne and Tim Collins, two prolific contributors to the far-right Epoch Times, have expanded their grift to crypto.
  A twenty-page-long "newspaper" titled Wall Street Today appeared in many mailboxes, featuring misleading charts and a multi-page-long
  advertisement for a Bitcoin mining company — evidently hoping that its recipients might invest in crypto or in the penny
  stock for the mining firm. A small-print disclosure on page 17 revealed that the firm, Creek Road Miners, paid $1.9 million
  for the glowing "review".Byrne and Collins published the paper via their co-founded company Streetlight Equity. The firm
  has also published ostensibly economic-focused articles that include conspiracy theories about how U.S. sanctions on Russia
  are all a part of a plan to "force the left's green agenda", and rail against pandemic lockdowns.This is not the first unsolicited
  newspaper from the Epoch Times or its associates; the Falun Gong-associated and strongly anti-Chinese Communist Party publication
  previously distributed an unsolicited "special edition" which described COVID-19 as the "CCP virus". This led to pushback
  from Canadian postal union, who urged the Canadian government to ban its distribution as hate speech they feared would endanger
  Asian Canadians. Epoch Times have also spread QAnon and anti-vaccine conspiracy theories, spread false claims of fraud in
  the 2020 United States presidential election, and promoted far-right politicians in Europe.
