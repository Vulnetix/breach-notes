notes: 'The police in Richmond, British Columbia say they''ve received 22 reports of crypto fraud, which have included fake
  investment schemes, romance scams, or scammers impersonating government officials. One individual targeted by a fake investment
  scheme lost CA$550,000, which he thought he was investing in foreign exchange companies that turned out to all be fake.


  Total loss estimated at $2,070,000.'
