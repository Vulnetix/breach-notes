source_name: '"$139M BXH Exchange Hack Was the Result of Leaked Admin Key"'
source_url: https://www.coindesk.com/tech/2021/11/01/139m-bxh-exchange-hack-was-the-result-of-leaked-admin-key/
date_of_breach: '2021-11-01'
date_of_disclosure: '2021-11-01'
category: data-leak
notes: 'The decentralized exchange BXH was exploited for $139 million. BXH CEO Neo
  Wang attributed the exploit to a compromised administrator key, which he said suggested
  either a staff member''s computer was breached, or a staff member themselves was
  behind the theft. BXH offered a reward to the hacker if they returned the funds,
  and offered a $1 million bounty to any person who could help retrieve the funds,
  but was ultimately not successful in having the money returned.


  Total loss estimated at $139,000,000.'
