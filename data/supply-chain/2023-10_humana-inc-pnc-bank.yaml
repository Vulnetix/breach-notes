notes: 'Cyberattacks Reported by Brooklyn Premier Orthopedics & Atlas Healthcare.
  Brooklyn Premier Orthopedics (BPO) in New York has confirmed the protected health
  information of 48,459 patients may have been viewed or obtained in a The protected
  health information of more than 48,000 patients of Brooklyn Premier Orthopedics
  and almost 11,000 patients of Atlas Healthcare has been exposed in cyberattacks.
  The investigation did not uncover any evidence to indicate any of that information
  has been misused; however, the affected patients have been advised to be vigilant
  and monitor their accounts carefully. Complimentary credit monitoring and identity
  theft protection services have been offered. BPO has reviewed and enhanced its security
  policies and practices to reduce the likelihood of similar incidents occurring in
  the future. Third-party company: PNC Bank.'
