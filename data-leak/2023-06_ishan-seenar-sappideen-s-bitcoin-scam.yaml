notes: 'Quick tip: if you''re in jail and a fellow inmate who is serving twelve years for running a Ponzi scheme asks you
  to invest in a Bitcoin scheme, don''t do it. Then again, on the list of "things Jarryd Hayne shouldn''t have done", this
  ranks fairly low.Jarryd Hayne is a convicted rapist once known for his careers in rugby league and, briefly, American football.
  He''s serving several years in jail, after being convicted of rape, winning an appeal, being retried, and once again being
  found guilty.Hayne is one of several inmates apparently convinced by the Ponzi schemer inmate, Ishan Seenar Sappidee, that
  he could make them massive returns. Hayne provided around AU$780,000 (~US$521,000) in Bitcoin to the enterprising inmate,
  who apparently amassed more than AU$2 million (~US$1.3 million)from at least seven inmates.


  Total loss estimated at $1,335,000.'
