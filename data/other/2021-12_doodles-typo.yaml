notes: A misplaced decimal point caused an NFT trader to sell their "beloved" Doodle NFT for 0.37 ETH (about $1,500) instead
  of their intended 3.7 ETH (about $15,000). The trader tried begging on Twitter to buy back the NFT, then to get back "maybe
  the ETH i lost.. minus all royalties and such..". Two days later they posted, "well, i don't think i'll ever get back what
  i lost.. had to take a break yesterday to not go crazy over this. 3.7 ETH is a lot of money to lose for me." This happened
  two days after a different trader made a similar, $300,000 mistake.
