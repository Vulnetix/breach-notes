notes: Lest it be mistaken for a grift, the press release was quick to say that Mrs. Trump had promised to donate a portion
  of the proceeds to children leaving foster care. The NFT platform is "powered by Parler", a far-right social network. Trump
  intends to release multiple NFTs, and the first will have a starting price of 1 SOL (approximately $150). Solana Labs was
  quick to clarify that the "project is not part of any Solana-led initiative".
