notes: 'Patricia, a retail cryptocurrency trading app in Nigeria, froze withdrawals after revealing that they had suffered
  a ₦2 billion hack. According to the outlet TechCabal, despite announcing the hack in May 2023, the incident actually occurred
  in January 2022, but Patricia had managed to hide it up until that point.The stolen ₦2 billion would have been worth around
  US$4.8 million based on the value of the Naira at the time of the theft.


  Total loss estimated at $4,800,000.'
