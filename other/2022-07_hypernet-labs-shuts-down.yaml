notes: Ivan Ravlich, founder of the nebulous crypto firm called Hypernet Labs, announced on Twitter that "Hypernet's road
  has reached an end". "Hypernet was impacted by the same market headwinds that have touched millions around the world since
  May. Unfortunately, the treasury was also held in Ethereum, which disproportionately exacerbated the bear market's impact
  on our balance sheet", he wrote.What he didn't mention was the lawsuit that had just been filed against the company, by
  investors who allege that Ravlich and his co-founders lied to investors and never created any usable product or service.
  Investors claim to have lost millions in cryptocurrency, and one alleged that Ravlich and his compatriots used a shell company
  in the Cook Islands to make it harder for him to recoup his losses.Hypernet initially promised to build a system for renting
  unused computing power, and in 2018 raised around $20 million in an initial coin offering. In late 2021, Hypernet "pivoted
  hard" into NFTs, which one investor stated was a "knee jerk reaction to the flavour of the day" and a "last-ditch attempt
  to find a non-existent market for a non-existent product".
