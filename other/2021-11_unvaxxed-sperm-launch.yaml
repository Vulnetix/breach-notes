source_name: '"''Unvaxxed Sperm'' Is Trying to Become the Anti-Vax Bitcoin"'
source_url: https://www.vice.com/en/article/n7nn87/unvaxxed-sperm-coin-spreading-covid-disinformation
date_of_breach: '2021-11-30'
date_of_disclosure: '2021-11-30'
category: other
vendor_product: Unvaxxed Sperm launch
notes: Developers launched a memecoin called "Unvaxxed Sperm", hoping to make a buck while also recruiting for their anti-vaccine
  group. The name is based on the belief that in the future, sperm (and eggs) from unvaccinated individuals will have enormous
  monetary value, which is based on the false belief that COVID-19 vaccines render people infertile. The group also promised
  to make a "pureblood" version of Tinder for the unvaccinated, and create a DAO to allow investors to crowdsource decisions
  on which anti-vaccine groups and individuals are worthy of their donations.
