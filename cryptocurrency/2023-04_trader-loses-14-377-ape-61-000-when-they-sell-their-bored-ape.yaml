notes: 'The former owner of Bored Ape #7810 presumably intended to agree to sell the ape to another buyer for 70 ETH (~$130,900).
  However, it''s unlikely they intended for that buyer to also be able to access the staked $APE they had accrued. With this
  particular staking mechanism, the Bored Ape effectively serves as the "key" to the staked ApeCoin, and so it transferred
  to the NFT''s new owner right along with the NFT.


  Total loss estimated at $61,000.'
