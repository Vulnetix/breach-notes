source_name: '"InsurAce says it will pay millions to claimants after Terra’s collapse"'
source_url: https://cointelegraph.com/news/insurace-says-it-will-pay-millions-to-claimants-after-terra-s-collapse
date_of_breach: '2022-05-13'
date_of_disclosure: '2022-05-13'
category: cryptocurrency
initial_attack_vector: Smart contract vulnerability exploit
vendor_product: InsurAce shortens claims window
blockchain: terra
notes: InsurAce is a defi insurance provider (oh yes, they exist) that allows people to buy insurance against events including
  smart contract vulnerabilities and stablecoin depegs. Following the Terra collapse, InsurAce suddenly announced that its
  customers who held Terra had only a week to file claims, and that "Late submission [sic] will be rejected without further
  appeal".Altogether, InsurAce says they paid out about $11 million to around 173 claimants as a result of the depeg. Evidently
  there were 61 others who did not submit their claims within the deadline.
