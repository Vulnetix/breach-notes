vendor_product: Former ConsenSys employees demand audit
notes: A group of 35 former employees of the startup incubator ConsenSys filed a request for an audit of a transfer of the
  company's "crown jewel" assets to a new company, which they say "was to the detriment of the minority shareholders". The
  requested audit relates to an August 2020 deal that saw the cryptocurrency wallet MetaMask and the developer platform Infura
  be transferred to a brand new entity. The transaction also resulted in the banking giant JPMorgan taking a 10% share in
  ConsenSys, and in a $39 million loan by ConsenSys founder being offset. The shareholders allege that MetaMask and Infura
  were massively undervalued in the trade; an allegation that a ConsenSys spokesperson has rebutted, saying that "the group
  would like to apply a valuation that might be achieved today to a set of projects that were pre-monetization during the
  darkest days of Covid when the transaction took place".
