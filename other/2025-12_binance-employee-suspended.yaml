vendor_product: Binance employee suspended
blockchain: bsc
notes: Binance has announced that the company has suspended an employee who used the platform's official Twitter accounts
  to promote a memecoin they had launched. The token, called "year of the yellow fruit", pumped in price after official Binance
  accounts coaxed followers to "harvest abundantly".Binance publicly acknowledged that an employee had been suspended for
  misconduct over the incident. "These actions constitute abuse of their position for personal gain and violate our policies
  and code of professional conduct," Binance tweeted from its BinanceFutures account. After this announcement, the memecoin
  token price spiked even further.Earlier this year, Binance fired another employee after discovering they had used inside
  information to profit from a token sale event.
