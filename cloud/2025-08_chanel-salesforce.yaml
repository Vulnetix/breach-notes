notes: 'Fashion giant Chanel hit in wave of Salesforce data theft attacks. French
  fashion giant Chanel is the latest company to suffer a data breach in an ongoing
  wave of Salesforce data theft attacks. Chanel says the breach was first detected
  on July 25th after threat actors gained access to a Chanel database hosted at a
  third-party service provider, as first reported by WWD. The breach only impacted
  customers in the United States and exposed personal contact information. Third-party
  company: Salesforce.'
