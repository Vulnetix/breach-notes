date_of_breach: '2022-07-18'
date_of_disclosure: '2022-07-18'
category: other
notes: Binance, the world's largest crypto exchange, was fined €3.3 million ($3.35
  million) by De Nederlandsche Bank (DNB) for operating in the Netherlands without
  the required registration. According to NOS, the fine was higher than most fines
  imposed for this type of infraction, partly due to Binance's enormous size. The
  regulators had issued a public warning about Binance operating without registration
  in August 2021.The fine was imposed on April 25, 2022, and Binance filed an appeal
  in June. This is not Binance's first time playing fast and loose with regulatory
  bodies — in February, Binance halted activities in Israel due to being unlicensed.
  In December 2021, the Ontario Securities Commission released a statement to say
  that Binance wasn't registered in the province, but Binance continued to operate
  there anyway for several more months.
