notes: Amid a month of falling crypto prices, the crypto tracking platform DappRadar has announced it will be shutting down
  after seven years of operation. "Running a platform of this scale became financially unsustainable in the current environment,"
  the company announced on Twitter.The company had previously raised several rounds of financing, with a $2.3 million seed
  round in 2019 and a $5 million Series A in 2021.
