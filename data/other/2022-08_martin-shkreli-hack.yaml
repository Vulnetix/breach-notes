notes: 'I''ve almost got to give it to him. When I wrote up Druglike, Martin "Pharma
  Bro" Shkreli''s new "web3" project for drug discovery, and asked him some questions
  in the project Discord, I expected him to run into issues with the fact that he''s
  trying to build a pharmaceutical software platform after being banned from the pharma
  business. But he seems to have exceeded my high expectations for this grift, pulling
  off a scam even before anything got off the ground.The value of $MSI, Martin Shkreli
  Inu (really), plummeted 90% from $0.000014 to a mere $0.0000014 when a wallet owned
  by Shkreli suddenly dumped its tokens. The MSI token originally was a fan-made token,
  but Shkreli adopted it as the token "powering" Druglike (despite zero information
  as to how it''s actually used to power the project). The MSI were swapped for 239
  ETH (~$459,000).Shkreli claimed via his Twitter persona "Enrique Hernandez" that
  "I got hacked last night." (Shkreli was banned from Twitter after being creepy to
  a journalist, and so now uses the thinnest of veiled identities to somehow evade
  Twitter suspension). Shkreli claimed that when he had tried to torrent a file called,
  no joke, [BigTitsRoundAsses] 17.12.14 - Jazmyn [1080p], he ended up with a remote
  access trojan. However, crypto research project Rug Pull Finder tweeted, "Bruh -
  why is the attackers wallet funded by you then".


  Total loss estimated at $459,261.'
