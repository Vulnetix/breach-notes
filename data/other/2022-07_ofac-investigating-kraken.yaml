source_name: '"Kraken, a U.S. Crypto Exchange, Is Suspected of Violating Sanctions"'
source_url: https://www.nytimes.com/2022/07/26/technology/kraken-crypto-iran.html
date_of_breach: '2022-07-26'
date_of_disclosure: '2022-07-26'
category: other
notes: The New York Times reported on July 26 that the Treasury Department's Office
  of Foreign Assets Control (OFAC) has been investigating major US-based crypto exchange
  Kraken for suspected sanctions violations. They reportedly believe that Kraken has
  been providing services to people in Iran and other sanctioned countries. The Times'
  sources have said that OFAC is likely to impose a fine on the company, which would
  make Kraken the largest crypto company to face enforcement from OFAC relating to
  the Iranian sanctions.
