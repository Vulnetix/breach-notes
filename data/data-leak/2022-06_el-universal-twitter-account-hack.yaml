notes: 'Scammers successfully compromised the Twitter account for El Universal, a Venezuelan newspaper. The account is verified,
  and has five million followers. The scammers used the account to promote "goblintowm" (note the m on the end), a fake website
  pretending to be the recently-popular Goblintown project. Users who connected their wallets to try to mint the free NFTs
  instead saw their wallets drained of their cryptocurrency and NFTs.One of the wallets used by the scammers had stolen 64
  NFTs, though most of them were low in value. The address had also pulled in 16.5 ETH (~$30,000). However, most scammers
  rotate wallets, and this likely doesn''t reflect the total damage from the scam.


  Total loss estimated at $30,000.'
