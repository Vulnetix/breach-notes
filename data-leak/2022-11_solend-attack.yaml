notes: 'Solend announced that an exploiter had manipulated the oracle price of an asset on their platform, allowing them to
  take out a loan that left the platform with $1.26 million in bad debt. They reported that they had paused affected pools,
  and did not anticipate other pools on the platform were at risk.


  Total loss estimated at $1,260,000.'
