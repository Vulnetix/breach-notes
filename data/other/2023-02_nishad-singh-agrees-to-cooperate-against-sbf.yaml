notes: Nishad Singh, a co-founder of FTX and its former director of engineering, has
  agreed to plead guilty to six criminal charges and co-operate against his former
  boss, Sam Bankman-Fried. Singh has pled guilty to one count of wire fraud, three
  counts of conspiracy to commit fraud, one count of conspiracy to commit money laundering
  and one count of conspiracy to defraud the United States by violating campaign finance
  laws.In direct messages to a Vox journalist in November 2022, shortly after the
  FTX bankruptcy, Bankman-Fried wrote that Singh had left, and that he was feeling
  "ashamed and guilty" because customer deposits were missing.According to bankruptcy
  filings, Singh had received a $543 million loan from Alameda Research. Some of this
  may have gone towards illegal political donations, which Singh admitted in court
  to making, saying they were intended to bolster Bankman-Fried's and FTX's influence
  among politicians.
