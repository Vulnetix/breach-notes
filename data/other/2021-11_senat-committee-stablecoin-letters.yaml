date_of_breach: '2021-11-23'
date_of_disclosure: '2021-11-23'
category: other
notes: The U.S. Senate Committee on Banking, Housing, and Urban sent letters to various
  stablecoin operators including Tether, Coinbase, and Binance, asking for more details
  on how the companies operate, and how they mint their currencies. In the letter,
  senators write, "stablecoins present investor protection risks and raise several
  market integrity concerns". Some worry that if Tether fails, it will collapse various
  cryptocurrencies and potentially disrupt traditional finance.
