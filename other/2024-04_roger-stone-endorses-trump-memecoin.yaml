vendor_product: Roger Stone endorses $TRUMP memecoin
notes: Amid tweets alleging corruption among jurors in his 2019 criminal case, far-right activist and Trumpworld figure Roger
  Stone has posted several tweets endorsing "MAGA Memecoin", one of the many memecoins with the $TRUMP ticker. In several
  posts, he's suggested the token enjoys support from Trump himself, mentioning that the token is "the largest holding in
  Donald Trump's crypto wallet". "Donald Trump has at least $2M in @MAGAMemecoin in his crypto wallet - get yours- this cryptocurrency
  is going UP!", he wrote in another.What he failed to mention is that the tokens in Trump's wallet were airdropped to him,
  likely without Trump even realizing it. Several of Trump's crypto wallets are publicly known, and people send coins and
  NFTs to them all the time. Trump has no more endorsed Stone's "MAGA Memecoin" than he has the "HarryPotterTrumpHomerSimpson777Inu"
  tokens that also sit in his crypto wallet.Elsewhere, Stone disclosed, "My promotion of MAGAMemecoin is, of course, sponsored."
  I haven't been able to find where he has disclosed the amount he was paid for these promotions, as he is required to do.
