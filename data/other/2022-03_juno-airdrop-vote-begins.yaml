vendor_product: Juno airdrop vote begins
blockchain: cosmos
notes: A blockchain protocol called Juno launched in October 2021, airdropping their $JUNO tokens to members of the Cosmos
  ecosystem in proportion to how many $ATOM tokens they held. The protocol agreed via community vote that they would cap the
  amount given to a single individual at 50,000 $JUNO to "ensure fair distribution across the network". However, there is
  no restriction that one individual only have one crypto wallet, and so one single whale ended up receiving more than 3.1
  million $JUNO across tens of wallets, which they later consolidated into one. Because of the enormous value centralized
  in one wallet — equivalent to around $123 million — if the whale sold off their $JUNO they could wipe out liquidity on decentralized
  exchanges and tank the price of the token. They could also perform a 51% attack on the network, as they already have half
  of quorum.On March 10, a community proposal was submitted, proposing to take away the majority of the whale's tokens (worth
  around $121 million), and leave them with the 50,000 $JUNO (a little below $2 million) that was originally intended to be
  the maximum per person. The vote passed, in a major blow to an ecosystem where "your keys, your coins" is taken as gospel
  — that is, if you control the keys to a wallet, your assets supposedly can't be taken from you.
