notes: 'A scammer was able to trick a prolific NFT collector into signing a transaction on a fake trading website, which then
  allowed them to maliciously transfer 29 pricey Moonbirds NFTs in a single transaction. Moonbirds are a popular collection
  of pixel art owls that currently trade with a floor price of 24 ETH (about $48,000). The trader who was targeted was a big
  time Moonbirds fan, holding 29 of the NFTs in their affected wallet. The loss has been estimated at around 750 ETH (~$1.5
  million).The highly exclusive group of NFT collectors known as Proof Collective, of which this trader was a member, was
  reportedly preparing a report for the FBI and police. Because the attacker used an exchange that requires KYC there may
  be some possibility that their identity could be traced, although falsified KYC is also increasingly common.


  Total loss estimated at $1,500,000.'
