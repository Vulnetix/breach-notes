notes: 'In what might be a new record, someone bought a Bored Ape NFT for 70.69 ETH (~$116,000) and had it stolen from them
  less than two hours later. The scammer quickly flipped the NFT for 61.6969 ETH (~$101,000), then bridged the funds through
  RenBridge to cover their tracks.


  Total loss estimated at $116,000.'
