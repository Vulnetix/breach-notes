financial_loss_usd: 5923380
notes: 'A scam-as-a-service company identified by ScamSniffer and dubbed "Inferno Drainer" has stolen assets nominally worth
  around $5.9 million since mid-February. The vendor sells phishing scam software that is then used by phishers to target
  victims, who believe that they are interacting with an established crypto project. Inferno Drainer takes 20–30% of the stolen
  funds as "payment" for the scam software.One Inferno Drainer victim lost assets worth around $417,000. They later sent an
  on-chain message to the thief, writing: "you are ruining my life and for me this money was a lifetime''s work, I won''t
  have enough my family..." They asked the attacker to return 50% of the funds stolen from them, offering to not report the
  scammer to Interpol and other authorities in return, and even offering to "sign a contract allowing you to use legally the
  stolen crypto".


  Total loss estimated at $5,923,380.'
