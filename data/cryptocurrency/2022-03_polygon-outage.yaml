source_name: '"Binance temporarily halts Polygon deposit and withdrawal to sync nodes"'
source_url: https://cointelegraph.com/news/binance-temporarily-halts-polygon-deposit-and-withdrawal-to-sync-nodes
date_of_breach: '2022-03-10'
date_of_disclosure: '2022-03-10'
category: cryptocurrency
initial_attack_vector: Software bug / unintentional loss
vendor_product: Polygon
blockchain: polygon
notes: After a network upgrade, Polygon went offline for eleven hours while developers scrambled to diagnose and patch an
  issue preventing its validators from achieving the 2/3 consensus required by the protocol. Projects and traders alike were
  affected by the outage, with various projects having to delay planned releases, and users reporting errors and funds stuck
  in transit. Although the network was able to release a patch to buy them some time, the project had to hard fork on March
  18 in order to properly fix the issue.
