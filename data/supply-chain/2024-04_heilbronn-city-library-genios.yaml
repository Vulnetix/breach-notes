notes: 'German database company Genios confirms ransomware attack. The Munich-based
  company said that as a result of the incident, “unfortunately we have to assume
  an outage for several days.”. GBI Genios, a database company used by numerous media
  organizations in Germany, announced on Tuesday its servers were unavailable “due
  to a massive hacker attack.”. In a post on LinkedIn , Genios said the incident was
  a ransomware attack and cautioned, “unfortunately we have to assume an outage for
  several days.”. Third-party company: Genios.'
