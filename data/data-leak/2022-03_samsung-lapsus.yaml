notes: "Lapsus$ hacking group leaked 190GB of alleged Samsung source code and proprietary data in March 2022. Stolen data included: TrustZone trusted applet source code, biometric unlock algorithms, Galaxy device bootloader source code, Qualcomm confidential source code, activation servers source code. Samsung confirmed breach but stated no consumer personal data was stolen. Occurred 2 weeks after Lapsus$ breached Nvidia. Source code exposure risks enable targeted vulnerability discovery."
