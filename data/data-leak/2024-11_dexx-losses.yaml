notes: 'DEXX, a platform that advertises itself as the "first memecoins trading terminal
  application", disclosed that it had been hacked when it posted a message on social
  media addressed to "Mr./Ms. Hacker", asking they return stolen funds in exchange
  for "destroy[ing] all information we currently have on the hack" and not pursuing
  further legal action.DEXX did not disclose how much was taken in the breach, but
  hundreds of victims have reported around $21 million in combined losses so far.


  Total loss estimated at $21,000,000.'
