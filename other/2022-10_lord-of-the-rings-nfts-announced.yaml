source_name: '"Warner Bros.’ Lord of the Rings NFT ‘experience’ is just The Fellowship in 4K"'
source_url: https://www.theverge.com/2022/10/20/23413237/lord-of-the-rings-movie-nft-wb-movieverse-metaverse
date_of_breach: '2022-10-21'
date_of_disclosure: '2022-10-21'
category: other
vendor_product: Lord of the Rings NFTs announced
notes: 'Warner Bros. has just announced their "The Lord of the Rings: The Fellowship of the Ring (Extended Version) Web3 Movie
  Experience". Catchy name.Now, you have of course already been able to purchase or stream The Lord of the Rings: The Fellowship
  of the Ring (Extended Version) for twenty years now. But now you can buy a $30 or $100 NFT to get the same thing, which
  also boasts "themed navigation menus based on iconic locations from the beloved film". So one of those DVD navigation menus.
  The NFTs come with other vagaries, including "8 hours of special features, image galleries, [and] hidden AR collectibles".Plus,
  of course, you can "own and trade the experience in a community marketplace".Two days after launch, 4,203 of the 10,000
  "Mystery Edition" NFTs have sold for their $30 mint price. They''re already reselling on the secondary market for as low
  as $7.99. The $100 mint "Epic" NFTs are doing slightly better — all 999 of those were minted, and are reselling on the secondary
  market for around $200. All told, WB has made around $225,000 off the mint.'
