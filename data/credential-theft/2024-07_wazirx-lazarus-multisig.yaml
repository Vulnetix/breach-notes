notes: "$234.9 million in crypto assets stolen from Indian exchange WazirX on 18 July 2024. Attributed to North Korea's Lazarus Group by joint US/Japan/South Korea statement in January 2025. Attackers created a fake account, deposited tokens, then manipulated the multisig wallet's smart contract once three developer signatures were collected from compromised devices. WazirX suspended withdrawals. Singapore High Court sanctioned a restructuring scheme in October 2025 returning approximately 85% of funds to users."
