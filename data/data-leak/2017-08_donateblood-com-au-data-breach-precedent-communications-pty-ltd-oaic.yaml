notes: 'Download the print version Precedent Communications Pty Ltd (Precedent) managed
  the website www.donateblood.com.au for the Australian Red Cross Blood Service (the
  Blood Service). On 5 September 2016, a Precedent employee inadvertently saved a
  backup of a database file containing information relating to approximately 550,000
  prospective blood donors, who had entered their details on the Donate Blood website,
  to a public-facing web server (the data breach). The data file was discovered and
  accessed by an unknown individual on 25 October 2016. On the same day, the individual
  notified the Blood Service via a number of intermediaries. The Blood Service immediately
  took steps to contain the breach. On 27 October 2016, the Australian Information
