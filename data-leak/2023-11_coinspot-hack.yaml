notes: 'The Australian cryptocurrency exchange CoinSpot appears to have been hacked
  for around 1,283 ETH (~$2.4 million). In two separate transactions, the ETH was
  transferred out of CoinSpot''s hot wallet, then bridged to Bitcoin via Thorchain
  and another bridge.


  Total loss estimated at $2,400,000.'
