notes: 'Japanese cryptocurrency exchange Liquid Global suffered a hack that saw $90 million in various assets stolen. The
  exchange stated that the attack had targeted the company''s MPC wallet.A week after the hack, FTX extended a $120 million
  loan to the platform. In April 2022, FTX formally acquired Liquid for an undisclosed amount.


  Total loss estimated at $90,000,000.'
