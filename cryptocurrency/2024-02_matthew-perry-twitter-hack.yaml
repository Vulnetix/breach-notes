notes: There are evidently no lows to which crypto scammers will not sink.Some scammers were able to compromise the Twitter
  account belonging to the Friends star Matthew Perry, who passed away in October 2023. He had spent much of his life battling
  addiction, and his death was drug-related.The scammers took advantage of this to share crypto addresses that they claimed
  would funnel donations to the real Matthew Perry Foundation, which actually tries to help those battling addiction. However,
  in a post on Perry's other social media accounts, the Foundation clarified that they had nothing to do with the wallets
  or the Twitter posts, and described the website as "fraudulent".
