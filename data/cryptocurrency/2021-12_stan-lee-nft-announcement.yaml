source_name: '"Stan Lee Fans Are Outraged Over His Twitter Account Being Used to Sell NFTs"'
source_url: https://www.cbr.com/stan-lee-fans-outraged-twitter-account-nfts/
date_of_breach: '2021-12-14'
date_of_disclosure: '2021-12-14'
category: cryptocurrency
vendor_product: Stan Lee NFT announcement
blockchain: polygon
notes: Stan Lee fans were outraged when the Twitter account belonging to Lee, who died in 2018, posted a message to promote
  an upcoming NFT based on one of his characters. Fans fairly universally felt this was disrespectful to Lee's legacy and
  contrary to the values he'd held through his career.
