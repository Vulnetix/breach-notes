notes: 'Almost 20,000 Aptihealth Patients Affected by Business Associate Data Breach.
  Data breaches have been announced by the behavioral health engagement company Aptihealth
  and the civil engineering and architecture firm Wilson & Data breaches have been
  announced by the behavioral health engagement company Aptihealth and the civil engineering
  and architecture firm Wilson & Company. The Saratoga Springs, NY-based behavioral
  health engagement company, Aptihealth, has confirmed that the HIPAA protected health
  information of almost 20,000 patients has been exposed or stolen. The breach occurred
  at Sisense, a business associate of Aptihealth that provides data analytics services.
  In order to provide those services, Sisense is given access to Aptihealth data,
  which includes patients’ protected health information. Third-party company: Sisense.'
