vendor_product: Fazio Mechanical Services (HVAC contractor) / Target vendor portal
software_package: ''
malware: BlackPOS (Kaptoxa) RAM-scraping malware; Citadel malware (on vendor's systems)
supply_chain_claimed: true
notes: 'Last week, Target told reporters at The Wall Street Journal and Reuters that
  the initial intrusion into its systems was traced back to network credentials that
  were stolen from a third party vendor. Sources now tell KrebsOnSecurity that the
  vendor…. Sources close to the investigation said the attackers first broke into
  the retailer’s network on Nov. 15, 2013 using network credentials stolen from Fazio
  Mechanical Services , a Sharpsburg, Penn.-based provider of refrigeration and HVAC
  systems. Black Kite timeline context: Data breached: Unknown. Use of third party:
  Unknown. Third-party company: Third-party vendor.'
