notes: Just as the NFT marketplace was entering collapse in May 2022, GameStop decided
  it would be a great time to launch an NFT marketplace. The marketplace launched
  in July, and made headlines for a rather unfortunate reason.Evidently the platform
  has still been running since then, though it rarely enjoys much mention alongside
  its many competitors.Now, rolling out the classic "regulatory uncertainty" line,
  GameStop has announced it will be shutting down the marketplace. After shutting
  down a crypto wallet project in November, the company seems to have fully exited
  the crypto world.
