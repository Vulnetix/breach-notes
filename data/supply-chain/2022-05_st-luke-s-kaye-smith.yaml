notes: 'St. Luke''s says customers hit with data breach that may have exposed personal,
  financial, medical information. St. Luke’s Health System issued a news release Wednesday
  saying an unknown number of patients were impacted by a data breach. The hospital
  system said a breach at vendor Kaye-Smith may have exposed a wide array of information,
  including patient name, insured name, address, phone number, ID number, date of
  birth, last five digits of […]. St. Luke’s said the breach happened in late May,
  and impacted customers billed in that same month. The vendor discovered the breach
  in June and informed St. Luke’s on July 6th. Third-party company: Kaye-Smith.'
