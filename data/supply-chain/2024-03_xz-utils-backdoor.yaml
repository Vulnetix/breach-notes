notes: "CVSS 10.0. Suspected nation-state actor 'Jia Tan' (JiaT75) spent 2+ years cultivating trust in xz-utils project before becoming co-maintainer. Injected SSH authentication bypass/RCE backdoor in versions 5.6.0 and 5.6.1. Backdoor hooks into systemd-linked OpenSSH via malicious shared library. Affected Fedora 40/Rawhide, Debian testing/unstable, openSUSE, Kali Linux, Arch. Discovered March 29 2024 by Microsoft engineer Andres Freund who noticed anomalous CPU usage. Caught before widespread stable distro adoption. State-sponsored attribution suspected but unconfirmed."
