notes: Austin ISD warns of possible data breach. Those who have been affected are
  being offered free identity monitoring. AUSTIN, Texas — Austin ISD notified parents
  last week after it was made aware of a possible data breach involving a former third-party
  vendor. According to the letter, there hasn't been any evidence that personal information
  was used for malicious purposes. It also said that those who have been affected
  are being offered free identity monitoring.
