blockchain: ethereum, polygon
financial_loss_usd: 275000
notes: 'An attacker was able to insert malicious code into the frontend of the decentralized exchange KyberSwap and steal
  $265,000 of user funds. The project used Google Tag Manager to allow code to be injected into the project frontend (often
  for analytics, ads, or marketing purposes), which was used by the attacker to insert malicious code into the project UI
  that specifically targeted whale accounts — that is, those with large balances.Kyber identified and remedied the issue after
  two hours of investigating it, and only two wallets were affected. Kyber promised to compensate the users who lost funds,
  and also tried to tempt the hacker into returning funds by allowing them to keep 15% of the stolen money as a "bounty" (~$40,000).


  Total loss estimated at $275,000.'
