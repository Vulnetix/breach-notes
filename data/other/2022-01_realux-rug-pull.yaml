financial_loss_usd: 23000
notes: 'On January 31, a cryptocurrency project called Realux launched after fanfare from viral tweets and influencer YouTube
  videos. The project promised to make "real estate open to everyone, at a very low cost in a very easy way" and "resolve,
  once and for all, the wealth gap by removing all barriers, costs, middlemen, social background, and other limitations".
  The token enjoyed a fairly steady climb in value over the four or so hours it was active, increasing in value 400% from
  about $0.00065 to a peak of around $0.0027. The price suddenly crashed to around $0.0003 when the developer sold off 70
  million of the RLX tokens, earning a profit of around $23,000. The project also deleted their website, Twitter account,
  and Telegram channel.


  Total loss estimated at $23,000.'
