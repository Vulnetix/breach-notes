notes: 'A week after the launch of the "Evolved Apes" NFT project, which consisted
  of 10,000 NFTs and a promised fighting game, the anonymous developer behind the
  project disappeared after pulling the equivalent of $2.7 million out of the project''s
  funds.


  Total loss estimated at $2,700,000.'
