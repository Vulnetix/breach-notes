notes: 'The apparent owner of Bored Ape #5262, of which this site header is a derivative work, contacted me on Twitter to
  say "I believe you are using my ape on your website without my permission. Can you please prove you own this ape as I believe
  there is only one looking like this and it is mine" in an event that truly transcended parody. While this would be hilarious
  even if it was a prank, the Twitter account who DMed me does appear to belong to the person holding the NFT on OpenSea.'
