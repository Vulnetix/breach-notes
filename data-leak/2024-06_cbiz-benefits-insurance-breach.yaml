notes: "CBIZ Benefits & Insurance Services (subsidiary of business services giant CBIZ Inc.) disclosed a breach affecting 35,953 individuals who had retiree health information on file. Exposed data included names, contact information, dates of birth, SSNs, retiree health information, and welfare plan information. The breach was discovered June 24, 2024. CBIZ reported 9,103 individuals' protected health information was involved, per HHS OCR filing. CBIZ had suffered a prior similar breach in 2023."
