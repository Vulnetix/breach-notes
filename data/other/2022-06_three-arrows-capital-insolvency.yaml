source_name: '"Rumors Swirl About Financial Stress at Three Arrows"'
source_url: https://thedefiant.io/3ac-steth-sales/
date_of_breach: '2022-06-14'
date_of_disclosure: '2022-06-14'
category: other
notes: 'Blockchain data showed that Three Arrows Capital (3AC), a crypto-focused hedge
  fund based in Singapore, appeared to be dumping stETH as quickly as possible. stETH
  is Lido-staked Ethereum, a project that is facing liquidity issues and deviating
  from its peg as of late. The sales appear to be 3AC selling off stETH to pay off
  debts, presumably due to margin calls as the crypto ecosystem as a whole fell dramatically.Making
  matters worse, 3AC co-founder Su Zhu tweeted during the mass sell-off to promote
  stETH, which certainly gives the appearance that he was trying to pump the price
  to improve price or liquidity. BlockFi later confirmed that they had liquidated
  some positions that 3AC held with them.Speculation about 3AC has swirled, with little
  comment from 3AC or its executives besides a June 14 tweet from Zhu: "We are in
  the process of communicating with relevant parties and fully committed to working
  this out". Meanwhile, other organizations including 8 Blocks Capital have reported
  that they''ve been unable to reach 3AC about money they''re owed.'
