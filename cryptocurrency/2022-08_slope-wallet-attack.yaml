notes: 'Nearly 8,000 Solana wallets were drained for at least $6 million worth of assets, including native SOL tokens and
  SPL tokens like USDC. The attack went on for nearly a day before Solana identified the likely cause: private keys that were
  exposed to an application monitoring service used by the crypto wallet Slope. Both Solana and Slope were vague about further
  details but explained that they were continuing to investigate.


  Total loss estimated at $6,000,000.'
