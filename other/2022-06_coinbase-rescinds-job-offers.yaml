source_name: '"Coinbase freezes hiring, rescinds job offers: ''Coinbase ghosted me''"'
source_url: https://amycastor.com/2022/06/03/coinbase-freezes-hiring-rescinds-job-offers-coinbase-ghosted-me/
date_of_breach: '2022-06-02'
date_of_disclosure: '2022-06-02'
category: other
notes: The same day that Gemini announced they would be laying off 10% of their staff,
  Coinbase announced they would be extending a hiring freeze they'd put in place two
  weeks earlier, and also rescinding job offers that had already been accepted.Crypto
  companies are not the only tech companies that have been slowing down hiring or
  even laying off employees recently, though rescinding already accepted offers is
  extremely unusual. A would-be employee wrote on the anonymous employee message board
  app Blind that their offer had been rescinded, and that "this feels like a nightmare
  that I can't wait to wake up from". A current Coinbase employee replied, "Dodged
  a bullet".
