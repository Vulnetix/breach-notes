vendor_product: Worldcoin warehouse in Nairobi raided by authorities
notes: After Kenya shut down Worldcoin's operations in the country over data privacy concerns, police have raided a warehouse
  in Nairobi. Authorities reportedly took "machines they believe stores data gathered by the firm" as well as various documents,
  according to Kenyan newspaper Kahawa Tungu.Kenya's Office of the Data Protection Commissioner has said that Worldcoin failed
  to accurately disclose its intentions with the project when corresponding with regulators.
