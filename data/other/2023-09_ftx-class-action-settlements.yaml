notes: Jacksonville Jaguars quarterback Trevor Lawrence has agreed to settle claims against him made in a class action lawsuit
  by FTX customers who say his endorsement of the fallen crypto exchange contributed their decision to use it. Also settling
  are finance YouTuber and crypto shills Kevin Paffrath and Tom Nash. The terms of the settlements were not disclosed.Lawrence,
  Paffrath, and Nash are far from the only people facing class actions over their endorsements of FTX. Tom Brady, Gisele Bundchen,
  Steph Curry, Shaquille O'Neal, Larry David, are also facing lawsuits over their activities in promoting the firm.
