category: other
notes: 'A decentralized finance project called FinNexus was reportedly hacked for
  $7.6 million, in what was widely speculated to actually be a rug pull by the project''s
  developers.The theft appeared to have been enabled by someone who had access to
  the project''s admin key, and was able to change the token owner to an address where
  they then minted and withdrew tokens, amounting to a $7.6 million theft.


  Total loss estimated at $7,600,000.'
