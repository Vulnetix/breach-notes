source_name: '"Babel Finance Suspends Withdrawals, Citing ''Unusual Liquidity Pressures''"'
source_url: https://www.coindesk.com/business/2022/06/17/babel-finance-suspends-withdrawals-citing-unusual-liquidity-pressures/
date_of_breach: '2022-06-17'
date_of_disclosure: '2022-06-17'
category: other
notes: Babel Finance is the latest crypto finance platform to suddenly limit customer
  withdrawals. Citing "unusual liquidity pressures" and "conductive risk events" to
  crypto institutions, Babel announced that they would be "temporarily suspending"
  redemptions and withdrawals for an indeterminate period. Babel Finance had just
  completed a $80 million Series B round, with a valuation of $2 billion, in May.Some
  in the crypto space have been encouraging people to withdraw their funds from any
  type of staking or lending platform, as liquidations and failures to repay debt
  spreads through the tightly-interconnected ecosystem. On June 16, yield farming
  platform Finblox implemented a very low cap on the amount of funds customers could
  withdraw, citing exposure to the apparently insolvent Three Arrows Capital.
