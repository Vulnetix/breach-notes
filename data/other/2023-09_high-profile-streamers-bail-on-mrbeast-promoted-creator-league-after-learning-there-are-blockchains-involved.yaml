vendor_product: Promo image for the Creator League
notes: 'A group of high-profile streamers and social media influencers agreed to join eFuse''s "Creator League", where they
  would lead community e-sports teams. The project was announced on September 2, and was promoted by mega-influencer MrBeast.
  Only days later, the project has been put on hold after some of those influencers balked once they learned blockchains were
  involved.YouTuber CDawgVA publicly withdrew from the project on September 3, writing, "I was not told or made aware at any
  point that there was Blockchain technology and was only made aware of that information when the event went live. I was given
  assurances that it had nothing to do with NFT''s. Given my vocal hatred of such tech, I would never agree to join had I
  known that."The creator of the OTK Network, which had agreed to participate in the League, wrote: "We were told there was
  no NFT/crypto component but looks like that may not be the case."Creator League issued a statement attempting to downplay
  its blockchain usage, emphasizing that people who purchased "Creator Passes" were not buying cryptocurrency or NFTs. "The
  Creator League is not an NFT project and we have never sold tokens," they insisted. "Those buyers who remain uncomfortable
  with the blockchain technology can request a refund," they continued.Now, Creator League has been postponed. eFuse, the
  company behind it, has also just announced a 30% layoff amid company restructuring.'
