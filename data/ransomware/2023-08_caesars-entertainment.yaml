notes: "Scattered Spider targeted Caesars' outsourced IT support vendor Aug 18 2023 via voice phishing, convincing vendor to hand over Okta credentials. Within days accessed 6TB loyalty program database with SSNs and driver's licenses of 65M+ rewards members. $30M ransom demanded; Caesars paid $15M in cryptocurrency. Breach discovered Sept 7, SEC 8-K filed. Unlike MGM (same group same week), quick ransom payment avoided operational disruption. FBI involved; Chainalysis tracked ransom funds."
