notes: 'WCSD addresses concerns over data breach. The Washoe County School District
  Board of Trustees has a message for parents: personal student information has not
  been compromised. During public comment at a meeting Monday, several people expressed
  concerns over a 2017 Edmodo data breach. WCSD uses the third party vendor as an
  instructional tool. Teachers use Edmodo to communicate with students about assignments.
  They also use it as a resource for lesson plans, example quizzes and instructional
  guides. During public comment at a meeting Monday , several people expressed concerns
  over a 2017 Edmodo data breach. Trustee Katy Holland said during the breach emails,
  usernames and passwords were exposed. Third-party company: Edmodo.'
