vendor_product: Wikimedia Foundation stops accepting cryptocurrency donations
notes: The Wikimedia Foundation, the non-profit organization that owns and operates Wikipedia and related projects, announced
  that they would no longer accept donations in cryptocurrency. The announcement followed a formal request from the community
  that the WMF no longer accept such donations, a request that came from three months of discussion among members of the community.The
  Wikimedia Foundation has accepted cryptocurrency donations since 2014, accepting donations in cryptocurrencies including
  Bitcoin, Bitcoin Cash, Ether, Ripple (XRP), Litecoin, Dogecoin, and the DAI and USDC stablecoins. However, it has made up
  a small portion of the non-profit's donation revenue — they received only $130,000 worth of crypto donations in the last
  fiscal year, which made up 0.08% of their revenue.There has been strong pressure from crypto advocates on the WMF to accept
  crypto donations — both in 2014 when it was initially implemented, but also via brigading of the recent community discussion.
