notes: 'A blockchain-based version of the 2014 hit game Flappy Bird has emerged, taking
  advantage of the recent "tap-to-earn" crypto craze. The @flappy_bird Twitter account
  posted "I AM BACK!!" on September 12, with a video compilation showing people playing
  the original game. The tweet also claimed they were "working with [Flappy Bird''s]
  predecessor", leading many to believe that the original Flappy Bird creator Dong
  Nguyen was involved with the project.Nguyen famously removed the game from app stores
  shortly after it surged to popularity, stating that he felt guilty that people were
  becoming addicted to the game. This makes the game''s reappearance — complete with
  loot boxes and other addictive features — feel somewhat dark.On September 15, Nguyen
  returned from a seven-year Twitter hiatus to post: "No, I have no related with their
  game. I did not sell anything. I also don''t support crypto."Although Nguyen held
  the Flappy Bird trademark, he did not sell it to this group. Instead, they registered
  the trademark themselves after arguing he had abandoned it.'
