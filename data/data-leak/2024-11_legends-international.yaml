notes: "Legends International, a major entertainment venue management and premium services company, detected unauthorized activity on November 9, 2024. The company manages venue services for major sports stadiums and arenas across North America. Stolen data included SSNs, government IDs, financial information, and medical information. At least 8,065 individuals confirmed affected in Texas (8,060) and Massachusetts (5); some reports indicate 118,000+ total affected. No ransomware group claimed responsibility. The company offered 24 months of Experian identity theft protection. A class action lawsuit was filed and subsequently voluntarily dismissed."
