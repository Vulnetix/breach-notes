source_name: '"Art by Anish Kapoor and David Bailey for sale as NFTs without their
  consent"'
source_url: https://www.ft.com/content/7570bd42-0728-4e7e-b322-be9e5880e3d2
date_of_breach: '2021-11-22'
date_of_disclosure: '2021-11-22'
category: other
notes: An art curator created NFTs from photographs of Stormtrooper helmet artwork,
  but failed to actually ask permission from the artists. The NFTs sold for a collective
  $7.5 million before various marketplaces removed them from trading. Several of the
  artists responsible for the works are reportedly considering legal action. The NFT
  creator, meanwhile, has posted a video of himself on social media "wearing a Stormtrooper
  helmet, shooting a gun in the air and bragging about making 'two mil on NFT[s]'".
