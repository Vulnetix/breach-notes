notes: 'Pablo Stanley, an artist who created the "Robotos" generative NFT collection, posted two final messages from the Robotos
  Twitter account. First, "it was a good run! thank u, all!", then an image of the Twitter log-out button with "forever and
  ever".Rewind to November 2021, when it was announced that TIME Magazine''s film and production studio would be collaborating
  with Stanley to develop a children''s animated TV show based on the Robotos NFTs. The announcement helped to drive interest
  in the NFT collection, which reached a peak floor price of around 1.5 ETH (~$5,000 at the time).Since then, no show has
  materialized, and the collection''s floor price has dwindled. NFTs from the collection have recently sold for around 0.015
  ETH (~$42). In the project Discord, Stanley claimed that TIME had lost interest in the project after the writer''s strike.
  He also wrote that he had lost faith in web3: "Glad you still believe. It''s hard for me to believe in it anymore." He explained
  that he had viewed Robotos as a "personal side project", and that he was "sorry if that''s not enough for most people, but
  that''s all I have the appetite for, and that''s all I can offer."'
