source_name: '"Ethereum Betting Site Polymarket Hit With $1.4M Fine: CFTC"'
source_url: https://decrypt.co/89673/ethereum-betting-polymarket-1-4-million-fine-cftc
date_of_breach: '2022-01-03'
date_of_disclosure: '2022-01-03'
category: other
notes: Although Polymarket was nominally "decentralized", it wasn't so decentralized
  that the CFTC couldn't fine its New York-based parent company for operating an unregistered
  market and order them to shut it down. Polymarket previously allowed people to bet
  cryptocurrency on the outcomes of various events including elections, COVID-19 case
  spikes, and sports games.
