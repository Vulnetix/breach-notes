notes: 'The former head moderator of the Cosmic Cowgirls NFT project Discord, Esh,
  wrote on Twitter that that the project team had fired all moderators and scrapped
  all of their roadmaps. The previous roadmap had promised gamification, meetups,
  merchandise, comics, an animated series, and all sorts of other things, though no
  headway appeared to have been made on any of them. The team also removed around
  300 ETH (a bit over $1 million) in funds from the project wallet.The Cosmic Cowgirls
  team hit back with accusations against the head moderator, accusing him of falsifying
  allegations against the project out of anger at being fired along with the other
  moderators. The group also claimed that the funds had been moved for security and
  tax reasons, and sent a vaguely threatening message to the moderator in which they
  stated that he should "discontinue the spread of false information in attempts to
  harm us and the project" and "resolve [concerns] ... privately as the terms of our
  contract are still ongoing and applicable".


  Total loss estimated at $1,046,000.'
