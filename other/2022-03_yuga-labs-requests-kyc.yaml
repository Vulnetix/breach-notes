notes: Yuga Labs, the company behind the Bored Ape Yacht Club (BAYC) project, announced
  a new project in partnership with blockchain gaming group Animoca Brands. The signup
  required KYC — that is, people were required to verify their real-life identities
  — something many BAYC fans seemed to bristle at, particularly given they had released
  absolutely no information about what the project would entail. BAYC themselves wrote,
  "P.S. we don't like KYCs either, but we think you're going to want to be a part
  of this."There was some irony in BAYC requiring their buyers to reveal their identities
  only a month after some of the BAYC founders' identities were revealed by a journalist
  (who made the connection based on publicly-available information), which made the
  BAYC team and many of their supporters absolutely irate.
