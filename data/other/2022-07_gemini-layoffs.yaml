vendor_product: Gemini layoffs
notes: After laying off 10% of its workforce in the first week of June, Gemini has performed a second round of layoffs. The
  layoffs have not been announced externally, nor were they widely communicated internally, according to employees who spoke
  to TechCrunch. One employee said that 68 members, or 7% of the employee base, were no longer in the company Slack channel
  on Monday morning.The week prior, an internal operating plan document was shared to the anonymous employee platform Blind,
  which outlined a plan that would reduce company headcount to around 800  — a 15% reduction. The plan was taken down shortly
  after. Gemini co-founder Cameron Winklevoss wrote in a Slack message that the leak was "super lame", and wrote that "friendly
  reminder that Karma is the blockchain of the universe — an immutable ledger that keeps track of positive and negative behavior."
