notes: 'Sutter Health Confirms 84K Individuals Affected by Cyberattack on Business
  Associate. Sutter Health, a healthcare provider serving Northern California, has
  recently confirmed that patient data was compromised in a hacking incident at one
  of 845,441 Sutter Health patients impacted by MOVEit hack, Northern Iowa Therapy
  confirms 5,100-record data breach, and the West Central District Health Department
  in Nebraska has started notifying patients about a May 2023 cyberattack. Third-party
  company: Virgin Pulse.'
