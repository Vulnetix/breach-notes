source_name: '"Beleaguered NFT Traders Can Now Relive Mania With Fantasy League Game"'
source_url: https://www.coindesk.com/business/2022/09/30/beleaguered-nft-traders-can-now-relive-mania-with-fantasy-league-game/
date_of_breach: '2022-09-30'
date_of_disclosure: '2022-09-30'
category: other
vendor_product: Flip.xyz fantasy NFT trading
notes: '"Most of us are too poor to be spending the [ether] we have left on huge sweeps, but we still want that sweet adrenaline
  rush of flipping JPEGs" said Brian Krogsgard, co-founder of the Flip NFT platform, in a statement you would think might
  have raised a red flag or two in his own mind. Evidently NFT traders are now being pitched NFT trading fantasy leagues,
  where they will be able to paper trade NFTs without risking their real-life fake money. Unfortunately for the traders, the
  app uses actual NFT price data, so the huge NFT project bull runs that some traders experienced during the NFT mania of
  2021 will likely not emerge here, either.'
