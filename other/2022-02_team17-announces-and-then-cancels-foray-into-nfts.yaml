source_name: '"Team17 Nixes ''Environmentally Friendly'' Worms NFT Project After Backlash"'
source_url: https://www.ign.com/articles/team17-environmentally-friendly-worms-nfts-fans-dont-seem-pleased
date_of_breach: '2022-02-01'
date_of_disclosure: '2022-02-01'
category: other
vendor_product: MetaWorms NFT
blockchain: ethereum
notes: 'Team17, the studio behind the many Worms games, announced their plans for "MetaWorms": NFTs based on the characters
  from the games. The announcement on January 31 apparently blindsided development teams who''ve published with Team17  —
  shortly after the announcement, three teams published statements condemning NFTs. One team, Aggro Crab, also announced they
  wouldn''t be working with Team17 going forward. The three statements also all urged fans not to harass Team17 staff and
  community managers, with one announcement by Playtonic saying they were "unwittingly affected by NFT announcements". Backlash
  from fans had been swift and fierce, and in some cases extreme. The following day, Team17 wrote that they were ending the
  project and "step[ping] back from the NFT space".'
