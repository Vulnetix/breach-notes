vendor_product: Su Zhu
notes: Co-founder of the collapsed Three Arrows Capital hedge fund, Su Zhu, was arrested in Singapore while allegedly trying
  to leave the country. He and his cofounder Kyle Davies have been uncooperative with investigations into the June 2022 implosion
  of the fund, and were both sentenced to four months imprisonment as a result. Davies has not been arrested because his whereabouts
  are currently unknown.Three Arrows Capital fell apart in June 2022, and was among one of the first major collapses that
  set off a domino effect of crypto company failures throughout that summer and the rest of the year.
