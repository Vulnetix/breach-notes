source_name: '"Ubisoft''s NFT Announcement Has Been Intensely Disliked"'
source_url: https://kotaku.com/ubisofts-nft-announcement-has-been-intensely-disliked-1848182203
date_of_breach: '2021-12-07'
date_of_disclosure: '2021-12-07'
category: other
notes: 'Ubisoft announced that it would be adding NFTs to its Tom Clancy''s Ghost
  Recon Breakpoint title, allowing players to buy "Digits": artificially scarce in-game
  weapons, vehicles, and cosmetics. The announcement video on YouTube sported a 96%
  dislike ratio shortly after, with the top comment accusing Ubisoft of "milking the
  Ghost Recon franchise for literally every cent while putting in minimal effort into
  the actual game itself". Many Ubisoft developers were also caught off guard: some
  were worried they would be forced to include NFTs in other game titles they were
  working on, while others raised environmental concerns that come with Ethereum NFTs.
  The project had a very underwhelming reception — two weeks after its launch, they
  had sold only fifteen of the more than 2,000 NFTs, for a total of around $400.'
