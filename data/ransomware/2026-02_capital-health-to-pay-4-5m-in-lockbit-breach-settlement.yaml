notes: |-
  Capital Health — which operates capital health hospital and clinical facilities in New Jersey and Pennsylvania
  — agreed to pay $4.5 million to settle claims arising from a LockBit ransomware attack. The settlement was
  reached with regulatory authorities and/or class-action plaintiffs. Capital Health serves as a regional
  healthcare provider in the Princeton, NJ and surrounding areas. The breach exposed patient and employee data.
  LockBit has been one of the most prolific ransomware groups targeting healthcare organizations, responsible
  for dozens of hospital system attacks in 2023-2024.
