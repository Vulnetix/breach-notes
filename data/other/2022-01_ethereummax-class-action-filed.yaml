vendor_product: EthereumMax class action filed
notes: An investor filed a class action lawsuit against Kim Kardashian, Floyd Mayweather, and Paul Pierce, all of whom promoted
  the EthereumMax currency (not to be confused with the completely unrelated Ethereum project). The lawsuit also names the
  creators of the coin, who are still unknown, but who the filer hopes to unmask through legal discovery. The filer alleges
  that the group of defendants were hyping a "pump-and-dump scam" that caused him to suffer investment losses.
