notes: 'Miss Universe and its models, the @nft Instagram, and Steve Harvey all got
  in on the advertisements for the Miss Universe NFT project, which Miss Universe
  presenter Paula Shugart said  was "going to be the first brand in the NFT space
  that is about women, about women''s empowerment, and embracing the technology, and
  moving forward. I love it; this is the first one that is away from other more male-oriented
  spaces." Buyers were offered signed prints, virtual meetings with the models, exclusive
  events, and a chance to win $50,000. None of this materialized, the Miss Universe
  Instagram account was deleted, and NFT owners who asked questions began to be banned
  from the project''s Discord channel.


  Total loss estimated at $376,000.'
