initial_attack_vector: "Attackers gained access to Sisense's self-hosted GitLab code repository, found credentials/tokens granting access to Sisense's Amazon S3 buckets in the cloud, and exfiltrated customer access tokens, API keys, passwords, and certificates"
cve: []
vendor_product: "GitLab (self-hosted); Amazon S3"
