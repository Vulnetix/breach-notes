notes: California-based Silvergate bank had pivoted almost entirely to serving crypto clients, a move that proved fatal to
  them in the wake of the FTX collapse and ensuing contagion. On March 8, they announced that they would be shutting down.
  Although their shutdown is considered to be a "voluntary liquidation", they had little other choice after a bank run, increasing
  regulatory pressure on banks serving the crypto industry, and a general dearth of new clients in the crypto downturn.Silvergate's
  collapse may worsen crypto's already tenuous relationship with US banks. Silvergate was one of the few "crypto-friendly"
  banks, and the clients it previously served — among them, Crypto.com, Bitstamp, and Paxos — may face challenges finding
  a reliable replacement.
