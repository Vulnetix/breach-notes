notes: According to a scoop in Bloomberg, the United States Securities and Exchange Commission has been probing whether NFTs
  from Yuga Labs should be considered securities regulations, and may be in violation of federal law.Yuga Labs is the company
  behind the Bored Apes NFTs and spinoff projects (Mutant Apes, and Bored Ape Kennel Club), and in March also acquired the
  blue-chip NFT collections CryptoPunks and Meebits.A probe does not necessarily mean that Yuga has violated the law, but
  such an investigation could have major ramifications for the world of NFTs.
