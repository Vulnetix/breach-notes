notes: 'In the spring of 2024, a number of Snowflake customers suffered data breaches
  when cybercriminals announced they had data sets from high-profile customers like
  TicketMaster, LendingTree, Neiman Marcus, and Santander.

  While Snowflake &amp; Mandiant found no evidence their cloud offering was compromised,
  these incidents became a serious public relations issue.


  Sourced from breaches.cloud'
