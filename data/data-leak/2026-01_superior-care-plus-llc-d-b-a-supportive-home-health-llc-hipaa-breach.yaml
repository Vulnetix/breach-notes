notes: 'Superior Care Plus LLC d/b/a Supportive Home Health LLC (OH), a Healthcare
  Provider, submitted a HIPAA breach notification to the HHS Office for Civil Rights
  (OCR) on 2026-01-16 for a breach affecting 1415 individuals. Breach type: Hacking/IT
  Incident. Information location: Email. Source: HHS OCR Breach Portal (HIPAA Breach
  Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured
  protected health information (PHI) affecting 500 or more individuals.'
