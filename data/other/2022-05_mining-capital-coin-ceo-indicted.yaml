date_of_breach: '2022-05-05'
date_of_disclosure: '2022-05-05'
category: other
initial_attack_vector: Ponzi / pyramid scheme
vendor_product: Mining Capital Coin CEO indicted
notes: The Department of Justice unsealed an indictment on May 5, showing that Mining Capital Coin's CEO and founder Luiz
  Capuci Jr. was charged with orchestrating a $62 million investment fraud. Capuci allegedly misled investors about MCC's
  program, which he said would use investors' money to mine new cryptocurrency and would generate guaranteed returns. Instead,
  Capuci put the funds into his own crypto wallets, and used them to fund his own lifestyle of Lamborghinis, real estate,
  and a yacht. Capuci also allegedly ran a pyramid scheme of promoters, to whom he promised luxury gifts including iPads and
  luxury cars.Capuci was charged with conspiracy to commit wire fraud, conspiracy to commit securities fraud, and conspiracy
  to commit international money laundering. If convicted on all counts, he could be sentenced to up to 45 years in prison.
