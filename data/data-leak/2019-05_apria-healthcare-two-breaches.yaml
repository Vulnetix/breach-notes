notes: "Apria Healthcare Group — one of the largest providers of home healthcare equipment (durable medical equipment, or DME) in the United States — disclosed in May 2022 a data breach that affected approximately 1.87 million current and former patients. The breach actually involved two separate periods of unauthorized access: 5 May to 5 August 2019, and 22 August to 10 October 2021. Apria stated the breach was discovered in September 2021 and that the 2019 intrusion was identified during the subsequent forensic investigation. The breach involved unauthorized access to employee email accounts and potentially other systems. Exposed data included names, Social Security numbers, financial account information, dates of birth, medical record numbers, health plan information, and clinical information related to Apria's home healthcare services (which include oxygen therapy, infusion therapy, and medical equipment). The almost three-year gap between the first breach (2019) and public disclosure (2022) was criticized. HHS OCR opened a compliance investigation. Multiple class-action lawsuits were filed. Apria was acquired by Owens & Minor in 2022. The dual-intrusion nature of the breach suggested that remediation after the 2019 incident was incomplete, allowing re-entry in 2021."
