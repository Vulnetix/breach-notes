source_name: '"La empresa forestal que originó el fuego de Ateca ya causó otro hace un mes en el mismo lugar"'
source_url: https://www.heraldo.es/noticias/aragon/huesca/2022/07/20/los-mismos-trabajos-de-reforestacion-cerca-de-ateca-ya-causaron-otro-fuego-hace-un-mes-1588841.html
date_of_breach: '2022-07-20'
date_of_disclosure: '2022-07-20'
category: other
vendor_product: Still frame from a video of the Ateca fire
notes: Five villages were evacuated and a rail line was closed as a wildfire has burned 14,000 hectares (~35,000 acres) near
  Ateca in northwestern Spain. The fire was reportedly sparked by equipment used by a contractor to dig trees for Land Life.
  Land Life is a carbon offset company that focuses on reforestation, and speaks about its "autonomous planting, remote monitoring
  and blockchain verification". The Dutch company raised €3.5 million in a Series A round in October 2018.The wildfire is
  reportedly the second fire in that same location attributed to the company in the last month. Spain has been facing devastating
  fires brought on by record-breaking temperatures and drought, and Land Life acknowledged that contractors should not have
  been working during the heat wave due to the extreme fire risk.
