source_name: '"RWA platform Zoth suffers second hack this month — loses $8.4M"'
source_url: https://protos.com/rwa-platform-zoth-suffers-second-hack-this-month-loses-8-4m/
date_of_breach: '2025-03-21'
date_of_disclosure: '2025-03-21'
category: data-leak
notes: RWA restaking platform Zoth suffered a $8.29 million hack after an attacker
  gained access to admin privileges that allowed them to modify the platform's smart
  contracts. The hacker "upgraded" the contract to a malicious version, then withdrew
  $8.45 million in USD0++, a token issued by the Usual protocol. After swapping the
  assets into various other tokens, they were left with 4,223 ETH (~$8.29 million).This
  is the second Zoth exploit in two weeks, following a $285,000 theft on March 6 by
  an attacker who took advantage of a bug in one of the platform's smart contracts.
