source_name: '"Kickstarter plans to move its crowdfunding platform to the blockchain"'
source_url: https://techcrunch.com/2021/12/08/kickstarter-plans-to-move-its-crowdfunding-platform-to-the-blockchain/
date_of_breach: '2021-12-08'
date_of_disclosure: '2021-12-08'
category: other
notes: Kickstarter announced they have decided to create a decentralized version of
  their platform, and to create it on the Celo blockchain. This was not entirely well-received,
  and some major users strongly opposed the idea. Per Gizmodo, "How this will actually
  work, beyond Kickstarter being able to yell 'blockchain' like a spell to summon
  investors or maybe getting a cut of every project that runs on the resulting protocol,
  is unclear."
