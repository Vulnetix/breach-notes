source_name: '"Celsius CEO Cashed in After Bankrupt Crypto Lender''s Token Surged"'
source_url: https://www.coindesk.com/markets/2022/08/09/dormant-wallet-linked-to-alex-mashinsky-used-to-cash-in-on-cel-token-surge/
date_of_breach: '2022-08-10'
date_of_disclosure: '2022-08-10'
category: other
notes: A wallet identified as belonging to Celsius CEO Alex Mashinsky sold off 17,475
  CEL (the native token of the Celsius lending platform) for around $28,000. Celsius
  is undergoing bankruptcy proceedings, and users remain without access to their cryptocurrency
  that's locked in the platform.CEL enjoyed an all-time-high of around $8 in June
  2021, but has been trading for less than half that for this year. The token hit
  $0.15 on the day Celsius announced they would be pausing withdrawals, but has, oddly,
  recently spiked above $2. Some have attributed this to the ill-advised attempts
  at a short squeeze by a group of people who believe that exchanges are somehow running
  out of CEL tokens to provide to short-sellers, and that a properly-coordinated short
  squeeze could somehow realistically send the token to $100. Protos did a useful
  explainer on why this is unlikely to work, but those pushing the idea have a fervency
  not unlike what was seen with those pushing the GameStop short squeeze, and enjoy
  dismissing those who question the strategy as "CEL shorters" who are trying to ruin
  any chance of a Celsius recovery.All the same, Mashinsky can possibly thank the
  short squeeze folks for helping him pump his bags, and sell off a pile of tokens
  for over 10x more than what he previously could have.
