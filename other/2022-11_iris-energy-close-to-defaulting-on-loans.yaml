category: other
notes: Iris Energy, an Australian "sustainable Bitcoin mining company", has announced
  that they are close to defaulting on loans used to purchase $103 million of Bitcoin
  mining rigs. These machines depreciate in value quickly, and are currently estimated
  by the company to be worth $65–$70 million. At the moment, they produce $2 million
  in gross profit from mining Bitcoin, which is not sufficient for the company to
  meet the $7 million of loan payments each month.
