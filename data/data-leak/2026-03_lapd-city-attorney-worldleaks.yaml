notes: "On March 20, 2026, the WorldLeaks extortion gang breached a third-party digital system used by the Los Angeles City Attorney's Office to transfer legal discovery documents. The LA City Attorney's Office disclosed the breach on April 8, 2026. The breach resulted in the leak of 337,000 files totaling 7.7 terabytes of sensitive law enforcement and civil litigation materials. Exposed data includes unredacted LAPD personnel files, internal affairs investigation documents, witness names, witness medical records, and unredacted criminal complaints. The compromised documents consisted of materials turned over in discovery from previously resolved or settled LAPD civil litigation cases. LAPD stated that none of its own systems or networks were breached — only the third-party discovery transfer system used by the City Attorney's Office was compromised. The breach raised significant concerns about officer safety (exposed personnel files) and witness protection (unredacted witness identities). WorldLeaks is an extortion group that also claimed attacks on NAFCO and the City of Los Angeles in early 2026."
