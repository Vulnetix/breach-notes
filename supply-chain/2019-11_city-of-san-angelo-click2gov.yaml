notes: 'San Angelo explains what it''s doing to prevent 3rd hack of payment system.
  Water customers in San Angelo are hacked off after the city''s online payment system
  was hacked for the second time in a year. &ldquo;That online payment system was
  hacked and credit cards were breached. We are trying to narrow down that exact time
  window with our forensics, " said Water Utilities Director Allison Strube. According
  to Strube, customers who made online payments should monitor their accounts for
