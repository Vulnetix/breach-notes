source_name: '"Indonesian Crypto Exchange Indodax Hacked for $22M; Pauses Activity
  Before Bigger Hit"'
source_url: https://www.coindesk.com/markets/2024/09/11/indonesian-crypto-exchange-indodax-hacked-for-22m-pauses-activity-before-bigger-hit/
date_of_breach: '2024-09-10'
date_of_disclosure: '2024-09-10'
category: data-leak
notes: 'The Indonesian Indodax cryptocurrency exchange suffered an exploit that allowed
  attackers to steal tokens from several of its hot wallets. The firm did not directly
  acknowledge the theft, instead posting an announcement that they had "discovered
  a potential security issue" and were "conducting a complete maintenance to ensure
  the entire system is operating properly". They reassured customers that their assets
  were "100% safe".Indodax''s Instagram account also appeared to be compromised, promoting
  a suspicious "giveaway".


  Total loss estimated at $22,000,000.'
