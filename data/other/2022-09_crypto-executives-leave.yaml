notes: The wave of crypto executives stepping down from their roles is continuing, after Genesis' CEO left the company and
  Michael Saylor gave up his CEO title (but stayed on as chairman) in August.Now, Genesis' managing director has stepped down
  after five years. Kraken CEO Jesse Powell relinquished his title, planning to remain at the firm as a chairman. Alex Mashinsky
  has resigned as the CEO of Celsius Network in the midst of bankruptcy proceedings. And FTX US president Brett Harrison will
  also be stepping down.
