source_name: '"Mark Cuban on how he lost $870k to crypto scam — ''They must have been
  watching''"'
source_url: https://www.dlnews.com/articles/people-culture/mark-cuban-loses-870k-to-a-crypto-scam/
date_of_breach: '2023-09-15'
date_of_disclosure: '2023-09-15'
category: data-leak
notes: 'Billionaire crypto evangelist Mark Cuban apparently fell victim to a hack
  when an attacker was able to siphon around $870,000 in multiple cryptocurrencies
  from a wallet belonging to him. Cuban later acknowledged the hack to DL News. "They
  must have been watching," he said, explaining that "I''m pretty sure I downloaded
  a version of MetaMask with some shit in it".This isn''t the first time Cuban has
  been burned by the crypto industry. In June 2021, he lost "enough that I wasn''t
  happy about it" in the collapse of the Titan stablecoin. Cuban is also a defendant
  in a class action lawsuit related to his endorsement of Voyager, a crypto broker
  that collapsed in July 2022.


  Total loss estimated at $870,000.'
