notes: 'Hundreds of Swedish municipalities impacted by suspected ransomware attack
  on IT supplier. A suspected ransomware attack on a Swedish software provider is
  believed to have impacted around 200 of the country’s municipal governments. A suspected
  ransomware attack on Miljödata, a Swedish software provider used for managing sick
  leave and similar HR reports, is believed to have impacted around 200 of the country’s
  municipal governments. The attack was detected on Saturday, according to the company’s
  chief executive Erik Hallén. The attackers are attempting to extort Miljödata, police
  told local newspaper BLT. Third-party company: MiljÃ¶data.'
