notes: 'Data breach with Harbor Regional Health vendor; potentially affected patients
  contacted. [](http://www.kxro.com/#facebook)[](http://www.kxro.com/#twitter)Share.
  Harbor Regional Health has announced that they were made aware of a data breach
  within CaptureRx, a vendor used by the local medical group. According to the release,
  CaptureRx is is used to handle tasks associated with 340B compliance, and helps
  HRH’s Medicare and Medicaid patients access reduced drug prices on eligible prescriptions.
  Third-party company: CaptureRX.'
