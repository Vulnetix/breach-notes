notes: "Financial Business and Consumer Solutions (FBCS), a Pennsylvania-based debt collection agency, suffered a ransomware attack between February 14-26, 2024. The breach ultimately affected 4.2 million individuals. Downstream victims included customers of Comcast (273,703 customers), Truist Bank, and others — because FBCS had previously handled collections for these companies. FBCS initially told clients no customer data was involved, then had to retract this. Exposed data included names, addresses, Social Security numbers, dates of birth, and account numbers. FBCS's worsening financial position forced downstream firms to conduct their own notification and remediation. The FCC later fined Comcast $1.5 million over the incident."
