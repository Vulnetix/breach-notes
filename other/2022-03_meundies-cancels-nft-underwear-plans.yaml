notes: 'Believe me, I was as shocked as you were to discover that the MeUndies underwear
  brand has a "community". But that community apparently objected to the brand''s
  purchase of a Bored Ape NFT, which they intended to use as a print on their line
  of undergarments. "We aren''t going to make any excuses, we just didn''t do the
  work we should have to make such an impactful decision", a MeUndies spokesperson
  wrote on Reddit. The spokesperson wrote that, after learning about the environmental
  impact of NFTs and cryptocurrency, they would be canceling the planned print, and
  selling off their Bored Ape. The NFT in question appeared to be BAYC #3986, which
  most recently sold in January for around 107 ETH ($260,000).'
