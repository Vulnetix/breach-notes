category: other
initial_attack_vector: 51% attack / network takeover
vendor_product: Monero mining pool approaches 51%
blockchain: monero
notes: Much of the mining of the Monero privacycoin is done by a single mining pool named MineXMR. The total computing power
  being used to mine and process Monero transactions (also called the hashrate) controlled by the one mining pool has been
  gradually increasing. On February 13, someone posted in the Monero subreddit urging people to "boycott" MineXMR, because
  the pool's hashrate was as high as 47.7% of the total network hashrate. If the one group's hashrate breaks the 50% mark,
  it opens the network up to a potential 51% attack, where the mining pool could be used for malicious actions, including
  blocking new transactions from being confirmed, reordering transactions, or double spending.
