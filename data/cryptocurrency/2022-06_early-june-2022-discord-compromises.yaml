notes: 'The June 4 compromise of the Bored Apes Discord was only one of several Discord hacks in a several-day period. All
  the attacks appeared to involve user accounts of individual moderators being compromised and used to post fake announcements
  that lured users of the server to phishing sites that stole NFTs. Discord servers for Yung Ape Squad, Apocalyptic Apes,
  Bubbleworld, and Aiternate were among the projects affected.The Apocalyptic Apes Discord attackers stole around 21 NFTs.
  Bubbleworld attackers stole 171 NFTs, with combined floor prices amounting to around $243,000.


  Total loss estimated at $243,000.'
