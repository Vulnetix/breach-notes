notes: The NFT startup Glass was operating under the assumption that YouTubers and others who post video content for fans
  online might want to mint those videos as NFTs, which their fans could then buy. Unfortunately for them, they have since
  "come to the conclusion that there is not sustainable demand for video NFTs".In September 2022, the startup managed to raise
  $5 million from investors including TCG Crypto and 1kx. Either that money's run out, or they're cutting their losses early.
