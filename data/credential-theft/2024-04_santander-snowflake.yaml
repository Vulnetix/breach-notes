notes: "UNC5537 accessed a third-party Snowflake-hosted database used by Santander. Breach began April 17, discovered May 10, disclosed May 14. ShinyHunters listed data on BreachForums claiming 6 million account numbers, 28 million credit card numbers from Chile/Spain/Uruguay customers, plus all current and former staff globally. Maine AGO notified of 12,786 US employees' SSNs and payroll account numbers exposed. No transactional data or login credentials compromised. Part of the broader 165-organisation Snowflake campaign."
