notes: Players are not the only ones questioning Ubisoft's decisions to incorporate NFTs into their games (such as their newest
  Tom Clancy game), though Ubisoft has done little more than brush those aside with statements from executives that players
  simply "don't get it". Questions and concerns have also been raised by Ubisoft employees, to the point where the company
  held an internal workshop to address questions like "How can you look at private property, speculation, artificial scarcity,
  and egoism, then say 'yes this is good, I want that, let's put it in art?'" Bloomberg reported that an internal announcement
  pertaining to NFTs received hundreds of negative comments from employees.Meanwhile, Ubisoft announced that they were creating
  a celebratory virtual hat NFT to gift to their employees in early March, in honor of the opening of the Ubisoft Quartz NFT
  platform. Maybe just give them a cash bonus next time.
