notes: 'Around 1.67 million EIGEN tokens belonging to an investor in the popular Ethereum-based EigenLayer project were stolen
  after the investor was tricked into transferring the tokens into the attacker''s wallet. The thief then sold the tokens
  for around $3.1 million, although the tokens were notionally worth around $5.5 million. Some of the stolen funds were later
  frozen by centralized exchanges.After the incident, some questioned why the tokens had been sent to an investor without
  a vesting contract, given they were supposed to be locked for a period of time to prevent sale.


  Total loss estimated at $3,100,000.'
