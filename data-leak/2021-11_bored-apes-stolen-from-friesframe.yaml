notes: Although friesframe had transferred some of his valuable NFTs to cold storage
  (a crypto wallet not connected to the Internet), he had been waiting for gas fees
  to come down before transferring more. In that period, his hot wallet was hacked,
  and a Bored Ape NFT and several others were stolen.
