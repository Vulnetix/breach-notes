source_name: '"New Zealand auction house becomes the first to auction NFTs"'
source_url: https://www.newshub.co.nz/home/new-zealand/2022/01/new-zealand-auction-house-becomes-the-first-to-auction-nfts.html
date_of_breach: '2022-01-26'
date_of_disclosure: '2022-01-26'
category: other
notes: 'New Zealand auction house Webb''s is selling the original glass plate negatives
  of two photographs taken of artist Charles Goldie sometime between 1910 and 1920.
  The sale also includes an NFT of a print of the photo (although the listing seems
  more excited about the NFT than the negative: "The purchaser of the NFT will also
  receive a framed contact print of the image and the original glass plate negative
  in a custom-built pine box"). In a bizarre move, Webb''s decided to sell the glass
  plate along with a small brass hammer. Head of art at Webbs, Charles Ninow, said,
  "Perhaps you might want to make it permanently digital. Smash it? Smash it."'
