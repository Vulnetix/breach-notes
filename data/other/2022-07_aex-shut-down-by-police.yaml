source_name: '"Announcement on Suspension of Platform Services"'
source_url: https://www.aex.com/announcement/en/blog/2022/07/17/14414.html/
date_of_breach: '2022-07-17'
date_of_disclosure: '2022-07-17'
category: other
notes: 'The AEX crypto exchange paused all withdrawals on June 16, estimating a 36-hour
  outage "to avoid unnecessary panic withdrawal". Then, instead of re-enabling all
  withdrawals, they re-enabled them in a piecemeal fashion, with several announcements
  each day that withdrawals were enabled for some extremely minor altcoins, but never
  for the more popular cryptocurrencies.Then, on July 17, the exchange released a
  new announcement: "Due to cooperation with the police investigation, the platform
  has suspended related services... Please wait for the police announcement." They
  also wrote in the post, "AEX reserves the right of final interpretation of this
  announcement", and below the signature wrote, "The closer you look, the further
  you see."'
