notes: 'The token for the Farcana blockchain shooting game plummeted in value by around
  60%. First, the project team announced that one of the project wallets had been
  compromised. However, they later deleted that tweet, then claimed that one of their
  market makers had been compromised. They emphasized that their wallets had not been
  hacked, and that their smart contracts had not been exploited.23.8 million FAR were
  taken from a wallet, and the majority were sold for around $164,000 in USDT. The
  exploiter still holds 3.4 million FAR, which are notionally worth $83,250 but not
  likely to be sellable for that amount.Farcana raised $10 million in seed funding
  in November 2023 from investors including Animoca and Polygon Ventures.


  Total loss estimated at $164,000.'
