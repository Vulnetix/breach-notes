notes: 'The IEGT token was created on Binance Smart Chain on July 13. However, its creators "covertly minted a large amount
  of tokens, primed for a rug pull", as blockchain security firm SlowMist described it. Although the project reportedly had
  only 5 million tokens in supply, this allowed the team to sell 1 billion tokens, cashing out approximately $1.14 million
  in the USDT stablecoin.


  Total loss estimated at $1,140,000.'
