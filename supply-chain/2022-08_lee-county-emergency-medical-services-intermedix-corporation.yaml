notes: 'Lee County Emergency Medical Services notifies past customers of third-party
  security breach. Lee County Emergency Medical Services reports that on Aug. 4 staff
  received notification of a customer data breach related to a previous third-party
  vendor responsible for ambulance billing services. Lee County EMS conducted business
  with a company called Intermedix Corporation for nearly 15 years, ending its vendor
  contract in September 2014. Intermedix hired a law […]. Of all the records the firm
  handled, less than 2% of the total may have been compromised. At this time, there
  is no indication that any of the information was misused and the notice is being
  provided out of an abundance of caution, according to SGR. Third-party company:
  Intermedix Corporation.'
