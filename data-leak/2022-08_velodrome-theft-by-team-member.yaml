notes: On August 4, the team behind the Velodrome exchange and liquidity marketplace noticed that $350,000 had been taken
  from a team-operated wallet that was normally used for operational funds. They announced they were beginning an investigation
  into the theft, which they initially believed was due to a compromised wallet. Their team member Gabagool tweeted more details,
  underscoring that no user funds were lost.On August 13, Gabagool posted a long confession to his Twitter account, writing
  that he had stolen the $350,000, and had previously taken $56,000 over the course of two months, to try to "revenge trade"
  the money he had lost in the crypto crash. Explaining why he took the $350,000, he wrote, "I thought I could make the 56k
  back and return all of the funds, which was delusional". He also wrote that "the majority of the funds have been returned
  to the Velodrome team. The rest will be." Velodrome later confirmed they had recovered all of the stolen money.Gabagool
  had become a somewhat prominent part of the crypto community, providing insights into various crypto happenings as someone
  who was adept at tracing blockchain transactions. In June, he was featured in a Vice documentary titled, "Is Everything
  in Crypto a Scam?". He spoke about, among other things, his October 2021 discovery that the crypto-focused venture capital
  firm Divergence Ventures was Sybil attacking airdrops to claim millions in rewards. That particular incident ended with
  Divergence returning the money they had gained from the strategy, and Ribbon awarding 5% of that amount — equivalent to
  about $545,000 at the time — to Gabagool as a "bounty".
