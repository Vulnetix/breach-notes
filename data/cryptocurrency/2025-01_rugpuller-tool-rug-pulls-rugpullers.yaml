notes: 'A suite of software tools called DogWifTools was popular among memecoin creators looking to rug pull unsuspecting
  traders. By helping token creators mask supply control and fake trading activity, the tool was used to convince outside
  traders that a token had potential — at least, up until the token creator pulled the rug out from under them.However, poor
  security by the software developers allowed attackers to ship a remote access trojan (RAT) along with the DogWifTools release.
  Once the package was downloaded, the trojan began scanning infected devices for crypto private keys, login information,
  and other sensitive data. Attackers even used scans of identification documents taken from their targets'' computers to
  create Binance accounts.Ultimately, around $10 million was stolen from would-be scammers. Along with the virus, the people
  who compromised DogWifTools left an angry note on infected machines: "Solana is a fucking joke and a scam from the beginning,
  it was designed for criminals by criminals! As a result, we have confiscated all your crypto, because you deserved it! You
  people who use automated tools to run these scam tokens are fucking disgusting to us. It''s about time you got fucked over
  for once. Solana is nothing more than a shitty platform that enables scammers and rug pullers to steal from innocent users."They
  also launched an onion website containing a message: "We specifically targeted scammers in the crypto market who were using
  tools to gain an unfair advantage over innocent, day-to-day traders. ... We believe it was morally correct to confiscate
  money that was not rightfully theirs." They added that they would soon be publishing the user data they stole on the scammers.


  Total loss estimated at $10,000,000.'
