initial_attack_vector: Withdrawal halt / insolvency
vendor_product: Vauld
notes: Vauld, a major cryptocurrency lender backed by the likes of Coinbase and Peter Thiel, announced they have suspended
  withdrawals, trading, and deposits due to the crypto market downturn, "financial difficulties of our key business partners",
  and a recent bank run of customer withdrawals approaching $200 million.Vauld, which is based in Singapore, also announced
  that they would be bringing on financial and legal advisors to "explore and analyse all possible options, including potential
  restructuring options".
