notes: 'In February, perennial political candidate Andrew Yang announced he had created "Lobby3", a DAO which he says will
  push for crypto-friendly regulation and "eradicate poverty". The website sports a cute illustration of a city, which was
  created by a group of artists, and which was also originally intended to be split into "puzzle pieces" to be minted as NFTs
  (though this apparently never came to pass).One of the artists, Phillip Lietz, took to Twitter on March 28 to call out the
  group for the pittance he was offered for his work, posting screenshots of an email exchange he had had with a member of
  the project team. The emails show Lietz asking whether artists would receive compensation for their work, and a project
  team member replying: "Yes... any artist we select will receive a percentage of our revenue".They went on to say that if
  they used his work, they would "negotiate a percentage of what we sell". The reply to Lietz''s question about if there was
  a contract was: "No formal contract as we need to move fast, but I imagine this email would hold up in court as a written
  agreement if it ever came to that (it wouldn''t! Andrew and I are men of our words!)" In a subsequent email, the team member
  wrote that they would "love to send you a Lobby3 Member token", and that "our artist commissions weren''t huge, but [we]
  would love to send you $500 for your time and effort". Lietz replied to say that the DAO''s NFT fundraising appeared to
  have raised at least $790,000, and that $500 was an unfair amount (although I suppose 0.06% is technically "a percentage").
  The team member replied by basically negging Lietz, writing "Honestly, I didn''t want to say this, but I will now mention:
  we weren''t actually going to use your art in the project... but you seemed like a great guy and I wanted to throw you some
  cash and get you some exposure".Anyway, nice job Andrew and team! Nothing says "eradicating poverty" and "empowering creatives"
  like paying them basically nothing.'
