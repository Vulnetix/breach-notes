notes: Following the dramatic collapse of Terra earlier this month, the Terra ecosystem voted to pass a proposal by Do Kwon
  to create "Terra 2.0". The project intends to "effectively create a new Terra chain without the algorithmic stablecoin"
  — an odd choice given that the whole point of the original Terra was the stablecoin. The proposal also involves renaming
  the existing Luna ($LUNA) coin to "Luna Classic" ($LUNC), so that Luna 2.0 can take its place — a change that I'm sure will
  not cause any confusion whatsoever.Billy Markus, one of the original creators of the Dogecoin cryptocurrency (both of whom
  have since left the project), tweeted, "luna 2.0 will show the world just how truly dumb crypto gamblers really are".
