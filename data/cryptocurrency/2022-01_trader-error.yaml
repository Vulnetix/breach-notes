source_name: '"Did I just lose half a million dollars by sending WETH to WETH''s contract address?"'
source_url: https://web.archive.org/web/20220131014321/https://www.reddit.com/r/ethereum/comments/sfz4kw/did_i_just_lose_half_a_million_dollars_by_sending/
date_of_breach: '2022-01-29'
date_of_disclosure: '2022-01-29'
category: cryptocurrency
vendor_product: Trader error
blockchain: ethereum
notes: A trader learned that, in order to exchange Ethereum tokens (ETH) for Wrapped Ethereum (WETH), they should send their
  ETH to the WETH token contract and receive the WETH in return. Intending to convert WETH back into ETH, they erroneously
  assumed that it "works the same way backwards". The trader sent 195 WETH ($510,000) to the WETH contract only to find they
  received no ETH in return, and their money was lost forever.Transaction history on Etherscan shows they were the 265th person
  to make this mistake. Most people did so with far smaller amounts of WETH, although another unfortunate trader lost 115
  WETH (at the time valued at $360,000) on August 11, 2021. A total of 432 WETH has been irretrievably lost to this contract
  this way since July 2018  — currently valued at $1.1 million.
