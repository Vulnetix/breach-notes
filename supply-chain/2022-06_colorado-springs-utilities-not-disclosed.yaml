notes: Colorado Springs Utilities experiences data breach, customer data compromised.
  COLORADO SPRINGS, Colo. (KRDO) -- Colorado Springs Utilities is warning customers
  about a data breach that happened in June, affecting customer. On July 6, Colorado
  Springs Utilities was notified that customer data stored by one of the company's
  subcontractors was accessed by an unauthorized party. According to Springs Utilities,
  this happened on June 15, 2022. The information included customer names and addresses,
  account numbers, and in most cases, phone numbers and email addresses.
