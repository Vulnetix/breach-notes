date_of_breach: '2022-09-15'
date_of_disclosure: '2022-09-15'
category: cryptocurrency
initial_attack_vector: Regulatory / legal action
vendor_product: Gensler says proof-of-stake crypto could be securities
blockchain: ethereum
notes: In the early hours of September 15, Ethereum completed "The Merge —  the long-awaited transition from its original
  proof-of-work consensus mechanism to proof-of-stake.Later that day, SEC Chairman Gary Gensler pointed to the staking mechanism
  as a signal that an asset might be a security as determined by the Howey test.There has been much discussion over whether
  cryptocurrencies in general or individually should be considered securities, commodities, or possibly even something else.
  Broadly, people within the crypto community don't want to see the assets fall under SEC jurisdiction, as the SEC is seen
  as much less friendly to the industry than the CFTC.
