notes: TBD is a subsidiary of Block (formerly Square), a tech company co-founded by
  billionaire social media mogul and Twitter founder Jack Dorsey. In July, they unveiled
  the concept of "Web5", which they define an "extra decentralized web platform".Who
  could have predicted that people might balk when TBD then announced they would try
  to trademark the term? Apparently they saw no irony in their attempt as a single,
  powerful entity to gain control over the trademark.The same was not true of the
  people who responded to the post, who wrote things like, "We need to make sure web
  5 is truly open by copyrighting it", and simply "🤡🤡🤡🤡🤡".Six hours later, the company
  tweeted, "we have heard the community and we are responding to their concerns".
  They issued a statement acknowledging that "we have heard loud voices in the community
  who are concerned about the potential for abuse of trademark law in ways that would
  undermine the mission of decentralization." Gee, you think?And no, they still haven't
  explained what happened to web4.
