notes: The Texas-based Rhodium Enterprises bitcoin mining company has filed for bankruptcy, disclosing debts between $50 and
  $100 million and total assets between $100 and $500 million. The company had tried to begin restructuring, but was not able
  to reach agreement among shareholders, and so decided to enter bankruptcy.Bitcoin mining has been an extremely challenging
  business in recent times, partly due to volatile crypto prices over the last few years, and due to diminishing miner rewards
  following the April halving event.Rhodium Enterprises had been showing signs of trouble, including failing to make scheduled
  loan payments earlier this month. In December 2023, a dispute between them and a subsidiary of the Riot Platforms bitcoin
  mining group culminated in armed security removing Rhodium employees from a bitcoin mining facility in Rockdale, Texas,
  where Rhodium was leasing bitcoin miners. The case was later sent to arbitration.
