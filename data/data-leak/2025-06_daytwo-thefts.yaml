notes: 'Christian Nieves, a New York man who goes by the handles "daytwo" and "PawsOnHips", has reportedly stolen more than
  $4 million through a theft ring where he impersonates Coinbase customer support. An investigation by crypto sleuth zachxbt
  outlined thefts from multiple Coinbase users, including one elderly victim who lost $240,000.zachxbt noted that Nieves seems
  to have a gambling problem, depositing much of the stolen funds into crypto gambling websites. "You’ll see onchain how casino
  deposits get smaller as he loses funds," wrote zachxbt. "Recently this escalated to the point where he started stealing
  cuts from accomplices." He also appears to have used some of the stolen funds on luxury goods, including a Corvette and
  expensive watches.


  Total loss estimated at $4,000,000.'
