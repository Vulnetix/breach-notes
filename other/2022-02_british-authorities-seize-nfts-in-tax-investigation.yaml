vendor_product: British authorities seize NFTs in tax investigation
notes: British tax authorities seized three NFTs in what they said was an attempt to dodge £1.4 million ($1.9M) in taxes.
  Officials stated that the seizure was a "warning to anyone who thinks they can use crypto assets to hide money", which may
  come as a surprise to some of the masterminds in the crypto subreddits.
