notes: 'So, apparently polo shirts have NFTs now. Fashion brand Lacoste''s NFT project is titled "Undw3", which is apparently
  supposed to be pronounced "underwater" — I guess if you say the 3 in French it sort of sounds like the English... word...
  "underwater"... anyway. The Discord for that NFT project was one of the latest to be hacked in a string of Discord hacks
  so prolific that I''ve basically stopped reporting on them individually. Like many recent Discord hacks, this one was accomplished
  by compromising a moderator''s account. The account was then used to post a fake mint link, and users who signed the transaction
  approval found their assets transferred to the attacker.Since the last post about an NFT project having its Discord compromised,
  five days ago, we''ve seen at least fifteen more projects suffer the same: Clyde, Good Skellas, Duppies, Oak Paradise, Tasties,
  Yuko Clan, Mono Apes, ApeX Club, Anata, GREED, CITADEL, DegenIslands, Sphynx Underground Society, FUD Bois, and Uncanny
  Club.'
