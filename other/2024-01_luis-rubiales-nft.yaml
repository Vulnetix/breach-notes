notes: 'Apparently, former president of the Royal Spanish Football Federation Luis Rubiales has decided the way to rehabilitate
  his reputation after forcibly kissing a soccer player and being banned from football is to... release an NFT project.In
  an announcement posted on Rubiales'' Twitter account, the South Korean Moon Labs wrote: "Yes, we agree that Mr. Luis Rubiales
  made a small mistake in women world cup." The statement went on to condemn "extremism and radical feminism", and downplay
  Rubiales'' actions as not "really" sexual assault. "Yes, Luis did small mistake but probably the biggest mistake was losing
  Luis Rubiales in football part [sic]."'
