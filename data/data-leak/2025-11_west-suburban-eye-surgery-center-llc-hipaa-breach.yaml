notes: 'West Suburban Eye Surgery Center LLC (MA), a Business Associate, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2025-11-11
  for a breach affecting 500 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Electronic Medical Record. This was reported by a Business
  Associate on behalf of a covered entity. Source: HHS OCR Breach Portal (HIPAA Breach
  Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured
  protected health information (PHI) affecting 500 or more individuals.'
