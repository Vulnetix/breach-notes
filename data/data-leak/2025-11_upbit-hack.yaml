source_name: '"Upbit Reveals 5.9B-Won Corporate Loss in Latest Hack, Fully Reimburses
  Users"'
source_url: https://www.coindesk.com/markets/2025/11/28/upbit-reveals-5-9b-won-corporate-loss-in-latest-hack-fully-reimburses-users
date_of_breach: '2025-11-27'
date_of_disclosure: '2025-11-27'
category: data-leak
notes: 'The Korean cryptocurrency exchange Upbit suffered a loss of around $30 million
  in various Solana-based assets due to a hack. Some entities have suggested that
  Lazarus, a North Korean state-sponsored cybercrime group, was behind the hack.Upbit
  reimbursed users who had lost funds from company reserves. The exchange was able
  to freeze around $1.77 million of the stolen assets.This theft occurred exactly
  six years after Upbit suffered a theft of 342,000 ETH (priced at around $50 million
  at the time).


  Total loss estimated at $28,430,000.'
