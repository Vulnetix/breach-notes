notes: After reducing their staff by 20–30% in June, Dubai-based cryptocurrency exchange Bybit is doing another round of layoffs.
  This time the cut is estimated at around 30%, which is likely around 750 people based on their headcount.In a Twitter thread,
  Bybit CEO attributed the layoffs to the "deepening bear market" and said the layoffs touch all departments."We are all saddened
  by the fact this reorganisation will impact many of our dear Bybuddies and some of our oldest friends," he wrote. On the
  bright side, they no longer have to be called "Bybuddies".
