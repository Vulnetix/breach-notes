notes: 'The United Kingdom''s Financial Conduct Authority issued a warning that FTX
  is not authorized by them, but is targeting consumers in the UK. "Almost all firms
  and individuals offering, promoting or selling financial services or products in
  the UK have to be authorised or registered by us," they wrote in the announcement,
  noting that FTX is not. Because of this, "you are unlikely to get your money back
  if things go wrong".A spokesperson from FTX said they believed that "a scammer is
  impersonating FTX", which they said they thought led to the warning. However, that
  statements in the warning are accurate: FTX is not registered with the FCA, and
  they serve UK customers.'
