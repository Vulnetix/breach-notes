notes: 'Feedify cloud service architecture compromised by MageCart crime gang. MageCart
  cyber gang compromised the cloud service firm Feedify and stole payment card data
  from customers of hundreds of e-commerce sites. UAT-10362 linked to LucidRook attacks
  targeting Taiwan-based institutions. Bitcoin Depot hack leads to $3.6M Bitcoin theft
  via stolen credentials. Third-party company: Feedify.'
