notes: 'An attacker stole $1.4 million from the defi lending project Minterest. Using a flash loan attack, they manipulated
  the exchange rate calculated by the project, allowing them to withdraw more tokens than they originally loaned.Minterest
  paused the supply and borrow portions of their protocol after the attack, and attempted to contact the attacker to negotiate
  a return of some of the funds.


  Total loss estimated at $1,400,000.'
