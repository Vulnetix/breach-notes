initial_attack_vector: Regulatory / legal action
vendor_product: Aragon DAO to sue founders
blockchain: ethereum
notes: Aragon is a prominent project that creates DAO infrastructure. Ironically, its own DAO-based governance has been fraught,
  with the group facing a governance crisis in May over conflicts between the DAO and the Aragon Association (a small group
  of "stewards" for the project).Now, after the Aragon Association decided without consulting the DAO to dissolve itself and
  wind down the project's governance tokens (while keeping some of the funds), the DAO has voted to sue the group. The DAO
  has accused the group of improperly taking investors' money to put it "into their new secretive company". They've allocated
  $300,000 to legal efforts.
