source_name: '"Auros bankruptcy protection filings show funds tied up on FTX"'
source_url: https://www.theblock.co/post/196418/auros-bankruptcy-filing-ftx
date_of_breach: '2022-12-20'
date_of_disclosure: '2022-12-20'
category: other
notes: Crypto market maker Auros filed for bankruptcy protection in the British Virgin
  Islands, not long after a missed loan repayment to the Maple defi lender in late
  November signaled something was amiss. At the time, Auros attributed the missed
  payment of 2,400 wETH (valued at ~$3 million at the time) to a "short-term liquidity
  issue as a result of the FTX insolvency".Now, however, Auros is seeking a "light
  touch" liquidation path that would allow them to continue operations while they
  develop a restructuring plan. Meanwhile, they have missed another Maple loan repayment,
  this time for $7.5 million.Court filings have revealed that "a significant proportion
  of the Company's assets" are frozen with FTX, leaving the company insolvent. These
  assets have an estimated value of $20 million.
