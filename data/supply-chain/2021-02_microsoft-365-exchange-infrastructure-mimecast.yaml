notes: 'Mimecast Certificate Hacked in Microsoft Email Supply-Chain Attack. A sophisticated
  threat actor has hijacked email security connections to spy on targets. A Mimecast-issued
  certificate used to authenticate some of the company’s products to Microsoft 365
  Exchange Web Services has been “compromised by a sophisticated threat actor,” the
  company has announced. Third-party company: Mimecast.'
