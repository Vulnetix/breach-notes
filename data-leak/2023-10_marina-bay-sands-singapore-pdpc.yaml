notes: "On October 19-20, 2023, unauthorized actors accessed the Sands LifeStyle loyalty programme database of Marina Bay Sands, Singapore's iconic integrated resort and casino. The breach exposed personal data for 665,000 loyalty programme members. Compromised data included names, email addresses, phone numbers, mobile numbers, membership tier details, and membership numbers. Marina Bay Sands disclosed the breach on October 26 and began notifying affected members. The Singapore Personal Data Protection Commission (PDPC) investigated and in October 2025 fined Marina Bay Sands Pte Ltd SGD 2.4 million (approximately USD 1.8 million) — one of the largest PDPC enforcement actions under the Personal Data Protection Act (PDPA). The PDPC found failures in access control, monitoring, and security management of the loyalty programme systems."
