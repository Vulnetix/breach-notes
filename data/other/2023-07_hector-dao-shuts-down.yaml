source_name: '"Hector Network Votes to Liquidate $16M Treasury Following Multichain,
  Fantom Losses"'
source_url: https://www.coindesk.com/business/2023/07/17/hector-network-votes-to-liquidate-16m-treasury-following-multichain-fantom-losses/
date_of_breach: '2023-07-17'
date_of_disclosure: '2023-07-17'
category: other
notes: Hector DAO, the governing body behind the Hector Network, voted to liquidate
  the project's $16 million treasury and distribute it to tokenholders, effectively
  putting an end to the project.On July 14, a community manager wrote on Discord that
  "Hector Network ha[d] suffered significant damage to its ability to operate" after
  the Multichain collapse, and that the project faced a choice between liquidating
  the treasury and winding down or migrating to a new blockchain and trying to rebuild.
  The community chose the former.According to a post on Discord, the winding-down
  process will likely take 6 to 12 months as the project appoints a liquidator, legal
  counsel, and auditor.
