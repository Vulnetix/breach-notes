notes: 'A memecoin called $BALD, built on the Coinbase Base test network, appears to have rug pulled for at least $25.6 million.
  Although the Base network is meant to be used for developer testing, some people have tried to trade on the network before
  its official launch.A pseudonymous crypto user called "Bald" announced that they would be selling $BALD tokens on the Base
  network, and the token — apparently named after the hairless Coinbase CEO Brian Armstrong — quickly skyrocketed in price.
  However, the token deployer emptied tokens priced at around $25.6 million from the liquidity pool two days after launch
  in apparent rug pull. The token price quickly plunged by around 90%.Conspiracy theories emerged that the Bald account was
  in fact operated by Sam Bankman-Fried, the former CEO of FTX who is on house arrest under strict supervision and without
  access to most websites as he awaits trial later this year.


  Total loss estimated at $25,600,000.'
