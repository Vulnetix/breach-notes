notes: 'The owner of EtherRock #44 tried to list their NFT for sale for 444 ETH (almost
  $1.2 million), but erroneously listed it for 444 wei — the fractional unit of ETH
  typically used for representing transaction fees. A bot programmed to look for listings
  like this one, where a pricey NFT is listed for far below its average or floor price,
  quickly snapped up the NFT before the buyer could remove the listing. The buyer
  of the NFT eventually tried to flip the NFT for 234 ETH, (around $625,000). The
  trader wrote on Twitter, "In one click my entire net worth of ~$1 million dollars,
  gone".'
