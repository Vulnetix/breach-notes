notes: 'A new wallet drainer tool has stolen $58.98 million in cryptocurrency assets
  from more than 63,000 victims in the past nine months. People using the drainer
  software have pulled in victims by running ads on Twitter and through Google ads,
  employing various tricks to thwart ad reviewers trying to thwart malicious ads on
  their platforms.


  Total loss estimated at $58,980,000.'
