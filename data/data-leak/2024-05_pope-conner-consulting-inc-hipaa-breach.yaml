notes: 'Pope & Conner Consulting, Inc. (WI), a Business Associate, submitted a HIPAA
  breach notification to the HHS Office for Civil Rights (OCR) on 2024-05-15 for a
  breach affecting 1035 individuals. Breach type: Hacking/IT Incident. Information
  location: Email. This was reported by a Business Associate on behalf of a covered
  entity. Source: HHS OCR Breach Portal (HIPAA Breach Notification Rule, 45 CFR §164.400–414).
  The OCR portal lists all breaches of unsecured protected health information (PHI)
  affecting 500 or more individuals.'
