source_name: '"SEC Charges Crypto Entrepreneur Justin Sun and his Companies for Fraud
  and Other Securities Law Violations"'
source_url: https://www.sec.gov/news/press-release/2023-59
date_of_breach: '2023-03-22'
date_of_disclosure: '2023-03-22'
category: other
notes: Celebrities Lindsay Lohan, Jake Paul, Soulja Boy, Austin Mahone, Kendra Lust,
  Lil Yachty, Ne-Yo, and Akon were all charged by the SEC for violating anti-touting
  laws that would require them to disclose if and how much they were being paid to
  promote securities. The alleged securities in question are TRX and BTT, two tokens
  both closely tied to Justin Sun, who was also charged in relation to the scheme.With
  the exception of Soulja Boy and Mahone, the celebrities paid a total of more than
  $400,000 in  disgorgement, interest, and penalties to settle the charges without
  admitting or denying them.
