initial_attack_vector: Protocol collapse / insolvency
vendor_product: LocalBitcoins to
blockchain: bitcoin
notes: LocalBitcoins, a Finnish platform that allows individuals to trade Bitcoins with one another peer-to-peer, will be
  shutting down. The exchange is one of the longest running cryptocurrency exchanges, and for a while functioned as a way
  for people to trade cash for Bitcoin (and vice versa) more privately. However, in 2019, the exchange introduced KYC requirements.LocalBitcoins
  cited "the ongoing very cold crypto-winter" as the rationale for the closure, and stated that new sign-ups would be suspended
  immediately. Trading will be suspended a week later, and users will have a year to withdraw Bitcoins they stored on LocalBitcoins'
  wallet product.
