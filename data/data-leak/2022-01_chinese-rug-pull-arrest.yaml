notes: 'Eight people were arrested in China after being connected to a rug pull. One investor lost ¥590,000 ($90,000) he had
  poured into the token in June, when project owners took the website offline and pulled all of the money out. A total of
  ¥50 million (a bit below $7.9 million) was lost to the scam.


  Total loss estimated at $7,800,000.'
