notes: 'Two Usenet providers blame data breaches on partner company. Editor''s note:
  This article was updated on July 8, 2025, to reflect new information discovered
  by an external investigation in May 2020. Two companies that provide Usenet services
  have disclosed security breaches today. The two companies, UseNeXT and Usenet.nl,
  blamed the breaches on "a security vulnerability at a partner company.". Neither
  UseNeXT nor Usenet.nl has named the third-party company whose software enabled the
  intrusion. It is unclear if this is referring to a Usenet desktop client or a server-side
  service.'
