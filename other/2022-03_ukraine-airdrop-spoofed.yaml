initial_attack_vector: Phishing attack
vendor_product: Ukraine airdrop spoofed
blockchain: ethereum
notes: After embracing cryptocurrency donations to help fund its resistance to Russian invasion, the Ukrainian government
  decided to try to solicit even more donations by announcing they would airdrop a token to anyone who donated. There was
  some excitement on March 3 as it appeared that Ukraine was seeding liquidity pools on Uniswap with $WORLD tokens. However,
  blockchain analysis tool Etherscan shortly afterwards marked the token as "misleading... and may be spam or phishing". It's
  not yet clear what the person apparently spoofing the tokens was trying to do.
