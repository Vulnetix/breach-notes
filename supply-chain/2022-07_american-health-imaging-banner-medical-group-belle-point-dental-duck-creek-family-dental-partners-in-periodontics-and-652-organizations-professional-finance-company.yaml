notes: 'Ransomware attack one of year''s biggest health data breaches. A cyberattack
  on a little-known debt collection firm affects over 650 healthcare facilities across
  the U.S. A ransomware attack on a little-known debt collection firm that serves
  hundreds of hospitals and medical facilities across the U.S. could be one of the
  biggest data breaches of personal and health information this year. The Colorado-based
  Professional Finance Company, known as PFC, which contracts with “thousands” of
  organizations to process customer and patient unpaid bills and outstanding balances,
  disclosed on July 1 that it had been hit by ransomware months earlier in February.
  Third-party company: Professional Finance Company.'
