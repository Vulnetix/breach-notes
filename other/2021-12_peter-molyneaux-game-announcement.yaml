source_name: '"Peter Molyneux’s NFT Game Will Make Being Nice Cost Real Money"'
source_url: https://www.theverge.com/22832188/peter-molyneux-22cans-gala-nft-blockchain-business-simulator-game-interview
date_of_breach: '2021-12-11'
date_of_disclosure: '2021-12-11'
category: other
notes: Peter Molyneux announced a new game, Legacy, a business management simulator
  (fun!) where you join by buying an NFT called "Land", and compete to increase your
  "LegacyCoin" bank account balance. The company in the game effectively is running
  a company town, a real-world model with a history that is far more fraught than
  Molyneux acknowledges in his Verge interview.
