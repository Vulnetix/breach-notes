source_name: '"Peer-to-Peer Bitcoin Exchange Paxful to Suspend Operations"'
source_url: https://www.coindesk.com/business/2023/04/04/peer-to-peer-bitcoin-exchange-paxful-to-suspend-operations/
date_of_breach: '2023-04-04'
date_of_disclosure: '2023-04-04'
category: other
notes: Paxful, a peer-to-peer marketplace where people could trade Bitcoin, Tether
  (USDT), and USDC, suddenly announced on April 4 that they would be immediately suspending
  the marketplace. "We are not sure if it will come back," wrote CEO Ray Youssef.Youssef
  was vague as to the reasons for the closure, writing that "While I cannot share
  the full story now, I can say that we unfortunately have had some key staff departures.
  Also, regulatory challenges for the industry continue to grow, especially in the
  peer-to-peer market and most heavily in the U.S."Youssef later elaborated in a Twitter
  Space, explaining that he feared for the safety of user funds because of a lawsuit
  from his co-founder, who he also accused of "[driving] away all of our senior level
  staff".Some had trouble withdrawing funds from the platform, though this seemed
  to be due to the overload. Youssef tweeted, "Paxful database is a bit overloaded
  now as everyone is withdrawing funds. It is making transfers slow. I promise funds
  r safe and they will clear soon".On May 8, Paxful came back online, though it was
  unclear whether or in what capacity the business would continue to operate going
  forward.
