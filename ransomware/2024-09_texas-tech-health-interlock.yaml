notes: "Texas Tech University Health Sciences Center (TTUHSC) and its El Paso center suffered a ransomware attack in September 2024, claimed by the Interlock group. Combined, 1,465,000 patients were affected (650k from TTUHSC Lubbock, 815k from TTUHSC El Paso). Attackers claimed 2.6 TB of stolen data including patient records, medical research, and SQL databases. Data published on Interlock's dark web leak site after ransom was not paid. Largest university breach by records in 2024 and sixth-largest US healthcare breach that year. Data compromised: names, addresses, DOB, SSNs, driver's licence, health insurance, diagnosis and billing data."
