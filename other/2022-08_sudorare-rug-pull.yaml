source_name: '"NFT Exchange SudoRare Goes Dark After $820,000 Rug Pull"'
source_url: https://cryptobriefing.com/nft-exchange-sudorare-goes-dark-820000-rug-pull/
date_of_breach: '2022-08-23'
date_of_disclosure: '2022-08-23'
category: other
notes: 'Six hours after its launch, the team behind the new SudoRare NFT exchange
  took the money and ran, deleting the project website and social media. People had
  already warned about issues in the project contract that signaled it could be a
  scam, but those were either unseen or unheeded by the people who put a collective
  $820,000 of various tokens into the project.At least one of the scammer wallets
  interacted with the Kraken crypto exchange, a U.S.-based exchange that requires
  KYC, so it''s possible that Kraken could help identify the scammers — though they''ve
  not made any public moves to do so.


  Total loss estimated at $820,000.'
