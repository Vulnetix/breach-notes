notes: 'Maybe they''d sunk too much money into producing Killer Whales to back out,
  or maybe its creators actually think that a Shark Tank-style crypto reality TV series
  is what it will take to return crypto to its former glory. A crypto-boosting show
  judged by crypto industry hustlers like Anthony "The Mooch" Scaramucci and shady
  operator Mario Nawfal has just published trailers for its scheduled January 2024
  debut.The trailer for the show features a duo pitching "Ape Water": Bored Ape-branded
  canned water that sells for $2.80/can. "We want to reimagine water... When you scan
  the can, that''s when crypto and web3 is unlocked," says the booster. Revolutionary.Even
  crypto Twitter seemed less than enthused, with one person writing that the show
  was "like Shark Tank, but cringe". Another wrote, "Just take a peep at the panel
  of judges it''s full of crypto grifters and scammers".'
