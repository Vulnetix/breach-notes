source_name: '"Crypto.com to suspend US institutional exchange"'
source_url: https://blockworks.co/news/crypto-com-suspending-us-institutional-exchange
date_of_breach: '2023-06-09'
date_of_disclosure: '2023-06-09'
category: other
notes: Singapore's Crypto.com has announced it will be imminently shutting down its
  institutional exchange service in the US, citing "limited demand from institutions
  in the U.S. in the current market landscape". The firm will continue to serve retail
  customers in the country, however.
