notes: 'Operation Red Signature Targets South Korean Companies. We uncovered Operation
  Red Signature, an information theft-driven supply chain attack targeting organizations
  in South Korea. We discovered the attacks around the end of July, while the media
  reported the attack in South Korea on August 6. By: Jaromir Horejsi, Joseph C Chen,
  Kawabata Kohei, Kenney Lu Aug 21, 2018 Read time: ( words). Together with our colleagues
  at IssueMakersLab , we uncovered Operation Red Signature, an information theft-driven
  supply chain attack targeting organizations in South Korea. We discovered the attacks
  around the end of July, while the media reported the attack in South Korea on August
  6. Third-party company: Remote support solution provider.'
