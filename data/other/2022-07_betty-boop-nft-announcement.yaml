notes: The studio behind Betty Boop decided there was no better time to launch a Betty Boop NFT collection than during a period
  of record low interest in NFTs (or, more likely, they started the project during the NFT craze and decided they'd sunk too
  much money into it to pull the plug). The Betty Boop Twitter account announced Boop &amp; Frens, an 8,888-piece NFT collection.Reception
  on Twitter was brutal, with one person commenting, "And that's another one for Beloved Icons Ruined By Pyramid Scheme Bingo".
  Another described the decision to launch an NFT project as "jumping on the bandwagon while it's actively collapsing". The
  reception on Discord was also tepid, with only 130 people joining the server in the two days following the announcement.
