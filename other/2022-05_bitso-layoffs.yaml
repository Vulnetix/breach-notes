notes: The Latin American crypto exchange Bitso laid off 80 employees, around 10% of their staff which had previously amounted
  to around 700 people. The exchange told CoinDesk that they needed to reconsider the skills they were looking for in employees,
  so they could "move faster".Bitso is a major Latin American exchange, with mor than four million users across Mexico, Argentina,
  Colombia, and Brazil.
