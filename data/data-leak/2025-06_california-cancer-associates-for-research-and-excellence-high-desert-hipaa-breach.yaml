notes: 'California Cancer Associates for Research and Excellence – High Desert (CA),
  a Healthcare Provider, submitted a HIPAA breach notification to the HHS Office for
  Civil Rights (OCR) on 2025-06-27 for a breach affecting 17250 individuals. Breach
  type: Hacking/IT Incident. Information location: Email. Source: HHS OCR Breach Portal
  (HIPAA Breach Notification Rule, 45 CFR §164.400–414). The OCR portal lists all
  breaches of unsecured protected health information (PHI) affecting 500 or more individuals.'
