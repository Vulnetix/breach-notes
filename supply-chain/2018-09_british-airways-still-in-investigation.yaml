initial_attack_vector: Magecart web-skimmer attack — attackers initially accessed British Airways' network via stolen credentials belonging to a third-party supplier, moved laterally through a Citrix-based remote access system, then injected 22 lines of malicious JavaScript into a modified Modernizr library loaded from the BA baggage claim information page; the skimmer exfiltrated payment card data in real-time to an attacker-controlled server in Romania during the booking checkout flow
