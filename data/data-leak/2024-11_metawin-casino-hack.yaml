notes: 'Hot wallets used by the MetaWin crypto casino were drained of around $4 million.
  According to the company''s CEO, the attacker "t[ook] advantage of our frictionless
  withdrawal system". The attacker then moved the stolen funds to crypto exchanges
  including KuCoin.


  Total loss estimated at $4,000,000.'
