notes: 'Reported ransomware attack leads to weeks of Aprima EHR outages. Some customers
  describe being unable to access their clinic schedules, chart notes, refill requests
  or incoming test results, among other issues. [This piece has been updated to include
  additional user experiences with the outage.]. A reported ransomware attack on the
  CompuGroup Medical data center partner, MedNetwoRX, has impeded some customers''
  access to their Aprima electronic health record systems for more than two weeks.
  Third-party company: APRIMA.'
