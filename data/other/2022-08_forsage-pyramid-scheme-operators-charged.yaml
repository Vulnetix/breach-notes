date_of_breach: '2022-08-01'
date_of_disclosure: '2022-08-01'
category: other
initial_attack_vector: Ponzi / pyramid scheme
vendor_product: Forsage pyramid scheme operators charged
blockchain: ethereum, bsc, tron
notes: The SEC charged eleven people who helped to create and promote the crypto pyramid and Ponzi scheme Forsage. The scam
  operated from January 2020 into 2021, despite multiple cease and desist actions from regulators in the US and the Philippines.Users
  deposited their money into projects running on the Ethereum, Tron, and Binance blockchains, and earned rewards for recruiting
  others to the scheme. The project also used payments from newer investors to pay out earlier investors — a Ponzi scheme.
