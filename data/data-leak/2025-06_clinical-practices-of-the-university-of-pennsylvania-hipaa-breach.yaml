notes: 'Clinical Practices of the University of Pennsylvania (PA), a Healthcare Provider,
  submitted a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on
  2025-06-30 for a breach affecting 1432 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Paper/Films. Source: HHS OCR Breach Portal (HIPAA Breach Notification
  Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected
  health information (PHI) affecting 500 or more individuals.'
