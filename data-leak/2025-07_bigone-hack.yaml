notes: 'The BigONE cryptocurrency exchange was hacked for more than $27 million, which
  the hacker quickly swapped for various other tokens. The attacker compromised one
  of the exchange''s hot wallets after gaining access to the company''s production
  network. BigONE stated they would fully cover the loss.Blockchain security researcher
  zachxbt responded to the hack by saying, "I do not feel bad for the team as this
  CEX processed a good bit of volume from pig butchering, romance, investment scams."
  Elsewhere he suggested that hacks of "sketchy offshore exchanges" would be a positive
  for the crypto industry, serving as a "natural cleanse".


  Total loss estimated at $27,000,000.'
