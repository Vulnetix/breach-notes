notes: 'Blockchain security firm SlowMist has reported that a phishing website appearing
  to be the real cryptocurrency exchange HitBTC has stolen more than $15 million worth
  of Bitcoin, Tether, and Ether from users believing it to be the real thing. Users
  who didn''t notice they were accessing a site with the URL hitbt2c.lol instead of
  hitbtc.com approved transactions to swap their crypto assets, only to find the site
  drained their wallets.


  Total loss estimated at $15,000,000.'
