notes: 'Unicorn Nodes claimed to be a "defi-as-a-service" project. It launched its
  $RNBW token on April 14, despite warnings from "TheBreadmaker", who rates various
  protocols. Only hours after launch, someone sold 5,432 RNBW (~$129,000), draining
  the liquidity pool and crashing the token price. Although the project creators initially
  claimed that the project had been exploited by an external actor, and that it wasn''t
  a rug pull, by that evening they had scrubbed their website and Twitter presence.


  Total loss estimated at $129,000.'
