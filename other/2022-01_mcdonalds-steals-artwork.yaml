vendor_product: McDonalds steals artwork
notes: "Shortly after rolling out their hexagonal NFT profile pictures, @twitter posted \"gm, looking for an nft pfp\". The\
  \ next day, McDonald's German \nlanguage communications account, @McDonaldsDENews, replied \"Say no more!\" with attached\
  \ pixel art of the Twitter bird logo holding a McDonald's bag in its beak. After further investigation, the art was found\
  \ to be nearly identical to an image from a tweet by @SarahBurssty, which ironically was created to criticize Twitter's\
  \ support of NFTs."
