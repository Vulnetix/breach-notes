vendor_product: Three Arrows Capital looks for bailout
notes: The Wall Street Journal reported that Three Arrows Capital, a crypto hedge fund that was rumored to be insolvent several
  days earlier, was indeed pursuing last-ditch options to make good on their debts. 3AC had major exposure to Luna, a token
  that plunged in value during the collapse of the Terra ecosystem in May, and lost around $200 million in that catastrophe.
  The collapse of other projects and the plummeting prices of cryptocurrencies in general exacerbated 3AC's situation, causing
  them to take losses in other risky plays they had made, and ending with them unable to pay off debts to creditors.According
  to the WSJ, 3AC has hired legal and financial advisors to pursue solutions including asset selloffs or rescue by another
  firm, and is trying to extend the deadlines for outstanding debt repayments.
