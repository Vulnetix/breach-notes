source_name: '"Binance tells regulators it will cease operations in Ontario... for
  real this time"'
source_url: https://cointelegraph.com/news/binance-tells-regulators-it-will-cease-operations-in-ontario-for-real-this-time
date_of_breach: '2022-03-16'
date_of_disclosure: '2022-03-16'
category: other
notes: In June 2021, Binance announced they would stop operating in Ontario after
  the province introduced new prospectus and registration requirements for crypto
  exchanges. However, in December, Binance said in an email to Ontarian investors
  they were allowed to continue operating in the province — prompting the Ontario
  Securities Commission to release a statement titled "Binance is not registered in
  Ontario", which said, "Binance represented to OSC Staff that no new transactions
  involving Ontario residents would occur after December 31, 2021. Binance has issued
  a notice to users, without any notification to the OSC, rescinding this commitment.
  This is unacceptable."On March 16, Binance confirmed that they would actually stop
  servicing Ontario residents, for real this time. They also admitted to sending an
  email to investors on January 1 that said that they could no longer trade or onboard
  to the platform, despite not putting any such restriction in place.
