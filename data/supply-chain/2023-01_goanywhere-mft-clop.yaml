notes: "Beginning 18 January 2023, the Cl0p ransomware gang exploited a zero-day remote code injection vulnerability (CVE-2023-0669) in Fortra's GoAnywhere Managed File Transfer (MFT) product, which is used by organizations to securely transfer large files. Cl0p claimed to have exploited the vulnerability against approximately 130 organizations over a 10-day window before Fortra issued an emergency patch on 1 February 2023. Major victims included Community Health Systems (1 million patients), Rubrik (data theft confirmed), Hitachi Energy, City of Toronto, Hatch Bank, Saks Fifth Avenue, Elly Lilly (via third-party), Procter & Gamble, and many others. The Cl0p group did not deploy ransomware encryption — consistent with their later MOVEit campaign — instead only exfiltrating data and threatening publication. The GoAnywhere attack established Cl0p's playbook of targeting enterprise file transfer platforms as an efficient mass-breach vector, a methodology they subsequently applied at even greater scale against MOVEit Transfer (May 2023) and Cleo (December 2024). Healthcare was particularly affected: CHS notified HHS OCR of the 1-million-patient exposure. The GoAnywhere and MOVEit campaigns in 2023 together established Cl0p as the most prolific data extortion group by victim count in that year."
