notes: '60 credit unions facing outages due to ransomware attack on popular tech provider.
  The ransomware attack targeted the cloud services provider Ongoing Operations, a
  company owned by credit union technology firm Trellance. About 60 credit unions
  are dealing with outages due to a ransomware attack on a widely used technology
  provider. National Credit Union Administration (NCUA) spokesperson Joseph Adamoli
  said the ransomware attack targeted the cloud services provider Ongoing Operations,
  a company owned by credit union technology firm Trellance. Third-party company:
  Trellance.'
