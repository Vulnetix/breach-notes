notes: 'Zoth, a restaking platform for "real world assets" (or RWAs), was hacked for around $285,000 when an exploiter discovered
  a bug in the platform''s collateral calculations. This allowed them to mint ZeUSD, the platform''s stablecoin token, without
  depositing sufficient collateral.


  Total loss estimated at $285,000.'
