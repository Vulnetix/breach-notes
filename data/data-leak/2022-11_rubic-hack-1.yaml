notes: 'An attacker was able to compromise the private key of an admin wallet for
  the Rubic crypto exchange, transferring around 34 million Rubic tokens. The attacker
  then sold the tokens on decentralized exchanges Uniswap and PancakeSwap.The enormous
  sale caused the token price to plummet from $0.082 to $0.016, an 80% decrease. The
  stolen tokens were nominally worth almost $2.8 million (priced at the value before
  the theft), but it''s not likely the attackers were able to exchange them for that
  much given the lack of liquidity to absorb such a huge sale.


  Total loss estimated at $814,000.'
