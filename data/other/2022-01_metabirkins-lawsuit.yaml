notes: Mason Rothschild, the creator of "MetaBirkins" NFTs, was the target of a trademark
  lawsuit by Birkin bag-maker Hermès. The lawsuit came after he ignored a cease and
  desist from the company over his his 3D renderings depicting and named after the
  distinctive bags. In a public statement replying to the lawsuit, Rothschild wrote
  that "I am not creating or selling fake Birkin bags. I've made art works that depict
  imaginary, fur-covered Birkin bags... I have the right also to use the term 'MetaBirkins'
  to describe truthfully what that art depicts, and to comment artistically on those
  bags and on the Birkin brand." So far, the NFT collection has enjoyed about $1.2
  million in trading.I, for one, am very curious to see how the litigation plays out.
  In the meantime, the Rarible landing page for the connection displays an error message
  stating, "This user or item has been temporarily blocked from public access".
