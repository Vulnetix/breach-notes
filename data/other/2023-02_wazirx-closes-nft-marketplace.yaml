notes: Indian cryptocurrency exchange WazirX abruptly closed their NFT marketplace on February 22, giving its users no warning.
  In an announcement on Twitter, they wrote that they had made the decision based on "low volume and traction". Elaborating,
  they wrote that over the previous 30 days, the platform had seen "71 unique active wallets, 354 transactions, a volume of
  $112.24, and a total platform fee collected of ~$6".Many users of WazirX were angry, accusing the company of "abandoning
  the community".
