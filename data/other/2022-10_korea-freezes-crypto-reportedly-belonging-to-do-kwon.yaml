vendor_product: Korea freezes crypto reportedly belonging to Do Kwon
blockchain: terra
notes: South Korean prosecutors have reportedly frozen $39.6 million in crypto assets belonging to Do Kwon, the founder of
  Terraform Labs and creator of the failed Terra blockchain project. South Korea had also previously issued a warrant for
  his arrest.Kwon claims that the report is a "falsehood", and "I don't know whose funds they've frozen". This joins his other
  claims, such as that he is "not 'on the run' or anything similar" (he is), and that Interpol didn't issue a red notice for
  him (they have).
