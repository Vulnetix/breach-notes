notes: "FIN11 / UNC2546 (linked to Cl0p/TA505) exploited four zero-days in legacy 20-year-old Accellion FTA product starting Dec 25 2020. Used DEWMODE webshell to exfiltrate data. ~100 of 300 FTA customers victimized; 25 suffered significant data theft. Victims: Reserve Bank of New Zealand, Washington State Auditor, Kroger, Qualys, Transport for NSW, University of California, Shell, Jones Day law firm, Bombardier. Data-theft-only extortion, no ransomware deployed. Accellion had EOL'd FTA; pushed customers to migrate to Kiteworks."
