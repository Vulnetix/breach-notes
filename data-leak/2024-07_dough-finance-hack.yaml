notes: 'Defi platform Dough Finance was hacked for 608 ETH ($1.8 million) by a hacker using a flash loan attack funded through
  the Railgun privacy service.Dough Finance sent an on-chain message to the attacker, asking them to return the "misappropriated
  funds", threatening that they would "pursue all criminal, legal, and administrative avenues available" in the event that
  the attacker did not do so.


  Total loss estimated at $1,800,000.'
