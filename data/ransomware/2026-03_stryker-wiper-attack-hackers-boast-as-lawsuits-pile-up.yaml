notes: |-
  In the weeks following Stryker's March 2026 Handala wiper attack (documented separately), multiple lawsuits
  were filed against Stryker as the Iranian-linked Handala group continued to boast about the attack on social
  media and dark web channels. Handala published additional stolen materials and claimed ongoing access to
  Stryker systems. Stryker — the $22B medical technology company — continued recovery operations across global
  IT systems disrupted by the Intune MDM wiper. The lawsuits alleged Stryker failed to adequately protect its
  MDM infrastructure against nation-state attacks. The attack drew significant attention to the vulnerability of
  enterprise MDM platforms as attack surfaces and the specific risk from Iran-linked actors targeting US medical
  technology companies during heightened geopolitical tensions.
