notes: 'Attackers who compromised devices belonging to a WOO X employee stole $14
  million from users of the Taiwanese WOO X cryptocurrency exchange. The phishing
  attack on the employee gave the hackers access to a development environment, according
  to statements from WOO X, and the hackers were then able to make withdrawals from
  customer accounts.WOO X temporarily froze withdrawals, before reopening accounts
  after a security review. They offered a 10% "bounty" to the thief.


  Total loss estimated at $14,000,000.'
