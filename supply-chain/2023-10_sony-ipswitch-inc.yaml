notes: 'Sony confirms data breach impacting thousands in the U.S.. Sony Interactive
  Entertainment (Sony) has notified current and former employees and their family
  members about a cybersecurity breach that exposed personal information. The company
  sent the data breach notification to about 6,800 individuals, confirming that the
  intrusion occurred after an unauthorized party exploited a zero-day vulnerability
  in the MOVEit Transfer platform. The zero-day is CVE-2023-34362 , a critical-severity
  SQL injection flaw that leads to remote code execution, leveraged by the Clop ransomware
  in large-scale attacks that compromised numerous organizations across the world.
  Third-party company: Ipswitch, Inc..'
