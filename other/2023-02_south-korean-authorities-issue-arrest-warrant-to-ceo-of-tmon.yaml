source_name: '"Korean e-commerce exec accused of accepting LUNA for shilling Terra
  Labs"'
source_url: https://cointelegraph.com/news/korean-e-commerce-exec-accused-of-accepting-luna-for-shilling-terra-labs
date_of_breach: '2023-02-15'
date_of_disclosure: '2023-02-15'
category: other
notes: 'South Korean authorities have issued an arrest warrant for the former CEO
  of Tmon, a major Korean e-commerce platform. The allege that he was bribed with
  Luna tokens, which he exchanged for billions of won (worth around US$105 million),
  to promote Terra: the stablecoin in the Terra/Luna ecosystem.Terra and Luna dramatically
  collapsed in May 2022, and South Korean authorities are still hunting for Terra
  leader Do Kwon, who is reportedly hiding in Serbia. Earlier this month, Korean authorities
  reportedly traveled to Serbia to try to locate him, but were unsuccessful.'
