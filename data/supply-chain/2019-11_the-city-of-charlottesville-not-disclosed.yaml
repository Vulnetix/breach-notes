notes: Potential data breach found on Charlottesville tax collections. Charlottesville
  is investigating the possibility of a data breach related to its tax collections.
  CHARLOTTESVILLE, V.A. (WVIR) - The city of Charlottesville is investigating the
  possibility of a data breach. The city says a security flaw was found on a third
  party vendor’s online payment software for city tax collections. That payment portal
  is used by other localities.
