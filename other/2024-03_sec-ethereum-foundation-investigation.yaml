notes: Fortune reported that the U.S. Securities and Exchange Commission has targeted the Swiss-based Ethereum Foundation
  for investigation, apparently in an effort to classify its ETH token a security. The report came out shortly after CoinDesk
  reported that a warrant canary had been removed from the Ethereum Foundation's website.Although the SEC has agreed that
  bitcoin is a commodity and not a security, it has been hesitant to make similar explicit statements about ETH. Designation
  as a security could be devastating to the Ethereum project and to ETH, which is the second most popular cryptocurrency to
  bitcoin.
