notes: 'Justin Sun confirmed on September 25 that his crypto exchange Huobi (recently
  rebranded to "HTX") had been hacked for 5,000 ETH ($8 million) the prior day. He
  reassured customers that the exchange would be covering the shortfall, and that
  "all user assets are #SAFU".Sun offered a bounty to the hacker to return 95% of
  the funds, also promising to hire them as a "security white hat advisor" for the
  exchange. Otherwise, he threatened to go to law enforcement.Two weeks later, the
  thief returned the funds, with a note that their hot wallet key had leaked. Huobi
  paid the $410,000 bounty.'
