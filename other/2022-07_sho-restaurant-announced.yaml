notes: Salesforce Park, a suspended park area underneath the Salesforce Tower, has been described as intentionally unwelcoming
  to the many unhoused San Franciscans it looms atop. Parts of the new restaurant intended to loom over Salesforce Park were
  even more ostentatious and exclusive — people would need to pay between $7,500–$300,000 to gain access to the members-only
  Sho Club at the Sho Restaurant, which was set to open in autumn 2023.The Sho Restaurant said they planned to allow members
  of the public as well as NFT holders, and even the holders would still have to pay for their food. NFT holders were also
  promised access to the exclusive Sho Club, and things like "Access to all future Sho Club lounges" (no such lounges appeared
  to be in planning). Those who paid $15,000 or $300,000 for the top two tiers of NFTs were told they would receive access
  to perks including a "Monthly curated omakase members dinner (food &amp; beverage not included).None of this ever came to
  pass, though, because the project fell silent and then was confirmed to have been abandoned in September 2023 — around the
  time it was supposed to open.
