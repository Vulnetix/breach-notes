notes: Global Game Jam, an annual event where people collaborate to make video games,
  proudly plugged The Sandbox as their "primary headline sponsor" on Twitter. The
  Sandbox is a platform for selling game assets on the Ethereum blockchain. After
  swift backlash, GGJ deleted the tweet and deleted references to blockchains from
  The Sandbox's description in their sponsor list. Needless to say this didn't go
  unnoticed, appearing to many as an attempt to deceive their community. GGJ eventually
  apologized for this action, and dropped The Sandbox as a sponsor.
