notes: 'A Ethereum-based project promising to duplicate the bitcoin leveraged investment strategy used by MicroStrategy has
  announced that, prior to even launching, 165 ETH (~$535,850) was lost when a misconfiguration in the project interface resulted
  in tokens being sent to the wrong address. The project appears to have determined that those tokens are irrecoverably lost,
  because they announced that they had contributed 165 ETH of their own to reimburse users for their costly mistake.


  Total loss estimated at $535,850.'
