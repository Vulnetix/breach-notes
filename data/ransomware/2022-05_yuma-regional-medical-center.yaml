notes: "On 25 April 2022, Yuma Regional Medical Center (YRMC) — the primary regional hospital for southwestern Arizona serving Yuma, Arizona and surrounding areas — discovered a ransomware attack. YRMC is the largest hospital in the region and operates a 406-bed facility. The attackers accessed and potentially exfiltrated patient data before triggering ransomware encryption. YRMC filed a breach notification with HHS OCR disclosing that approximately 700,000 individuals were affected. Exposed information included names, Social Security numbers, health insurance information, medical record numbers, and in some cases clinical information. YRMC notified affected patients beginning in July 2022 and offered credit monitoring services. The attack required YRMC to temporarily revert to manual paper-based procedures for patient care during recovery. The hospital serves one of the more geographically isolated hospital catchment areas in the US, with patients having limited alternatives during any service disruption. YRMC restored systems and returned to normal operations, but the breach represented significant exposure of health information for a large proportion of the regional population."
