notes: "US Bitcoin ATM operator Byte Federal (which operates 1,200+ ATMs nationwide) was breached on 30 September 2024 via a GitLab vulnerability but did not detect the incident until 18 November 2024. Disclosed publicly 12 December 2024. 58,000 customers' names, addresses, phone numbers, government-issued ID details, Social Security numbers, transaction data, and photographs were exposed. No customer funds or digital assets were compromised. Byte Federal reset all customer accounts and passwords upon discovery."
