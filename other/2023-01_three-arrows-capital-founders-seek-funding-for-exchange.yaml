vendor_product: Three Arrows Capital founders seek funding for exchange
notes: Kyle Davies and Su Zhu, the founders of the bankrupt Three Arrows Capital crypto hedge fund, have joined forces with
  Mark Lamb and Sudhu Arumugam, the founders of the CoinFLEX platform, which is undergoing restructuring due to its own solvency
  issues. Davies and Zhu are still on the run from liquidators. What a dream team.The group is seeking $25 million to create
  a cryptocurrency exchange they're calling "GTX" for now — which they write in the pitch deck is "because G comes after F".Not
  only that, but the exchange plans to focus on claims trading — that is, the trading of claims held by creditors against
  debtors who are undergoing bankruptcy proceedings, like FTX, Celsius, BlockFi, or Mt. Gox (throwback!). The fact that 3AC
  was a major catalyst in kicking off the string of bankruptcies we saw throughout 2022 was not lost on observers, with Nic
  Carter of the Castle Island venture capital firm commenting that the endeavor "is akin to arsonists returning to the scene
  of the crime and offering to charge their victims for buckets of water".
