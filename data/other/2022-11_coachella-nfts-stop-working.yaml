source_name: '"Coachella NFTs Trapped in FTX Crypto Fallout"'
source_url: https://www.billboard.com/pro/coachella-nfts-stuck-ftx-exchange-bankruptcy/
date_of_breach: '2022-11-15'
date_of_disclosure: '2022-11-15'
category: other
notes: Coachella partnered with FTX to sell a collection of NFTs in February, ultimately
  raking in around $1.5 million. The NFTs were paired with physical items — Coachella
  passes, art prints, and photo books — and the NFT owners had the option to "redeem"
  their NFT to receive the item. However, all of this was done through FTX, and with
  FTX no longer fully operational, redemptions are no longer possible. The FTX server
  storing the artwork for the NFTs was also intermittently available, so holders reported
  seeing broken images when going to view their NFT.Ten of the NFTs in the collection
  came with lifetime passes to Coachella, and sold for six figures. Each year, the
  NFT holder has to go through the redemption process to obtain their festival pass.Many
  of the token owners bought their NFTs with FTX and simply left them in their accounts
  on the platform. Some were able to transfer their tokens before FTX's NFT platform
  stopped operating, but many did not.
