source_name: '"Special Report: How crypto giant Binance built ties to a Russian FSB-linked agency"'
source_url: https://www.reuters.com/technology/how-crypto-giant-binance-built-ties-russian-fsb-linked-agency-2022-04-22/
date_of_breach: '2022-04-22'
date_of_disclosure: '2022-04-22'
category: other
vendor_product: Binance gives Putin regime user data
blockchain: bitcoin
notes: 'Binance, the largest cryptocurrency exchange, shared customer data with the Russian government according to a Reuters
  special report. Reuters detailed how Binance provided the Russian government''s financial monitoring service with data on
  Binance users who donated to Alexei Navalny, an anti-corruption activist and prominent opponent of Putin. Reuters reported
  this was part of a broader effort by Binance to form allegiances with Russian governmental agencies as it worked to expand
  its footprint in Russia.Navalny has been imprisoned in Russia since returning in January 2021, shortly after recovering
  from poisoning: an attempt on his life reportedly ordered by Putin. While in prison, Navalny''s foundation has encouraged
  people to donate cryptocurrency using Binance. They have raised more than 670 Bitcoin ($28 million) so far, despite the
  Russian government outlawing the foundation and labeling it a terrorist organization. Donors to Navalny''s cause now face
  potentially serious danger as they''ve been identified to the Putin regime by Binance.Crypto proponents have long promoted
  the technology''s potential to fund individuals who are targeted by oppressive regimes, and to allow anonymous and untraceable
  donations.'
