notes: "On 16 October 2024, attackers executed transferOwnership on Radiant Capital's Pool Provider contract using 3 collected malicious signatures, gaining control of all lending pool contracts on BSC and Arbitrum. $50 million drained. Initial compromise began 11 September 2024 via Telegram message to a developer. Mandiant attributed to UNC4736, a Lazarus Group sub-cluster aligned with North Korea's Reconnaissance General Bureau."
