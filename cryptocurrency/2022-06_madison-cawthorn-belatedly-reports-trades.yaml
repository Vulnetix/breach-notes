notes: Representative Madison Cawthorn (R-NC) is facing an ethics investigation pertaining to his involvement with the Let's
  Go Brandon coin, which includes allegations of insider trading as well as not disclosing his cryptocurrency trades as is
  required by the STOCK Act. After the investigation was announced in May, Cawthorn disclosed purchases of LGB and ETH, far
  past the 45-day deadline imposed by the Act.On June 8, Cawthorn filed more reports of crypto trades he made in January to
  March, reflecting 24 purchases totaling between $290,000 to $950,000 in crypto projects including Kryll, Ethereum, Solana,
  Bitcoin, Let's Go Brandon, and Request.
