notes: The SEC filed charges against Ryan Ginster related to two online platforms that he ran, MyMicroProfits.com and Social
  Profitmatic. He promised investors what the SEC described as "astronomical" rates of return, which he claimed were achieved
  through various financial activities including cryptocurrency trading. According to the SEC, Ginster misappropriated at
  least $1 million of the $3.6 million in Bitcoin he raised, using it to pay for his own personal expenses.
