source_name: '"Prominent Global Cryptocurrency Exchange KuCoin And Two Of Its Founders
  Criminally Charged With Bank Secrecy Act And Unlicensed Money Transmission Offenses"'
source_url: https://www.justice.gov/usao-sdny/pr/prominent-global-cryptocurrency-exchange-kucoin-and-two-its-founders-criminally
date_of_breach: '2024-03-26'
date_of_disclosure: '2024-03-26'
category: other
notes: The cryptocurrency exchange KuCoin and two of its founders, Chun Gan and Ke
  Tang, were indicted in the Southern District of New York on charges of conspiring
  to operate an unlicensed money transmitting business and conspiring to violate the
  Bank Secrecy Act. Both founders are Chinese citizens, and neither has been located
  or arrested.According to prosecutors, they tried to conceal that the exchange had
  customers from the United States in order to claim that they were exempt from US
  anti-money laundering laws. They also marketed KuCoin as a KYC-optional exchange
  where customers from the US could operate unverified accounts.The charges against
  the founders carry maximum sentences of five years in prison.
