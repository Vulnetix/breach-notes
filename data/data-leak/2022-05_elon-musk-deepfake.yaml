date_of_breach: '2022-05-27'
date_of_disclosure: '2022-05-27'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Elon Musk deepfake
blockchain: bitcoin
financial_loss_usd: 1700
notes: 'A somewhat robotic-sounding deepfake Elon Musk speaks to a deepfaked interviewer, who asks "what can you tell us about
  your project and how can it help people get rich right now?" Fake-Musk explains that people who invest in the (scam) project,
  "BitVex", will "receive exactly 30% of dividends every day", and that if Bitcoin falls in price they will still receive
  twice their investment back.According to BleepingComputer, only about $1,700 in deposits appeared to have gone to addresses
  associated with the scam, although they acknowledged that the addresses are likely rotated and so the true amount may be
  larger.Someone brought the scam to Musk''s attention on Twitter, where he replied, "Yikes. Def not me." The YouTube channel
  hosting the videos was taken down shortly after.


  Total loss estimated at $1,700.'
