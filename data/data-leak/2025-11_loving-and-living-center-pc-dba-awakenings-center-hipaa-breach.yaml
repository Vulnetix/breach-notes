notes: 'Loving and Living Center, PC dba Awakenings Center (NC), a Healthcare Provider,
  submitted a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on
  2025-11-07 for a breach affecting 17800 individuals. Breach type: Hacking/IT Incident.
  Information location: Electronic Medical Record. Source: HHS OCR Breach Portal (HIPAA
  Breach Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches
  of unsecured protected health information (PHI) affecting 500 or more individuals.'
