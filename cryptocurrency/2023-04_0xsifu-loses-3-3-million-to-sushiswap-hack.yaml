notes: '0xSifu, also known as Michael Patryn, also known as Omar Dahani, is the once-pseudonymous chief developer of the Wonderland
  protocol. His identity was discovered by zachxbt in January 2022, when the crypto sleuth revealed that "0xSifu" was Patryn,
  a man with a history of financial crimes who was previously involved with QuadrigaCX, an exchange which lost over $150 million
  in customer funds in 2018.Today, Sifu himself was the victim of a theft as a bug in the SushiSwap decentralized exchange
  allowed a hacker to make off with around 1,800 ETH (more than $3.3 million) belonging to him. According to SushiSwap leader
  Jared Grey, around 300 ETH (~$557,000) of Sifu''s funds were subsequently recovered.Analysts have found that almost 200
  addresses on the Ethereum network have approved the vulnerable contract, and around 2,000 addresses approved the vulnerable
  contract on Arbitrum, Polygon, and other chains. It''s not yet clear how much was stolen in total. SushiSwap leader Grey
  urged users via Twitter to revoke approval for the vulnerable smart contract.


  Total loss estimated at $2,784,000.'
