source_name: '"ESPN baseball reporter''s Twitter account hacked by NFT scammers"'
source_url: https://cointelegraph.com/news/espn-s-baseball-reporter-s-twitter-account-hacked-by-nft-scammers
date_of_breach: '2022-03-10'
date_of_disclosure: '2022-03-10'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Jeff Passan Twitter account
notes: ESPN MLB reporter Jeff Passan was having a great day, as he had been the one to break the news of an agreement between
  the MLB and the MLB Players Association, who had been deadlocked on labor negotiations. Unfortunately, this was soured a
  bit by his 800,000-follower, verified Twitter account being compromised and repurposed to shill "Skulltoons" NFTs.Passan
  regained control of his Twitter account several hours later. Passan later wrote in a tweet, "hey remember that time i got
  hacked on the biggest news day of my life". The Skulltoons project distanced themselves from the incident, writing that
  they believed the hackers were trying to scam the Skulltoons community.
