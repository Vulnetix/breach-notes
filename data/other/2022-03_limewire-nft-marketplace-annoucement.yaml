source_name: '"Piracy Icon LimeWire Is Coming Back, But As an NFT Marketplace"'
source_url: https://www.vice.com/en/article/z3n85w/piracy-icon-limewire-is-coming-back-but-as-an-nft-marketplace
date_of_breach: '2022-03-09'
date_of_disclosure: '2022-03-09'
category: other
notes: LimeWire, the filesharing service that was enormously popular in the early
  2000s for piracy, has been resuscitated — or at least the brand has. Needless to
  say they are probably not planning to reuse much of the 20-year-old codebase that
  existed before public blockchains were even in use, if they even still have it at
  all. The choice to create an NFT marketplace with the same branding as the service
  that was shut down by a federal court for rampant copyright infringement seems a
  bit on the nose to me, for a technology that proponents still try to claim empowers
  artists and actually mitigates art theft. The duo behind the project claim that
  they are just trying to capitalize on nostalgia for the brand, but plan to operate
  above-board (though they would say that, wouldn't they).
