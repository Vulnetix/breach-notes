notes: In what seems like a bad sign for Terraform Labs, the developer of the Terra blockchain and the TerraUSD (UST) and
  Luna cryptocurrencies, the three members of the company's legal team left the company. This came shortly after UST, Luna,
  and the entire Terra ecosystem dramatically collapsed after the stablecoin lost its peg last week.
