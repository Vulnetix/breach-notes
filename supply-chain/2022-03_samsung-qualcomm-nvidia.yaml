notes: 'Samsung data breach: Hackers steal data from microchip giant Nvidia. Samsung
  has confirmed that a hacking group which stole data from microchip giant Nvidia
  last week has also infiltrated its systems. Samsung has confirmed that a hacking
  group that stole data from microchip giant Nvidia last week has also infiltrated
  its systems and leaked confidential source code and algorithms of its various technologies.
  Lapsus$, an organization of hackers, claimed responsibility for the data breach
  in a post on the encryption messaging platform Telegram. Third-party company: Nvidia.'
