notes: 'Shenzhen Shikongyun Technology, a company focused on mining the Filecoin token, has been accused of running a pyramid
  scheme. Four of the company''s executives were also charged. According to Chinese law enforcement, they had been soliciting
  investments in what was ultimately a pyramid scheme, exaggerating the likely returns from their mining efforts.Shenzhen
  Shikongyun Technology was operating in mainland China despite a ban on cryptocurrency activities in September 2021.


  Total loss estimated at $83,300,000.'
