notes: I can safely describe most NFT marketplaces as bizarre, but the AP is really trying to top the bunch. The marketplace
  will provide a place for trading the NFTs they plan to create out of their journalistic photography. However, people won't
  be able to move the NFTs they purchase to other marketplaces (so much for decentralized). Dwayne Desaulniers, AP's Director
  of Blockchain &amp; Data Licensing, attempted to shed some light on their plans via Twitter, only making things worse. "Buying
  an AP photo registered on the blockchain provides you with a personal license to display, print, resell the image if you
  wish. But is also helps reduce the economic damage from digital theft, preserves the value of a photograph and will help
  us fight deep fakes", he said, though basically none of these claims stand up to scrutiny, or particularly require a blockchain.
