notes: Something apparently went terribly wrong on the trading platform that Twitter user rifftrader was using (though they
  didn't say which) when 10 BTC (~$385,000) was erroneously deposited to their account. The trader, who was expecting a transfer
  of $24 USD for Litecoin (LTC) that they had initiated to go through, didn't initially notice that the amount was in BTC
  when they subsequently converted it to USD. However, when they suddenly saw hundreds of thousands of dollars in the account,
  they realized what had happened. Not wishing to spend money that wasn't theirs, the trader transferred it back into BTC
  and contacted their exchange's support email. The exchange subsequently withdrew the erroneously-deposited funds from the
  trader's account. However, because the trader incurred a cost converting the BTC to and from USD, only 9.8752 BTC went back
  to the exchange. The exchange then proceeded to demand the trader pay the difference — around $3,600  — and accused them
  of "trad[ing] on those funds which did not belong to you". The email demanded payment by the following day, and the exchange
  threatened to send the case to a debt collector the trader didn't send the money.
