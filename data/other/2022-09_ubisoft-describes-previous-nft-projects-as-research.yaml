source_name: '"Ubisoft CEO Says Company’s Interest In NFTs Was Just ''Research'',
  No Longer Interested"'
source_url: https://www.kotaku.com.au/2022/09/ubisoft-no-longer-interested-in-nfts/
date_of_breach: '2022-09-10'
date_of_disclosure: '2022-09-10'
category: other
notes: 'Remember when Ubisoft decided it was going to shoehorn NFTs into their Tom
  Clancy''s Ghost Recon Breakpoint game, to the nearly universal disappointment of
  their fans? Remember when one of their execs said that gamers just "don''t get what
  a digital secondary market can bring to them"? Remember when their employees were
  so unhappy with the NFT plan that they had to hold an internal workshop about it,
  shortly before giving all employees NFTs of hats?Well, despite being pretty bullheaded
  about their stance on NFTs and web3, even Ubisoft is now backing away from it all.
  In April, only a few months after launch, Ubisoft announced that there would be
  no more NFTs for the Ghost Recon Breakpoint title. Now, the CEO is putting a different
  spin on the company''s once determination to introduce NFTs: "we are still in research
  mode" when it comes to web3 technologies, he said. "We probably were not good at
  saying we are researching. We should have said we were working on it, and when we
  have something that gives you a real benefit, we''ll bring it to you." I imagine
  that might come as a shock to the handful of people who actually bought the Ghost
  Recon Breakpoint NFTs, given they were promised "real benefit" back in December
  and are now left with useless collectibles.'
