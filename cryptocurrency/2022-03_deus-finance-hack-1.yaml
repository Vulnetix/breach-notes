source_name: '"Deus Finance exploit: Hackers get away with $3M worth of DAI and Ether"'
source_url: https://cointelegraph.com/news/deus-finance-exploit-hackers-get-away-with-3m-worth-of-dai-and-ether
date_of_breach: '2022-03-15'
date_of_disclosure: '2022-03-15'
category: cryptocurrency
initial_attack_vector: Flash loan attack on smart contract
vendor_product: Deus Finance
blockchain: fantom
financial_loss_usd: 3096984
notes: 'Hackers were able to use a flash loan attack to manipulate a price oracle, pulling 200,000 DAI and 1101.8 ETH (totaling
  almost $3.1 million) out of the Deus Finance defi platform. PeckShield, the analysis firm that identified the vulnerability,
  wrote that the $3 million number represented the amount the hackers were actually able to withdraw and put through a cryptocurrency
  tumbler, but that the loss to the project may have been larger. The CEO of Deus Finance subsequently wrote on Twitter that
  users whose positions were liquidated as a result of the exploit would be repaid.


  Total loss estimated at $3,096,984.'
