notes: As the Aragon Association took steps to "progressively decentralize" their
  centralized project by assigning more control to the Aragon DAO, they encountered
  some challenges. Aragon, somewhat ironically, is a platform for creating and running
  DAOs that has been "stewarded" by the Aragon Association, a non-profit run by a
  small committee.In June and October 2022, the Aragon DAO — that is, all holders
  of the $ANT token or (later) their delegates — voted on several proposals supporting
  a move to place the Aragon treasury under DAO control. The treasury is a pool of
  crypto assets currently priced at around $174 million. However, the tokens continued
  to remain under control of the Aragon Association.On May 9, 2023, the Aragon Association
  announced that they would not be following through with the treasury change, and
  instead would be "repurposing the Aragon DAO into a grants program". They attributed
  the decision to "coordinated social engineering and 51% attack" on the DAO that
  began shortly after a small portion of the treasury assets were transferred.A week
  before the announcement, Aragon also banned a group of token holders from the group's
  Discord channel. Aragon characterized the group as appearing "coordinated" and alleged
  the group was "engaging in harassment". They claimed the group were members of the
  "Risk Free Value Raiders", which they described as "a sophisticated, well-resourced,
  and coordinated group of actors that target crypto projects with an imbalance between
  the value of their token and treasury". They also accused the group and its members
  of coordinating governance attacks on other DAOs, including  Invictus DAO and Mango
  Markets. Aragon wrote that they believed the RFV Raiders were aiming to "[extract]
  value from Aragon for financial profit" rather than pursue the DAO's goals of supporting
  developers building DAO infrastructure.One of the banned members told a different
  story, publishing and later taking down a statement in which he claimed that they
  were trying to get answers to questions about why the Aragon team was so slow to
  enact the DAO vote. "We find these bans, failure to empower the community with treasury
  transfers, and overall lack of transparency to be frustrating and against the ethos
  of both what DAOs are meant to be and what Aragon team members have repeatedly said
  they stood for. However, these actions have become a common pattern for Aragon,"
  he wrote.On May 11, Aragon apologized for how they handled the crisis, unbanned
  the banned Discord members, and announced that they would "keep following a gradual
  [treasury] transfer approach, making sure it aligns with the mission of the project",
  but continued to characterize the members as attackers and reiterated that "we won’t
  stand for hostile and coordinated attacks".
