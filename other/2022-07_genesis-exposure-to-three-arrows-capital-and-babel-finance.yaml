source_name: '"Genesis Confirms Exposure to Three Arrows Capital"'
source_url: https://www.coindesk.com/business/2022/07/06/genesis-confirms-3ac-exposure-dcg-assistance/
date_of_breach: '2022-07-06'
date_of_disclosure: '2022-07-06'
category: other
notes: Genesis, a crypto broker and lender, suffered "a few hundred million dollars"
  in losses during the recent crypto downturn. This were largely due to the firm's
  exposure to the bankrupt Three Arrows Capital.Genesis is owned by the deep-pocketed
  Digital Currency Group (DCG), which may enable it to weather this loss better than
  some of its crypto brethren. CEO Michael Moro tweeted that "DCG has assumed certain
  liabilities of Genesis" relating to Three Arrows Capital's inability to meet a margin
  call.
