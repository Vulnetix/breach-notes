notes: 'It''s hard to believe that the hamburger joint themed around the owner''s
  Bored Ape NFT failed to take off. Although there was novelty value in the themed
  restaurant, which for a time boasted that it accepted cryptocurrency payments, the
  excitement seemed to wear off quickly after a few early news articles. After a while,
  the restaurant''s crypto payments became spotty, with employees saying the system
  was unwieldy and unpopular among customers.Some more recent Yelp reviews described
  fairly mediocre food, which "[t]he NFTs don''t make up for".The restaurant opened
  in April 2022, a month after owner Andy Nguyen purchased Bored Ape #6184 for $268,000,
  along with three Mutant Apes for an additional combined  $187,000. #6184 became
  the restaurant''s logo, and the others were incorporated into the restaurant''s
  branding. The NFTs haven''t been resold since, although it''s unlikely they could
  recoup close to their original purchase prices — Bored Apes have been averaging
  a little under $50,000 in recent sales, and Mutants around $8,500 each.'
