notes: 'bergpay.eth checked his MetaMask wallet on the day after Christmas only to discover that all his NFTs had been stolen,
  including five from the popular "Jungle Freaks" collection and 2 from "Sandbox". Jungle Freaks average about 0.9 ETH ($3,700)
  each; Sandbox NFTs average around 2.75 ETH ($11,300) each.


  Total loss estimated at $41,100.'
