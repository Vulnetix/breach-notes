source_name: '"SEC files suit against Dragonchain over $16.5 million ICO"'
source_url: https://www.theblock.co/post/163883/sec-files-suit-against-dragonchain-over-16-5-million-ico?utm_source=rss&utm_medium=rss
date_of_breach: '2022-08-16'
date_of_disclosure: '2022-08-16'
category: other
notes: The U.S. Securities and Exchange Commission filed a complaint against an individual
  and his companies in relation to their sale of Dragon tokens in 2017. The ICO raised
  $16.5 million, but the SEC has said the event was an unregistered securities offering,
  and has demanded the proceeds be returned and a penalty be paid.
