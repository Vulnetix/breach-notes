source_name: '"How a VR startup took the money and ran to the metaverse"'
source_url: https://www.engadget.com/metaworld-nft-metaverse-dedric-reid-clubhouse-discord-170052007.html
date_of_breach: '2021-11-25'
date_of_disclosure: '2021-11-25'
category: other
notes: 'Dedric Reid has repeatedly stolen art and promotional material, passing off
  other projects'' work as his own, to promote his "MetaWorld" project — a concept
  he''s been promising (and fundraising for) in various forms since as early as 2016.
  He''s recently relaunched it with a web3 spin, including metaverse ideas and NFTs
  into its newest form, but it appears to be as much vaporware as it was five years
  ago. Reid has raised at least $14,000 over the years for this idea which still has
  no tangible result, though Engadget believes the true amount scammed is probably
  higher.


  Total loss estimated at $14,000.'
