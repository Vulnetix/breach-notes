source_name: '"Skycoin Founder Claims in Suit He Was Extorted, Kidnapped"'
source_url: https://www.bloomberg.com/news/articles/2022-02-09/skycoin-founder-alleges-ransomware-attack-kidnap-plot-in-suit
date_of_breach: '2022-02-09'
