source_name: '"OpenSea pulls back its controversial NFT minting limit decision"'
source_url: https://cryptoslate.com/opensea-pulls-back-its-controversial-nft-minting-limit-decision/
date_of_breach: '2022-01-27'
date_of_disclosure: '2022-01-27'
category: other
vendor_product: OpenSea tries to limit free mints
blockchain: ethereum
notes: On January 27, OpenSea announced a limit of five collections and 50 items per collection, after discovering that "over
  80% of the items created with [their free minting tool] tool were plagiarized works, fake collections, and spam". The decision
  came without warning to creators, some of whom were in the process of minting items for collections that had already promised
  more than 50 items, and suddenly unable to complete the collections. Later that day, OpenSea announced that they had reversed
  the decision, saying they "should have previewed this with you before rolling it out".
