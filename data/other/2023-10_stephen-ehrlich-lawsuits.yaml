source_name: '"CFTC Charges Former Chief Executive Officer of Digital Asset Platform
  with Fraud in Massive Commodity Pool Scheme"'
source_url: https://www.cftc.gov/PressRoom/PressReleases/8805-23
date_of_breach: '2023-10-12'
date_of_disclosure: '2023-10-12'
category: other
notes: Simultaneous civil lawsuits from the Commodity Futures Trading Commission (CFTC)
  and Federal Trade Commission (FTC) against former CEO of the collapsed Voyager crypto
  lender accuse him of fraud and making deceptive claims to customers.The FTC lawsuit
  focuses on Voyager's claims suggesting to customers that accounts with the lender
  were FDIC insured. That complaint also names Voyager as a defendant. Voyager settled
  with the FTC, agreeing to pay a $1.65 billion judgment that will be suspended until
  customers are repaid.
