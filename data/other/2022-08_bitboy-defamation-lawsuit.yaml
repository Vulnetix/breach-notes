category: other
notes: '"BitBoy Crypto" (Ben Armstrong) has sued "Atozy" (Erling Mengshoel Jr.) over
  a video in which Mengshoel accuses Armstrong of "lacking integrity as a cryptocurrency
  commentator" and repeatedly calls him a "dirtbag". He also states that Armstrong
  "cannot be trusted with financial advice because you don''t know whether he''s trying
  to enrich you or himself."Armstrong has claimed that the video cost him more than
  $75,000 in damages, and has caused him emotional distress including anxiety and
  depression.Oddly, in the lawsuit, he writes that he is "in the business of providing
  advice and commentary on cryptocurrency investments" — a strange thing to do for
  someone who, like most crypto influencers, constantly tries to claim that his videos
  are not financial advice.Armstrong has promoted crypto projects including Celsius.
  He has also posted and then deleted videos on cryptocurrency projects that later
  failed, such as Ethereum Yield, Cypherium, and MYX Network. According to a recent
  CNBC story, he claimed he "could easily make more than $100,000 per month in promotions
  alone", though it was not clear to which time period he was referring.Armstrong
  announced on August 24 that he planned to drop the lawsuit against Mengshoel, stating
  that "I didn''t understand that my name is now so big that if I file a lawsuit it
  would be found and be made public" — a strange thing to be blindsided by given he
  sued a YouTuber with 1 million followers who predictably told his audience about
  the suit. "We are going to drop the lawsuit, 100%. I''m sorry it became public."'
