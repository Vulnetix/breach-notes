date_of_breach: '2022-11-30'
date_of_disclosure: '2022-11-30'
category: other
vendor_product: Auros misses loan payment
blockchain: ethereum
notes: Crypto trading firm Auros missed a payment on its 2,400 wETH (~$3 million) loan from the Maple defi lending project.
  According to M11 Credit, the operator of the credit pool from which Auros has taken the loan, this was due to "a short-term
  liquidity issue as a result of the FTX insolvency".In total, Auros has 8,400 wETH (~$10.7 million) and $7.5 million in USDC
  in loans from M11 credit pools, plus another $2.4 million in loans from the Clearpool defi lending project, for a total
  of more than $20 million in unsecured loans.
