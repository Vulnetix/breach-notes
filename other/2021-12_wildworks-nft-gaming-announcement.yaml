source_name: '"WildWorks, maker of Animal Jam and Feral, angers fans with embrace of crypto gaming"'
source_url: https://techcrunch.com/2021/12/06/wildworks-maker-of-animal-jam-and-feral-angers-fans-with-embrace-of-crypto-gaming/
date_of_breach: '2021-12-06'
date_of_disclosure: '2021-12-06'
category: other
vendor_product: WildWorks NFT gaming announcement
blockchain: solana
notes: WildWorks, a game company with a reputation for eco-friendliness, angered many of its fans when it announced it would
  be reusing the technology and assets from its partially-finished title Feral for a new metaverse game called Cinder. Some
  fans were upset to hear that the developers were apparently leaving Feral unfinished; many were angry about the developers'
  choice to embrace NFTs and crypto gaming — particularly after the company itself had decried the technology's impact on
  the environment, but also because of concerns about the unethical nature of many projects in the web3 space. Attempts to
  reassure fans with the fact that they will be using the Solana proof-of-stake blockchain, and purchasing carbon offsets,
  apparently did little to mollify fans, some of whom began cancelling subscriptions.WildWorks later split Cinder into a separate
  company, Cinder Studios. However, in early 2023, the studio shutdown, giving its employees no advance notice that they would
  soon be out of a job.
