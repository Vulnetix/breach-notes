source_name: "npm Supply Chain Attack: chalk, debug, and 16 Other Packages Compromised"
source_url: "https://www.cisa.gov/news-events/alerts/2025/09/23/widespread-supply-chain-compromise-impacting-npm-ecosystem"
date_of_breach: "2025-09-08"
date_of_disclosure: "2025-09-08"
date_of_customer_notification: ""
category: "supply-chain"
initial_attack_vector: "Phishing / adversary-in-the-middle attack against package maintainer 'qix' (Josh Junon): fake npm 2FA reset email (npmjs.help domain) captured username, password, and live TOTP code"
cve: []
vendor_product: "npm registry"
software_package: "chalk, debug, ansi-styles, strip-ansi, duckdb (18 packages total)"
malware: "Browser crypto wallet stealer (hooking window.ethereum, Solana APIs, fetch/XHR)"
supply_chain_claimed: false
notes: "On September 8, 2025, 18 widely used npm packages were compromised via an account takeover of maintainer 'qix'. Affected packages collectively receive 2.6+ billion downloads per week. Malicious versions were live for approximately 2 hours before detection and removal. The malicious payload targeted browser-based crypto wallets by hooking web3 APIs to reroute transactions. CISA issued an advisory on September 23, 2025. The malicious code reached 1 in 10 cloud environments during the 2-hour window. A follow-on campaign 'Shai-Hulud 2.0' was identified in November 2025. Exemplary case of npm ecosystem account takeover via phishing and adversary-in-the-middle credential capture defeating TOTP-based MFA."
