initial_attack_vector: "SamSam ransomware variant delivered via exploitation of vulnerable internet-facing servers (likely via RDP brute force or exploitation of unpatched JBoss/Java application servers — the same TTPs used in other SamSam campaigns); the ransomware encrypted servers hosting Allscripts' Professional EHR and electronic prescriptions for controlled substances (EPCS) cloud-hosted services"
