notes: "Otelier, a cloud-based hotel management platform used by major hotel chains worldwide, was breached starting in approximately July 2024. Threat actors obtained employee credentials — believed to have been stolen via infostealer malware — and used them to access Otelier's internal Atlassian tools and AWS S3 data storage containing customer reservation records. The breach affected guests at Marriott, Hilton, Hyatt, and Wyndham properties that used Otelier for reservation management. Exposed data included guest names, email addresses, home addresses, reservation dates, transaction information, and PII. Otelier notified affected hotel brands in late 2024/early 2025. This incident highlighted the vulnerability of the hospitality sector's shared SaaS infrastructure, where a single vendor breach can cascade to hundreds of major hotel properties and millions of guests across multiple competing brands."
