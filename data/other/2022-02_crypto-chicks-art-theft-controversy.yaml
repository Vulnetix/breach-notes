notes: Polly, a member of the popular Crypto.Chicks NFT team, apologized for "drawing
  inspiration from" artists and "inadvertently cop[ying]" their work, after it is
  discovered that she blatantly traced the artwork used in some of the Crypto.Chicks
  NFTs. Although she wrote that she had "redrawn" the NFT in question, the artwork
  was nearly identical to artwork by a Brazilian artist named Amanda, who apparently
  was never credited nor compensated. The Crypto.Chick in question had sold for $27,500
  in late January.The following day, Crypto.Chicks announced that they would be replacing
  Polly as a team member, and pausing their planned release of another NFT collection
  that also appeared to contain stolen artwork.
