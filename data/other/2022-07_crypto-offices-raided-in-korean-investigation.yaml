source_name: '"Prosecutors Raid 7 Korean Exchanges Amid Terra Probe: Report"'
source_url: https://www.coindesk.com/business/2022/07/20/prosecutors-raid-7-korean-exchanges-amid-terra-probe-report/
date_of_breach: '2022-07-20'
date_of_disclosure: '2022-07-20'
category: other
notes: Prosecutors working on the fraud case around the May Terra/Luna collapse raided
  seven cryptocurrency exchanges in South Korea including Bithumb, Upbit, and Coinone.
  They also raided eight other offices and residences in connection to the investigation.
  The investigators are reportedly looking for evidence to determine whether Terra
  founder and CEO Do Kwon may have intentionally spurred the collapse of the ecosystem.
