vendor_product: Gemini lays off 10% of staff
notes: Gemini performed a 10% layoff, cutting roughly 100 positions. This move followed a 7% layoff in July 2022, and a 10%
  reduction just a month prior to that.Gemini has been having a rough time lately, trying to recoup $900 million of their
  customers' funds from Genesis, and facing charges from the SEC that their Earn product was an unregistered securities offering.
