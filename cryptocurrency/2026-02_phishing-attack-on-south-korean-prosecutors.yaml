notes: 'Staff members working for South Korean prosecutors, for some reason, decided to use a "wallet checking tool" during
  an August 2025 audit of seized crypto assets. The tool they selected turned out to be a phishing tool, and five wallets
  were drained of 320 BTC.On February 19, the office announced they had recovered the stolen assets and identified the thief.


  Total loss estimated at $22,000,000.'
