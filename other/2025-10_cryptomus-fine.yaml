notes: The Canadian cryptocurrency exchange Cryptomus has been fined CA$177 million (US$127 million) by the Financial Transactions
  and Reports Analysis Centre of Canada (FINTRAC) for failing to report more than 1,000 suspicious transactions linked to
  darknet markets, distribution of child sex abuse material, fraud, ransomware, and sanctions evasion. It additionally failed
  to report more than 7,500 transactions originating from Iran, and more than 1,500 high-value transactions.Cryptomus was
  temporarily banned from trading in British Columbia in May. The CA$177 million fine smashes Canada's previous record for
  the largest penalty they've ever imposed. That honor previously went to KuCoin, another crypto exchange fined CA$20 million
  (US$14.3 million) in September.
