source_name: '"Call of Cthulhu Maker Chaosium Suspends NFT Program After Backlash"'
source_url: https://comicbook.com/gaming/news/chaosium-nft-suspends-tabletop-rpgs-call-cthulhu-veve/
date_of_breach: '2022-02-16'
date_of_disclosure: '2022-02-16'
category: other
vendor_product: Chaosium suspends NFT plans
blockchain: ethereum
notes: Chaosium, a maker of tabletop roleplaying games (TTRPGs; think games like Dungeons &amp; Dragons) including the popular
  Call of Cthulu game, launched an NFT project in July 2021. Their initial NFT offering was based around their Call of Cthulu
  game, but "didn't receive much attention from the gaming press or TTRPG community". However, their more recent discussion
  of plans to release more NFTs received major pushback from their community, leading the company to release a statement that
  "we have heard your concerns" and "we are suspending production". In a longer-form statement they wrote that, "In recent
  months, the debate has become prominent and contentious. Bad actors in this sphere have received widespread coverage. Many
  people are justifiably baffled, incredulous, and deeply skeptical."
