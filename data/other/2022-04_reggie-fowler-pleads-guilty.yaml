notes: 'Reggie Fowler, a businessman and former pro football player who worked for the Panama-based Crypto Capital Corp.,
  pled guilty to various charges involving bank fraud, wire fraud, and conspiracy. Crypto Capital Corp. was a shadow bank
  that allegedly enabled crypto exchanges and criminal enterprises to access the traditional banking system. At the time,
  crypto exchanges were largely excluded from traditional finance due to the potential exposure to money laundering. CCC is
  perhaps best known for its ties to Bitfinex, and for losing funds in an incident that Bitfinex was fined for attempting
  to cover up.After initially rejecting a plea offer that would have allowed him to plead guilty to one felony if he forfeited
  up to $371 million, Fowler ultimately decided to enter an open plea to the charges against him and skip a trial. He pled
  guilty to five charges: bank fraud, conspiracy to commit bank fraud, operating a money transmitter business, conspiracy
  to operate a money transmitter business, and wire fraud. Fowler faces a maximum sentence of 90 years in prison.'
