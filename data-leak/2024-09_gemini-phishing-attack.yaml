notes: 'Two people have been arrested in relation to a phishing scam that successfully stole more than 4,000 BTC priced at
  around $243 million from a single individual. The victim was targeted with a phishing scam in which the attackers posed
  as Google support employees and convinced the victim to reset their two-factor authentication for their account on the Gemini
  cryptocurrency exchange.The FBI raided a luxury home in Miami in connection to the theft, and arrested two men in their
  early twenties. Authorities worked with crypto investigators including zachxbt to trace the stolen funds.


  Total loss estimated at $243,000,000.'
