notes: 'The Swap feature of the BitKeep crypto wallet suffered an exploit that landed a hacker more than $1 million worth
  of BNB. The project acknowledged the hack, and promised to reimburse users who were impacted.This is the second hack in
  October of the swap functionality of a crypto wallet, with Transit Swap suffering a $21 million hack on October 1  — although
  in that case, the attacker subsequently returned a large portion of the stolen funds.


  Total loss estimated at $100,000.'
