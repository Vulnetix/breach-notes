notes: Apparently hoping to create the "rallying cry for the women of web3", Randi Zuckerberg released her second crypto-themed
  song "WAGMI", a parody of Twisted Sister's "We're Not Gonna Take It". Earlier that month, she had released another parody
  video, of Adele's "Hello". "WAGMI" is loaded with crypto in-jokes, with Zuckerberg at one point yelling "LFG! sweep the
  goddamn floor! we're hodling, yes we are!" The reaction on Twitter appeared to be fairly universally one of cringe, and
  more than a few users drew comparison to the terrible raps of alleged Bitfinex money launderer Heather "Razzlekhan" Morgan.Partway
  through the song, Zuckerberg sings "carpe the crypto diem". This raises the question of whether she intentionally included
  a dig at her brother Mark's failed Diem cryptocurrency project (formerly Libra), or if the project was such a flop even
  his own sister didn't know about it. I truly can't decide which scenario would be funnier.
