notes: In 2023, there was no shortage of buzzy press coverage for Futureverse, which
  promised to build a metaverse and gaming-focused blockchain. They partnered with
  Ready Player One author Ernest Cline to build the "Readyverse". They partnered with
  the estate of Muhammad Ali to build an "AI-powered" boxing game (with NFTs!) They
  partnered with Rebook to build a "virtual sneaker design experience", where customers
  could design sneakers to equip to their Fortnite or Roblox characters. That year,
  the company had raised $54 million in a Series A round led by 10T Holdings and Ripple
  Labs. They made even more money from token sales to retail investors.As recently
  as this year, Futureverse was earning spots on "most innovative company" lists.
  In April, they announced they'd be acquiring Candy Digital, an NFT company created
  by Mike Novogratz, Gary Vaynerchuk, and others (which itself had raised a $100 million
  series A in 2021, and another funding round in 2023). "NFTs will be back in a big
  way one of these days", wrote Axios, covering the sale in April 2025.But now, Futureverse
  has announced they've "made the difficult decision to begin a restructuring of the
  business". Focusing only on the AI portion of their business, and conspicuously
  omitting any mention of blockchains, NFTs, or metaverses, the company says they
  "recognize that adjustments are needed to ensure the long-term sustainability of
  our vision."Futureverse locked comments on the post, likely to try to dodge angry
  community members who accused the company of stealing from them or rug-pulling.
