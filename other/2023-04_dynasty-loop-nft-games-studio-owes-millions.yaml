source_name: '"Montreal-based indie studio hasn’t paid workers in months, allegedly
  owing more than $2M in paychecks"'
source_url: https://www.polygon.com/23632736/dynasty-loop-unpaid-wages-allegations-montreal-canada
date_of_breach: '2023-04-01'
date_of_disclosure: '2023-04-01'
category: other
notes: Dynasty Loop is a Montreal-based video games studio launched in 2020 to create
  NFT games. In March, gaming news outlet Polygon reported that the studio allegedly
  owed more than $2 million to its employees in unpaid wages and other expenses. Employees
  also told Polygon that they'd been asked to return equipment and couldn't access
  the office space, but that Dynasty Loop had told them they had not been laid off.In
  April, four employees filed a lawsuit against the company, claiming around CAD$519,000
  in unpaid wages.
