notes: 'The Canadian firm Timechain claimed that they lost around $4 million to the
  Terra collapse, a loss they said destroyed the company. Timechain claimed that a
  stop-loss mechanism that should have triggered in Binance to avoid such devastating
  losses never actually fired, resulting in a loss of more than 95%. However, Binance
  has reported that Timechain almost completely emptied their account before the Terra
  collapse.


  Total loss estimated at $4,000,000.'
