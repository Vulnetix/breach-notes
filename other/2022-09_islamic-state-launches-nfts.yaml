source_name: '"Islamic State Turns to NFTs to Spread Terror Message"'
source_url: https://www.wsj.com/articles/islamic-state-turns-to-nfts-to-spread-terror-message-11662292800
date_of_breach: '2022-09-04'
date_of_disclosure: '2022-09-04'
category: other
vendor_product: Islamic State launches NFTs
notes: In the apparent "first known nonfungible token created and disseminated by a terrorist sympathizer", a supporter of
  the Islamic State has minted an NFT with a message praising an attack on a mosque in Kabul, Afghanistan. According to former
  U.S. intelligence officials cited by The Wall Street Journal the NFT is likely an experiment with new funding and channels
  for propaganda.The token was briefly listed on OpenSea, Rarible, and various other marketplaces before those marketplaces
  took it down. However, because it was minted on the blockchain, the token itself cannot be removed. "It's very much an experiment...to
  find ways to make content indestructible," said Raphael Gluck, a co-founder of a jihadist research group.
