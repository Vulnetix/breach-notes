source_name: '"Coinbase-backed Vauld Cuts Workforce by 30%, Seeks To Halve Exec Pay"'
source_url: https://blockworks.co/coinbase-backed-vauld-cuts-workforce-by-30-seeks-to-halve-exec-pay/
date_of_breach: '2022-06-21'
date_of_disclosure: '2022-06-21'
category: other
initial_attack_vector: Protocol collapse / insolvency
vendor_product: Vauld layoffs
notes: The Peter Thiel- and Coinbase-backed Vauld cryptocurrency exchange laid off 30% of its 100–200 employees, reportedly
  due to falling prices, low trading volumes, and tax concerns. They also halved executive salaries and drew back on their
  marketing expenses and vendor contracts.Almost a year earlier, in June 2021, Vauld raised $25 million in a Series A round
  led by Peter Thiel's Valar Ventures, which was also joined by Coinbase and Pantera Capital.
