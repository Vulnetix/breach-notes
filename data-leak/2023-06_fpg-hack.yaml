date_of_breach: '2023-06-15'
date_of_disclosure: '2023-06-15'
category: data-leak
initial_attack_vector: Withdrawal halt / insolvency
vendor_product: FPG
financial_loss_usd: 15000000
notes: 'The institutional cryptocurrency broker Floating Point Group (FPG) announced to customers on June 14 that they would
  be suspending all activity on their platform following a "cyber security incident" that had occurred on June 11. "While
  the loss at this point is still being investigated and analyzed, the number as we understand it today is between $15M-$20M
  in cryptocurrencies lost," they wrote on Twitter.The group announced that they were working with "the FBI, the Department
  of Homeland Security, our regulators and Chainalysis" to investigate the attack. The group had previously earned SOC 2 certification
  for its cybersecurity controls.


  Total loss estimated at $15,000,000.'
