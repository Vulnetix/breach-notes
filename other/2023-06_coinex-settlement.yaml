date_of_breach: '2023-06-15'
date_of_disclosure: '2023-06-15'
category: other
notes: The Hong Kong-based cryptocurrency exchange CoinEx has agreed to pay $1.17
  million in refunds to investors and $600,000 in penalties for failing to register
  as a securities and commodities broker-dealer and for falsely representing itself
  as a crypto exchange. The lawsuit was initially filed in February, and alleged that
  the company "engaged in repeated and persistent fraudulent practices".The company
  is also banned from operating in the state going forward. The agreement requires
  CoinEx to implement geoblocking to prevent people with New York IP addresses from
  accessing the platform, and prohibits the company from creating new accounts for
  US customers or allowing US customers to do anything other than withdraw their assets.
