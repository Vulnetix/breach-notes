source_name: '"Huobi Token Plunges 90% In Minutes, Sparks Insolvency Rumors"'
source_url: https://bitcoinist.com/huobi-token-insolvency-rumors/
date_of_breach: '2023-03-10'
date_of_disclosure: '2023-03-10'
category: other
notes: Huobi Token, the token tied to the Huobi cryptocurrency exchange, experienced
  a flash crash in which the token price tumbled 90% from $4.60 to around $0.31 within
  about a ten-minute span. HT does not have a ton of liquidity, and so Huobi-linked
  executive Justin Sun reported that a "few users trigger[ed] a cascade of forced
  liquidations in the spot and HT contract markets".Sun also announced that he had
  transferred $100 million to Huobi to provide more liquidity. He also announced that
  "Huobi will bear all leverage-through position losses on the platform resulted from
  this market volatility event of HT."Although the token recovered quickly, the flash
  crash sparked rumors that Huobi was insolvent.
