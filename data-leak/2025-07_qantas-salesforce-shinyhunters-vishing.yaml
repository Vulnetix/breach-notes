category: "data-leak"
initial_attack_vector: "ShinyHunters (Scattered Lapsus$ Hunters) used vishing (voice phishing) to impersonate IT support staff, tricking employees into visiting Salesforce's connected app setup page and entering a 'connection code' that linked a malicious OAuth app (malicious Salesforce Data Loader) to the employee's Salesforce environment"
cve: []
vendor_product: "Salesforce CRM; Salesforce Data Loader (malicious OAuth app abuse)"
software_package: ""
malware: ""
supply_chain_claimed: false
notes: "In July 2025, Qantas Airways (Australia's flag carrier) suffered a Salesforce data breach attributed to ShinyHunters/Scattered Lapsus$ Hunters via a vishing campaign. Approximately 5.7 million customer records were exfiltrated. Exposed data included customer names, email addresses, phone numbers, frequent flyer program details, and for a subset: home/business addresses, dates of birth, gender preferences, and meal selections. Credit card details, financial information, and passport data were not compromised. This attack is part of a broader ShinyHunters Salesforce vishing campaign that started around June 2025 and affected at least 91 organizations worldwide, including Allianz Life, LVMH, Adidas, Cartier, Air France-KLM, Cisco, and others (see 2025-07_allianz-life-shiny-hunters.yaml)."
