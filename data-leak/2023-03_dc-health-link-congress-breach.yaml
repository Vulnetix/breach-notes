notes: "In March 2023, data for approximately 56,415 individuals enrolled in DC Health Link — the health insurance marketplace for Washington D.C. residents including US House of Representatives members, Senate members, Supreme Court staff, Capitol Police, and congressional staff — was put up for sale on BreachForums by a hacker calling themselves 'IntelBroker'. The breach was particularly significant because it exposed the personal data of a significant portion of the US legislative branch, including members of Congress and their families. The US House of Representatives Information Security Office notified all members and staff on 8 March 2023. The FBI investigated. Exposed data included names, Social Security numbers, employer-sponsored insurance plan details, and enrollment information. Speaker Kevin McCarthy and Minority Leader Hakeem Jeffries were among those whose data may have been compromised. The DC Health Benefit Exchange Authority CEO Mila Kofman testified before Congress about the breach. A second, unrelated individual (a contractor) was also charged with attempting to sell stolen DC Health Link data. The breach occurred approximately two months after a similar breach at the US Marshals Service. The exposure of legislators' personal data, including Social Security numbers, created significant counterintelligence concerns."
