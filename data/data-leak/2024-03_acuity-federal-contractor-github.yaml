notes: "IntelBroker breached federal IT contractor Acuity Inc. on 7 March 2024 and claimed to have stolen data from US State Department, DoD, NSA, ICE, USCIS, and other agencies. The stolen data appeared on hacking forums and Telegram in April 2024. Acuity confirmed the breach but characterized the stolen data as 'old and non-sensitive' from GitHub repositories. The State Department investigated. Leaked data included thousands of records with government employee PII and internal communications. Acuity provides IT services to multiple US federal agencies."
