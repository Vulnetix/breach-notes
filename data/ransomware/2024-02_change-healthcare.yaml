notes: "Affiliate of ALPHV/BlackCat breached Change Healthcare (UnitedHealth subsidiary) on Feb 11 2024 via stolen credentials on a Citrix portal lacking MFA. Spent 9 days in network before encrypting. UHG paid $22M ransom; affiliate withheld decryptor and sold data to RansomHub who extorted again. ~100 million individuals' PHI exposed. Estimated cost >$1.5B. HHS opened HIPAA investigation March 2024. Largest healthcare cyber incident in US history."
