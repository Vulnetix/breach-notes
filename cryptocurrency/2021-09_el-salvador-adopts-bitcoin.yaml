source_name: '"El Salvador Just Became The First Country To Accept Bitcoin As Legal Tender"'
source_url: https://www.npr.org/2021/09/07/1034838909/bitcoin-el-salvador-legal-tender-official-currency-cryptocurrency
date_of_breach: '2021-09-07'
date_of_disclosure: '2021-09-07'
category: cryptocurrency
vendor_product: El Salvador adopts Bitcoin
blockchain: bitcoin
notes: Nayib Bukele unexpectedly announced that El Salvador would be adopting Bitcoin as legal tender, and the policy went
  into effect on September 7, 2021. With the benefit of hindsight, we can see that the decision came near the very top of
  the Bitcoin prices. Those who put money into Bitcoin at Bukele's urging have lost quite a lot of money.So has El Salvador
  itself, assuming Bukele is telling the truth about his many claimed Bitcoin purchases. As of December 2022, Nayib Bukele
  has lost more than $67 million on those investments.
