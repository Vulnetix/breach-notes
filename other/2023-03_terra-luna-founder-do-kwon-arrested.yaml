category: other
notes: The founder of Terra/Luna, the stablecoin that crashed dramatically in May
  2022 and has subsequently been alleged to be a massive fraud, has been arrested
  in Montenegro.After the collapse, Kwon became a fugitive. South Korea issued a warrant
  for his arrest in September, and Interpol issued a red notice. However, he's remained
  on the lam for some time, reportedly hiding in Serbia for a time — a country with
  no extradition agreement with South Korea.Now, officials in Montenegro have announced
  they arrested Do Kwon, who was attempting to travel through the country using falsified
  documents. Montenegro is a Balkan country bordering Serbia.
