vendor_product: Coinbase outage
notes: The largest crypto exchange in the U.S., Coinbase, suffered a  six-hour-long outage in which they couldn't take payments
  or make withdrawals involving U.S. bank accounts. They later narrowed down the problem to an issue creating ACH transfers,
  and tweeted "rest assured, your funds are safe". Six hours later, the company marked the incident as resolved.
