source_name: '"Meta to Shutter Novi Crypto Payments Wallet in September, Ending Libra
  Saga"'
source_url: https://www.coindesk.com/business/2022/07/01/meta-to-shutter-novi-crypto-payments-wallet-in-september-ending-libra-saga/
date_of_breach: '2022-07-01'
date_of_disclosure: '2022-07-01'
category: other
notes: Diem, formerly known as Libra, was a stablecoin-based payments system proposed
  by Meta, formerly known as Facebook. Novi, formerly Calibra (are you keeping up?),
  was a crypto wallet and crypto-based money transfer pilot project run by the company.
  The app was advertised as a solution for sending remittances, and claimed it would
  help provide "equal access to financial services".Libra-now-Diem ground to a halt
  after concerns from regulatory bodies and the general public, with Facebook-now-Meta
  abandoning the project in January 2022. Now they've announced they'll be shutting
  down Calibra-now-Novi, too, and have advised users to withdraw their balance "as
  soon as possible". Users won't be able to add money to their accounts beginning
  on July 21.
