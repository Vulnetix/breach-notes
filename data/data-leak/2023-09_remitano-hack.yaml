notes: 'Crypto exchange Remitano suffered a hack in which $2.7 million in Tether (USDT), USDC, and Ankr was drained from the
  exchange''s hot wallets across three blockchains. Luckily for them, Tether was able to freeze $1.9 million of the stolen
  funds, substantially reducing the attacker''s profits.Remitano acknowledged the hack, writing that they had suffered a "data
  breach from a third-party source". They have claimed that users'' assets will not be affected by the theft.Remitano is a
  peer-to-peer crypto exchange focused on emerging markets, including Nigeria, Pakistan, Venezuela, and Malaysia.


  Total loss estimated at $800,000.'
