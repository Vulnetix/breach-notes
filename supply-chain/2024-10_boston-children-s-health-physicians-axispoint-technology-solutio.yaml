notes: 'More Than 909,000 Individuals Affected by Cyberattack on New York IT Services
  Provider. ATSG Inc., an IT services company headquartered in New York, has recently
  reported a September 2024 data breach to the Department of Health and Human ATSG
  Inc., a New York-based IT services company, has reported a breach of the PHI of
  more than 909,000 individuals – an incident that also affected Boston Children’s
  Health Physicians. Data breaches have also recently been reported by Community Dental
  in Maine and Summit Pathology in Colorado. Third-party company: Axispoint Technology
  Solutions Group (ATSG).'
