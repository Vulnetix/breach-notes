notes: All holders of Luna, who saw their holdings crash to nothing in the Terra collapse,
  received an airdrop of the new Luna tokens with the release of Terra 2.0 (electric
  boogaloo). The researcher who originally observed that at least $88 million worth
  of ill-gotten tokens had been siphoned from the Terra Mirror Protocol before a patch
  was quietly applied in early May noticed that the attacker had been among the recipients
  of the airdrop, receiving more than 2.1 million $LUNA. "A nice little reward for
  stealing money from thousands of Mirror users &amp; locking their funds, causing
  them millions in losses", wrote the researcher.The price of the new $LUNA token
  has been volatile on its first day, starting at around $17 and later valued around
  $5.70. This would make the attacker's holdings of airdropped tokens worth around
  $12.1 million, assuming they could find liquidity to cash out.
