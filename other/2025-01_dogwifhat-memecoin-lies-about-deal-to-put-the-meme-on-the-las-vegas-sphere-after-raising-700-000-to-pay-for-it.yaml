source_name: '"Solana Meme Coin Dogwifhat Has No Deal With Las Vegas Sphere, Venue Says"'
source_url: https://decrypt.co/303887/solana-meme-coin-dogwifhat-no-deal-sphere
date_of_breach: '2025-01-31'
date_of_disclosure: '2025-01-31'
category: other
vendor_product: Dogwifhat memecoin lies about deal to put the meme on the Las Vegas Sphere after raising $700,000 to pay for
  it
blockchain: solana
notes: In late January, the creator of the "dogwifhat" memecoin announced "Officially confirmed. Viva hat vegas." in a tweet
  accompanied by a photo overlaying the dog meme with the Las Vegas Sphere. Project organizers had raised around $700,000
  in March 2024 to fund the project, hoping that the attention-grabbing stunt would spike the memecoin price. The announcement
  alone had somewhat of a similar effect, causing the $WIF price to spike by more than 30% shortly after.However, crypto media
  firm Decrypt reached out to a spokesperson for the Las Vegas Sphere and discovered that no such deal had been reached.Dogwifhat
  creators have since backtracked, replacing the tweet with a version omitting the "officially confirmed" portion, but still
  claiming that they "have been in ongoing negotiations with various parties to collaborate on the Sphere ad placement". They
  promised to return the funds "if, by any chance, the plan is not executed".
