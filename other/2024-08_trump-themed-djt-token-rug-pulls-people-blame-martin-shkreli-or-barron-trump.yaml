notes: 'Surprising just about no one, a wallet holding around 20% of the supply of the $DJT Trump-themed memecoin suddenly
  dumped its holdings, crashing the token price by around 90%. The token price had briefly spiked in June, when it was falsely
  reported that the token was "an official Trump token". However, the token''s price had already dwindled since that time,
  and before the sudden dump.People were quick to blame those behind the project, primarily "Pharma Bro" Martin Shkreli (who
  has been accused of dumping his own token before). Shkreli was quick to shift the blame to Donald Trump''s youngest son,
  Barron, who he has also claimed is behind the token (although this has not been independently confirmed). However, the owner
  of the wallet that dumped its tokens is not definitively known.


  Total loss estimated at $2,000,000.'
