notes: 'Crypto speculator Jonny Reid wrote on May 22 that his crypto wallet had been
  hacked and drained of approximately $203,000. He wrote that he had never owned a
  hardware wallet before and had only used MyEtherWallet and MetaMask. "My security
  has always been great, always cautious with phishing links / websites / discord
  / telegram / social media scans etc". He wrote that he suspected the compromise
  might have been the result of a Chrome extension he had downloaded to auto-refresh
  a page to schedule a passport appointment.Reid traced the stolen funds until they
  disappeared into the crypto exchange "Fixed Float". Reid contacted the exchange,
  who told him they couldn''t supply him with server logs without a law enforcement
  request. Reid wrote that he was "angry [with] the fact they cant provide me with
  any details to help me follow the trace" and urged crypto Twitter to try to pressure
  the exchange to release more information to him.


  Total loss estimated at $203,000.'
