notes: 'Louis Vuitton says regional data breaches tied to same cyberattack. Luxury
  fashion giant Louis Vuitton confirmed that breaches impacting customers in the UK,
  South Korea, and Turkey stem from the same security incident, which is believed
  to be linked to the ShinyHunters extortion group. Update 7/17/25: Updated story
  with links to breach notifications for Italy and Sweden as well. Since last week,
  the retailer has been notifying customers that their info was exposed in a data
  breach, first in South Korea, then in Turkey, and on Friday in the United Kingdom.
  After publishing, BleepingComputer learned that notifications also went to customers
  in Italy and Sweden.'
