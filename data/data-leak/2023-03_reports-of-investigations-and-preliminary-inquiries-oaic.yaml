notes: "The Australian Information Commissioner may undertake a Commissioner initiated\
  \ investigation (CII) into whether the actions of an agency or private sector organisation\
  \ may be an interference with the privacy of an individual. Prior to commencing\
  \ an investigation, the Commissioner may conduct preliminary inquiries, to determine\
  \ whether to commence a CII. A CII may look at a specific act or practice, at a\
  \ systemic problem or recurring pattern in an entity’s practices and processes in\
  \ handling personal information, or at a practice or problem occurring in more than\
  \ one entity. Below are reports of preliminary inquiries and investigations on the\
  \ Commissioners’ own initiative under Part V of the Privacy Act. Reports of investigations\
  \ relating to acts or practices prior to 12 March 2014 use the \n\nSource: OAIC\
