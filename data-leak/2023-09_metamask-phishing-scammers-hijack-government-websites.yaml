source_name: '"MetaMask scammers take over government websites to target crypto investors"'
source_url: https://cointelegraph.com/news/metamask-scam-government-websites-crypto-investors
date_of_breach: '2023-09-05'
date_of_disclosure: '2023-09-05'
category: data-leak
initial_attack_vector: Phishing attack
vendor_product: MetaMask phishing
notes: 'Phishing scammers hoping to lure victims into visiting fake websites resembling that of the popular MetaMask crypto
  wallet have adopted a new approach: compromising government websites. CoinTelegraph identified websites on domains belonging
  to the governments of countries including India, Nigeria, Egypt, Colombia, Brazil, Vietnam that had been compromised and
  modified to redirect to these scam sites. Some of them included the websites of the Nigerian postal service and, ironically,
  of Egypt''s Consumer Protection Agency.Once victims visit the fake site, they''re prompted to connect their MetaMask wallets
  to access various services, which would allow the scammers to steal any assets in the wallets.'
