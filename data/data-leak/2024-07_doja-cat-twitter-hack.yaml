source_name: '"American rapper Doja Cat’s X account was hacked to promote a now-collapsed token"'
source_url: https://www.theblock.co/post/304127/american-rapper-doja-cats-x-account-was-hacked-to-promote-a-now-collapsed-token
date_of_breach: '2024-07-08'
date_of_disclosure: '2024-07-08'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Doja Cat Twitter
blockchain: solana
notes: The Twitter account belonging to rapper Doja Cat was compromised on July 8, tweeting to her 5.6 million followers that
  they should "buy $DOJA or else", and various other messages to that effect. Doja Cat quickly posted on her Instagram account
  to say that the Twitter account had been compromised.The attacker appeared to have only marginal success, as the token reached
  a market cap of around $500,000 before collapsing by 96%.Hackers have compromised a string of celebrity Twitter accounts
  to promote memecoins recently, including those of Hulk Hogan and Metallica.
