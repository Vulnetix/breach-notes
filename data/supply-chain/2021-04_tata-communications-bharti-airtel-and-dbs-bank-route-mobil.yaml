notes: 'Data Leak: Route Mobile investigating claims; data of Tata Communications,
  Bharti Airtel and DBS Bank allegedly leaked. Hackers have allegedly compromised
  servers of enterprise communications firm Route Mobile, even as the company claimed
  that data of its customers is safe and its cyber security team is investigating
  the matter. According to cyber security experts, data of companies like Tata Communications,
  Bharti Airtel and DBS Bank have been leaked due to the alleged breach in Route Mobile''s
  system. Third-party company: Route mobil.'
