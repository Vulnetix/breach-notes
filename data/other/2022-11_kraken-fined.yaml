vendor_product: Kraken fined
notes: The US cryptocurrency exchange Kraken settled charges from the Office of Foreign Assets Control (OFAC) alleging that
  they had violated sanctions against Iran. In the agreement, Kraken will pay $362,158.70 for the potential civil liability,
  and agree to commit $100,000 in various compliance controls.The OFAC investigation was first revealed in July, in reporting
  from the New York Times.
