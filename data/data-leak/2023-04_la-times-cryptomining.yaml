notes: 'In February 2018, The Los Angeles Times was unwittingly part of a crypto jacking
  scheme. A publicly writable S3 Bucket on their website was discovered and configured
  to serve a Coinhive Monero Miner Javascript code. The injected code used the CPU
  power of any browser that visited the site.


  Sourced from breaches.cloud'
