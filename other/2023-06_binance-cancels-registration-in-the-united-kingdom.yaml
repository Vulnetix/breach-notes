category: other
vendor_product: Binance cancels registration in the United Kingdom
notes: Binance's footprint is shrinking even further, as the company has canceled its registration with the United Kingdom's
  Financial Conduct Authority (FCA). This means that the company will not be able to perform any regulated activities in the
  country.Binance had applied for registration after being warned by the FCA in July 2021 to seek registration before launching
  its business in the region.Since the beginning of June, Binance has also announced it will exit the Netherlands and Cyprus
  amid regulatory issues.
