source_name: '"Chase U.K. to Block Crypto Payments Citing Fraud, Scams"'
source_url: https://www.coindesk.com/policy/2023/09/26/chase-uk-to-block-crypto-payments-citing-fraud-scams/
date_of_breach: '2023-09-26'
date_of_disclosure: '2023-09-26'
category: other
notes: Chase Bank’s UK branch has decided it will completely block debit card purchases
  and bank transfers that it identifies as being "related to crypto assets", a move
  they say is motivated by an increase in crypto scams targeting UK customers. Chase
  customers who want to buy crypto will have to use some other bank, Chase has said.The
  change is scheduled to go into effect on October 16.
