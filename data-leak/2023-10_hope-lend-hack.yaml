source_name: '"Ethereum DeFi protocol Hope Lend drained after exploit"'
source_url: https://cointelegraph.com/news/ethereum-defi-protocol-hope-lend-drained-after-exploit
date_of_breach: '2023-10-18'
date_of_disclosure: '2023-10-18'
category: data-leak
notes: 'A small defi protocol called Hope Lend was drained of nearly all its assets
  when attackers stole around 526 ETH (~$825,000). Hilariously, the project claims
  the hacker was frontrun by a watchful third party, who paid half of the stolen funds
  (~264 ETH, or around $414,000) to an ETH validator to allow them to frontrun the
  transaction. The original attacker who discovered the bug reportedly made no money
  at all.The stolen assets represented the entire TVL of the project.


  Total loss estimated at $825,000.'
