source_name: '"Crypto Exchange Binance to Suspend US Dollar Bank Transfers This Week"'
source_url: https://www.coindesk.com/business/2023/02/06/crypto-exchange-binance-to-suspend-us-dollar-deposits-this-week/
date_of_breach: '2023-02-06'
date_of_disclosure: '2023-02-06'
category: other
notes: Binance announced that they would be "temporarily suspending USD bank transfers"
  with two days notice.This comes in the wake of various crypto exchanges — Binance
  included — appearing to have difficulties with banking. On January 21, Binance announced
  that users wouldn't be able to use SWIFT for transfers below $100,000 via Signature
  Bank. Meanwhile, Crypto.com's Lithuanian payment processor, Transactive, has faced
  a crackdown from the Lithuanian banking regulator leaving Crypto.com users without
  access to Euro-denominated deposits and withdrawals.
