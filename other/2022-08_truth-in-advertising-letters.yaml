source_name: '"TINA.org Sends Notification Letters to Celebrities Promoting NFTs"'
source_url: https://truthinadvertising.org/articles/tina-org-sends-letters-to-celebrities-promoting-nfts/
date_of_breach: '2022-08-08'
date_of_disclosure: '2022-08-08'
category: other
notes: Non-profit advertising watchdog organization Truth in Advertising (TINA) sent
  letters to seventeen celebrities, urging them to follow FTC requirements on clearly
  disclosing when they are being paid to promote a brand. TINA had also previously
  sent such letters to Justin Bieber in relation to his promotion of the inBetweeners
  NFT project, and to Reese Witherspoon in relation to her endorsement of World of
  Women.The celebrities who received letters from TINA were Drake Bell, Tom Brady,
  DJ Khaled, Eminem, Jimmy Fallon, Paris Hilton, Eva Longoria, Madonna, Floyd Mayweather,
  Meek Mill, Von Miller, Neymar, Shaquille O'Neal, Gwyneth Paltrow, Logan Paul, Snoop
  Dogg, and Timbaland.
