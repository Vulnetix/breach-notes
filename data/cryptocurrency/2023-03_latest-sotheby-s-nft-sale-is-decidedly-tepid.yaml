vendor_product: Latest Sotheby's NFT sale is decidedly tepid
blockchain: ethereum
notes: Despite Sotheby's estimates that the most popular piece in the "Oddly Satisfying" NFT collection would sell for €70,000–€100,000
  ($75,500–$108,000), the "Eternity" NFT attained a highest bid of only €50,800 ($54,600). Altogether the full collection
  brought in $316,000, with 60% of the NFTs going for less than Sotheby's estimates. This is a marked change from the barn
  burner NFT sales at Sotheby's in 2021, including one in which a CryptoPunks NFT sold for $11.8 million.It seems perhaps
  even Sotheby's prestige is not sufficient to overcome the NFT downturn.
