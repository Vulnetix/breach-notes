notes: 'In a twist absolutely no one could have predicted, the developer of a coin
  called "Monkey Jizz" ran off with around $270,000. The project promised to share
  a portion of transactions with all investors, and eventually publish a video game.
  However, on October 31, the developer set a 94.9% sale fee to discourage people
  from selling, then transferred out the cash and disappeared.


  Total loss estimated at $270,000.'
