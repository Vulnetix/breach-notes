notes: In what is likely a preview of the levels of grift about to come — levels previously
  not thought possible — Trump has launched a Solana memecoin two days before his
  inauguration. The move was so unexpected that many believed the president-elect's
  Twitter account had been compromised to promote a fake scam token, but half a day
  later, it appears this scam token is of the genuinely Trump-backed variety.
