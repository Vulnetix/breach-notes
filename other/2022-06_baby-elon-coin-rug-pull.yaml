notes: 'The Baby Elon project on BNBChain rug pulled on June 8, with the token price
  plummeting 98% as the team withdrew 623 BNB (~$179,000) from the project. They quickly
  moved the funds to the Tornado Cash cryptocurrency tumbler.The Baby Elon token is
  of course not to be confused with Baby Musk, a different BNB Chain-based, baby Elon
  Musk-themed memecoin that rug pulled in February after a $2 million ICO.


  Total loss estimated at $178,994.'
