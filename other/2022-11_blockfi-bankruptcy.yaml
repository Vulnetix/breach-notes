notes: 'Crypto lending firm BlockFi has filed for Chapter 11 bankruptcy in the wake
  of the FTX collapse. The company was in dire straits in the spring after Terra and
  Three Arrows Capital blow-ups, but was bailed out in June by a $250 million loan
  from FTX, followed by a deal giving BlockFi a $400 million credit facility and giving
  FTX the "option to acquire" BlockFi.Because of this dependency, it was no surprise
  when BlockFi announced they were once again in crisis following the FTX explosion.
  On November 15, the Wall Street Journal reported they were preparing for possible
  bankruptcy and considering layoffs.On November 28, BlockFi filed for bankruptcy.
  Their filing estimates they have more than 100,000 creditors (the maximum option
  on the form), between $1–10 billion in assets, and between $1–10 billion in liabilities.


  Total loss estimated at $1,300,000,000.'
