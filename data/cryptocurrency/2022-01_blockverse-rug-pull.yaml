notes: 'Blockverse, a project that promised to build a play-to-earn game on top of Minecraft, rug pulled two days after launch.
  The initial NFT collection sold out in only eight minutes, even though the project creators hadn''t even begun to develop
  the game they were promising. When the creators rug pulled, they took the 500 ETH ($1.2 million) and deleted the project
  website and Discord server.


  Total loss estimated at $1,216,500.'
