notes: 'After FTX declared bankruptcy, the entire FTX.us domain was redirected to a page providing information on the bankruptcy
  proceedings.However, NFTs that had been minted on the FTX platform relied on metadata from an API at that domain, meaning
  that the NFTs are now pointing to broken links. Owners of these NFTs can still see that the NFT exists, but images no longer
  work—even when viewing the NFTs in their own wallets, or when listing them for sale on other platforms.Other projects that
  rely on the FTX NFT platform''s API, such as the Coachella NFT project, also broke: the Coachella NFT platform shows 0 NFTs
  in existence. Those NFTs still show up where they are listed on external NFT platforms, although the images and metadata
  are broken.'
