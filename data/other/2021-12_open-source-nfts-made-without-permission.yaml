notes: Some prominent open source advocates and contributors were surprised to find
  that their likenesses were turned into NFTs by an artist who photographed them in
  2018. Kris Nóva tweeted, "What would you do if you woke up and found out somebody
  made an NFT of you? Because that just happened to me and a lot of other open source
  contributors and thought leaders." She later wrote that the photographer "ended
  up reaching out, his heart is totally in the right place." However, it still seems
  pretty gross to me that the NFT creator didn't check with the subjects before using
  their likenesses in the NFT project, and that he prominently featured Kelsey Hightower,
  an outspoken critic of web3 who I suspect would not approve of his image being used
  in such a way, in the branding for the project.
