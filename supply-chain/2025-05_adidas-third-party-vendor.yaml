notes: Adidas warns of data breach after customer service provider hack. German sportswear
  giant Adidas disclosed a data breach after attackers hacked a customer service provider
  and stole some customers' data. "adidas recently became aware that an unauthorized
  external party obtained certain consumer data through a third-party customer service
  provider," the company said on Friday. "We immediately took steps to contain the
  incident and launched a comprehensive investigation, collaborating with leading
  information security experts.".
