source_name: '"Wemix says delay in disclosing $6.2 million hack was to prevent panic: report"'
source_url: https://www.theblock.co/post/346565/wemix-hack-delayed-report
date_of_breach: '2025-02-28'
date_of_disclosure: '2025-02-28'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Wemix Foundation
financial_loss_usd: 6200000
notes: 'The Wemix Foundation, which runs the blockchain gaming platform WEMIX, suffered a $6.2 million hack of their blockchain
  bridge. Although the hack occurred on February 28, the company did not disclose the theft until four days after the incident,
  leading some to accuse Wemix of attempting to cover up the hack. Wemix has denied those allegations, claiming that the delay
  was in hopes of preventing market panic, and to ensure they had time to patch any security vulnerabilities before publicly
  disclosing a breach.


  Total loss estimated at $6,200,000.'
