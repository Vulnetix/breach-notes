financial_loss_usd: 100000
notes: 'Quixotic, an NFT marketplace on the Optimism network, was attacked after a hacker was able to exploit a recently updated
  smart contract. The attacker made off with at least $100,000.Quixotic is the largest NFT marketplace on Optimism, a layer
  2 Ethereum network. Despite being the largest marketplace on the network, it still does fairly little in volume compared
  to NFT marketplaces on other networks, boasting only around $420,000 in trading volume in the last 30 days.Quixotic paused
  marketplace activity after discovering the hack, and promised to reimburse all users who had tokens stolen from them.


  Total loss estimated at $100,000.'
