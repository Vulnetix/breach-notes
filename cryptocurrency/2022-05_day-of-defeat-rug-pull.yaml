notes: 'The token associated with the Day of Defeat project, which describes itself as a "radical social experiment token
  mathematically designed to give holders 10,000,000X PRICE INCREASE" (🚩🚩🚩), suddenly dropped in value by more than 96% as
  the project rug pulled. More than $1.35 million worth of assets were drained from the BSC-based project and transferred
  to external wallets.The project''s website is one of the most absurd I''ve seen, promising that "all final holders will
  get 10,000,000x gains". Their project roadmap includes a "mystery plan" that results in a 1,000,000x price increase. Their
  FAQ states, "First of all, we promise that the team will not redeem the fund pool." Apparently projects based on pinky swears
  aren''t great investments.After the funds were drained, the project claimed that they had been compromised by an external
  actor, and had "reported to Binance and local authorities".


  Total loss estimated at $1,350,000.'
