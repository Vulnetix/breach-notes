notes: Brantly Millegan is the director of operations for the Ethereum Name Service, which is basically a blockchain version
  of DNS, and is also how some people get their wallet to show up as customname.eth on various web3 projects. His Twitter
  biography describes him as a "Catholic, husband, father". Someone discovered a 2016 tweet of his, in which he expressed
  bigoted views about homosexuality and transgender people, and condemned abortion, contraception, masturbation, and pornography.
  Millegan dismissed the concerns about the tweet, writing, "hey looks like I've got my first mob. nice to see some ppl finally
  read the first word of my bio." He left the offensive tweet up, and later doubled down in a Twitter Spaces conversation.On
  February 6, the ENS community stewards voted to remove Millegan from among them, and the following day the nonprofit behind
  ENS announced that they had terminated Millegan's contract as director of operations. As of February 7, Millegan still holds
  the largest share of voting power in the ENS DAO.
