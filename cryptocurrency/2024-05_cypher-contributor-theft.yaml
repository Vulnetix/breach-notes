notes: 'After the founder of the Solana-based Cypher futures trading protocol publicly accused a core contributor of stealing
  funds, the contributor — publicly known only as "hoak" — has confessed to the thefts.Cypher was hacked for $1 million in
  August 2023, but was able to recover around $600,000 of the stolen funds, which they promised to distribute to impact users
  via a redemption fund. However, over a period of months and unbeknownst to the rest of the team, hoak had been dipping into
  the recovered funds — taking around half of what was in the fund for himself.After he was accused, hoak fessed up in a public
  statement where he wrote that his actions were a "culmination of what snowballed into a crippling gambling addiction and
  probably multiple other psychological factors that went by unchecked for too long." He continued: "I know likely nothing
  I say or do will make things better - perhaps other than rotting in jail. To address the elephant in the room, the allegations
  are true, I took the funds and gambled them away. I didn’t run away with it, nor did anyone else."


  Total loss estimated at $316,294.'
