source_name: '"Kujira Foundation''s Tokens Stung by Its Own Leveraged Positions as Bets Backfire"'
source_url: https://www.coindesk.com/markets/2024/08/02/kujira-foundations-tokens-stung-by-its-own-leveraged-positions-as-bets-backfire/
date_of_breach: '2024-08-01'
date_of_disclosure: '2024-08-01'
category: cryptocurrency
vendor_product: Kujira token tanks as team's leveraged bets melt down
blockchain: cosmos
notes: The team behind the Kujira project wound up with around $2 million in bad debt after taking some of their operational
  funds and using it to make leveraged bets on their own platform. They blamed "a series of events over the last few months,
  including exploits, socially engineered attacks and fallouts within the ecosystem" for causing the positions to be liquidated.
  The $KUJI token price crashed by more than 60% as a result of the team's poor risk management.The Kujira team apologized
  for the fiasco, and announced a plan to create a DAO to take over the project treasury.
