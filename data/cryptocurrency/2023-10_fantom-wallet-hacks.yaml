notes: 'An attack targeting the Fantom Foundation and its employees siphoned $7 million from wallets under their control.
  Of that, around $550,000 were funds belonging to the Fantom Foundation. One individual employee reportedly lost $3.4 million.It''s
  not clear yet how the attack was perpetrated, although crypto researcher Spreek reposted a comment by an admin in Fantom''s
  Telegram channel, where they blamed the theft on a zero-day exploit in Google Chrome.


  Total loss estimated at $7,000,000.'
