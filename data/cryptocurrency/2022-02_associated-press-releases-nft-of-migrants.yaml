notes: The Associated Press announced they would be dropping a new NFT on the platform they launched in January, which notably
  doesn't allow users to sell their NFTs off-platform or really do much at all with the image or video associated with their
  NFT. Most NFTs they've offered to date have been fairly benign, like a photo of a shooting star over a house in a field,
  or of a person spray-painting "illegal" on a brick wall (edgy!)However, on February 24 they announced that their newest
  NFT would show a short, top-down video of around fifty migrants crammed into a small inflatable boat, adrift at sea in the
  Mediterranean. Any goodwill the AP might have had for their NFT project was likely shattered by their choice to monetize
  a video of human suffering. The already horrific NFT announcement was particularly ill-timed, given its juxtaposition on
  many Twitter feeds amongst news of Russian military action against Ukraine. The Associated Press deleted the announcement
  tweet four hours later.
