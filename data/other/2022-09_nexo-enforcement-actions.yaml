notes: 'Crypto lending service Nexo was hit with a barrage of cease-and-desist lawsuits
  from eight states: California, Vermont, Oklahoma, Kentucky, Washington, South Carolina,
  New York, and Maryland. Several of them also tacked on fines, with Washington levying
  a hefty $1 million against the company, and Maryland fining them $5,000 per violation.Nexo
  had previously been warned to stop offering services in New York state and to register
  under securities regulations, but hadn''t done so. Several states called into question
  Nexo''s "real-time audit", which they describe as bogus. Kentucky also noted in
  their lawsuit that when the company''s holdings of their own $NEXO token was taken
  out of the equation, the company appears to be insolvent.'
