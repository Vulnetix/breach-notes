vendor_product: Trust Reserve (formerly CNHC) employees arrested
notes: A Chinese cryptocurrency publication has reported that the staff of Trust Reserve (formerly CNHC Group) were detained
  by police. A sign on the door of the company's office in Shanghai announced "judicial seizure".Trust Reserve issues the
  CNH offshore yuan-pegged stablecoin and the HKDC Hong Kong dollar-pegged stablecoin. The company had received funding from
  sources including the KuCoin crypto exchange.
