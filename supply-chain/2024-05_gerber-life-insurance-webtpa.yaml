notes: 'WebTPA Data Breach Affects 2.4 Million Health Insurance Policyholders. WebTPA,
  a Texas-based provider of administration services to health insurance and benefit
  plans has recently started notifying 2,429,175 benefit plan WebTPA, a provider of
  administration services to health insurance and benefit plans, has confirmed that
  the protected health information of more than 2.4 million policyholders was exposed
  in a 2023 cyberattack. Third-party company: WebTPA.'
