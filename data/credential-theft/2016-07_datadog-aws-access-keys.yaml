notes: "On July 7-8, 2016, DataDog, a cloud monitoring and analytics platform, detected unauthorized access to its internal systems and discovered that AWS access keys had been exposed. DataDog immediately rotated all credentials and notified customers. Because DataDog agents run with IAM permissions inside customer AWS environments, the potential exposure of these keys raised concerns about downstream access to customer cloud infrastructure. DataDog stated it found no evidence that customer data was accessed. The company's rapid response — detection and notification within approximately 24 hours — was noted as a positive example of breach response."
