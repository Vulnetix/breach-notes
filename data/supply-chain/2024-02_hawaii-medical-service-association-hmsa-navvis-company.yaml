notes: '462,000 Hawai''i Residents Affected by Data Breach at Navvis & Company. Approximately
  462,000 individuals who enrolled in health plans through the Hawaii Medical Service
  Association (HMSA) have been affected by a data breach Approximately 462,000 individuals
