source_name: '"Treasury Announces Two Enforcement Actions for over $24M and $29M Against
  Virtual Currency Exchange Bittrex, Inc."'
source_url: https://home.treasury.gov/news/press-releases/jy1006
date_of_breach: '2022-10-11'
date_of_disclosure: '2022-10-11'
category: other
notes: The U.S. Treasury Department announced fines against Bittrex, a U.S.-based
  cryptocurrency exchange. The Office of Foreign Assets Control (OFAC) announced a
  $24 million penalty against the company, and the Financial Crimes Enforcement Network
  (FinCEN) announced a $29 million fine. Both groups form parts of the Treasury Department.
  FinCEN said it would credit the fine to be paid to OFAC towards the total fine they
  imposed, meaning Bittrex will pay $29 million in total. According to the Treasury
  Department, the fines are the largest they've ever imposed on a virtual currency
  platform.The OFAC sanction was imposed due to 116,421 reported sanctions violations
  in which Bittrex failed to prevent people in Crimea, Cuba, Iran, Sudan, and Syria
  from using their service. In total, these prohibited individuals performed more
  than $263 million in transactions on the platform.The FinCEN fine was imposed due
  to "willful violations" of the Bank Secrecy Act's requirements pertaining to anti-money
  laundering (AML) and suspicious activity reports.
