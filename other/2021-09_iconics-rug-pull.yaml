source_name: '"Supposed 17-year-old artist sells $138,000 worth of fake NFTs and disappears"'
source_url: https://www.theblockcrypto.com/post/119150/supposed-17-year-old-artist-sells-138000-worth-of-fake-nfts-and-disappears
date_of_breach: '2021-09-30'
date_of_disclosure: '2021-09-30'
category: other
vendor_product: Iconics
blockchain: solana
financial_loss_usd: 138000
notes: 'NFT collectors eagerly bought thousands of presales of an NFT project called "Iconics" after viewing sample artwork
  from a supposedly 17-year-old 3D artist. When they viewed their NFTs, instead of the 3D busts they had expected, they were
  brought to images of random collections of emojis. It was later discovered that the artwork had been stolen from an artist
  unaffiliated with the NFT project.


  Total loss estimated at $138,000.'
