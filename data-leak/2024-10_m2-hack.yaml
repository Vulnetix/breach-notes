notes: 'The UAE-based M2 cryptocurrency exchange was hacked for $13.7 million in bitcoin, ether, and Solana tokens. The exploiter
  compromised several of the exchange''s hot wallets to take the funds.Shortly after the theft, M2 acknowledged the hack and
  announced that "the situation has been fully resolved". This apparently involved M2 restoring customer funds from their
  own assets, rather than recovering the stolen assets.


  Total loss estimated at $13,700,000.'
