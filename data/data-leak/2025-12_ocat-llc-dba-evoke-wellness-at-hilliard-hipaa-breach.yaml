notes: 'OCAT, LLC dba Evoke Wellness at Hilliard (OH), a Healthcare Provider, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2025-12-12
  for a breach affecting 1629 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Electronic Medical Record. Source: HHS OCR Breach Portal (HIPAA
  Breach Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches
  of unsecured protected health information (PHI) affecting 500 or more individuals.'
