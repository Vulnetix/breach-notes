notes: Data breach exposes Social Security info of some Floridians seeking unemployment
  benefits. The Florida Department of Economic Opportunity said they had to deal with
  a data security incident. TALLAHASSEE, Fla. – The Florida agency that handles unemployment
  benefits said they recently had a “data security incident” that may have compromised
  information from Floridians seeking unemployment. The incident exposed full names
  and Social Security numbers of some people who have applied for unemployment benefits,
  according to the Department of Economic Opportunity.
