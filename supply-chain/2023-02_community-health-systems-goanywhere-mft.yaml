category: supply-chain
initial_attack_vector: |-
  Cl0p exploited CVE-2023-0669, a pre-authentication remote code injection vulnerability in
  Fortra's GoAnywhere MFT administrative interface, to exfiltrate data from Community Health
  Systems' managed file transfer environment between January 28–30, 2023; no ransomware
  encryption was deployed — data theft only
cve:
