notes: 'In what should surprise nobody, some of the historically phishing-prone fans of the pricey Bored Apes project fell
  for scams that pretended to be the Bored Apes'' new land project, called "Otherside". In collectors'' hurry to mint the
  metaverse land NFTs, some fell for phishing sites pretending to be the real deal.Blockchain sleuth zachxbt found one such
  address that had netted around $1 million in NFTs just today, and tracing its transactions led to two other scammer wallets
  containing $5.1 million of other stolen NFTs.


  Total loss estimated at $6,100,000.'
