notes: 'NHS IT supplier held to ransom by hackers. Its IT provider says it may take
  three or four weeks to fully recover from the cyber-attack. A cyber-attack on a
  major IT provider of the NHS has been confirmed as a ransomware attack. Advanced,
  which provides digital services like patient check-in and NHS 111, says it may take
  three to four weeks to fully recover. Third-party company: Advanced.'
