source_name: '"OpenSea product chief accused of flipping NFTs using insider information"'
source_url: https://www.theverge.com/2021/9/15/22676075/opensea-insider-information-nft-trading-nate-chastain
date_of_breach: '2021-09-15'
date_of_disclosure: '2021-09-15'
category: other
notes: A Twitter sleuth discovers that OpenSea's Head of Product, Nate Chastain, had
  apparently been engaging in a form of insider trading by buying NFTs that he knew
  would later be featured on the front page of OpenSea, then selling them once their
  value increased from the spotlight. The Twitter user identified a chain of transactions
  show Chastain laundering the transactions through several anonymous accounts. OpenSea
  posted a statement confirming the shady trades had taken place, and that they had
  requested and received the employee's resignation, though they didn't specifically
  name Chastain as the culprit. Chastain's Twitter profile was updated shortly after,
  identifying him as a former OpenSea employee. OpenSea announced the next day that
  they had implemented policies preventing employees from trading on confidential
  information, which I guess they just hadn't bothered to think about previously.
