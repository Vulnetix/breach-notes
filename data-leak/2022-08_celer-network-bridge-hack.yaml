notes: 'The Celer Network''s cBridge project was targeted with a BGP hijacking attack.
  Users who tried to access the bridge''s frontend were instead shown a site that
  prompted them to authorize transactions that drained their wallets. The attacker
  was able to steal around 128 ETH (~$240,000) before the exploit was discovered and
  Celer took the frontend offline. The stolen funds were quickly transfered to the
  Tornado Cash cryptocurrency tumbler.


  Total loss estimated at $240,000.'
