notes: 'Black Kite third-party breach timeline entry for Zscaler. Data breached: Includes
  names, business email addresses, job titles, phone numbers, regional/location details,
  zscaler product licensing and commercial information, plain text support case header
  content from certain cases limited to the following fields: Case Number, Opened,
  Preferred Contact Number, Description, Priority, Case Owner, Preferred Time Zone,
  Case Status, Type, Customer Case Reference, Product, Last Activity, Subject, Resolution
  Notes, Reason for Hand Off, Current Status / Next Plan of Action, Data Collected,
  Issue Summary / Business Impact, and Requestor. Use of third party: Chatbot service
  provider. Third-party company: Drift (Salesloft).'
