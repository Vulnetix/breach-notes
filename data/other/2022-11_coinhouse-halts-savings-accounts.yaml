notes: The French crypto broker Coinhouse announced that they would be suspending withdrawals from their crypto "savings account"
  product. Coinhouse partners with Genesis to offer the service, and Genesis recently suspended their service due to the FTX
  collapse. As a result, services that relied on Genesis, including Gemini and now Coinhouse, are halting their own services
  as the dominoes continue to fall.
