notes: 'Illuminate Education Mega-Breach Affects K-12 Students. New York state officials
  are investigating a data breach at Illuminate Education, maker of a widely used
  software platform for K-12 schools. More than 1 million. Data Breach Notification
  , Incident & Breach Response , Security Operations. New York state officials have
  launched an investigation into a data breach involving a widely used digital education
  software platform that exposed protected, personal information for more than 1 million
  school-age children. Third-party company: Illuminate Education.'
