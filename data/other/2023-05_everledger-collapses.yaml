initial_attack_vector: Protocol collapse / insolvency
vendor_product: Everledger
notes: Everledger was an Australian company that hoped to use blockchains to track provenance of diamonds, other precious
  gems, fine wines, and other luxury goods. Things apparently didn't pan out, though, when an investor's planned funding fell
  through and the company was placed into voluntary administration.Everledger had in the past raised US$37 million in funding.
  AUD$3 million (~US$2 million) of that funding came from the Australian government's blockchain grants program in 2021.
