notes: The new owner of a CryptoPunk, one of the most popular early NFT projects,
  accidentally burned the NFT they had only just purchased. After spending 77 ETH
  ($123,434) on the NFT, the owner tried to wrap it so they could borrow against it.However,
  some confusing instructions resulted in the owner sending the punk to the burn address,
  effectively destroying the NFT. "I was trying to wrap it and don't know what I was
  doing... Thought I was following the directions exactly..." they later wrote. They
  also later shared that they had borrowed money in order to purchase the CryptoPunk.
