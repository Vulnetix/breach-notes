notes: 'Cyber-Attackers Hit Sunwing Airlines. Thousands of passengers of Canadian
  low-cost airline face delays after third-party system was hacked. Thousands of passengers
  of Canadian low-cost airline, Sunwing Airlines Inc, face a fourth day of flight
  delays after a third-party system the airline uses was hacked, according to the
  CEO. It has been widely reported this week that passengers remain stranded abroad
  and vacations have been delayed for others because of the technical issues that
  began on Sunday afternoon. Third-party company: Airline Choice.'
