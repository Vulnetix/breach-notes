source_name: '"Parler Launches NFT Marketplace With New Trump NFTs"'
source_url: https://www.forbes.com/sites/abrambrown/2022/03/01/parler-launches-nft-marketplace-with-new-trump-nfts/?sh=733440da13c4
date_of_breach: '2022-03-01'
date_of_disclosure: '2022-03-01'
category: other
notes: 'You might think if Parler was going to create an NFT celebrating their hero,
  they wouldn''t include along with their promotional material the example most reminiscent
  of Milo Yiannopoulos, the man who''s been so effectively deplatformed that he''s
  had to resort to selling statues of the Virgin Mary on a home shopping TV channel.
  On March 1, the far-right social network Parler announced their "CryptoTrump" NFTs,
  which will sell on their "DeepRedSky" NFT platform. The platform is built on the
  Solana blockchain, and has already helped Melania Trump "sell" (wash trade) her
  NFTs. Their inaugural project is a collection of 250 algorithmically-generated Trump
  NFTs, which will sell for $2,750 each and eventually be part of a collection of
  10,000 items.Although Parler''s press release contains a lot of their usual chest-thumping
  about "freedom from Big Tech", the DeepRedSky NFTs can only be minted with credit
  cards, with payments being processed through Stripe. The good news: if you aren''t
  getting enough of a rush out of the risks involved with crypto in general, you can
  get a new thrill from giving your personal information to a platform that''s been
  hacked multiple times.'
