source_name: '"Crypto investment firm AuBit International goes into liquidation amid
  suspected $160M fraud"'
source_url: https://www.offshorealert.com/crypto-investment-firm-aubit-international-goes-into-liquidation-amid-suspicions-of-160m-fraud/
date_of_breach: '2023-10-20'
date_of_disclosure: '2023-10-20'
category: other
notes: A judge in the Cayman Islands has placed Aubit, the firm behind the Freeway
  crypto project, into liquidation. Freeway was a crypto lending project that promised
  annual returns as high as 43%, at least until it halted withdrawals in October 2022,
  claiming it was due to "unprecedented volatility" in forex and crypto markets. Withdrawals
  were never re-enabled, leaving around $160 million in total customer assets out
  of reach.A lawsuit from an institutional customer was filed against the company
  in August, calling the project "a scam".AuBit has tried to argue that it should
  be allowed to restructure, but the Cayman Islands judge opted to force the firm
  to liquidate, citing "a real absence of proper accounting".
