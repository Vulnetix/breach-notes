notes: 'The two founders of a South Africa-based crypto investment firm called Africrypt claimed they had been hacked, and
  all assets had been stolen. The duo disappeared as legal action began, and as skepticism grew as to the veracity of that
  story.


  Total loss estimated at $3,600,000,000.'
