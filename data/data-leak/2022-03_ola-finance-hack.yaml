source_name: '"Ola Finance on Fuse Network suffers $3.6 million hack"'
source_url: https://www.theblockcrypto.com/post/140012/ola-finance-on-fuse-network-suffers-3-6-million-hack
date_of_breach: '2022-03-30'
date_of_disclosure: '2022-03-30'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Ola Finance
financial_loss_usd: 3600000
notes: 'Ola Finance is a lending protocol that allows others to create their own lending networks. It promises to allow users
  to create their own loan platforms where "assets can be listed without needing to pass cumbersome and expensive governance
  schemes or comply with numerous requirements (deep liquidity, high trading volumes, low volatility, etc.)"One of their networks,
  built on top of the Fuse chain, was exploited for crypto assets priced at around $3.6 million. By taking advantage of a
  re-entrancy vulnerability, the attacker was able to take loans on the platform, then withdraw the collateral without paying
  back the loans. They then took the stolen assets and transferred them to the BNB and Ethereum chains, making them more difficult
  to recover.


  Total loss estimated at $3,600,000.'
