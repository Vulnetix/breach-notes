notes: 'Huron Inc. Health Plan (MI), a Health Plan, submitted a HIPAA breach notification
  to the HHS Office for Civil Rights (OCR) on 2024-11-08 for a breach affecting 750
  individuals. Breach type: Unauthorized Access/Disclosure. Information location:
  Network Server. Source: HHS OCR Breach Portal (HIPAA Breach Notification Rule, 45
  CFR §164.400–414). The OCR portal lists all breaches of unsecured protected health
  information (PHI) affecting 500 or more individuals.'
