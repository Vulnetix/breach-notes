source_name: '"Troubled Crypto Lender Babel Lost Big While Trading Client Funds"'
source_url: https://www.bloomberg.com/news/articles/2022-07-29/troubled-crypto-lender-babel-lost-big-while-trading-client-funds?srnd=cryptocurrencies-v2
date_of_breach: '2022-07-29'
date_of_disclosure: '2022-07-29'
category: other
notes: 'Babel Finance, a crypto lender that suspended withdrawals in mid June, sustained
  "massive losses" thanks to its proprietary trading desk, which was trading with
  customer funds. According to a restructuring plan viewed by Bloomberg, Babel''s
  prop desk lost around 8,000 BTC and 56,000 ETH, valued at around $225 million at
  the time of the loss. The trading team was not using risk controls, and their unhedged
  position led to forced liquidations that made Babel''s lending and trading departments
  unable to meet its margin calls from counterparties like Zipmex.


  Total loss estimated at $225,000,000.'
