notes: The Bitcoin mining firm Riot Blockchain produced 318 BTC in July, valued at
  around $6.88 million, from its mining operations located in central Texas. The firm
  also received $9.5 million in power credits for switching off their power-hungry
  Bitcoin miners during all-time-high energy demands in a month where the state has
  been experience extreme heat waves.A press release from Riot proudly announced that
  "Riot curtailed a total of 11,717 megawatt hours in July, enough to power 13,121
  average homes for one month", as though it is acceptable that they are normally
  using this amount of electricity solely to churn out Bitcoins.They also wrote that
  "When applied to anticipated power costs for the month, the power credits and other
  benefits are expected to effectively eliminate Riot's power costs for July" — meaning
  that Texas residents are effectively subsidizing the cost of Bitcoin mining whether
  they like it or not. Meanwhile, the Texas Tribune and The Dallas Morning News report
  that many Texans are paying 50–70% more for electricity than this time last year.
