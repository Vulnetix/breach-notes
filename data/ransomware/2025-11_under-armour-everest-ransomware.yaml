notes: "In November 2025, the Everest ransomware group claimed Under Armour as a victim and attempted extortion, alleging theft of 343 GB of data. In January 2026, data for approximately 72 million accounts was published on a hacking forum. Have I Been Pwned indexed the breach on January 21, 2026. Exposed data included email addresses, names, dates of birth, genders, geographic locations, and purchase history; some records contained employee emails. Under Armour stated there was no evidence that payment processing systems or customer passwords were compromised. Class action lawsuits were filed in the US alleging negligence."
