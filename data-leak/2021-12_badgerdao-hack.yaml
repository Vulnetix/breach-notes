notes: 'A hacker was able to use a compromised Cloudflare API key to inject malicious code into the BadgerDAO platform via
  Cloudflare Workers. They then siphoned currency of various kinds, equivalent to approximately $120 million, out of user
  accounts over approximately two weeks before being discovered.


  Total loss estimated at $120,000,000.'
