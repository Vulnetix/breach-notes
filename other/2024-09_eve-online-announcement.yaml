notes: CCP, the developer of the Eve Online space MMORPG, has angered their fanbase with a new announcement that their upcoming
  game will be built on the blockchain and incorporate cryptocurrency for in-game transactions. According to an FAQ, the spin-off
  game (previously called "Project Awakening" and now titled "Eve Frontier") will use a layer-2 blockchain called Redstone."There
  is still time. You can still roll it back and pretend it never happened. Please. None of us want this crypto slop, this
  desperate cash grab, this attempt at 'creating something great,' this game where buzzwords seem more important than gameplay,"
  wrote one player on the game's subreddit.A tweet announcing the game was celebrated by some crypto advocates, but attracted
  some critical responses from players. One wrote, "releasing a blockchain game a year after the weird hype about that technology
  died so now you got a shitty concept and don't even get a pay-off for it. let's see how this is going to turn out :)"
