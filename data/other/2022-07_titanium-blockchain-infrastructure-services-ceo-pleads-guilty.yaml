source_name: '"Titanium Blockchain CEO pleads guilty to $21 million crypto fundraising
  scam"'
source_url: https://www.theverge.com/2022/7/26/23278995/titanium-blockchain-ceo-michael-stollery-guilty-plea
date_of_breach: '2022-07-26'
date_of_disclosure: '2022-07-26'
category: other
notes: CEO Michael Stollery of Titanium Blockchain Infrastructure Services (TBIS)
  pled guilty to securities fraud in connection to a $21 million cryptocurrency scam.
  The company promoted its BAR token during 2017–2018, and did not register with the
  SEC for its ICO. TBIS made false claims including that they had ties to companies
  including Apple, Boeing, and IBM, and offered various services that did not actually
  exist. At least 75 people participated in the ICO, giving TBIS a combined $21 million,
  some of which went directly to Stollery's bank account and personal expenses like
  a condo in Hawaii.
