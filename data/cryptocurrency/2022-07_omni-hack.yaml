source_name: '"Hacker drains $1.4 million worth of ETH from NFT lender Omni"'
source_url: https://www.theblock.co/post/156800/hacker-drains-1-4-million-worth-of-eth-from-nft-lender-omni
date_of_breach: '2022-07-10'
date_of_disclosure: '2022-07-10'
category: cryptocurrency
initial_attack_vector: Flash loan attack on smart contract
vendor_product: Omni
blockchain: ethereum
financial_loss_usd: 1430000
notes: 'Hackers used a flash loan attack to steal around 1,300 ETH ($1.43 million) from the NFT lending platform Omni. Omni
  allows users to borrow cryptocurrency against their NFTs.Hackers used NFTs from the popular Doodles collection as collateral
  to borrow wETH, then withdrew all but one of the NFTs, allowing them to perform a re-entrancy attack. The attacker then
  laundered the funds using the Tornado Cash cryptocurrency tumbler.According to Omni, only funds belonging to the platform
  that were being used for testing were taken by the attacker.


  Total loss estimated at $1,430,000.'
