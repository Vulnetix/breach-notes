notes: 'Animoon is yet another Pokémon rip-off NFT project, with artwork that was ripped directly from Pokémon artwork and
  recolored. They claim to have a "signed NDA" with Pokémon (whatever that means), though it seems extremely unlikely that
  there''s any real agreement granting them rights to use Pokémon IP.Not only did their roadmap include play-to-earn game
  (of course), collaborations with a Swiss shoe and apparel store that would send them actual gear, and real-life trips, but
  they promised that 15 "legendary" cards would "automatically generate" their owners $2,500 each month, for life. The project
  was promoted by Jake Paul, an influencer whose crypto promotions don''t have a great track record to say the least.The project
  team began to grow more distant after launch, posting less frequently. Promised apparel shipments never arrived. The team
  changed the legendary rewards from $2,500 a month to "a percentage of incomes from the game", which they said "could be
  a lot more than $2500 monthly" despite no game actually existing. The project team eventually disappeared, took down the
  Twitter account and website, and disabled the general chat in their Discord project.


  Total loss estimated at $6,300,000.'
