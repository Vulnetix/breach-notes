source_name: '"Tron’s Stablecoin Peg to Dollar Wobbles; Justin Sun Swears to Deploy
  $2B to Prop Up"'
source_url: https://www.coindesk.com/markets/2022/06/13/trons-stablecoin-peg-to-dollar-wobbles-justin-sun-swears-to-deploy-2b-to-prop-up/
date_of_breach: '2022-06-13'
date_of_disclosure: '2022-06-13'
category: other
notes: 'USDD, the algorithmic stablecoin belonging to the Tron network, dipped as
  low as $0.91 from its $1 peg on June 13 amidst a day of turmoil elsewhere in the
  crypto ecosystem. Blockchain analytics firm Nansen observed that Oapital, one of
  the funds that successfully profited off the Terra de-peg, had started to move large
  amounts of USDD (as well as other stablecoins). "Doesn''t look great", Nansen tweeted.Tron
  founder Justin Sun tweeted that the Tron DAO would deploy $2 billion (with a B)
  in capital to fight short sellers, writing: "Short squeeze is coming".'
