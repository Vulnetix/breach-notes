notes: Anesthesia, Eye Care, and Telehealth Providers Announce Third-Party Data Breaches.
  Several more providers of anesthesia services have confirmed they have been affected
  by a data breach at their management services organization (MSO). Several providers
  of anesthesia services have confirmed they have been affected by a breach at their
  management services organization, the Eye Care Leaders data breach total grows to
  410,842 records, and a telehealth provider announces a 3-year breach. The breach
  was detected by the MSO on July 11, 2022, with the forensic investigation determining
  information stored on its systems had been compromised. The affected companies were
  notified about the breach on September 22, 2022.
