notes: 'Ransomware hits largest US fertility network, patient data stolen. US Fertility,
  the largest network of fertility centers in the U.S., says that some of its systems
  were encrypted in a ransomware attack that affected the company two months ago,
  in September 2020. The US Fertility (USF) network is comprised of 55 locations across
  10 states that completed almost 25,000 IVF cycles in 2018 through its clinics and
  more than 80 physicians. In total, more than 130,000 babies have been born with
  the help of partner IVF/fertility practices in the USF network, including but not
  limited to Shady Grove Fertility, Reproductive Science Center San Francisco, IVF
  Florida, and Fertility Center of Illinois. Third-party company: USF.'
