date_of_breach: '2023-11-20'
date_of_disclosure: '2023-11-20'
category: other
notes: Kraken is the latest cryptocurrency exchange to face a lawsuit from the U.S.
  Securities and Exchange Commission. According to the SEC, Kraken violated securities
  laws by listing tokens like Polygon (MATIC) and Solana (SOL), which the SEC has
  argued in this and in other lawsuits are unregistered securities.Furthermore, the
  SEC claims that Kraken commingled corporate and customer funds, "at times pa[ying]
  operational expenses directly from bank accounts that hold customer cash."Kraken's
  new CEO, Dave Ripley, posted on Twitter that the company "plan[s] to vigorously
  defend [their] position" that they do not list securities.
