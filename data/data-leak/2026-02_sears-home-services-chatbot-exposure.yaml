notes: "On February 3, 2026, security researcher Jeremiah Fowler discovered three unsecured publicly exposed databases during routine Shodan scans, containing 4.3 terabytes of data linked to Sears Home Services ('Samantha' and 'KAIros' AI chatbot systems). The databases were made inaccessible the following day after responsible disclosure to Transformco. The exposure included approximately 3.7 million records: 2.1 million chat transcripts, 200,000 scheduling logs, and 1.4 million audio recordings of customer service interactions from 2024-2026. Data was in English and Spanish and contained customer names, physical addresses, email addresses, phone numbers, and details about products, services, repairs, and delivery appointments. The researcher noted that the chatbot continued recording for up to 4 hours in cases where customers did not properly hang up, capturing unrelated personal conversations. Transformco is the parent company that owns Sears Home Services after the Sears bankruptcy restructuring."
