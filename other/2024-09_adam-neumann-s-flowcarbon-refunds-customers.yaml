source_name: '"Adam Neumann’s Climate Company Is Issuing Refunds After Failing To
  Launch Crypto Token"'
source_url: https://www.forbes.com/sites/sarahemerson/2024/09/11/adam-neumanns-climate-company-is-issuing-refunds-after-failing-to-launch-crypto-token/
date_of_breach: '2024-09-11'
date_of_disclosure: '2024-09-11'
category: other
notes: In May 2022, WeWork founder and former CEO Adam Neumann announced he would
  be launching a company called Flowcarbon, which would issue "tokenized carbon credits"
  called "Goddess Nature Tokens" and sell them to companies looking to green up their
  image. The company raised $70 million in funding from Andreessen Horowitz and others,
  at least half of which was raised through token sales.Now, Flowcarbon has reportedly
  been issuing refunds after the tokens have failed to materialize more than two years
  later. Flowcarbon has reportedly been blaming "market conditions and resistance
  from carbon registries" for the failure to launch, according to a report from Forbes.
  Flowcarbon claimed they have been offering refunds "due to industry delays" since
  2023.
