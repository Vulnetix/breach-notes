notes: Peer-to-peer crypto marketplace Paxful announced that it will be delisting
  ether, citing "scams that have robbed people of billions".So close. You're almost
  there.Paxful CEO Ray Youssef said in an email to the platform's claimed 11.6 million
  customers that the decision was based on Ethereum moving from proof-of-work to proof-of-stake,
  not being decentralized, and spawning an ecosystem of scammy Ethereum-based altcoins.
  The email featured a header photo of Youssef himself posing triumphantly, and Youssef
  spent much of the subsequent day tweeting memes he made from pictures of himself.With
  the loss of ether, the platform will only allow swaps of Bitcoin, Tether (USDT),
  and USDC — despite both Tether and USDC being Ethereum-based tokens.
