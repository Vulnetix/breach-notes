source_name: '"Bitget will legally pursue 8 accounts suspected of profiting $20 million
  from VOXEL trading manipulation"'
source_url: https://www.theblock.co/post/352090/bitget-will-legally-pursue-8-accounts-suspected-of-profiting-20-million-from-voxel-trading-manipulation
date_of_breach: '2025-04-27'
date_of_disclosure: '2025-04-27'
category: other
notes: 'After trading — and prices — surged in Bitget''s market for the thinly traded
  video game token VOXEL, the company has accused a "professional arbitrage" group
  of "improperly" profiting $20 million from manipulating the market. A Bitget executive
  stated on Twitter that they had issued legal demands to eight accounts they said
  were responsible for "instigating" the unusual trading activity.


  Total loss estimated at $20,000,000.'
