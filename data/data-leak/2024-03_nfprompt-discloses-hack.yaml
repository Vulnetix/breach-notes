notes: A Binance-incubated platform called NFPrompt claims to be "the first Prompt
  Artist Platform in Web3" — with "prompt artist" referring to people who come up
  with prompts to feed into large language models. More succinctly, it's a platform
  to sell the NFTs you've made out of AI-generated images.The platform announced on
  March 15 that it had suffered a "critical security incident" that it attributed
  to "a group of hackers" who were able to gain access to funds belonging both to
  the project's users and the project itself. They did not disclose how much was taken.The
  project announced that it was working with the FBI, and had contacted centralized
  exchanges to ask them to freeze stolen funds.
