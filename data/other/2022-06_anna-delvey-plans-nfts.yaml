source_name: '"Convicted scammer Anna Sorokin says she is now selling NFTs"'
source_url: https://www.nbcnews.com/pop-culture/pop-culture-news/anna-delvey-nft-interview-rcna33811
date_of_breach: '2022-06-16'
date_of_disclosure: '2022-06-16'
category: other
notes: Anna Sorokin, the scammer  who convinced people and companies to give her hundreds
  of thousands of dollars by pretending to be a German heiress, has decided to get
  into NFTs. After winding up with a "scammer persona", which she says is a result
  of the Netflix series about her and not a result of the scams that landed her in
  prison, she has announced her intentions to "move away from" it. Now she is focusing
  on an NFT collection, which she announced in an interview from a detention facility
  in New York.
