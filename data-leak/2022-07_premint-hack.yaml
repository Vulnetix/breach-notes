notes: 'PREMINT is an NFT service intended to help project creators build access lists
  for new NFT projects based on various qualifications. The project was compromised
  on July 17, and users were asked to sign transactions that allowed hackers to drain
  all assets from their wallets. 314 NFTs were stolen, including from pricey collections
  such as Bored Ape Yacht Club, Otherside, Moonbirds Oddities, and Goblintown. The
  thiefs were able to flip the stolen NFTs for 270 ETH ($375,000), which they then
  tumbled through Tornado Cash.On July 20, PREMINT''s CEO announced they would be
  compensating all users affected by the hack by sending them ETH equivalent to the
  floor price of the stolen NFTs. "I realize that the NFTs stolen were not all floor
  NFTs... You might feel like this compensation isn''t enough. But I don''t think
  there''s any other scalable and objective way to do this," he said. The total repayment
  will amount to about 340 ETH ($525,000). PREMINT also bought the two most expensive
  stolen NFTs from their new owners for the prices they had paid to buy them from
  the hacker —  92 ETH ($138,000) for a Bored Ape and 12 ETH ($17,800) for an Azuki.
  Those NFTs were returned to their original owners.


  Total loss estimated at $680,800.'
