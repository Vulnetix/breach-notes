notes: "UNC5537 accessed Advance Auto Parts' Snowflake environment between April 14 and May 24, 2024. Breach disclosed July 10 via Maine AGO notification affecting 2.3 million current and former employees and job applicants. Exposed data: names, SSNs, driver's licence numbers, dates of birth. $10 million class action settlement reached. Part of the broader Snowflake campaign affecting 165+ organisations."
