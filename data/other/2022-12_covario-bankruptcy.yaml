notes: Just before the holidays, employees of the Covario crypto broker based in Zug,
  Switzerland learned that their employer was no longer solvent. Attempts to secure
  a buyout had been unsuccessful, and the company is entering bankruptcy.The firm
  had attempted to keep up appearances that all was well, spending lavishly and even
  opening new offices several weeks before entering bankruptcy. However, it turns
  out that employee pension contributions had not been being paid since early summer.
  Employee salaries had not been paid since October.
