notes: Huobi announced to shareholders that they had $18.1 million in crypto assets
  on the FTX exchange, where they can't be withdrawn. They reported that approximately
  $13.2 million of those funds were customer assets. They announced that they would
  be taking an unsecured loan of up to  $14 million from controlling shareholder Li
  Lin to cover the client assets.
