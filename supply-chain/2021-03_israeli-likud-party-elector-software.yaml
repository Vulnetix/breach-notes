notes: 'Personal details of all Israeli voters again leaked online, day before election.
  Anonymous hackers publish databases with 6.5 million names and ID numbers, including
  where people are set to vote, in latest election-related privacy scandal. Personal
  details of all voters were published online Monday, in another massive leak of Israelis’
  personal information before Knesset elections. The data breach was apparently linked
  to the Elector app, which was blamed for previous leaks when it was being used by
  the ruling Likud party to boost turnout. Third-party company: Elector Software.'
