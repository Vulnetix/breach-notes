notes: 'The NFT collector SOL Big Brain lost around $1.5 million in ETH, stablecoins, and the Gearbox token after being targeted
  in a phishing scam. The attacker apparently compromised a Telegram account belonging to a founder of a portfolio company,
  then used it to message SOL Big Brain to ask him to claim his vested tokens. SOL Big Brain double checked that the sender
  was indeed the founder of the company, and did as he was instructed.However, the attacker had set up a contract which used
  permit phishing to drain SOL Big Brain''s wallet. He lost $740,000 in stablecoins, $550,000 in ETH, and another $200,000
  in the GEAR token."Today is a bad day," wrote SOL Big Brain on Twitter.


  Total loss estimated at $1,490,000.'
