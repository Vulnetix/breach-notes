notes: 'Brightline: At Least 964,300 Individuals Affected by Fortra GoAnywhere Hack.
  Brightline, a provider of virtual behavioral and mental services to families, has
  confirmed it was affected by the cyberattack on Fortra’s GoAnywhere MFT Brightline
  has listed 58 Covered Entities on its website that were affected by the cyberattack
  on the Fortra GoAnywhere MFT solution and has confirmed that at least 964,300 individuals
  have been affected, although the total is likely to exceed 1 million. Third-party
  company: Brightline Health.'
