source_name: '"Former Security Engineer Sentenced To Three Years In Prison For Hacking
  Two Decentralized Cryptocurrency Exchanges"'
source_url: https://www.justice.gov/usao-sdny/pr/former-security-engineer-sentenced-three-years-prison-hacking-two-decentralized
date_of_breach: '2024-04-12'
date_of_disclosure: '2024-04-12'
category: other
notes: Shakeeb Ahmed, the hacker who stole a combined $12 million from Crema Finance
  and Nirvana Finance in July 2022, has been sentenced to three years in prison. Ahmed
  had previously worked for Amazon, where he led a bug bounty program focused on paying
  whitehat hackers to discover flaws in Amazon's software.US Attorney Damian Williams
  described this as the first ever conviction for a smart contract hack.Ahmed forfeited
  around $12.3 million in stolen funds, and will pay more than $5 million in restitution.
