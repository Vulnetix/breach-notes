notes: 'Netgain ransomware incident impacts local governments. The ransomware incident
  that Netgain, a provider of managed IT services, had late last year rippled onto
  its customers. Now, Ramsey County, Minnesota, is informing clients of the Family
  Health Division program that the hackers may have accessed personal data. The government
  of Ramsey County learned about the potential breach on December 2, 2020, when Netagin
  let them know of the attack and the impact it could have. "Netgain determined that
  the ransomware incident affected data within an application used by Ramsey County’s
  Family Health Division to document home visits" - Ramsey County Government. Third-party
  company: Netgain.'
