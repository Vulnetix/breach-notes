date_of_breach: '2022-07-06'
date_of_disclosure: '2022-07-06'
category: other
notes: 'Voyager Digital, a crypto broker that suspended withdrawals a week prior,
  announced that it had filed for bankruptcy. They attributed their decision to "prolonged
  volatility and contagion in the crypto markets", as well as their exposure to Three
  Arrows Capital, an also-bankrupt crypto fund that defaulted on a loan from Voyager
  worth around $660 million.Voyager CEO Stephen Ehrlich wrote on Twitter that he expected
  that Voyager would "emerge as a stronger company", certainly an optimistic prediction  for
  a crypto broker that froze customer funds with no promise they will ever be able
  to access them, then filed for bankruptcy.


  Total loss estimated at $430,000,000.'
