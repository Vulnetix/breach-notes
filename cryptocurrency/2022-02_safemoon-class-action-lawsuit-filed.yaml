notes: 'A class action suit was filed against SafeMoon, various executives, and a handful of influencers and celebrities who
  promoted the token. The plaintiffs allege that promotions included false or misleading statements, and that the defendants
  misrepresented their control over SafeMoon and its tokens in what is commonly called a "pump and dump". In addition to SafeMoon
  and its executives, the lawsuit named various celebrities and influencers who had promoted the token to their followers:
  Jake Paul, Nick Carter, Soulja Boy, Ben Phillips, and Lil Yachty. Promotions by the influencers occurred primarily between
  March and May 2021, and helped the coin spike to its all-time-highs of about $0.000008. However, the coin has spent most
  of its history worth less than half or, more lately, a quarter of that amount. The token underwent a migration in early
  2022, which increased the price per token, but the value has continued to decrease.These influencers join a growing list
  of celebrities who have been named in class action suits over alleged pump-and-dumps. The list includes names like Kim Kardashian,
  who was named among others in a January class action suit pertaining to a coin called EthereumMAX.'
