source_name: '"Bitcoin Defi Protocol Sovryn Gets Hacked for Over $1 Million"'
source_url: https://cryptopotato.com/bitcoin-defi-protocol-sovryn-gets-hacked-for-over-1-million/
date_of_breach: '2022-10-04'
date_of_disclosure: '2022-10-04'
category: data-leak
notes: 'Bitcoin-based defi protocol, Sovryn, lost $1 million to a price manipulation
  attack. An exploiter was able to use the project''s legacy lend and borrow functionality
  to maliciously withdraw 44.93 RBTC (~$915,000) and 211,045 USDT.According to the
  protocol, their developers "were able to identify and recover funds as the attacker
  was attempting to withdraw the funds". They have also announced that Exchequer,
  the project''s treasury committee, would "reinject" the remaining stolen funds.


  Total loss estimated at $1,125,536.'
