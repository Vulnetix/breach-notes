notes: Sixteen months after the collapse of his FTX cryptocurrency exchange, Sam Bankman-Fried has been sentenced to 25 years
  in prison. He has also been ordered to pay an $11 billion monetary judgment.The sentence follows his conviction on all seven
  felony charges in November 2022 — a decision reached by the jury within hours of beginning their deliberations.Bankman-Fried
  intends to appeal the conviction.
