notes: 'Possible data breach of City of Broken Arrow online payment system. The City
  of Broken Arrow released a statement Thursday after the city''s online payment system
  became unavailable. The city says the site was made unavailable after it became
  aware of a possible data breach involving a third-party payment software system.
  Their statement is below:The City of Broken Arrow takes cyber-security very seriously.
  TULSA, Okla. (KTUL) — The City of Broken Arrow released a statement Thursday after
  the city''s online payment system became unavailable. Third-party company: Click2Gov.'
