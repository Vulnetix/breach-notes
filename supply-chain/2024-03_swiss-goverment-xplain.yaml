notes: 'Switzerland: Play ransomware leaked 65,000 government documents. The National
  Cyber Security Centre (NCSC) of Switzerland has released a report on its analysis
  of a data breach following a ransomware attack on Xplain, disclosing that the incident
  impacted thousands of sensitive Federal government files. Xplain is a Swiss technology
  and software solutions provider for various government departments, administrative
  units, and even the country''s military force. The Play ransomware gang breached
  the company on May 23, 2023. At the time, the threat actor claimed to have stolen
  documents containing confidential information, and in early June 2023, it followed
  through on its threats and published the stolen data on its darknet portal. Third-party
  company: Xplain.'
