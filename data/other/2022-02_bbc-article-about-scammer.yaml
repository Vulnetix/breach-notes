source_name: '"Birmingham''s self-made crypto-millionaire giving back"'
source_url: https://web.archive.org/web/20220209102657/https://www.bbc.com/news/uk-england-birmingham-60289028
date_of_breach: '2022-02-09'
date_of_disclosure: '2022-02-09'
category: other
notes: The BBC featured an article on their homepage about Hanad Hassan, "a 20-year-old
  who made millions trading cryptocurrency [who] is set to open a food bank to give
  back to his community." They mentioned that "he and his friend ... set up a special
  cryptocurrency together, donating all the profits to charity." What the BBC failed
  to note was that the project, Orfano, was apparently a scam — after the project
  launched and received investments, the duo shut it down and took the money. The
  BBC took their article down without explanation shortly after publishing, though
  it is still accessible via the Internet Archive. The BBC had also originally announced
  that there would be a 30-minute feature on the man on their BBC One channel running
  later that day, but replaced it with a different segment.
