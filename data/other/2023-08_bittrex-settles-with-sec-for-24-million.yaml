source_name: '"Crypto Asset Trading Platform Bittrex and Former CEO to Settle SEC
  Charges for Operating an Unregistered Exchange, Broker, and Clearing Agency"'
source_url: https://www.sec.gov/news/press-release/2023-150
date_of_breach: '2023-08-10'
date_of_disclosure: '2023-08-10'
category: other
notes: The Bittrex crypto exchange was charged in April by the SEC for operating an
  unregistered exchange, broker, and clearing agency. In May, Bittrex filed for bankruptcy.
  Now, Bittrex has agreed to a $24 million fine to settle the charges from the SEC.
  If approved, Bittrex will have sixty days after filing a liquidation plan to pay
  the amount to the SEC — $18.4 million of which is disgorgement, plus a $5.6 million
  fine.
