notes: 'Matt Furie is the original creator of the Pepe the Frog cartoon that was later
  co-opted as an alt-right hate symbol, and which has also been popular among crypto
  enthusiasts and other online communities. Furie, his company Chain/Saw, and his
  DAO PegzDAO held an auction on October 8, 2021, and seemed to promise that the NFT
  would be one-of-a-kind: "500 cards issued, 400 burned, 99 will remain in the PegzDAO,
  and ONE is being auctioned here". Halston Thayer ended up winning the auction by
  bidding 150 ETH, then worth $537,084. However, on October 24, 46 of the 99 NFTs
  that were held by PegzDAO were distributed for free. According to a lawsuit filed
  by Thayer on March 12, 2022, releasing the 46 additional NFTs "significantly devalu[ed]
  Plaintiff''s Pepe NFT to less than $30,000". The lawsuit seeks reimbursement of
  Thayer''s original purchase, as well as punitive damages. Best of luck to the lawyers
  trying to describe "Rare Pepes" to a judge, or keep a straight face when saying
  that yes, the plaintiff did pay more than half a million for a drawing of a rather
  callipygian cartoon frog.'
