notes: "Cisco confirmed in August 2025 that it had been affected by the ShinyHunters Salesforce social engineering campaign. Exposed data included names, addresses, user IDs, email addresses, phone numbers, and account metadata for Cisco customers and partners. This is a separate incident from the April 2026 TeamPCP/Trivy supply chain attack that targeted Cisco's developer environment. Part of the broader 2025 Salesforce campaign affecting TransUnion (44M+), Air France-KLM, Pandora, Chanel, Stellantis, and Farmers Insurance."
