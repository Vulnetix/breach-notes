notes: 'The token associated with yet another crypto Pokémon rip-off, PokeMoney, suddenly
  crashed in price when around 11,800 BNB ($3.5 million) worth of it was pulled out
  of the project. The incident appeared to be a rug pull.The project creators claimed
  it was a hack, and stuck around to try to keep the hope alive. They claimed on Telegram
  that for some reason they couldn''t access the project Twitter account, and so couldn''t
  inform their community of the hack. They also began rallying their community around
  hopes for a project relaunch. Meanwhile, they announced a "CHAT MUTE UNTIL TOMORROW
  TO AVOID FUD" — as any reputable, not-rug-pulled project would do, I''m sure.


  Total loss estimated at $3,500,000.'
