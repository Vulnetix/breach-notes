notes: 'The G.O.A.T. ("Greatest of all Tokens") project claimed to be "the new standard in cryptocurrency", with vague claims
  that it would "add value by addressing scalability and risk management utilizing a broad range of strategies". Unfortunately
  for buyers, one risk they didn''t manage was that one of the project developers would suddenly sell off their holdings,
  making off with $260,000 while crashing the token price to nearly $0.The remaining project developers have tried to remain
  positive and restore faith in the community, accusing the developer who sold of "gluttony" and "greed". The project also
  implemented a steep 50% tax on remaining holders to discourage them from trying to sell.


  Total loss estimated at $260,956.'
