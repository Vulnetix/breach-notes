notes: The latest entry in "group launches NFTs, fans hate it" comes from the David Bowie estate, who decided that "Bowie
  on the Blockchain" would be a cool idea to raise money for charity.A tweet from OpenSea announcing the project received
  some positive replies, and a lot of other NFT projects trying to promote Bowie-themed NFTs they'd included in their collections.
  However, the tweet from David Bowie Twitter account seemed to be received almost universally negatively, with many commenters
  writing that they wished the estate would just raise money for charity without getting into NFTs, and others writing that
  they didn't think Bowie would have supported NFTs.On September 10, the account announced that "Out of respect for the people
  of the UK and Queen Elizabeth II, we will be postponing the 'Bowie on the Blockchain' sale. We will update soon."
