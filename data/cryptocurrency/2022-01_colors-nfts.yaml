notes: As the NFT gold rush continues and people attempt to slap price tags on everything in sight, Omar Farooq detailed his
  plans to sell colors on the blockchain. He said he will then build a platform where the "owner" of a color gets a cut of
  platform fees for any NFT using the color (or one close to it). He's offering 10,000 colors for sale at starting prices
  of $350 a pop, and then building an NFT platform where portions of the platform fees for any NFT sold will go to the "owners"
  of the closest colors in proportion to how much of the color is used in the image. Why artists would actually choose to
  buy or sell their artwork on the color-based platform is unclear — novelty value maybe? Its promised platform fee of 2.5%
  is the same as its popular competitors OpenSea and Rarible.
