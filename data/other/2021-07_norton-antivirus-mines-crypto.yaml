vendor_product: Norton Antivirus mines crypto
notes: Norton, the makers of the popular Norton Antivirus software, started installing "Norton Crypto" on customers' machines
  when they install the popular Norton 360 antivirus and malware protection software. It mines Ethereum, skimming 15% for
  Norton of course. They don't seem to mention that the energy costs incurred by crypto mining on a personal machine are likely
  to exceed any actual mining proceeds.
