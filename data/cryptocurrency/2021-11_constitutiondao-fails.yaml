source_name: '"Crypto collective raises $40 million to buy rare copy of U.S. Constitution"'
source_url: https://fortune.com/2021/11/18/constitutiondao-us-constitution-auction-sothebys-40-million/
date_of_breach: '2021-11-14'
date_of_disclosure: '2021-11-14'
category: cryptocurrency
vendor_product: ConstitutionDAO fails
blockchain: ethereum
notes: ConstitutionDAO emerged out of a Twitter joke, but ultimately raised more than $40 million to bid on an auction for
  a rare first printing of the U.S. Constitution. After being outbid by a hedge fund CEO, the group refunded all donations.
  However, there was enormous infighting over things like the possible value of the governance token (named $PEOPLE), and
  enormous gas fees taking up much of the money that people were supposed to be refunded. Ultimately, the DAO closed down
  without a single vote being cast.
