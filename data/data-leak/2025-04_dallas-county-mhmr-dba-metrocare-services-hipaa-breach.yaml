notes: 'Dallas County MHMR dba Metrocare Services (TX), a Healthcare Provider, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2025-04-03
  for a breach affecting 553 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Email, Network Server. Source: HHS OCR Breach Portal (HIPAA
  Breach Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches
  of unsecured protected health information (PHI) affecting 500 or more individuals.'
