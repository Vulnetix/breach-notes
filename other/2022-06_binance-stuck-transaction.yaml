source_name: '"Binance paused bitcoin withdrawals for several hours Monday due to a ''stuck transaction''"'
source_url: https://www.cnbc.com/2022/06/13/binance-pauses-bitcoin-withdrawals-as-crypto-sell-off-deepens.html
date_of_breach: '2022-06-13'
date_of_disclosure: '2022-06-13'
category: other
initial_attack_vector: Withdrawal halt / insolvency
vendor_product: Binance "stuck" transaction
blockchain: bitcoin
notes: Binance paused Bitcoin withdrawals for three hours on June 13, explaining that some network maintenance resulted in
  transactions becoming "stuck and not able to be processed successfully". Although founder and CEO Changpeng Zhao predicted
  the pause would only take thirty minutes, the issue took closer to three hours to resolve.I love it when I go to my bank
  to grab some cash from the ATM and discover that I can't, because someone else's cash clogged up the pipe.The pause occurred
  as Bitcoin was reaching record low prices not seen since 2020, contributing to the ongoing pattern of Binance suddenly pausing
  withdrawals or undergoing maintenance during periods of chaos in the crypto ecosystem.
