source_name: '"BitConnect Founder Indicted in Global $2.4 Billion Cryptocurrency Scheme"'
source_url: https://www.justice.gov/opa/pr/bitconnect-founder-indicted-global-24-billion-cryptocurrency-scheme
date_of_breach: '2022-02-25'
date_of_disclosure: '2022-02-25'
category: data-leak
notes: 'BitConnect founder, Satish Kumbhani, founded the Bitconnect "investment program"
  in 2016, which attracted investors with its impossibly high payouts. From then until
  its dramatic 2018 shutdown, Kumbhani and his team drew in around $2.4 billion from
  investors. The whole thing turned out to be a Ponzi scheme, as many had suspected,
  and Kumbhani now faces a long list of charges: "conspiracy to commit wire fraud,
  wire fraud, conspiracy to commit commodity price manipulation, operation of an unlicensed
  money transmitting business, and conspiracy to commit international money laundering".
  If convicted of all charges, Kumbhani faces up to 70 years in prison.'
