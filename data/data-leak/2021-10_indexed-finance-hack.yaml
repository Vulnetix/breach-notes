source_name: '"After ''Stealing'' $16M, This Teen Hacker Seems Intent on Testing ''Code Is Law'' in the Courts"'
source_url: https://www.coindesk.com/tech/2021/10/22/after-stealing-16m-this-teen-hacker-seems-intent-on-testing-code-is-law-in-the-courts/
date_of_breach: '2021-10-14'
date_of_disclosure: '2021-10-14'
category: data-leak
initial_attack_vector: Flash loan attack on smart contract
vendor_product: Indexed Finance
blockchain: ethereum
financial_loss_usd: 16000000
notes: 'A hacker drained $16 million from Indexed Finance, a defi protocol built on the Ethereum blockchain. The stolen funds
  represented nearly half of the total value locked on the platform. The hacker was later revealed to allegedly be an 18-year-old
  Canadian named Andy Medjedovic, who continued to refuse to return the funds even when his identity was revealed. The hacker
  argues that he simply took advantage of an arbitrage opportunity, and swore to "fight to the death" in court over his right
  to keep the money. However, the hacker never showed up to a December court appearance, and a warrant was issued for his
  arrest.


  Total loss estimated at $16,000,000.'
