notes: 'Healthcare software provider data breach impacts 2.7 million. ESO Solutions,
  a provider of software products for healthcare organizations and fire departments,
  disclosed that data belonging to 2.7 million patients has been compromised as a
  result of a ransomware attack. According to the notification, the intrusion occurred
  on September 28 and resulted in data being exfiltrated before the hackers encrypted
  a number of company systems. During the investigation of the incident, ESO Solutions
  discovered that the attackers accessed one machine that contained sensitive personal
  data. Third-party company: ESO Solutions, Inc..'
