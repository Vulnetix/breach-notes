category: "data-leak"
initial_attack_vector: "Attackers compromised the open-source security tool Trivy in a supply chain attack; a secret AWS API key associated with the European Commission's account was embedded in Trivy data and extracted by ShinyHunters, enabling access to the EC's AWS cloud environment"
cve: []
vendor_product: "Amazon Web Services; Trivy (open-source container scanner)"
