notes: 'A parts manufacturer for SpaceX and Tesla says it was hacked. Exclusive: The
  ransomware group have published some of the files stolen in the breach. A precision
  parts maker for space and defense contractors has confirmed a “cybersecurity incident,”
  which TechCrunch has learned was likely caused by ransomware. Visser Precision,
  a Denver, Colorado-based manufacturer, makes custom parts for a number of industries,
  including automotive and aeronautics. In a brief statement, the company confirmed
  it was “the recent target of a criminal cybersecurity incident, including access
  to or theft of data.”. Third-party company: Visser.'
