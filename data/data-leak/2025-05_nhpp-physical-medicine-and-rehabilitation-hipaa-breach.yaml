notes: 'NHPP Physical Medicine and Rehabilitation (NY), a Healthcare Provider, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2025-05-23
  for a breach affecting 1353 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Other. Source: HHS OCR Breach Portal (HIPAA Breach Notification
  Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected
  health information (PHI) affecting 500 or more individuals.'
