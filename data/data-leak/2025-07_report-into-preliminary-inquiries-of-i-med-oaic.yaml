notes: 'As artificial intelligence technologies advance and the practical and financial
  barriers to their adoption and diffusion reduce, many entities are grappling with
  legal and ethical questions. Although there is a live policy and regulatory debate
  about how the development and use of AI should be regulated, it is also clear that
  existing laws apply to AI technologies, and that regulated entities must ensure
  that their use of AI adheres to their legal obligations. As the country’s privacy
  regulator, the Office of the Australian Information Commissioner (OAIC) has been
  unequivocal that the Privacy Act 1988 (Cth) (Privacy Act) applies to the collection,
  use and disclosure of personal information to train AI models, just as it applies
