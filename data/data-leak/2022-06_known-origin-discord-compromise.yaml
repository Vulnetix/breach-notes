notes: The Discord server for Known Origin, a fairly major NFT platform, was compromised.
  The scammer used their access to advertise a fake free NFT mint, which actually
  would steal NFTs if a user tried to connect their wallet.This is the latest in a
  long string of Discord compromises. Other hacked servers in recent days included
  those for Curiosities, Meta Hunters, Parallel, Goat Society, RFTP, and Gooniez.
