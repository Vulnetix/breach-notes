notes: "Renault and Dacia UK disclosed in October 2025 that a third-party vendor had been compromised, exposing data for UK customers. Exposed information included customer names, gender, phone numbers, email addresses, postal addresses, and vehicle identification numbers (VINs). The breach was reported to the ICO. Renault/Dacia UK notified affected customers directly."
