source_name: '"Important Message to all Hodlnaut Users"'
source_url: https://www.hodlnaut.com/press/hodlnaut-message-to-our-users
date_of_breach: '2022-08-08'
date_of_disclosure: '2022-08-08'
category: other
notes: Crypto lending firm Hodlnaut announced they would be suspending withdrawals
  "due to recent market conditions". They also announced they would be withdrawing
  their license application with the Monetary Authority of Singapore, and that "Hodlnaut
  is therefore no longer providing regulated digital payment token (DPT) services,
  ie our token swap feature. For the avoidance of doubt, Hodlnaut will also cease
  all borrowing and lending services."In an FAQ attached to the announcement, Hodlnaut
  told users that "it will not be a short process" to re-enable withdrawals and token
  swaps.
