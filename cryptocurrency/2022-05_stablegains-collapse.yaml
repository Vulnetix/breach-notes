notes: 'A class action law firm sent a letter to the yield generation project Stablegains, demanding records on customer accounts,
  marketing and advertising strategies, and communications relating to the Terra stablecoin. Stablegains described itself
  as aiming to "make it simple and safe for everyone to benefit from advances in financial technology", and promised that
  "regardless if crypto markets are soaring or crashing, the value of assets under our management remains stable".Unfortunately
  for their customers, it turned out that Stablegains was heavily invested in the Terra project''s Anchor protocol, which
  collapsed along with the rest of the Terra ecosystem last week. Stablegains'' website had stated they primarily generated
  yields through the asset-backed stablecoin USDC. However, after the collapse of Terra, Stablegains admitted that "All users''
  holdings are in UST" — which lost over 90% of its value.


  Total loss estimated at $44,000,000.'
