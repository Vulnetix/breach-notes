initial_attack_vector: Regulatory / legal action
vendor_product: Crypto
financial_loss_usd: 73000000
notes: 'Two people were charged in California for laundering money obtained from cryptocurrency and fiat "pig butchering"
  scams. After receiving the money from the investment scammers, the launderers then allegedly helped to obfuscate at least
  $73 million in transactions by moving the money through Deltec Bank in The Bahamas and converting it into the Tether stablecoin.Deltec
  is a well-known bank in the cryptocurrency world, mostly for its ties to Tether and to FTX. In July 2023, US authorities
  seized tens of millions from Deltec accounts in connection to a cryptocurrency money laundering investigation. It''s not
  clear if that was the same investigation.


  Total loss estimated at $73,000,000.'
