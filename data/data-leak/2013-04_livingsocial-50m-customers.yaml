notes: "In late April 2013, LivingSocial (an online deals and local offers marketplace, then majority-owned by Amazon) suffered a cyberattack in which hackers accessed a database containing information for up to 50 million customers in the United States and other countries. LivingSocial disclosed the breach on April 26, 2013, and immediately expired all customer passwords, requiring users to create new ones. Exposed data included names, email addresses, dates of birth, and encrypted (hashed and salted) passwords. Financial data and payment card information were reportedly stored in a separate system and were not accessed. Countries outside the U.S. including Philippines, Indonesia, Thailand, and Malaysia were also affected. LivingSocial notified affected users by email and advised them to change passwords on any other sites where they used the same credentials. At 50 million records, the breach was one of the larger consumer data incidents up to that point in 2013. LivingSocial later declined as a business and was acquired and restructured multiple times; the breach did not directly cause its business difficulties but added to a difficult period for the company."
