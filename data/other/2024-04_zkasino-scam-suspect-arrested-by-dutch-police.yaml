source_name: '"More than 11 million euros seized and man arrested in investigation into gambling platform scam"'
source_url: https://www.fiod.nl/12-million-seized-and-arrested-in-investigation-into-gambling-platform-scam/
date_of_breach: '2024-04-29'
date_of_disclosure: '2024-04-29'
category: other
initial_attack_vector: Exit scam / rug pull
vendor_product: ZKasino
notes: In the wake of the $33 million ZKasino rug pull, Dutch police have arrested an as yet unnamed 26-year-old who is likely
  "Derivatives_Ape", the creator of the project. The police also seized assets estimated at more than €11.4 million (~US$12.3
  million) including real estate, a luxury car, and crypto. According to police, they began investigating the project only
  days earlier, after hearing reports of the rug pull on Twitter.
