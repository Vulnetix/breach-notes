vendor_product: CFTC subpoenas BitBoy's former company
notes: The CFTC has sent a subpoena to Hit Network, the crypto media company that was previously headed up by Ben "BitBoy"
  Armstrong until his rather public meltdown. According to The Block, the subpoena requested information about fifteen tokens,
  including the BitBoy-themed $BEN token, and the videos in which figures including BitBoy talked up their potential for price
  appreciation. The CFTC noted that the investigation was into a person who had engaged in crypto fraud.
