notes: 'A trader known as kirilm.eth fell victim to a phishing attack, losing over
  180 million BEAM tokens to a scammer. BEAM is a token belonging to the Beam blockchain
  gaming network, built by the Merit Circle DAO.The stolen tokens were notionally
  priced at around $5.14 million, although the sale of the stolen tokens resulted
  in a price drop that meant the attacker ultimately was only able to trade them for
  1,629 ETH (~$4.5 million). The BEAM price dropped around 10%.


  Total loss estimated at $4,500,000.'
