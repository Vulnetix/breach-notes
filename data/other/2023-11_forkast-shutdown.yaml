date_of_breach: '2023-11-30'
date_of_disclosure: '2023-11-30'
category: other
notes: The crypto media website Forkast has stopped publishing and laid off most of
  its editorial staff. The last post on the site is from November 22.After raising
  $1.7 million in seed funding in 2021, the site seems to have run out of runway.
  It merged with the CryptoSlam data aggregator in January 2023, but that apparently
  didn't help it sustain operations. The company appears to be trying to rebrand as
  "Forkast Labs", and is offering crypto data feeds.
