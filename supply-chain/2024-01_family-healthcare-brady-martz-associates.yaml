notes: 'Singing River Health System Confirms Ransomware Attack Affected 895,000 Patients.
  Singing River Health System has confirmed that 895,204 individuals were affected
  by an August 2023 ransomware attack. Data breaches have also been Singing River
  Health System has completed its file review and has confirmed that the PHI of 253,000
  patients was compromised in an August 2023 ransomware attack. Data breaches have
  also been reported by Highlands Oncology Group, Fincantieri Marine Group, Senior
  Scripts, and Family Healthcare. Singing River Health System in Mississippi experienced
  a ransomware attack in August 2023 that took its IT systems out of action for several
  days, including its electronic medical record system. Without access to patient
  data and essential IT systems, operations were disrupted, although care continued
  to be provided to patients throughout. The Rhysida ransomware group claimed responsibility
  for the attack. Third-party company: Brady Martz & Associates.'
