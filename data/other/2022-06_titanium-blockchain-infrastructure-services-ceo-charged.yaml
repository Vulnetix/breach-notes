source_name: '"Justice Department Announces Enforcement Action Charging Six Individuals
  with Cryptocurrency Fraud Offenses in Cases Involving Over $100 Million in Intended
  Losses"'
source_url: https://www.justice.gov/opa/pr/justice-department-announces-enforcement-action-charging-six-individuals-cryptocurrency-fraud
date_of_breach: '2022-06-30'
date_of_disclosure: '2022-06-30'
category: other
notes: The U.S. Department of Justice charged Michael Alan Stollery with securities
  fraud over his role as founder and CEO of Titanium Blockchain Infrastructure Services
  (TBIS). TBIS was a supposed cryptocurrency investment platform that launched an
  initial coin offering in 2018. The ICO drew in $21 million until the SEC obtained
  a court order to halt the offering on May 29, 2018.The DoJ alleges that Stollery
  falsified the TBIS whitepaper, wrote fake testimonials on the project website, and
  made up business relationships with the U.S. Federal Reserve Board and large companies
  including Apple, Pfizer, and Disney.If convicted on all counts, Stollery faces up
  to 20 years in prison.
