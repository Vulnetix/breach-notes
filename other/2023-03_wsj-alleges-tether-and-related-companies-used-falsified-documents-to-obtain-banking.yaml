source_name: '"Crypto Companies Behind Tether Used Falsified Documents and Shell Companies
  to Get Bank Accounts"'
source_url: https://www.wsj.com/articles/crypto-companies-behind-tether-used-falsified-documents-and-shell-companies-to-get-bank-accounts-f798b0a5
date_of_breach: '2023-03-03'
date_of_disclosure: '2023-03-03'
category: other
notes: A report from the Wall Street Journal made serious allegations against the
  stablecoin operator Tether, sister company Bitfinex, and the web of companies behind
  it. According to journalists, companies behind Tether "turned to shadowy intermediaries,
  falsified documents and shell companies to get back in" to the global banking system
  in late 2018, after a series of governmental actions cut them and their banking
  partners off from the financial system.Among other allegations, the WSJ outlined
  how Tether was repeatedly denied accounts at New York's Signature Bank, and so ultimately
  got an executive at an aviation fuel broker called AML Global to open an account
  that appeared to be used to fraudulently process transactions on behalf of Tether
  and Bitfinex.Tether is the largest stablecoin in circulation, though its entire
  existence has been marred by questions around its legitimacy and the status of its
  claimed reserves.
