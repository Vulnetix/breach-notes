source_name: '"Staking Protocol Bug Let Users Swap One Bitcoin for One Ethereum"'
source_url: https://decrypt.co/283440/staking-protocol-bug-let-users-swap-one-bitcoin-for-one-ethereum
date_of_breach: '2024-09-27'
date_of_disclosure: '2024-09-27'
category: data-leak
notes: 'A staking platform called Bedrock lost around $2 million after exploiters
  discovered a bug that allowed them to swap 1 ETH for 1 BTC despite the more than
  $63,000 difference in prices for the two assets.A security firm working with Bedrock
  had tried to warn Bedrock of the vulnerability several hours before the attack,
  but the team was asleep. The vulnerable contracts had been deployed a day and a
  half prior to the attack, and had not been audited.Fortunately for Bedrock, security
  groups were able to pause third-party projects surrounding Bedrock, which helped
  to limit the losses — which ultimately could have been as high as the entire value
  of funds on the protocol.


  Total loss estimated at $2,000,000.'
