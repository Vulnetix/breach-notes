notes: Claiming that they had no exposure to the various high profile collapses in
  the crypto industry lately, CoinLoan announced that they nevertheless would be reducing
  account withdrawal limits as they anticipated liquidity issues. They announced that
  users could only withdraw up to $5,000 a day, a change from the previous $500,000/day
  limit. CoinLoan tried to reassure customers that "rest assured that your assets
  are safe" — a statement that has also been made by various other crypto platforms
  recently, shortly before they announced insolvency.Apparently forgetting the industry
  they're in, CoinLoan also wrote that their "strategy bars risky activities that
  could endanger CoinLoaners' funds".
