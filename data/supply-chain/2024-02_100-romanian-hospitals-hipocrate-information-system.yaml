notes: 'Ransomware attack forces 100 Romanian hospitals to go offline. 100 hospitals
  across Romania have taken their systems offline after a ransomware attack hit their
  healthcare management system. Update: The article and title have been revised to
  reflect the increasing number of impacted hospitals. The Hipocrate Information System
  (HIS) used by hospitals to manage medical activity and patient data was targeted
  over the weekend and is now offline after its database was encrypted. Third-party
  company: Hipocrate Information System (HIS).'
