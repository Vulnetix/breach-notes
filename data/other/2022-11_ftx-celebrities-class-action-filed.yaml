notes: 'A class action lawsuit has been filed against Sam Bankman-Fried and a slew
  of celebrities who helped to promote FTX as a safe place to hold and trade crypto.
  Defendants include Tom Brady, Gisele Bündchen, Steph

  Curry, Shaquille O''Neal, David Ortiz, Naomi Osaka, and Larry David.The suit alleges
  that the celebrities violated the anti-touting provisions of securities laws by
  failing to disclose the nature, scope, and amount they were compensated to promote
  the platform.'
