notes: MU Health reports data breach. University of Missouri Health Care said Thursday
  that it has notified patients affected by a September data breach. The organization
  said in a news release that it finished those notifications May 5. The stolen information
  might have included names, birth dates, medical record numbers, health insurance
  information and "limited treatment and/or clinical information," according to the
  release. Some patients' Social Security numbers were also compromised, MU Health
  said.
