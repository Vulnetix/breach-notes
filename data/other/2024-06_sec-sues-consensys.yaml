notes: As expected, the SEC has filed a lawsuit against Consensys, the maker of the popular MetaMask cryptocurrency wallet.
  Although Consensys had recently gloated about the SEC completing an investigation into the company's offering of ETH, and
  determining not to pursue action over it, a Wells notice sent to the firm in April suggested that some legal action was
  impending. Shortly afterwards, Consensys filed a lawsuit against the SEC, alleging regulatory overreach.The SEC's lawsuit
  claims that Consensys violated securities laws by acting as an unregistered securities broker, and by offering staking services
  that constituted unregistered securities offerings. The SEC has previously cracked down on staking offerings by other firms,
  including Coinbase and Kraken.
