source_name: '"Nelson Mandela paintings of life in prison to be sold as NFTs"'
source_url: https://www.theguardian.com/world/2022/feb/25/nelson-mandela-paintings-of-life-in-prison-to-be-sold-as-nfts
date_of_breach: '2022-02-25'
date_of_disclosure: '2022-02-25'
category: cryptocurrency
vendor_product: Nelson Mandela NFT announcement
blockchain: ethereum
notes: The Guardian reported that five watercolor paintings created by former South African president Nelson Mandela depicting
  scenes from his years of incarceration will be sold as NFTs next month, as well as a handwritten description of why he created
  the artwork. His daughter is the one behind the project, and she says that "My dad was all about creating an accessible
  society. This is a way of democratising his art." She does not explain why there is a need to sell them as NFTs in order
  to accomplish this, or why this makes them more accessible than them already being available to view online. She also doesn't
  explain how pricing them at $3,500 for a set including one of each, or $700 apiece, can be considered "accessible".
