date_of_breach: '2024-07-10'
date_of_disclosure: '2024-07-10'
category: other
notes: 'BitMEX has pleaded guilty to charges from 2020 that they violated the Bank
  Secrecy Act by failing to implement an appropriate anti-money laundering program.
  BitMex''s founders, Arthur Hayes and Benjamin Delo, had previously pleaded guilty
  in 2022. Another former executive pleaded guilty to the same later that year.By
  delaying the proceedings for several years, BitMEX was able to downplay the result,
  writing: "The BSA charge is old news – this is the same charge brought in 2020 against
  our founders relating to BitMEX’s operations up to September 2020."'
