initial_attack_vector: Regulatory / legal action
vendor_product: Cred executives indicted
notes: The former CEO, CFO, and CCO of the cryptocurrency lending service Cred have been indicted on multiple charges involving
  wire fraud and money laundering. They were charged in connection with their operation of the Cred platform, which went bankrupt
  in November 2020 after hiding its insolvency for several months.Cred had claimed to customers that they engaged in only
  "collateralized or guaranteed lending",  hedged their investments, and "comprehensive insurance", but hid that "virtually
  all the assets to pay the yield were generated by a single company whose business was to make unsecured micro-loans to Chinese
  gamers." Furthermore, they did engage in uncollateralized lending, did not hedge their investments, and did not hold insurance
  as they had claimed.Around $150 million in customer funds were lost in the collapse based on prices at the time, though
  those crypto assets would have been priced substantially higher at various times since.
