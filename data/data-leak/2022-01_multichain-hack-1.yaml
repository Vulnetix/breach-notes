notes: 'Multichain publicly announced a vulnerability that was affecting their tokens, without first notifying users to ask
  them to remove vulnerable funds. Several hackers quickly exploited the vulnerability, stealing around $3 million from the
  platform. Security researchers described the saga as "the worst way to treat a vulnerability".


  Total loss estimated at $3,000,000.'
