notes: "Texas-based third-party insurance administrator Landmark Admin (serving American Monumental Life, Pellerin Life, Liberty Bankers Life, Capitol Life, and others) detected a ransomware attack on 13 May 2024. Attackers had access from May 13 through June 17, 2024. Initially disclosed as affecting 806,000; updated to 1.6 million individuals. Exposed data included SSNs, driver's license/passport numbers, financial account information, and medical/insurance data. Class action settled for $6 million."
