source_name: '"Crypto Scammers Edited 10 Years of Facebook Posts to Appear Legit"'
source_url: https://www.snopes.com/news/2022/03/09/rosenberg-crypto-scam/
date_of_breach: '2022-03-11'
date_of_disclosure: '2022-03-11'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Facebook crypto
blockchain: bitcoin
financial_loss_usd: 143584
notes: 'A Facebook profile impersonating an economist named David Rosenberg was discovered by Snopes to have drawn in around
  3.4 Bitcoin in deposits, ostensibly from victims who were convinced they were investing with the actual Rosenberg. The fake
  Rosenberg profile, and others associated with it, posted about how he had reportedly helped them get out of debt or make
  a lot of money. The scammer''s account was originally created in 2012, and when it began to be used in 2021 for the crypto
  scam, the operators edited old posts to make it appear that the "investment" operation had been going on for multiple years.
  Facebook banned the account shortly after Snopes published its report.


  Total loss estimated at $143,584.'
