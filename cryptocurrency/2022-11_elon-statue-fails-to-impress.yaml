notes: A shitcoin project desperate for the kind of pump that sometimes occurs when Elon Musk tweets about a cryptocurrency
  has gone to new lengths to get his attention. The group spent $600,000 and six months on a six-ton statue that's supposed
  to be Elon Musk's head on a rocket ship, but looks rather like a giant Elon Musk caterpillar.The group then delivered the
  sculpture to Tesla HQ in Austin, Texas, and is reportedly refusing to leave until he accepts the statue. Unfortunately he
  may be too busy burning Twitter to the ground to have noticed.Despite receiving press coverage in outlets including the
  Wall Street Journal, Fox Business, and USA Today, the project has as of yet failed to achieve much of a pump, and the token
  is trading around where it was several months ago. I've not named the token here in the hopes of not contributing to the
  goals of their viral marketing stunt.
