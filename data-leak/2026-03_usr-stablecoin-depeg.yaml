source_name: '"Resolv Labs’ stablecoin depegs as attacker mints millions of tokens"'
source_url: https://cointelegraph.com/news/resolv-labs-stablecoin-depegs-attacker-mints-millions-of-tokens
date_of_breach: '2026-03-22'
date_of_disclosure: '2026-03-22'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: USR stablecoin depeg
financial_loss_usd: 24000000
notes: 'The Resolv USD stablecoin, also known as USR, lost its intended dollar peg and dropped to around $0.14 after an exploiter
  was able to mint and sell tens of millions of unbacked tokens. USR is an asset-backed stablecoin that uses cryptoassets
  like bitcoin, ETH, and other stablecoins as collateral.An exploiter took advantage of a flaw in USR''s minting code to create
  tens of millions of USR tokens without depositing any assets to back them. The attacker then sold the unbacked USR, crashing
  the stablecoin''s price to as low as $0.14. The attacker has profited at least 11,400 ETH (~$24 million), though they are
  still selling.Some defi protocols paused USR-exposed strategies to avoid downstream impacts. Resolv issued a statement that
  the token''s collateral pool was unaffected, though this is likely little comfort for those who purchased the unbacked USR.


  Total loss estimated at $24,000,000.'
