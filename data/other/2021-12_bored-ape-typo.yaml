source_name: '"Bored Ape NFT accidentally sells for $3,000 instead of $300,000"'
source_url: https://www.bbc.com/news/technology-59638565
date_of_breach: '2021-12-13'
date_of_disclosure: '2021-12-13'
category: other
vendor_product: Bored Ape typo
blockchain: ethereum
financial_loss_usd: 297000
notes: 'An NFT trader made a typing error when entering a listing price, accidentally listing his Bored Ape NFT for 0.75 ETH
  (about $3,000) instead of 75 ETH (about $300,000). The NFT was instantly bought by a bot account. The BBC writes, "In traditional
  banking transactions, such errors are usually reversed easily if the bank facilitating them is told about the mistake quickly.
  But in the unregulated crypto-trading market, there is usually no way to reverse such a sale."


  Total loss estimated at $297,000.'
