category: other
initial_attack_vector: Regulatory / legal action
vendor_product: Treasury Department introduces proposal targeting crypto mixers
notes: The U.S. Treasury Department introduced a proposal for new regulation that would require cryptocurrency mixers (also
  called tumblers) to up their recordkeeping and reporting processes. Needless to say, for a class of projects intended to
  help people anonymize their cryptocurrency transactions and make them more challenging for governments and others to track,
  this would somewhat undermine the whole point.That seems to be the intention of the Treasury Department, who described mixers
  as primarily used for illicit money laundering "by a broad range of illicit actors, including state-affiliated cyber actors,
  cyber criminals, and terrorist groups".
