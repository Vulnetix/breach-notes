notes: Conservationist and wildlife photographer George Benjamin tweeted about his new project, "The NFT Conservation Fund".
  "Over the last decade I've seen first-hand the devastation that our Earth is currently enduring, oftentimes feeling completely
  helpless," he writes. The project involves minting NFTs of his wildlife photography on the notoriously high-emissions Ethereum
  blockchain, and then contributing a measly 15% of profits to... get more wildlife photographers to do the same. Good news,
  though — the paper on which the limited-edition prints will be printed is "Forest Stewardship Council-approved"!
