notes: 'OKC Police rape kit info exposed in data breach of DNA contractor. The DNA
  and personal information of past sexual assault victims were a part of a data breach
  by a contractor of the Okla City Police Dept. OKLAHOMA CITY ( Free Press ) — Victims
  of past sexual assault who had their DNA collected in a rape kit by the Oklahoma
  City Police Department now face yet more uncertainty because of a data breach. Rape
  kits are used to collect DNA evidence by law enforcement agencies for sexual assault
  investigations. Third-party company: DNA Solutions Inc..'
