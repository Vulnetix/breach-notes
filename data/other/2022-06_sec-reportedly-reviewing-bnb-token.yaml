source_name: '"US Probes Binance Over Token That Is Now World’s Fifth Largest"'
source_url: https://www.bloomberg.com/news/articles/2022-06-06/us-probes-binance-over-token-that-is-now-world-s-fifth-largest
date_of_breach: '2022-06-06'
date_of_disclosure: '2022-06-06'
category: other
notes: The same day that Reuters released an investigation implicating Binance in
  helping to launder billions of dollars of illicit funds, Bloomberg reported that
  the U.S. Securities and Exchange Commission had opened an investigation into whether
  Binance had broken securities laws when they launched their BNB initial coin offering.
  Bloomberg based its reports on conversations with anonymous sources, as the SEC
  has not publicly disclosed the existence of such a probe into Binance.
