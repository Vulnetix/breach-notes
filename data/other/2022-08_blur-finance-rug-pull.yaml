notes: 'The yield aggregator Blur Finance rug pulled, taking more than $600,000 in
  assets from the BNB Chain and Polygon-based projects before deleting their website
  and social media accounts. The project had only been active for about a month, and
  had accumulated about 750 users on its original BNB Chain implementation, and on
  August 5 had announced their launch on Polygon. In the announcement, they boasted
  returns of over 4,000% APR.


  Total loss estimated at $600,000.'
