category: cryptocurrency
initial_attack_vector: Exit scam / rug pull
vendor_product: Balloonsville
blockchain: solana
financial_loss_usd: 590000
notes: 'On January 9, the team behind an NFT project called Doodled Dragons made off with $30,000 and wrote that the charity
  to which they''d promised to donate "will instead now be... my bank account". A month later, the same team rug pulled again
  with a project called "Balloonsville", this time netting 5,000 SOL (about $590,000). The project had been listed as a "Featured
  project" on the Magic Eden NFT platform, a popular Solana marketplace. Before deleting their Twitter account, the Balloonsville
  project posted a series of tweets, including one that read, "all it took was a couple of paid actors, and boom. we did it
  again. y''all really believe anything nowadays. Magic Eden NFT refund everyone we scammed cause you were too stupid to ask
  for ID which could''ve easily shown we were a rug - doodled dragons". The Magic Eden NFT platform did indeed subsequently
  announce that they would stop allowing anonymous projects to use their platform. The platform also refunded users who sold
  their Balloon NFTs below the original mint price, though not the users who bought after the mint and later sold at a loss.


  Total loss estimated at $590,000.'
