source_name: '"MailerLite confirms hack that led to $3.3M crypto-phishing email attacks"'
source_url: https://cointelegraph.com/news/mailerlite-confirms-hack-crypto-phishing-email-3m-attacks
date_of_breach: '2024-01-23'
date_of_disclosure: '2024-01-23'
category: data-leak
notes: 'After hackers gained access to various accounts on the MailerLite email marketing
  software via a social engineering attack on an employee, they were able to send
  malicious phishing emails that appeared as though they had been genuinely sent from
  companies including the CoinTelegraph crypto media outlet and the crypto firms Wallet
  Connect, Token Terminal, SocialFi, and De.Fi.The emails appeared to announce airdrops
  and exclusive offers from those companies, and recipients were invited to connect
  their wallets to claim tokens. Those wallets were then drained.The attackers stole
  a variety of cryptocurrencies, and some outlets have reported the theft has totalled
  more than $3.3 million. However, because a substantial amount of that number comes
  from the illiquid Xbanking token, the actual liquid value of the tokens is likely
  closer to $700,000. The attackers have begun mixing the stolen funds through the
  Railgun privacy service.


  Total loss estimated at $700,000.'
