notes: 'In January of 2023, CommuteAir suffered a breach that exposed the US Department
  of Homeland Security&rsquo;s &ldquo;No Fly&rdquo; and Selective Screening lists
  containing over 1.5 million records, along with CommuteAir employee information.
  The attacker found an exposed Jenkins server and was able to access different build
  workspaces containing repositories for the build jobs. On the Jenkins server, the
  attacker found access keys that offered access to the CommuteAir environment. After
  investigating the AWS Infrastructure, the attacker found the No Fly List among test
  data on the Jenkins server.


  Sourced from breaches.cloud'
