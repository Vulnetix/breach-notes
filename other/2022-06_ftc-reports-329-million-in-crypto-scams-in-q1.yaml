source_name: '"Reports show scammers cashing in on crypto craze"'
source_url: https://www.ftc.gov/news-events/data-visualizations/data-spotlight/2022/06/reports-show-scammers-cashing-crypto-craze
date_of_breach: '2022-06-03'
date_of_disclosure: '2022-06-03'
category: other
notes: 'The U.S. Federal Trade Commission (FTC) reported that "Although it''s yet
  to become a mainstream payment method, reports to the FTC show [crypto is] an alarmingly
  common method for scammers to get peoples'' money." They found that consumers have
  reported $329 million in fraud only in the first quarter of 2022: already half as
  much as was lost in the entire prior year.The report also detailed that 25% of the
  monetary amount lost to fraud since the beginning of 2021 was lost via cryptocurrency,
  and that the median individual loss was around $2,600. Most of the crypto scams
  were investment frauds, followed by romance scammers and business and government
  impersonators.'
