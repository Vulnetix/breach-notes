notes: 'Weekend Health, LLC (NY), a Business Associate, submitted a HIPAA breach notification
  to the HHS Office for Civil Rights (OCR) on 2025-09-30 for a breach affecting 1643
  individuals. Breach type: Unauthorized Access/Disclosure. Information location:
  Network Server. This was reported by a Business Associate on behalf of a covered
  entity. Source: HHS OCR Breach Portal (HIPAA Breach Notification Rule, 45 CFR §164.400–414).
  The OCR portal lists all breaches of unsecured protected health information (PHI)
  affecting 500 or more individuals.'
