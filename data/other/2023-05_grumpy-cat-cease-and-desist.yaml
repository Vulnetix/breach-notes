notes: A Grumpy Cat Coin memecoin emerged in May, with a website using illustrations
  of the late real-life Grumpy Cat to promote the coin. Crypto influencers, including
  the "SlumDoge Millionaire", jumped on board to promote the token. (The "SlumDoge
  Millionaire" is Glauber Contessoto, a person who briefly became a paper millionaire
  from, as he claims, emptying his bank account, selling all his stocks, and maxing
  out credit cards to buy 5 million Dogecoin during the 2021 crypto frenzy. His holdings
  spiked to over $1 million in value, but he didn't cash out; they are now priced
  at around $365,000.)However, Grumpy Cat's owner owns trademarks associated with
  Grumpy Cat, and it seems she has become aware of the coin. On May 18, she minted
  an NFT and transferred it to the Grumpy Cat Coin deployer address. The NFT image
  is a copy of a cease and desist letter representing Grumpy Cat Limited. The letter
  describes the coin offering as a "blatant and willful infringement of our client's
  trademark rights", and insists that the coin creators stop all activities related
  to the coin offering or face legal action. The letter also mentioned that the URL
  of the project website — grumpycat.fyi — was a violation of the Anti-Cybersquatting
  Consumer Protection Act. The project subsequently changed its domain to gccoin.fyi
  in an apparent effort to avoid this issue.Simultaneously, a message addressed to
  holders of the Grumpy Cat Coin was posted to Grumpy Cat's Twitter account, describing
  the token as a "desperate, sad attempt to scam unwitting traders" by "SlumDoge Millionaire
  and their cohorts".
