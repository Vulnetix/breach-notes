notes: 'A person or group have raised funds for various crypto projects only to abandon them, empty the project wallets, and
  launder the funds through Tornado Cash. The largest of the projects was called "MuskSwap", which proclaimed: "$MUSK &amp;
  MuskSwap was born to show admiration to elon musk''s super projects like solarcity, tesla, space x and his constant influence
  on the world finance &amp; the crypto market."The project described itself as a DEX with a native $MUSK token, and launched
  in July 2021. However, the token tanked on December 25, 2021. Although the project team tried to blame the crash on "liquidity
  issues" and promised paths forward, they locked the project Telegram chat on March 11, 2022. On April 5, 2022, the team
  withdrew remaining funds and deleted the website.Crypto analysis firm CertiK linked the MuskSwap project to several other
  scam tokens and projects: RocketDoge, InfinityGame, SpaceX, MUFC (themed after Manchester United), and Elona Musk. Altogether,
  the rug pulls have drawn in $5.1 million.


  Total loss estimated at $5,100,000.'
