source_name: '"Justice Department Announces Enforcement Action Charging Six Individuals
  with Cryptocurrency Fraud Offenses in Cases Involving Over $100 Million in Intended
  Losses"'
source_url: https://www.justice.gov/opa/pr/justice-department-announces-enforcement-action-charging-six-individuals-cryptocurrency-fraud
date_of_breach: '2022-06-30'
date_of_disclosure: '2022-06-30'
category: other
notes: The U.S. Department of Justice announced charges against Le Anh Tuan, who was
  one of the individuals behind the "Baller Ape" NFT rug pull in October 2021. According
  to the DoJ, Tuan and his partners made off with $2.6 million of investor funds through
  the Baller Ape NFT project. He was charged with one count of conspiracy to commit
  wire fraud and one count of conspiracy to commit international money laundering,
  and faces up to 40 years in prison if convicted of all counts.The people behind
  the Baller Ape NFT project were also reportedly behind at least two other NFT rug
  pulls, including "Big Daddy Ape Club". These projects were not mentioned in the
  DoJ press release.
