notes: 'Californian Hospitals Continue to be Disrupted by Thanksgiving Ransomware
  Attacks. Over Thanksgiving weekend, Watsonville Community Hospital and PIH Health
  in California fell victim to ransomware attacks and continue to experience Watsonville
  Community Hospital and PIH Health in California are recovering from Thanksgiving
  weekend ransomware attacks. Jefferson Dental Center in Indiana has confirmed it
  has recovered from a November 15, 2024 ransomware attack. Watsonville Community
  Hospital in California is currently dealing with a cyberattack and is facing continued
  disruption to its computer systems. The hospital has implemented downtime protocols
  due to computer systems being unavailable and is recording patient information manually
  on charts and issuing paper prescriptions while its IT team and third-party IT specialists
  work to restore its computer systems. Third-party company: PIH Health.'
