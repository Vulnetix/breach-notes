notes: Stephanie Matto, who starred on season 6 of the reality show 90 Day Fiancé, has turned to some weird moneymaking schemes
  following her TV career. For a time, she claims she was making more than $50,000 a week selling "farts in a jar" for $1,000
  each — until she was hospitalized for a health scare after a particularly fiber-heavy meal. She now is trying to sell her
  farts as "digital artworks on the blockchain" for a bit under $200 each, sans any physical component. At least you got a
  jar for your money before.
