notes: 'On 11 February 2013, the Office of the Australian Information Commissioner
  (OAIC) opened an own motion investigation into Multicard Pty Ltd (Multicard). This
  was in response to information received from the Office of Transport Security (OTS)
  that personal information of a large number of Multicard applicants was publicly
  accessible online. The Commissioner’s investigation focused on whether Multicard
  took reasonable steps to protect customer information from misuse and loss and from
  unauthorised access, modification or disclosure. [1] After considering the facts
  of the case, submissions from Multicard and the relevant provisions of the Privacy
  Act 1988 (Cth) (Privacy Act), the Commissioner came to the view that Multicard had
