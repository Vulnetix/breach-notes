notes: 'Hackers drained more than $10 million from the project Dego Finance. This
  also plunged the value of the project''s $DEGO token by about 78%. Dego claims that
  the hackers compromised the keys to the address providing liquidity on UniSwap and
  PancakeSwap. Dego, which is a decentralized finance project, asked the various major
  exchanges to step in and prevent trading of the token, a type of intervention by
  centralized exchanges that is precisely what defi is supposed to prevent from happening.


  Total loss estimated at $10,000,000.'
