initial_attack_vector: Regulatory / legal action
vendor_product: Poloniex OFAC settlement
notes: A US entity that previously controlled the Poloniex crypto exchange has agreed to pay a $7.6 million fine to settle
  allegations that it violated US sanctions against Crimea, Cuba, Iran, Sudan, and Syria. The U.S. Treasury Department's Office
  of Foreign Assets Control (OFAC) alleges that between January 2014 and November 2019, Poloniex allowed citizens in those
  jurisdictions to use the platform, despite knowing their locations thanks to KYC and IP address information. OFAC alleges
  that there were nearly 66,000 apparent sanctions violations, which amounted to more than $15 million in transactions.Poloniex
  was a US-based crypto exchange founded in 2014, which in 2018 was purchased by Circle, who intended to get rid of the illegal
  activity for which it was known. However, when they discovered that the customers who used Poloniex no longer wanted to
  use it once they were subjected to scrutiny, they sold the platform to Justin Sun in late 2019, who relocated it to the
  Seychelles and shut down US operations. It appears that the OFAC fine will apply to the US entity most recently controlled
  by Circle, and not to Justin Sun's operation.In August 2021, Poloniex also paid more than $10.3 million to settle allegations
  from the U.S. Securities and Exchange Commission that it had operated as an unlicensed exchange.
