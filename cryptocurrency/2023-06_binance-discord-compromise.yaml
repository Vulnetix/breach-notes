notes: 'Adding insult to injury in Binance''s tough couple of days, someone has managed to hijack the Discord vanity URL used
  by BNB Chain, the blockchain project associated with Binance. The scammers created a fake Discord channel where they have
  posted a message: "In order to curb the reactionary market''s response to patently false SEC accusations, we are hosting
  a $BNB airdrop on BSC to show our faith in our technology and community!" The scammers urged members to connect their crypto
  wallets, ostensibly to receive their share of the roughly 100,000 BNB (nearly $30 million) the scammers claimed they''d
  allocated to the giveaway.After this was brought to BNB Chain''s attention by crypto sleuth zachxbt, they tweeted that they
  "acted quickly (within 10 minutes) to ban the offending accounts and remove the posts. We''ve taken steps to secure the
  server and protect against any further abuse." However, less than an hour later they put out a new tweet announcing that
  the URL had been hijacked to redirect to a new server."This is a scam, and if you connect your wallet, you will lose your
  funds. Please exercise caution until we are able to confirm a resolution", they wrote.'
