source_name: '"A Frida Kahlo Drawing Was Destroyed to Make NFTs"'
source_url: https://www.vice.com/en/article/aken7k/rida-kahlo-nft-mexico
date_of_breach: '2022-09-28'
date_of_disclosure: '2022-09-28'
category: cryptocurrency
vendor_product: Collector claims to burn Frida Kahlo drawing
blockchain: ethereum
notes: A businessman has published a video in which he burns a drawing that he claims is an original Frida Kahlo drawing worth
  more than $10 million — though its value and its authenticity have both been questioned. The entrepreneur created 10,000
  NFTs from the drawing, which he's selling for 3 ETH (~$4,000) (reduced from the original 3.5 ETH/$4,700) for a hoped total
  of $40 million. He claims that in burning the artwork, he has "transitioned [it] into the Metaverse".So far, the stunt has
  resulted in two NFTs being minted by outside parties, for total proceeds of 7 ETH (~$9,400) —  not quite the millions the
  drawing allegedly cost the NFT project creator. Meanwhile, Mexican authorities have said they are investigating whether
  the businessman committed a crime in intentionally damaging an artistic monument.
