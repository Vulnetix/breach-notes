source_name: '"Donald Trump Unveils New ''Mugshot'' NFTs, Stirring Up Prices for His
  Previous NFTs"'
source_url: https://www.coindesk.com/markets/2023/12/12/donald-trump-unveils-new-mugshot-nfts-stirring-up-prices-for-his-previous-nfts/
date_of_breach: '2023-12-12'
date_of_disclosure: '2023-12-12'
category: other
notes: The collapse of the NFT bubble hasn't stopped Donald Trump from trying to cash
  out. Following in the footsteps of his wife, who timed things much better as far
  as interest in NFTs goes, the former president launched his first NFT collection
  in December 2022. He was later accused of using stolen artwork in the collection.Now,
  Trump is hawking a new set of $99 NFTs, featuring the August 2023 mugshot taken
  in connection to his ongoing racketeering lawsuit. Those who purchase 47 of the
  NFTs — amounting to $4,653 plus fees — are promised a scrap of the suit Trump wore
  in the mugshot and a dinner with the president-turned-fulltime criminal defendant.The
  fine print, however, reserves the possibility that neither promise will come through.
