notes: 'The Garden bitcoin bridge suffered a roughly $11 million loss after one of its solvers was compromised. These solvers
  essentially act as market makers for the protocol. Some blockchain sleuths have questioned whether the affected solver,
  which Garden described as a separate entity, may actually be operated by the same team as Garden.There wasn''t much sympathy
  to be had for Garden after this exploit. The protocol had recently announced hitting a milestone of bridging more than $2
  billion in assets, but the celebration was criticized after zachxbt pointed out that a substantial portion of the bridged
  funds were proceeds of crimes being laundered to evade detection and recovery.


  Total loss estimated at $11,000,000.'
