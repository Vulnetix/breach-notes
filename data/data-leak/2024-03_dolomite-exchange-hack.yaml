source_name: '"Old Dolomite exchange contract suffers $1.8M loss from approval exploit"'
source_url: https://cointelegraph.com/news/old-dolomite-exchange-contract-suffers-1-8-million-loss-from-approval-exploit
date_of_breach: '2024-03-20'
date_of_disclosure: '2024-03-20'
category: data-leak
notes: 'The Dolomite DEX suffered a $1.8 million theft as an exploiter was able to
  take advantage of a vulnerability in a smart contract that had been deployed in
  2019. Although most contemporary users of the exchange use a version deployed on
  the Arbitrum layer-2 network, the old contracts were still usable on Ethereum.An
  attacker apparently discovered a reentrancy bug allowing them to drain user funds
  from those who had approved the old contract. Altogether, around $1.8 million was
  taken before the team disabled the contract. The attacker quickly tumbled the stolen
  funds through Tornado Cash.


  Total loss estimated at $1,800,000.'
