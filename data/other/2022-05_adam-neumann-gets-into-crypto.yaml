notes: Adam and Rebekah Neumann, the duo behind the WeWork coworking space company
  that imploded spectacularly in 2019, have re-emerged to start a company called Flowcarbon.
  The company intends to "tokenize carbon credits" — which they're calling "Goddess
  Nature Tokens" — and sell them to companies hoping to green up their image. The
  need for a blockchain is unclear.The company has already raised $70 million in token
  sales and a Series A funding round led by Andreessen Horowitz (aka a16z), which
  seems like a startling amount of money to give to someone who resigned from his
  previous company amidst accusations of some serious self-dealing and the creation
  of toxic corporate culture.
