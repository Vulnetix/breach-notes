initial_attack_vector: Regulatory / legal action
vendor_product: Coinbase provides ICE with analytics tools
notes: A Freedom of Information Act request has revealed an August 2021 contract between U.S. crypto company Coinbase and
  U.S. Immigrations and Customs Enforcement (ICE). The contract shows that Coinbase is providing ICE with access to their
  "Coinbase Tracer" intelligence-gathering tool, which is used to trace blockchain transactions and thwart laundering of funds
  through crypto tumblers.Cryptocurrency has long been touted as a tool for the unbanked, including those who don't have access
  to banking because they're undocumented, and for people hoping to operate free from government observation. Coinbase, however,
  has actively courted government contracts such as this one, which has not won them favor among the more libertarian-leaning
  crypto enthusiasts.
