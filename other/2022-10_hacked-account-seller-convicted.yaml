source_name: '"Non-Payment of Federal Income Tax on Cryptocurrency Earnings Leads
  to Conviction for South Florida Resident"'
source_url: https://www.justice.gov/usao-sdfl/pr/non-payment-federal-income-tax-cryptocurrency-earnings-leads-conviction-south-florida
date_of_breach: '2022-10-03'
date_of_disclosure: '2022-10-03'
category: other
notes: A Floridian who was in the business of buying and selling hacked account logins
  on the dark web was busted for attempted income tax evasion when he tried to hide
  more than $1 million in crypto earnings from the IRS in 2014–2017. Despite using
  services like cryptocurrency mixers (or "tumblers"), the man was unable to successfully
  hide the money from the IRS. He faces up to five years in prison for the tax fraud.
  Remember, folks, always make sure to report your ill-gotten profits to the IRS!
