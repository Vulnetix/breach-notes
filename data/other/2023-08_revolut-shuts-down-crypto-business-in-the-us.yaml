source_name: '"Revolut to stop crypto services for U.S. customers"'
source_url: https://www.reuters.com/technology/revolut-stop-crypto-services-us-customers-2023-08-04/
date_of_breach: '2023-08-04'
date_of_disclosure: '2023-08-04'
category: other
notes: Revolut, a British fintech firm, has announced it will no longer offer cryptocurrency
  services to its US-based customer. As is becoming typical, they blamed US regulations
  and "crypto market uncertainty" for the decision.Revolut had previously been one
  of the crypto platforms to limit US trading in Solana, Cardano, and Polygon tokens
  after the SEC identified those tokens as securities in lawsuits against Binance
  and Coinbase.
