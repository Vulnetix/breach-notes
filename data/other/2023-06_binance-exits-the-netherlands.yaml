source_name: '"Notice on Changes of Services in the Netherlands"'
source_url: https://www.binance.com/en/support/announcement/notice-on-changes-of-services-in-the-netherlands-b5a647be31cf469b87fc3337fd461ced
date_of_breach: '2023-06-16'
date_of_disclosure: '2023-06-16'
category: other
notes: As they are wont to do, Binance set up shop in the Netherlands without getting
  permission from the country's regulators. However, after being warned and then fined
  €3.3 million (~$3.35 million) in January, they apparently finally decided it was
  time to try to comply with requirements.Sadly for them, they were unable to obtain
  a VASP registration in the country, and their "many alternative avenues to service
  Dutch residents in compliance with Dutch regulations" didn't pan out either. They
  announced that, effective immediately, they would no longer be accepting new customers
  from the region. Existing customers in the country will soon be only able to withdraw
  assets, and will not be able to purchase assets or trade on the platform.
