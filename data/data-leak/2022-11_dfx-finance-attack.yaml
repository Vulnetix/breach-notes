notes: 'An attacker was able to use a flash loan to exploit a vulnerability in the smart contract for DFX Finance, a decentralized
  forex trading platform. The platform suffered a loss amounting to around $5 million. The attacker subsequently laundered
  the funds through the Tornado Cash cryptocurrency tumbler. The attacker didn''t make off with the entire amount lost from
  the platform, partly due to an MEV bot snagging a significant amount of the funds.


  Total loss estimated at $5,000,000.'
