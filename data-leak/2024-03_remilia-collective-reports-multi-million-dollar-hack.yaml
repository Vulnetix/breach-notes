notes: '"Charlotte Fang", the leader of the controversial Remilia project (known for its Milady NFTs), claimed he was hacked
  and drained of ETH and NFTs potentially worth several million dollars. Although the project''s treasury used a multi-signature
  model, the private keys were stored in one password manager, which Fang says was compromised.The attacker stole around 490
  ETH (~$1.8 million) and $58,000 USDC, along with more than 130 Milady NFTs, 320 Remilio NFTs, and hundreds of derivative
  tokens issued on the NFTX platform. Based on floor prices, the assets are valued at north of $6 million.The mechanism of
  the attack is still uncertain, though Fang has said he suspects malware that could have intercepted credentials to his Bitwarden
  password manager. Some have expressed skepticism around the "hack", suggesting it could have been inside job. The Remilia
  group had suffered a separate $1 million loss in September 2023 — blamed on a rogue developer — and failed to implement
  many security safeguards after that incident.


  Total loss estimated at $5,999,945.'
