notes: "Two-stage breach in 2022. Aug 8-11: attacker compromised software developer's laptop, stole 14 source code repositories. Aug 12: senior DevOps engineer's personal computer compromised via unpatched Plex CVE-2020-5741; keylogger captured master password. Aug-Sept: attacker exfiltrated customer vault backup and user database from third-party cloud storage. Stolen data includes encrypted password vaults and unencrypted metadata (URLs, email, billing addresses). Feds linked ~$150M crypto theft to LastPass vault cracking in 2025."
