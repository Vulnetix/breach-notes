notes: 'Dollar Tree hit by third-party data breach impacting 2 million people. Discount
  store chain Dollar Tree was impacted by a third-party data breach affecting 1,977,486
  people after the hack of service provider Zeroed-In Technologies. Dollar Tree is
  a discount retail company that operates the Dollar Tree and Family Dollar stores
  in 23,000 locations in the United States and Canada. According to a data breach
  notification shared with the Maine Attorney General , Dollar Tree''s service provider,
  Zeroed-In, suffered a security incident between August 7 and 8, 2023. Third-party
  company: Zeroed-In Technologies.'
