notes: El Salvadoran president Nayib Bukele gives us Americans a painful reminder
  of having a president who truly cannot be trusted with the reins of a country, much
  less a Twitter account. On January 24, with Bitcoin prices tanking, Bukele tweeted,
  "Most people go in when the price is up, but the safest and most profitable moment
  to buy is when the price is down. It's not rocket science. So invest a piece of
  your McDonald's paycheck in Bitcoin. Now go back to flip more burgers you lazy fvçk!"Naturally,
  he failed to mention the nearly 1,000 Bitcoin that he had purchased with taxpayer
  money since September 2021 at times that Bitcoin was above $50,000.
