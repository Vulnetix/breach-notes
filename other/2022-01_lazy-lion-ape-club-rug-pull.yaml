notes: 'Lazy Lion Ape Club, an NFT project in somewhat resembling the mega-popular
  Bored Apes, listed their NFTs on OpenSea on January 26. In addition to the NFTs,
  the project promised to generate passive income for its holders, as well as give
  them 3D models of their ape/lions to be used in the metaverse. The project leaders
  managed to generate 50 ETH (about $125,000) in sales before emptying the project
  of its funds and deleting their website and social media accounts.


  Total loss estimated at $125,000.'
