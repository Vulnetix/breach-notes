notes: 'A pig-butchering operation in Myanmar has scammed victims of more than $100 million in Tether in less than two years,
  according to a report from Chainalysis and the anti-human trafficking organization International Justice Mission.Many of
  the workers for the romance scam group are themselves victims of human trafficking. The operation is based in a "compound"
  near Myanmar''s border with Thailand, and researchers estimate that thousands of trafficked workers operate the scam from
  the "self-contained city".The scam may put more pressure on Tether, whose role in human trafficking and high-volume romance
  scam operations has been scrutinized more heavily in recent months and years. Tether has frozen some assets belonging to
  romance scammers in the past, but remains the token of choice for many of these groups.


  Total loss estimated at $100,000,000.'
