source_name: '"Crypto exchange FTX bails out lending platform BlockFi"'
source_url: https://www.ft.com/content/69ab1469-df01-4ea2-a015-b0e9904af4cc
date_of_breach: '2022-06-21'
date_of_disclosure: '2022-06-21'
category: other
notes: Crypto exchange FTX loaned $250 million to BlockFi, a crypto lending platform
  that recently announced 20% layoffs as they struggled to weather the crypto downturn.
  BlockFi also had loaned funds to Three Arrows Capital, an insolvent crypto hedge
  fund, although they claim to have successfully liquidated 3AC's positions.The FTX
  loan represents the second bailout of a crypto firm by Sam Bankman-Fried's companies,
  after his Alameda Research trading firm extended credit equivalent to around $485
  million to floundering crypto platform Voyager.
