notes: 'A project that promised to be "the DAO of DAOs" managed to accumulate and
  then make off with 800 ETH, which was worth around $3.2 million at the time of the
  scam. The project creators took the invested tokens and quickly tumbled them using
  Tornado Cash.


  Total loss estimated at $3,231,200.'
