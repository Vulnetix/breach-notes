notes: '3,250 BTC (~$330 million) were apparently stolen from a bitcoin holder and
  then quickly moved through multiple exchanges and swapped for the Monero privacycoin.
  Such a massive swap into Monero was apparently enough to cause the Monero price
  to spike from around $230 to as high as around $330, before retracting somewhat.


  Total loss estimated at $330,700,000.'
