notes: 'The NFT project BattleCatsArena appears to have rug pulled on March 5, about
  three weeks after its launch. The project had been announced late last year, with
  a post from its creator danvee.eth explaining, "After seeing lots of projects with
  zero utility and surviving 2 rug pulls I decided that it''s time to build a real
  product that will deliver value to its holders from day one." The project had an
  ambitious roadmap, featuring NFTs, cat shelter donations, and of course a game with
  several play modes. Minting began on February 16, though the launch was somewhat
  disappointing — only around 400 of the 500 available BattleCats were minted in the
  three weeks following launch, and trading volume was low. On March 6, the project
  apparently deleted its Twitter account, and danvee.eth claimed the Discord had been
  hacked. All told, the project earned almost 21 ETH ($55,000). danvee.eth wrote on
  Twitter that he would try to refund people who wished to be refunded (so long as
  they were nice to him); as of that day no refunds had been sent from addresses associated
  with the project.


  Total loss estimated at $54,943.'
