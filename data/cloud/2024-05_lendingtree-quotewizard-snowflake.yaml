notes: "UNC5537 threat actor 'Sp1d3r' posted on BreachForums 1 June 2024 claiming 190 million individual records and 3 billion tracking pixel data records (2 TB compressed) stolen from LendingTree's QuoteWizard insurance comparison subsidiary via its Snowflake environment. Data included names, addresses, phone numbers, dates of birth, driver's licence numbers, SSNs, and financial information. LendingTree confirmed the Snowflake connection on approximately 2 June 2024. Part of the broader Snowflake campaign affecting 165+ organisations. Class action lawsuits filed."
