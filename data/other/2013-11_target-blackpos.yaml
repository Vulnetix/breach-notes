notes: "Attackers phished Fazio Mechanical (HVAC vendor) to steal Target network credentials in Nov 2013. Moved laterally from vendor-accessible HVAC network segment to POS environment due to lack of network segmentation. Installed BlackPOS RAM-scraper on 1,797 store checkout terminals. Scraped payment card data from memory during transaction window. Exfiltrated ~40M credit/debit card numbers + 70M PII records to Russian FTP servers. FireEye alerts ignored. Breach detected by external payment processor. $18.5M settlement."
