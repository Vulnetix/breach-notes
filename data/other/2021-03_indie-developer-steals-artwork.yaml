source_name: '"Game Artists Not Happy That Developer Is Selling Their Nearly Decade-Old
  Work As NFTs"'
source_url: https://kotaku.com/game-artists-not-happy-that-developer-is-selling-their-1846465316
date_of_breach: '2021-03-09'
date_of_disclosure: '2021-03-09'
category: other
notes: Jason Rohrer, developer of the 2014 indie game The Castle Doctrine announced
  his plan to auction 155 of the digital paintings that he had commissioned for the
  game as NFTs on the OpenSea platform, without ever requesting permission from the
  original artists or informing them of his plan at all. In an email, Rohrer told
  Kotaku that he hadn't asked for permission from the artists to sell the works as
  NFTs "mostly because having email conversations with 50+ people would exceed my
  bandwidth as a solo creator." At least three artists asked for their work to be
  removed from the collection.
