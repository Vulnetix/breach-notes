source_name: '"Squid Game crypto token collapses in apparent scam"'
source_url: https://www.bbc.com/news/business-59129466
date_of_breach: '2021-11-01'
date_of_disclosure: '2021-11-01'
category: other
notes: 'Creators of a Squid Game-themed token (not affiliated with, or authorized
  by, those behind the Netflix series) created a token which quickly skyrocketed in
  value and earned news coverage in outlets like the BBC. Not long after investors
  began to report they were unable to sell their tokens, creators drained $3.36 million
  out of the liquidity pool in an apparent rug pull.


  Total loss estimated at $3,360,000.'
