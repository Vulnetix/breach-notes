notes: 'Health & Palliative Services of the Treasure Coast, Inc d/b/a Treasure Coast
  Hospice  (“Treasure Health ”) (FL), a Healthcare Provider, submitted a HIPAA breach
  notification to the HHS Office for Civil Rights (OCR) on 2025-09-19 for a breach
  affecting 13230 individuals. Breach type: Unauthorized Access/Disclosure. Information
  location: Email. Source: HHS OCR Breach Portal (HIPAA Breach Notification Rule,
  45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected health
  information (PHI) affecting 500 or more individuals.'
