notes: 'On 13 December 2013, the Australian Privacy Commissioner (the Commissioner)
  opened an own motion investigation into Adobe Systems Software Ireland Ltd (Adobe)
  following Adobe’s statement on its website that it had been the target of a cyber-attack
  ‘involving the illegal access of customer information as well as source code for
  numerous Adobe products’ (the data breach). [1] The investigation focused on whether
  Adobe took reasonable steps to protect the personal information that it held from
  misuse and loss and from unauthorised access, modification or disclosure. As part
  of his decision-making process, the Commissioner considered the facts of the case,
  submissions from Adobe and relevant provisions of the Privacy Act 1988 (Cth). This
  data breach affected the personal information of million


