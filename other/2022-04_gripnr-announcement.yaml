notes: Because, really, what is even the point of playing Dungeons &amp; Dragons if you're not buying a premade character
  from a limited set of options, playing premade adventures with it, getting "Gripnr certified" as a dungeonmaster (or finding
  someone who is), paying transaction fees every time you level up or get new equipment, or reselling your characters after
  the campaign ends (to someone who apparently wants a "used" D&amp;D character)?A company called Gripnr is already working
  to line up NFT pre-sales, despite acknowledging that they have no idea how they will prevent fraudulent data input — an
  issue commonly known as the oracle problem. It's also unclear how they intend to change the game so that it's sufficiently
  different from the Wizards of the Coasts game that they will not face legal action (an issue that ended another crypto project
  planned to be based around a WotC game). We can only hope that none of this may last long enough to become an issue, given
  that Gripnr have come up with an idea that I can't imagine appealing to a single person who's ever played D&amp;D.
