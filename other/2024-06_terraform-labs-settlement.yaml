notes: Terraform Labs and its former CEO Do Kwon have agreed to settle the SEC's civil action against them with a $4.5 billion
  payment of disgorgement, interest, and penalties. Kwon and the company were behind the collapsed Terra/Luna stablecoin project,
  which imploded in May 2022. It was among the first dominoes in what ended up being an industry-wide collapse.If the settlement
  is approved by the judge, Kwon will personally be responsible for around $200 million of the settlement payment, with Terraform
  Labs shouldering the rest. Although the settlement is among the largest the SEC has received in a securities fraud lawsuit,
  it's unlikely the company will ever pay anything close to the total amount, as it is in bankruptcy and claims to have only
  around $150 million in assets remaining. Both the company and Kwon will be banned from trading crypto asset securities.The
  substantial fine is among the lesser of Kwon's worries at the moment, as he is still in jail in Montenegro pending extradition
  to either South Korea or the United States to face serious criminal charges for his role in the fraud.
