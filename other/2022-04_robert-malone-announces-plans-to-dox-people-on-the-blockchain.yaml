notes: Robert W. Malone, a COVID-19 conspiracy theorist, gave a speech to a group
  of anti-vax truckers in which he announced plans to dox over 4,000 "[World Economic
  Forum] trainees" by publishing their names, addresses, and current and historical
  work information. "We're about to put this up on a blockchain-protected site so
  they can't take it down" he said, to cheers. "We're going to ask all of you and
  we're going to ask Steve Bannon's posse to crowdsource the rest of those names,"
  he said, "There are a ton of... people residing in the United States... that are
  embedded throughout our government, and throughout the tech industry, and throughout
  the banking industry, and throughout the bloody media!" When a crowd member shouted
  "Lock them up!" he replied, "locking them up isn't even going to do it", leading
  another person in the crowd to shout, "hang them!"
