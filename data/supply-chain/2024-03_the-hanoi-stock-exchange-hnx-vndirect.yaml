notes: 'Cyberattack on Vietnam securities broker disrupts stock markets. VNDirect,
  one of Vietnam''s largest brokers, is still responding to an incident that started
  over the weekend and forced actions by the country''s stock exchanges. Vietnam''s
  third-largest securities broker, VNDirect, is still struggling to fully restore
  its operations after suffering a cyberattack over the weekend. The company announced
  on Wednesday that some of its services are back online. However, according to local
  media reports , investors still couldn’t log in to the platform. VNDirect stated
  that it will restore access to its services in four stages, beginning with customer
  accounts and concluding with financial products. Third-party company: VNDirect.'
