initial_attack_vector: Ponzi / pyramid scheme
vendor_product: Wonderland cascading liquidations
notes: The broader decline in cryptocurrency prices triggered "cascading liquidations" in the Wonderland defi project, which
  is a fork of the "it might be a ponzi" OlympusDAO project. This dropped the value of the project's $TIME token nearly 50%,
  from around $780 to about $415 in the span of only two hours. This followed a decline of 91% over the past few months, as
  the token dropped from its November all-time-highs of around $14,000. According to CryptoBriefing, "Due to the disproportionately
  high leverage many TIME holders take on, the broader drop in crypto valuations has hit the Wonderland protocol harder than
  most."The $TIME tokens are issued against a set of assets that supposedly give the token an intrinsic value, and if the
  price drops below the backing price, the protocol uses the assets in their treasury to buy back the token to bring it back
  up to its "fair value". In the day following the crash, the protocol's founders spent several million dollars in buy-backs,
  which briefly boosted the token back up to trading at around $600.The project's team reportedly suffered major liquidation
  losses themselves, with the founder Daniele Sestagalli losing $15 million and the chief developer "0xSifu" losing $1.6 million.
  Sestagalli briefly caused panic in the community when he set his 300,000+ follower Twitter account to private after tweeting
  "Dude I just woke up losing 10 m dollars", but set the account back to public shortly after. He retweeted a thread stating
  that "the internal struggle for growth is cut short by the willingness of some entities to 'eat' all that they'r able to,
  instead of 'cultivating' and sharing what would be exponential profits in the future."
