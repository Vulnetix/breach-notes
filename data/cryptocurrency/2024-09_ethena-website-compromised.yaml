source_name: '"Ethena domain registrar hacked, Ethena Labs warns users to stay away"'
source_url: https://cointelegraph.com/news/ethena-domain-registrar-hacked
date_of_breach: '2024-09-18'
date_of_disclosure: '2024-09-18'
category: cryptocurrency
initial_attack_vector: DNS hijacking / domain takeover (front-end compromise)
vendor_product: Ethena website compromised
blockchain: ethereum
notes: The website for the Ethena protocol was compromised by attackers who gained control of the project's domain registration.
  The protocol issued warnings to their users to urge them not to interact with the website, which could compromise their
  crypto holdings.They later were able to deactivate the website and regain control of the domain. "Remember scammers are
  always chasing you," they wrote on Twitter.
