source_name: '"Judge Fines Ripple $125M, Bans Future Securities Law Violations in
  Long-Running SEC Case"'
source_url: https://www.coindesk.com/policy/2024/08/07/judge-fines-ripple-125m-bans-future-securities-law-violations-in-long-running-sec-case/
date_of_breach: '2024-08-07'
date_of_disclosure: '2024-08-07'
category: other
notes: A judgment has been issued in the long-running case against Ripple by the SEC,
  and the company has been fined $125 million for violations of securities laws in
  its institutional sales of its XRP token. The SEC has also obtained an injunction
  against the company, with the judge in the case opining that there was a "likelihood
  that [Ripple] will eventually (if it has not already) cross the line" again with
  respect to securities laws.Ripple and others in the crypto world have been celebrating
  the judgment as a victory, in part because it is a substantially smaller penalty
  than the $1 billion in disgorgement and $900 million in penalties sought by the
  agency.The SEC has already signaled throughout the case that they were likely to
  appeal an eventual outcome, after objecting to the judge's decision that several
  other types of token sales were not unlawful securities offerings.
