source_name: '"Terra DeFi project Terraport suffers $2M hack days after launch"'
source_url: https://cointelegraph.com/news/terra-defi-project-terraport-suffers-2m-hack-days-after-launch
date_of_breach: '2023-04-10'
date_of_disclosure: '2023-04-10'
category: data-leak
notes: 'Terraport Finance is a defi project built on, believe it or not, the Terra
  blockchain. Yes, the same Terra blockchain on which the Terra/Luna projects were
  built. Despite the massive collapse of the flagship project in May 2022, there are
  still a number of Terra projects operating, and even some new projects being developed.Terraport
  Finance launched on March 31, apparently having gone live without any sort of audit.
  On April 10, Terraport disclosed that an attacker had apparently managed to drain
  all project liquidity pools, making off with assets priced at around $2 million.


  Total loss estimated at $2,000,000.'
