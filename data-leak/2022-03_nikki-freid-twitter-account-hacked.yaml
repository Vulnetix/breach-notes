date_of_breach: '2022-03-19'
date_of_disclosure: '2022-03-19'
category: data-leak
notes: 'The Twitter account belonging to Nikki Fried, the current Florida Agriculture
  Commissioner and a Democratic candidate for the 2022 Florida gubernatorial race,
  was compromised and repurposed as an NFT shill account. The account, which was verified
  and had more than 270,000 followers, suddenly underwent what I imagine was a bit
  of a startling rebrand for her followers: her name was changed to "nikki.eth", and
  the Twitter bio was replaced with "Mod for SkulltoonsNFT, ThugBirdz, AzukiZen. Web3
  Enthusiast". The account also changed its banner and profile pictures to Skulltoons
  images, and started tweeting about giveaways. By March 20, Fried had apparently
  regained control of the account, though the account privacy had been changed to
  protected.The Fried account compromise is only one instance of what has become a
  trend on Twitter: Twitter accounts belonging to high-profile individuals, or accounts
  that are verified or have a large number of followers, being compromised and sold
  to NFT scammers. On March 11, ESPN baseball reporter Jeff Passan also had his twitter
  account compromised and repurposed to shill Skulltoons NFTs. Skulltoons distanced
  themselves from that incident, writing that they believed the hackers were trying
  to scam their NFT community.'
