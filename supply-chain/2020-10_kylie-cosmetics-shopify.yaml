notes: 'Shopify Data Breach - Arnold Law Firm. The Shopify data breach has affected
  thousands of merchants. Our lawyers can help you understand your legal rights and
  options for compensation. On September 22, 2020, e-commerce platform Shopify disclosed
  a security incident on their blog. Shopify reported that two “rogue” support team
  employees illegitimately accessed and stole customer transactional records of certain
  merchants, including Thrive Causemetics and Kylie Cosmetics. Third-party company:
  Shopify.'
