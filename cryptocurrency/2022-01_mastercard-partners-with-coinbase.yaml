notes: Apparently the real issue with crypto grifts all along has been that it's just too dang hard to put your money into
  them. Mastercard has shown up to fix that, announcing a new partnership with Coinbase to allow Mastercard holders to buy
  NFTs on Coinbase's upcoming NFT platform with credit. With just a jaw-dropping attempt at spin, Mastercard wrote in their
  announcement tweet, "We're working to make NFTs more accessible because we believe tech should be inclusive."
