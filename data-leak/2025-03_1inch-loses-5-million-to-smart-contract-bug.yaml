category: data-leak
notes: 'An attacker exploited a smart contract belonging to the 1inch DEX aggregator,
  stealing $5 million in the USDC stablecoin and wETH. According to the platform,
  the vulnerability existed in "smart contracts using the obsolete Fusion v1 implementation",
  and the stolen funds belonged to resolvers (that is, entities that fulfill 1inch
  orders) rather than users.


  Total loss estimated at $5,000,000.'
