source_name: '"Hedge fund Galois closes after half of assets trapped on crypto exchange
  FTX"'
source_url: https://www.ft.com/content/a06b77bc-52ac-4901-98d7-8c567449262e
date_of_breach: '2023-02-20'
date_of_disclosure: '2023-02-20'
category: other
notes: One of the largest crypto-focused algorithmic trading funds, Galois Capital,
  announced that they would be closing up shop in the wake of the FTX collapse. The
  fund had half its funds on FTX — around $40 million — and could not keep operating
  as a result.Galois also sold its claim on FTX to a distressed buyer for around $0.16
  on the dollar.
