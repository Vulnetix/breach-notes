source_name: '"Young NFT hacker returns 86ETH he stole from CreatureToadz"'
source_url: https://nftevening.com/young-nft-hacker-returns-86eth-he-stole-from-creaturetoadz/
date_of_breach: '2021-10-20'
date_of_disclosure: '2021-10-20'
category: data-leak
notes: A 17-year-old hacker was able to use a phishing webhook to make himself an
  admin in the CreatureToadz Discord server. Users who minted NFTs unknowingly sent
  cash to him, netting him a total of around 88 ETH (almost $350,000). However, after
  the hacker's real identity was uncovered shortly after the attack, the hacker returned
  the funds, claiming he'd intended to return it all along.
