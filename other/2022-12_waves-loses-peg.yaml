notes: Apparently adopting Do Kwon's belief that the solution to a crashing algorithmic
  stablecoin project is creating another project, Waves founder Sasha Ivanov has announced,
  "I will launch a new stable coin". This comes after Neutrino USD — aka USDN — has
  spent much of the year de-pegged, recently plunging dramatically to around $0.50.The
  USDN stablecoin remained within a few cents of its intended USD peg for about a
  year, before losing its peg in April. Since then, it has had a pretty bumpy road,
  spending much of the year more than a few cents off the dollar peg, and dropping
  much farther below it in early November.A less-than-enthused commenter responded
  to Ivanov's Twitter announcement of a new coin, writing, "My brother in Christ more
  stablecoins to depeg is not the answer". "It will be undepeggable", replied Ivanov.
  Well, in that case.
