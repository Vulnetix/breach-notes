notes: 'A Twitter thread showed dozens of people reporting amounts from hundreds to
  tens of thousands of dollars disappearing from their Chivo Wallets, the Bitcoin
  wallet backed by El Salvadoran President Nayib Bukele. El Salvador adopted Bitcoin
  as legal tender in September of this year, where it is used alongside the U.S. dollar.


  Total loss estimated at $96,224.'
