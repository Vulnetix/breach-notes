notes: 'In a letter to both current and former employees, Lowe’s says that personal
  information might have been compromised after a third-party vendor exposed it to
  the public. In a letter to both current and former employees, Scott Purvis, Vice
  President of Human Resources at Lowe’s, says that personal information might have
  been compromised after a third-party vendor exposed it to the public. According
  to the letter , the personal information of current and former drivers for the company,
  including names, addresses, birthdays, Social Security numbers, driver’s license
  numbers, and other driving record information, were exposed during the incident.
