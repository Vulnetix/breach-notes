notes: All 81 functional Bitcoin ATMs in the United Kingdom are operating illegally, says the UK's Financial Conduct Authority
  (FCA). None of the companies operating them have a license to do so, and the FCA has said that they will take action against
  the companies if they don't shut down the kiosks.
