date_of_breach: "2019-12-31"
date_of_disclosure: "2020-01-02"
date_of_customer_notification: "2020-01-17"
category: "ransomware"
initial_attack_vector: "REvil (Sodinokibi) exploited CVE-2019-11510, a critical path traversal vulnerability in Pulse Secure VPN that allowed unauthenticated remote file reading, including cached plaintext VPN credentials; patch had been available since April 2019"
