notes: 'Turkish authorities arrested Andreas Szakacs, also known as Emre Avci, for his role in the OmegaPro cryptocurrency
  Ponzi scheme. Victims were invited to make small investments in the "Omega Invest" application, which made quick returns.
  They were enticed to invest more and more, but when they attempted to withdraw funds, they discovered the money had been
  taken. Altogether, victims have claimed around $103 million in losses.The OmegaPro Ponzi scheme was reportedly linked to
  the OneCoin crypto Ponzi, whose operators stole at least $4 billion from millions of victims since 2019. Multiple people
  associated with OneCoin have been arrested, including its co-founder Karl Sebastian Greenwood, but its "Cryptoqueen" co-founder
  Ruja Ignatova was one of Europol''s most wanted fugitives and remains the subject of an Interpol red notice.


  Total loss estimated at $103,000,000.'
