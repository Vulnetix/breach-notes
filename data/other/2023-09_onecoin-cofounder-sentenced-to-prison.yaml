date_of_breach: '2023-09-12'
date_of_disclosure: '2023-09-12'
category: other
initial_attack_vector: Ponzi / pyramid scheme
vendor_product: Ruja Ignatova and Karl Sebastian Greenwood
affected_count: 3500000
notes: Karl Sebastian Greenwood, co-founder of the notorious OneCoin ponzi scheme, was sentenced to 20 years in prison after
  pleading guilty to fraud and money laundering charges. He will also forfeit $300 million, much of which he spent on real
  estate, luxury vacations, and a yacht.OneCoin operated out of Bulgaria, and was founded by Greenwood and "Cryptoqueen" Ruja
  Ignatova, the latter of whom has been on Europol's most wanted list since May 2022. The fraud amounted to around $4 billion
  and affected at least 3.5 million victims.
