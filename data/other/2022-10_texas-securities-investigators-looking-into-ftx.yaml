date_of_breach: '2022-10-17'
date_of_disclosure: '2022-10-17'
category: other
notes: Joseph Jason Rotunda, Director of the Enforcement Division of the Texas State
  Securities Board, submitted a filing to the ongoing Voyager bankruptcy case. FTX
  is the highest bidder among companies who have made offers to buy the assets of
  Voyager.According to Rotunda, there is an ongoing investigation by the TSSB into
  whether FTX has been offering unregistered securities to United States residence
  in the form of yield-bearing accounts. He alleged that FTX's claimed attempts to
  segregate US users to the separate FTX.US exchange, the software makes no apparent
  attempt to do so, and offered yield-bearing accounts to customers who had signed
  up with a U.S. address — potentially in violation of securities laws.Rotunda submitted
  the filing in the Voyager bankruptcy case to argue that FTX should not be permitted
  to buy Voyager's assets until they have been determined to be compliant with securities
  law. He wrote, "[FTX yield-bearing] products appear similar to the yield-bearing
  depository accounts offered by Voyager Digital LTD et al., and the Enforcement Division
  is now investigating FTX Trading, FTX US, and their principals, including [FTX CEO]
  Sam Bankman-Fried."
