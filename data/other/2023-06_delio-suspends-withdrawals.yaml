source_name: '"출금 중지 조치 안내"'
source_url: https://delio.io/notice/noticeDetail?id=376&p=0
date_of_breach: '2023-06-14'
date_of_disclosure: '2023-06-14'
category: other
initial_attack_vector: Withdrawal halt / insolvency
vendor_product: Delio suspends withdrawals
notes: South Korean cryptocurrency lending platform Delio announced to its customers on June 14 that they would be suspending
  withdrawals. In a letter to customers, they wrote that the decision was taken in response to the withdrawal suspension by
  Korean yield platform Haru Invest the previous day, which they said had led to a "sharp increase in market volatility and
  increased confusion among investors". Haru's suspension had caused a "sudden surge of withdrawals on our end", said Delio
  CEO James Jung.Delio, like Haru, advertised yields of more than 10%.
