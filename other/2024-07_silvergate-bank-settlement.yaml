source_name: '"SEC Charges Silvergate Capital, Former CEO for Misleading Investors
  about Compliance Program"'
source_url: https://www.sec.gov/newsroom/press-releases/2024-82
date_of_breach: '2024-07-01'
date_of_disclosure: '2024-07-01'
category: other
notes: More than a year after the crypto-friendly Silvergate Bank collapsed, its parent
  company has agreed to pay $63 million in fines to the Federal Reserve and California
  Department of Financial Protection and the Innovation. The SEC also imposed a $50
  million fine, though the terms of the settlement noted this "may be offset" by the
  other penalties.According to the regulators, Silvergate "had serious deficiencies"
  in its anti-money laundering programs, including in its intra-customer crypto transfer
  product. In particular, the SEC highlighted $9 billion in suspicious transfers among
  FTX entities that should have been detected by compliance programs. The SEC also
  alleged that Silvergate misrepresented its financial state during the post-FTX collapse
  bank run.
