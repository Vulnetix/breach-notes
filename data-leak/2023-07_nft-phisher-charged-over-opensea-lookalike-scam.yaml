source_name: '"Press release: Defendant Charged With Theft Of Cryptocurrency And NFTs
  Through Spoofing Of OpenSea Marketplace"'
source_url: https://www.justice.gov/usao-sdny/pr/defendant-charged-theft-cryptocurrency-and-nfts-through-spoofing-opensea-marketplace
date_of_breach: '2023-07-10'
date_of_disclosure: '2023-07-10'
category: data-leak
notes: 'The U.S. Attorney''s Office of the Southern District of New York announced
  the unsealing of charges against Soufiane Oulahyane, who they allege created a lookalike
  OpenSea website to trick victims into entering their login details, and used sponsored
  links in a "popular internet search engine" to cause his site to show up as the
  first result when a person searched "opensea". A victim with the OpenSea name "Hank666"
  entered his credentials into the scam website on September 26, 2021, and Oulahyane
  quickly used the credentials to transfer his crypto assets, sell his NFTs, and transfer
  the proceeds of those sales to his own wallet. Altogether, Hank666 lost assets that
  he had paid around $449,000 to obtain.Oulahyane is charged with wire fraud, two
  counts of access device fraud, and aggravated identity theft.


  Total loss estimated at $448,923.'
