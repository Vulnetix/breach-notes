notes: 'Somehow, SpiceDAO managed to raise €2.66 million (about $3 million) to buy the storyboard for Alejandro Jodorowsky''s
  never-made Dune adaptation. In a celebratory tweet the group wrote, "We won the auction for €2.66M. Now our mission is to:
  1. Make the book public (to the extent permitted by law) 2. Produce an original animated limited series inspired by the
  book and sell it to a streaming service 3. Support derivative projects from the community". They were quickly informed that
  buying the physical book did not somehow confer to them copyright or licensing rights (much like how buying an NFT does
  not automatically confer you the rights to the underlying artwork!). You''d think they might have checked that first.'
