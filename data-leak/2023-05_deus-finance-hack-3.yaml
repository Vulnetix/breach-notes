notes: 'Deus Finance suffered yet another hack as around $7 million was taken from the protocol. This was not the first time
  the platform had been targeted, suffering a $3 million exploit in March 2022 and a $13.4 million exploit in April 2022.
  Then, in May 2022, Deus Finance''s algorithmic stablecoin lost its intended dollar peg in the wake of the Terra collapse
  and never recovered.In the most recent hack, around $7 million was stolen as attackers discovered a vulnerability in the
  contracts of the DEI token. Some of the attackers were apparent whitehats, who executed the exploit to safeguard the funds
  until they could be returned to a secure address. As of May 8, $5.5 million of the $7 million stolen had been returned.


  Total loss estimated at $1,500,000.'
