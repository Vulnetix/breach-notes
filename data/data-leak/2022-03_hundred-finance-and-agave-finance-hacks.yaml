source_name: '"DeFi protocols Agave and Hundred Finance exploited on Gnosis Chain
  for $11 million"'
source_url: https://www.theblockcrypto.com/post/137932/defi-protocols-agave-and-hundred-finance-exploited-on-gnosis-chain-for-11-million
date_of_breach: '2022-03-15'
date_of_disclosure: '2022-03-15'
category: data-leak
notes: 'An attacker using a flash loan attack targeted two projects on the Gnosis
  blockchain: Hundred Finance and Agave Finance. Each project paused their smart contracts,
  but not before the attacker made off with a considerable sum of money. That day,
  the attacker put the funds through a cryptocurrency tumbler, making it much more
  difficult to trace the collective 4,479 ETH that was stolen in roughly equal amounts
  from each protocol.Hundred and Agave were the second and third defi protocols targeted
  by flash loan attacks that same day, with Deus Finance losing more than $3 million
  to hackers using the same class of exploit.


  Total loss estimated at $12,066,426.'
