notes: 'The Stream Finance defi yield project announced that "an  external fund manager
  overseeing Stream funds disclosed the loss of approximately $93 million in Stream
  fund assets." Stream announced that they were in the process of withdrawing remaining
  liquid assets, and had halted all deposits or withdrawals. They also announced they
  had retained a law firm to investigate the "incident".The project didn''t disclose
  who the fund manager was, or the circumstances in which the "loss" occurred.The
  Staked Stream USD token depegged on November 3, and crashed further following the
  announcement.


  Total loss estimated at $93,000,000.'
