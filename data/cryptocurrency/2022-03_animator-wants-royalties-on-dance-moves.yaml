notes: In the latest installment of "large television program launders the reputations of NFTs", an "NFT band" performed on
  Ellen... Well, some animated characters danced on a screen while a human performed, a concept that is not exactly new.The
  animator who created the band animation, however, has big dreams for the possibilities NFTs could bring to dancers. Dancers
  "can now claim digital ownership over a series of moves or routines by means of NFTs". Imagine, he says, "owning the original
  Moonwalk". Yes, everyone, just imagine how much better the world could be today if everyone had had to pay royalties whenever
  they imitated Michael Jackson's signature move.
