notes: 'The MonoSwap DEX announced on July 24 that it had been compromised, and urged
  its users to withdraw their funds to avoid losses. According to the project team,
  one of their developers had been lured into a call with someone pretending to be
  a venture capitalist, who convinced them to download what they claimed was video
  call software, but which instead was malware. MonoSwap claimed this gave the hackers
  "access to all MonoSwap-related wallets and contracts".The malicious video chat
  software attack vector has been widely used in the crypto world, with a victim losing
  cryptocurrency to an attacker using the same technique and impersonating an Andreessen
  Horowitz partner last month.So far, the MonoSwap attacker has laundered $1.3 million
  via the Tornado Cash cryptocurrency mixer.


  Total loss estimated at $1,300,000.'
