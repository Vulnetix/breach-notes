notes: 'Download the print version The Australian Red Cross Blood Service (Blood Service)
  website www.donateblood.com.au allows individuals to book appointments to donate
  blood. On 5 September 2016, a database file containing information relating to approximately
  550,000 prospective blood donors who had entered their details into the website
  was saved to a public-facing web server (the data breach). The file was inadvertently
  placed on the web server by an employee of a third‑party provider, Precedent Communications
  Pty Ltd (Precedent). The data file was discovered and accessed by an unknown individual
  on 25 October 2016. On the same day, the individual notified the Blood Service via
  a number of intermediaries. The Blood Service immediately took steps to contain
