notes: 'A scammer spent a month setting up a con in which they stole fourteen Bored Ape NFTs belonging to one individual.
  Posing as a casting director at a real film production company—complete with a fake website, a fake partner company, and
  fake individuals pretending to have signed deals with the company—a scammer was able to convince the collector that they
  were interested in paying $13,000–$17,000 to license a Bored Ape for use in an animation.After some back-and-forth, with
  legitimate-looking contracts and falsified emails appearing to come from the real company''s real founding director, the
  NFT collector was asked to use their crypto wallet to sign a contract, via the fake company partner website that had been
  set up.When the collector did so, the smart contract drained the collector''s wallet of its fourteen pricey Bored Ape NFTs,
  then accepted the highest offers that were outstanding on each of the Bored Apes, netting 852.9 ETH. The scammer converted
  the stolen ETH to the DAI stablecoin, making off with $1,075,000 in DAI.


  Total loss estimated at $1,075,030.'
