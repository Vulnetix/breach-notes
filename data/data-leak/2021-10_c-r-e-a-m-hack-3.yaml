notes: 'Crypto lending service C.R.E.A.M. Finance lost $130 million in a flash loan
  attack. It was the third hack of the platform this year, following a $37.5 million
  hack in February and an $18.8 million attack in August.


  Total loss estimated at $130,000,000.'
