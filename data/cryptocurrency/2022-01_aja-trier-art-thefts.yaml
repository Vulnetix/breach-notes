notes: Artist Aja Trier was shocked to discover that her artwork depicting dogs painted in the style of Van Gogh's Starry
  Night has been stolen and turned into an NFT collection with 86,000 items. Although NFT theft is sadly nothing new, this
  was perhaps the largest-scale theft to date. @NFTtheft, a popular Twitter account that draws attention to art theft in NFTs,
  wrote, "This is absolutely shocking. We've never seen anything at this scale before."
