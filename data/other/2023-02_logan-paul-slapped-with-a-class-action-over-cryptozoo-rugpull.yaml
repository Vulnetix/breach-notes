date_of_breach: '2023-02-03'
date_of_disclosure: '2023-02-03'
category: other
notes: Logan Paul is now facing a class action lawsuit over his CryptoZoo project,
  a planned NFT game that Paul apparently lost interest in and abandoned — after profiting
  handsomely, of course, off his fans who put millions into the project.Scam sleuth
  CoffeeZilla dug into the project in a multipart YouTube series recently, drawing
  legal threats from Paul. After plenty of negative publicity, Paul withdrew the legal
  threats and promised to develop a refund plan for some of the funds that were invested,
  though it is a small fraction of the money lost in the project.Rather than wait
  to see if Paul comes through with refunding only a small portion of their money,
  a group has formed a class action lawsuit against Paul and others who helped with
  the project. The lead plaintiff put a total of around $3,000 into the project altogether.The
  suit accuses Paul and his team of a whole host of charges including fraud, breach
  of contract, unjust enrichment, deceptive trade practices, negligence, and fraudulent
  misrepresentation.
