notes: 'Influencer-turned-(alleged)-crypto-grifter Logan Paul has threatened to sue scam researcher CoffeeZilla, who has exposed
  Paul''s "CryptoZoo" blockchain game project as his latest (alleged) scam. Paul''s (alleged) scam history is not to be confused
  with any of the other long list of (alleged) crypto scams perpetrated by his brother, Jake, which CoffeeZilla has also helped
  expose.After many attempts over the span of a year to contact Paul, directly and via his manager (who CoffeeZilla did speak
  with), Paul has claimed that CoffeeZilla made no attempts to get his side of the story. Instead of addressing any of the
  many well-researched claims about the flagrant (alleged) grift that Paul has been perpetrating, he has instead reacted in
  typical (alleged) cryptoscammer fashion: by threatening to sue CoffeeZilla.'
