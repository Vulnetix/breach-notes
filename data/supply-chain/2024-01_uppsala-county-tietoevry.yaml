notes: 'Tietoevry ransomware attack causes outages for Swedish firms, cities. Finnish
  IT services and enterprise cloud hosting provider Tietoevry has suffered an Akira
  ransomware attack impacting cloud hosting customers in one of its data centers in
  Sweden. The story was updated on 1/22/24 with Tietoevery''s confirmation that they
  suffered an Akira ransomware attack. Tietoevry is a Finnish IT services company
  offering managed services and cloud hosting for the enterprise. The company employs
  approximately 24,000 people worldwide and had a 2023 revenue of $3.1 billion. Third-party
  company: TietoEVRY.'
