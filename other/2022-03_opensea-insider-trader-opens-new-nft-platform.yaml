source_name: '"OpenSea Exec Who Quit After ‘Insider Trading’ Scandal Is Back With NFT Platform"'
source_url: https://www.coindesk.com/business/2022/03/31/opensea-exec-who-quit-after-insider-trading-scandal-is-back-with-nft-platform/
date_of_breach: '2022-03-31'
date_of_disclosure: '2022-03-31'
category: other
vendor_product: OpenSea insider trader opens new NFT platform
notes: Nate Chastain resigned from OpenSea at their request in September 2021 after it was discovered that he had allegedly
  been buying NFTs based on insider knowledge that they would be featured on the OpenSea front page, then reselling them at
  a profit. Fortunately for him, the crypto sphere is a great place for scammers and fraudsters to get second and third and
  fourth chances, and so Chastain is right back at NFTs with a new venture, "Oval". Oval is trying to raise a $3 million seed
  round and $30 million pre-money valuation, or a $7.5 million seed round and $50 million valuation, depending which pitch
  deck you look at.
