category: data-leak
notes: "Scam Sniffer's February 2024 report describes 57,000 victims who collectively\
  \ lost almost $47 million thanks to various phishing schemes on the Twitter platform.\
  \ Many of the losses came from accounts designed to impersonate various popular\
  \ cryptocurrency projects, who diverted users to scam websites resembling the real\
  \ ones.The largest individual loss was the phishing attack against kirilm.eth, who\
  \ had over 180 million $BEAM tokens notionally worth over $5 million drained from\
  \ their crypto wallet. The attacker sold the tokens for around $4.5 million.The\
  \ total amount stolen is down slightly from January, in which $55 million was taken.\
  \ Altogether, scammers have stolen over $100 million via Twitter phishing alone\
  \ in the first two months of 2024. \n\nTotal loss estimated at $42,363,781."
