notes: 'Digital supply chain giant Bizongo suffers massive data breach, sensitive
  customer info exposed: Report - The Tech Portal. Digital supply-chain platform Bizongo
  reportedly became the victim of a security breach, putting data of 100s of thousands
  of users at risk. Data theft is an increasingly persistent problem these days, and
  with data’s applications in all sectors of life, it is understandable that a case
  of a data breach is a matter of grave concern. Indian start-ups have been hit with
  a string of data breaches in recent days, and Mumbai-based digital supply-chain
  giant Bizongo reportedly became the latest name in the list on Tuesday. Third-party
  company: Bizongo.'
