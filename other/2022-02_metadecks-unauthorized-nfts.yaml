notes: 'An artist creating and selling trading cards of various streamers without asking their permission claims he was "just
  trying to do something cool for the community". He originally claimed that he had emailed each streamer about the project
  and never got a response, but the enormously popular streamer Ludwig released a statement in a tweet reading summarized
  with "TLDR: I am not making a fucking NFT and I''ll let my lawyers take it from here". The longer text said that the MetaDeckz
  creator hadn''t emailed Ludwig at all, and only sent him a Twitter DM "less than 24 hours ago". "You didn''t even follow
  me on Twitter until [a popular Twitter personality called out your project]. It feels like you just reached out to cover
  your ass rather than get permission.... This is nothing more than a low effort scam."Following Ludwig''s scathing statement
  and legal threat, MetaDeckz explained he was just "an artist who saw an oppertunity [sic]" and that he would disband the
  project. He later released a video explaining that he would stop the project, though his continued references to the cards
  as "the product" and his statements that he intended to continue working on the cards led some to question if he was just
  planning to try to monetize them in some other way. If that''s the case, he may run into further issues given that the card
  illustrations all appear to be derived directly from photos of the streamers that don''t belong to MetaDeckz.'
