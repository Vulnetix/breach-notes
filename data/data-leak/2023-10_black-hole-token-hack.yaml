notes: 'The Black Hole Token project suffered a $1.28 million apparent exploit, according
  to security firm PeckShield, though it''s hard not to wonder if it might have been
  a rug pull.Black Hole Token is a Chinese project built on BNB Chain, which promises
  an original mechanism that only goes up. "The more you sell, the more the price
  goes up", promises their website.Sounds legit.


  Total loss estimated at $1,280,000.'
