source_name: '"People Behind Crypto Protocol DeFi100 May Have Absconded With $32M
  in Investor Funds"'
source_url: https://www.coindesk.com/markets/2021/05/22/people-behind-crypto-protocol-defi100-may-have-absconded-with-32m-in-investor-funds/
date_of_breach: '2021-05-22'
date_of_disclosure: '2021-05-22'
category: other
notes: "DeFi100, a Binance-based DeFi protocol, suddenly replaced its website with\
  \ a statement: \"We scammed you guys and you can't do shit about it\". One crypto\
  \ analyst estimated a scam would've netted the team $32 million. However, the developers\
  \ subsequently denied the scam and claimed the website had been hacked, restoring\
  \ it soon after. Although the developers maintain they never stole any money, rumors\
  \ around what actually happened sank the project. \n\nTotal loss estimated at $32,000,000."
