notes: A class-action lawsuit filed by Missouri investor Eric De Ford claims that the people behind the pro-Trump "Let's Go
  Brandon" (LGB) memecoin misled investors about a NASCAR sponsorship deal and celebrity backing. LGB coin had nearly reached
  an agreement to be the primary sponsor for NASCAR driver Brandon Brown, but the sponsorship was axed by NASCAR shortly after
  LGB coin announced it. Regardless, those behind the coin allegedly continued to promote the coin as though the NASCAR sponsorship
  was in motion, even as the token value cratered. The lawsuit alleges that "Defendants pushed the LGB Tokens as a means of
  promoting the American dream, while simultaneously touting the prospects for LGB Tokens and the ability for investors to
  make significant returns from the LGB Tokens like other so-called 'meme coin' digital assets... In truth, Defendants cynically
  marketed the LGB Tokens to investors so that they could sell off their portion of the Float for a profit."De Ford has named
  the LGB coin creators in the suit, as well as NASCAR, and promoters like Brandon Brown and Candace Owens.
