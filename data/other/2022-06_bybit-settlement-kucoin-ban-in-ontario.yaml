source_name: '"Ontario Securities Commission Slaps Bybit and KuCoin With Penalties"'
source_url: https://www.coindesk.com/business/2022/06/22/ontario-securities-commission-slaps-bybit-and-kucoin-with-enforcement-actions/
date_of_breach: '2022-06-22'
date_of_disclosure: '2022-06-22'
category: other
notes: The Ontario Securities Commission (OSC) accused crypto trading platforms Bybit
  and Kucoin of operating unregistered platforms and offering unregistered securities
  to Ontarian investors.Bybit opted to settle with the OSC, disgorging about CA$2.5
  million (US$1.9 million) and has begun working with the OSC to become compliant.OSC
  accused KuCoin of not complying with the investigation, and permanently banned the
  exchange from operating in Ontario. The OSC also levied a CA$2 million (US$1.5 million)
  fine against the exchange.
