notes: 'Student Loan Breach Exposes 2.5M Records. 2.5 million people were affected,
  in a breach that could spell more trouble down the line. EdFinancial and the Oklahoma
  Student Loan Authority (OSLA) are notifying over 2.5 million loanees that their
  personal data was exposed in a data breach. The target of the breach was Nelnet
  Servicing, the Lincoln, Neb.-based servicing system and web portal provider for
  OSLA and EdFinancial, according to a breach disclosure letter. Third-party company:
  Nelnet Servicing.'
