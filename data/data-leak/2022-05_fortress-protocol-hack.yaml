notes: 'An attacker was able to steal 1,048 ETH (~$2.65 million) and 400,000 DAI from the Fortress Protocol borrowing and
  lending platform in what appears to have been an oracle manipulation attack. The attacker quickly moved their ~$3 million
  in stolen funds to the Tornado Cash cryptocurrency tumbler to obscure their tracks.The exploit caused the $FTS token to
  drop 42%. The creators of Fortress urged people not to supply any assets to the pool as the attack was ongoing, and tweeted
  "we need the support of all of our partners and key organizations in the community to assist and try to freeze and bring
  back the funds!"


  Total loss estimated at $3,050,000.'
