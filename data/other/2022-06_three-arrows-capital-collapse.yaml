notes: 'A court in the British Virgin Islands ordered the liquidation of Three Arrows Capital, a crypto hedge fund. This follows
  initial rumors in mid-June that the firm was insolvent, then a report shortly after that the group was looking at options
  including asset selloff or a buyout.The court action followed lawsuits from several creditors over its failure to pay debts.
  Those creditors included Voyager Digital, who reduced their platform''s withdrawal limit after reporting their exposure
  to 3AC, as well as the crypto exchange Deribit.


  Total loss estimated at $3,300,000,000.'
