notes: 'ConsensioHealth Ransomware Attack Affects 61,000 Patients. The Wisconsin-based
  medical billing service, ConsensioHealth, has recently notified 60,871 individuals
  about a July 2023 ransomware attack. The attack was ConsensioHealth experienced
  a ransomware attack in July in which patient data was compromised. Data breaches
  have also been reported by Burr & Forman, Southeastern Orthopaedic Specialists,
  Rebekah Children’s Services, and Sharp Health Plan. Third-party company: ConsensioHealth.'
