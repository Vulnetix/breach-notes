source_name: '"AG Racine Sues DC-Based Billionaire Michael Saylor &amp; Software Company Microstrategy for Evading More Than
  $25 Million in District Taxes"'
source_url: https://oag.dc.gov/release/ag-racine-sues-dc-based-billionaire-michael-saylor
date_of_breach: '2022-08-31'
date_of_disclosure: '2022-08-31'
category: other
initial_attack_vector: Regulatory / legal action
vendor_product: DC Attorney General sues Michael Saylor and MicroStrategy
notes: DC-based Bitcoin evangelist and former CEO (now chairman) of MicroStrategy has been accused by the DC Attorney General
  of avoiding years of taxes by pretending to live in Florida, a state without personal income tax. The AG says he evaded
  more than $25 million in DC taxes this way, with the help of MicroStrategy (which is also named in the suit for helping
  to enable the tax evasion).DC permits the court to impose "treble damages" on Saylor if he is determined to have evaded
  the taxes he owes, which could end up costing him and MicroStrategy more than $100 million in taxes and penalties.
