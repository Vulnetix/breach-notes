date_of_breach: '2023-04-07'
date_of_disclosure: '2023-04-07'
category: other
initial_attack_vector: Regulatory / legal action
vendor_product: dYdX
notes: dYdX announced that it would be shutting down its decentralized derivatives exchange in Canada. They gestured toward
  regulatory issues in the post, writing that, "We hope that the regulatory climate in Canada will change over time to allow
  us to resume services in the country."Canada has become more strict on cryptocurrency exchanges in recent months, particularly
  following the collapse of FTX.
