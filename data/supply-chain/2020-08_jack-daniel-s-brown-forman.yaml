notes: 'Jack Daniel’s-Maker Suffers REvil Ransomware Breach. Attackers claim to have
  1TB of stolen data in their possession. US wine and spirits giant Brown-Forman has
  become the latest big-name brand to suffer a serious ransomware-related data breach,
  cyber-criminals have claimed. The Jack Daniel’s-maker has released few details about
  the incident but claimed it successfully prevented attackers from encrypting its
  files. Third-party company: Brown-Forman.'
