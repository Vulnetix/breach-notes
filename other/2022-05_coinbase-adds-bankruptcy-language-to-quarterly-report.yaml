vendor_product: Coinbase adds bankruptcy language to quarterly report
notes: 'Coinbase added new language to its latest 10-Q, a quarterly report submitted by public companies to the SEC. In the
  section outlining risks to the business, Coinbase wrote: "Because custodially held crypto assets may be considered to be
  the property of a bankruptcy estate, in the event of a bankruptcy, the crypto assets we hold in custody on behalf of our
  customers could be subject to bankruptcy proceedings and such customers could be treated as our general unsecured creditors."This
  serves as a stark reminder to users who keep their cryptocurrency on exchanges, that although it is often a more user-friendly
  way to keep crypto (compared to self-custodying), it exposes users to risk like this.Some members of the crypto community
  expressed shock, with Swan Bitcoin CEO Cory Klippsten tweeting, "Is this real?!?"'
