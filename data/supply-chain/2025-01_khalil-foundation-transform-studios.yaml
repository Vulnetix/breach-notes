notes: 'Billing Support Vendor Notifies 701K Patients About December 2023 Data Breach.
  Medusind, a Florida-based revenue cycle management vendor and practice management
  software provider, has recently started notifying individuals about a Medusind has
  notified 360,934 individuals that their protected health information was compromised
  in a December 2023 security incident. Data breaches have also recently been reported
  by Indiana University Health, Mid-Ohio Psychological Services, and Khalil Foundation
  (Khalil Center). Third-party company: Transform Studios.'
