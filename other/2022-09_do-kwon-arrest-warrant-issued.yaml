notes: A South Korean court has issued a warrant for the arrest of Do Kwon, the founder of the Terra ecosystem, as well as
  five other people. According to Bloomberg the allegations include violations of Korea's capital markets law.Kwon and the
  others named in the warrant are currently in Singapore. In June, Korea banned current and former Terraform Labs employees
  from leaving the country, and in July Korean authorities raided multiple exchanges in connection to their investigation.
