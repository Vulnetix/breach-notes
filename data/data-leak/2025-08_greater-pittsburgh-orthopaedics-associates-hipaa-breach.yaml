notes: 'Greater Pittsburgh Orthopaedics Associates (PA), a Healthcare Provider, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2025-08-27
  for a breach affecting 35000 individuals. Breach type: Hacking/IT Incident. Information
  location: Desktop Computer. Source: HHS OCR Breach Portal (HIPAA Breach Notification
  Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected
  health information (PHI) affecting 500 or more individuals.'
