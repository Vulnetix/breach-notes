source_name: '"4 NFT Projects Took Investors'' Money and Disappeared in One Day"'
source_url: https://www.vice.com/en/article/xgxnew/4-nft-projects-took-investors-money-and-disappeared-in-one-day
date_of_breach: '2021-10-06'
date_of_disclosure: '2021-10-06'
category: other
notes: 'Developers behind Solana Towers, an NFT project allowing investors to buy
  rooms in a metaverse virtual condo as NFTs, disappeared with around $280,000 a day
  after the project''s launch. It was only one of the projects to do so that day,
  joining the developers behind three other Solana NFT projects: "Interstellar Bots",
  "Cheesy Dizzy", and "Technidroids".


  Total loss estimated at $396,000.'
