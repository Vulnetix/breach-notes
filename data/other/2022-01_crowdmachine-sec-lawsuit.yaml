source_name: <i>SEC v. Crowd Machine, Inc.</i>
source_url: https://www.sec.gov/litigation/complaints/2022/comp-pr2022-3.pdf
date_of_breach: '2022-01-06'
date_of_disclosure: '2022-01-06'
category: other
notes: The SEC alleged that Craig Sproule, founder of companies CrowdMachine and Metavine,
  ran a fraudulent and unregistered ICO when he launched "Crowd Machine Compute Tokens"
  (CMCTs). Although he claimed that the money raised from the token sale would be
  used on technical development of the "Crowd Computer", a "global decentralized"
  peer-to-peer network, he made no effort to create this technology. Instead, he secretly
  sent more than $5.8 million of the more than $33 million raised in the ICO to South
  African gold mining companies.
