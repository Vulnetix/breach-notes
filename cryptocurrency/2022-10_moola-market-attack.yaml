notes: 'The Celo-based borrowing and lending platform, Moola Market, suffered a major exploit when an attacker manipulated
  collateral prices to steal a collection of assets notionally worth around $8.4 million. After taking a loan of $MOO tokens
  on the platform, the attacker manipulated the price of those tokens to borrow all other tokens available on the lending
  protocol. The project dashboard currently shows 100% utilization, because the attacker emptied all funds that were available:
  a mix of $CELO, $cEUR, $MOO, and $cUSD that amount to around $8.4 million.This attack was executed similarly to the Mango
  Markets exploit a week prior. Moola Market tweeted that they had "contacted law enforcement and taken steps to make it difficult
  to liquidate the funds. We are willing to negotiate a bounty payment in exchange for returning the funds within the next
  24 hours." The attacker did eventually return 93% of the funds, keeping the remaining $588,000 as a "bug bounty".


  Total loss estimated at $588,000.'
