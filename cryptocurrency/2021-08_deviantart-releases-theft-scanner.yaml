category: cryptocurrency
vendor_product: DeviantArt releases theft scanner
blockchain: ethereum
notes: DeviantArt releases software to automatically scan the NFT platform OpenSea for NFTs that use stolen artwork from DeviantArt.
  While it's awesome that DeviantArt created this tool to help the artists on their platform, it underscores the hands-off,
  look-the-other-way approach OpenSea has taken to the rampant art theft on their platform. Even reports of blatant copies
  of artwork have been rejected with no action, and artists are forced to report each infringement of their work individually
  even if there are many.
