notes: 'After Paris Hilton and Jimmy Fallon engaged in a frankly bizarre discussion
  of their beloved Bored Apes on The Tonight Show, a fake projects imitating the Bored
  Ape Yacht Club began popping up on OpenSea. OpenSea shut down several projects of
  this type, which each brought in several hundred dollars an hour. One such project
  was left up for two weeks, duping investors out of nearly $65,000.


  Total loss estimated at $65,000.'
