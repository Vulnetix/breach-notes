date_of_breach: '2022-01-10'
date_of_disclosure: '2022-01-10'
category: cryptocurrency
initial_attack_vector: Smart contract exploit / hack
vendor_product: Lympo
blockchain: ethereum
financial_loss_usd: 18700000
notes: 'Animoca Brands'' subsidiary Lympo, an NFT platform specifically for sports, experienced a breach of several hot wallets.
  This allowed an attacker to pull 165.2 LMT tokens from the platform, equivalent to about $18.7 million. The tokens were
  quickly exchanged for Ether on Uniswap and Sushiswap. The hack caused the value of LMT to drop by 92%, to $0.0093.


  Total loss estimated at $18,700,000.'
