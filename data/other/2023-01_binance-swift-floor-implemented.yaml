source_name: '"Binance Says Signature Sets Transaction Minimum Amid Pullback"'
source_url: https://www.bloomberg.com/news/articles/2023-01-22/binance-says-signature-sets-transaction-minimum-amid-pullback
date_of_breach: '2023-01-21'
date_of_disclosure: '2023-01-21'
category: other
vendor_product: Binance SWIFT floor implemented
notes: Binance informed its users that they would no longer be able to perform transactions below $100,000 via the SWIFT financial
  network. According to Binance, this was because their banking partner, Signature Bank, had announced they were implementing
  that floor for all cryptocurrency exchange clients.Signature Bank has suggested it intends to step back somewhat from the
  crypto industry. It is one of the relatively few US banks that services crypto clients, and provided services to FTX among
  others.Patrick McKenzie speculated that the change might have been related to AML/KYC, and Binance's "Bond villain compliance
  strategy".
