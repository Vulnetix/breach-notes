notes: 'Data breach at French healthcare services firm puts millions at risk. French
  healthcare services firm Viamedis suffered a cyberattack that exposed the data of
  policyholders and healthcare professionals in the country. Though the company''s
  website remains offline at the time of writing, an announcement was posted on LinkedIn
  warning of the data breach. The data exposed in the attack includes a beneficiary''s
  marital status, date of birth, social security number, name of health insurer, and
  guarantees open to third-party payment. Third-party company: Viamedis.'
