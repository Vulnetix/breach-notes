notes: 'Kingfund Finance suddenly drained more than 300 WBNB (about $141,000) from their project. This happened a few days
  after users began to report being blocked by the project''s Twitter account and kicked from its Telegram channel for reporting
  issues with unavailable funds, apparently an attempt to buy time as they prepared for their exit. Around the time of the
  rug pull, they took their Twitter and website offline.


  Total loss estimated at $141,000.'
