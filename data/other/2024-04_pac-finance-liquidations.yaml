source_name: '"$26 million in ''unnecessary liquidations'' hit Blast-based lender Pac Finance"'
source_url: https://www.theblock.co/post/287992/26-million-in-unnecessary-liquidations-hit-blast-based-lender-pac-finance
date_of_breach: '2024-04-12'
date_of_disclosure: '2024-04-12'
category: other
initial_attack_vector: Software bug / unintentional loss
vendor_product: Pac Finance liquidations
blockchain: ethereum
notes: Pac Finance, a fork of the Aave lending protocol deployed on the Blast blockchain, surprised some of its users as an
  unannounced and unexpected code change lowered the liquidation threshold. Pac Finance said that they had asked an engineer
  to make changes to the smart contract, and that that person had unexpectedly decreased the threshold at which positions
  could be forcibly liquidated. This change resulted in $26 million being liquidated across the project.Pac Finance has said
  they are "actively developing a plan with [impacted users] to mitigate the issue."
