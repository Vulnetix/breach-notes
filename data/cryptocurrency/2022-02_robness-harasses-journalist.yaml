notes: '"Robness", an NFT artist who is somewhat known for selling a photograph of a trashcan for more than $250,000, apparently
  took issue with BuzzFeed News journalist Katie Notopoulos, who published an article in early February revealing the identities
  of two of the pseudonymous Bored Ape Yacht Club team. Robness was not the only one unhappy with her reporting — many people
  claimed that she "doxxed" the founders, despite the fact that she only published names that were on public business records
  and which the Bored Apes company confirmed to her. Some went so far as to send threats to her about her parents, claiming
  to know where they lived.Robness decided the best way to make his displeasure known would be to find a photo of Notopoulos
  as a young child and turn it into an NFT titled "VOTED MOST LIKELY TO BE A FAILED JOURNALIST: KATIE NOTOPOULOS". The NFT
  description read, "Failed journalism is a true art to master. With Buzzfeed''s new article about the Bored Ape Yacht Club,
  Katie Notopoulos went where no journalist usually goes. She ousted [sic] both of the Bored Ape Yacht Club founders while
  providing baseless claims of racist tropes about their artwork to further stir up contention. We thank Katie for her continued
  pursuit in tainting the once respected practice of real journalism. Here we have what is known as doxx art. Enjoy."The NFT
  platform where Robness originally listed the NFT, Known Origin, eventually took down the listing. However, due to the nature
  of blockchains, the NFT itself still exists and can continue to be accessed and traded despite one platform''s intervention.'
