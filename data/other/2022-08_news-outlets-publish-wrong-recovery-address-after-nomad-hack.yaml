notes: 'After the August 1 Nomad bridge exploit, Nomad created an address where people
  who took money out of the bridge could return it.However, that was not the address
  that CoinGape published in their article titled "Breaking: Nomad Announces ENS Address
  And Bounty For Returning Funds" article, which was syndicated to Binance''s news
  feed. Instead, they indicated that people should send funds to a different address,
  a scammer who had been sending on-chain messages to various people who took money
  out of Nomad during the exploit, asking they return it.Although CoinGape removed
  the article fairly quickly, it remained live on Binance''s site for over an hour.
  Fortunately, it doesn''t appear anyone besides the writers have fallen for the scam,
  as no cryptocurrency has been sent to the address.'
