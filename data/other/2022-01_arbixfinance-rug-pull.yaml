notes: 'Yield farming platform ArbixFinance was drained of at least $10 million, with some reporting amounts up to $32 million.
  Some optimistic users hoped it was a glitch, but the fact that the formerly-active @ArbixFinance Twitter account disappeared
  along with their website as the funds were being drained points to a rugpull. The platform had previously been audited and
  approved by CertiK in November, lending the project credibility in the eyes of prospective users.


  Total loss estimated at $10,000,000.'
