notes: Massive data breach confirmed by Allianz Life. U.S. life insurance firm Allianz
  Life had most of its 1.4 million customers' data compromised following a data breach
  this month, reports BleepingComputer. Allianz Insurance has been a leader in fostering
  a DevSecOps culture. Today’s columnist, Matias Madou of Secure Code Warrior, offers
  advice on how to bring the AppSec and DevOps teams together to create a collaborative
  DevSecOps approach.
