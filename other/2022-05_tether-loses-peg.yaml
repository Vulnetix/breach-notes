source_name: '"Crypto meltdown deepens as stablecoin Tether drops below dollar peg"'
source_url: https://www.reuters.com/markets/us/bitcoin-falls-16-month-low-2022-05-12/
date_of_breach: '2022-05-12'
date_of_disclosure: '2022-05-12'
category: other
notes: Tether, the largest stablecoin, had a major wobble. Pegged to the U.S. dollar
  and widely used throughout the cryptocurrency ecosystem, even a fractional cent
  deviation from its peg can have enormous ramifications. Tether spent six hours below
  $0.99  — at one point slipping down to $0.95  — in the most significant deviation
  from its peg in recent history. The dip was widely connected to the recent and even
  more dramatic de-peg of the previously third-largest stablecoin, TerraUSD, as well
  as the general crypto market crash.Tether began to recover somewhat as the day progressed,
  gradually returning to above $0.99. However, the de-peg has clearly shaken the cryptocurrency
  ecosystem. The heavy reliance on Tether means that a substantial or protracted loss
  of its peg would be devastating, and the open secret that Tether does not have the
  backing assets it once claimed has intensified fears about a possible run on Tether.
