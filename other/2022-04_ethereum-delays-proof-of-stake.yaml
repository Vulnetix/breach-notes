notes: For years now, Ethereum has been talking about a transition from its energy-intensive, expensive proof-of-work consensus
  model to a proof-of-stake consensus model, which sports a totally different set of flaws! Exciting.The project has been
  delayed so many times that it has become a bit of a running joke — crypto critics regularly describe the Ethereum PoS migration
  as something that has been "only six months away" for several years now. Meanwhile, it has proven a useful way for Ethereum
  fans to dismiss the valid concerns about the enormous energy expenditure of their preferred blockchain, as though enormous
  emissions and e-waste are somehow a non-issue if there is some vague plan at some perpetually-in-the-future point to move
  away from them.Anyway, Ethereum developers have projected new levels of optimism lately, with several of them describing
  "the merge" as imminent — I believe a June timeframe was the popular estimate. Unfortunately, this appears to have been
  just as unachievable as the prior "deadlines", with an Ethereum core developer stating it was now looking like it wouldn't
  happen until some time this autumn. This is particularly brutal timing, given Nilay Patel's interview yesterday with a16z's
  Chris Dixon, where he confidently pointed to an early July "merge" date (only to become substantially less confident when
  pressed on specifics). Anyway, see you this fall for the next hype cycle — between now and then, Ethereum will have again
  consumed energy comparable to the amounts used annually by some small countries, for little if any useful purpose.
