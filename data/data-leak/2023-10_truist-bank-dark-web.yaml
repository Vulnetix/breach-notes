notes: "Truist Bank, a major US financial institution formed by the merger of SunTrust Banks and BB&T, confirmed in June 2024 that its systems had been breached in October 2023. The breach came to light when a threat actor posted stolen data on dark web forums, offering approximately 65,000 employee records for $1 million. Stolen data included names, SSNs, account numbers, dates of birth, and addresses. Truist customers were separately affected by the FBCS (Financial Business and Consumer Solutions) third-party breach in February 2024 (a distinct incident). Truist confirmed the October 2023 breach was a separate event from the FBCS supply-chain exposure. Financial sector; highlights the long dwell time before dark web disclosure of intrusions."
