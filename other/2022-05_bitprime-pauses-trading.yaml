source_name: '"Important Notice For All Customers"'
source_url: https://www.bitprime.co.nz/important-notice-for-all-customers/
date_of_breach: '2022-05-11'
date_of_disclosure: '2022-05-11'
category: other
vendor_product: BitPrime
notes: 'The New Zealand cryptocurrency exchange BitPrime paused trading operations, issuing a notice to their customers: "A
  perfect storm has occurred, where liquidity has reduced, the market has crashed, and our overheads have increased. These
  have eroded trading capital and liquidity to a point where we felt we couldn''t guarantee fast trading execution and liquidity
  of customer funds." Unlike many exchanges, BitPrime doesn''t also play the role of a wallet, so customers aren''t prevented
  from moving their crypto as they would be if this happened with an exchange that holds customer funds.'
