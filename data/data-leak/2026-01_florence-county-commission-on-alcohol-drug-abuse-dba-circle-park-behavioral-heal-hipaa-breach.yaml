notes: 'Florence County Commission on Alcohol & Drug Abuse – dba Circle Park Behavioral
  Health Services (“Circle Park”) (SC), a Healthcare Provider, submitted a HIPAA breach
  notification to the HHS Office for Civil Rights (OCR) on 2026-01-14 for a breach
  affecting 7020 individuals. Breach type: Hacking/IT Incident. Information location:
  Email. Source: HHS OCR Breach Portal (HIPAA Breach Notification Rule, 45 CFR §164.400–414).
