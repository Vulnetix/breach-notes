source_name: '"G2 Esports files lawsuit against NFT provider Bondly"'
source_url: https://www.washingtonpost.com/video-games/esports/2022/03/22/g2-esports-nft-lawsuit/
date_of_breach: '2022-03-22'
date_of_disclosure: '2022-03-22'
category: other
notes: G2 Esports announced a partnership with NFT provider Bondly in June 2021, through
  which they planned to release profile picture NFTs that would also provide access
  to membership perks. Nothing has materialized since then, despite their plans to
  launch in February. On March 22, G2 filed suit against Bondly, accusing them of
  agreeing to a deal they knew they could not fulfill, but that would lend Bondly
  credibility and publicity via the association with the G2 brand. According to the
  lawsuit, shortly after the first invoice was sent for the rights payments that Bondly
  was due to pay to G2, Bondly wrote that the company was "past the point of being
  able to successfully deliver an NFT program". G2 has said the failed deal resulted
  in $5,250,000 in damages.
