source_name: '"Weaponized Trading Bots Drain $1M From Crypto Users via AI-Generated
  YouTube Scam"'
source_url: https://www.coindesk.com/tech/2025/08/07/weaponized-trading-bots-drain-usd1m-from-crypto-users-via-ai-generated-youtube-scam
date_of_breach: '2025-08-07'
date_of_disclosure: '2025-08-07'
category: data-leak
notes: 'Scammers using AI-generated YouTube videos to promote supposedly profitable
  crypto bot software have convinced crypto users to deploy what is, in reality, malicious
  code that allows scammers to siphon funds from their wallets. The free software
  supposedly allows anyone to run MEV bots to profit from arbitrage strategy, but
  the obfuscated code people are encouraged to download and deploy is actually malicious.Researchers
  at Sentinel Labs have estimated that more than $1 million has been drained from
  various wallets via these malicious contracts.


  Total loss estimated at $1,000,000.'
