source_name: '"Belt Finance loses millions in latest BSC-based DeFi exploit"'
source_url: https://cointelegraph.com/news/belt-finance-loses-millions-in-latest-bsc-based-defi-exploit
date_of_breach: '2021-05-29'
date_of_disclosure: '2021-05-29'
category: data-leak
notes: 'Belt Finance fell victim to a flash loan attack which netted an attacker $6.3
  million. This was yet another exploit targeting a protocol built on the Binance
  Smart Chain protocol, following other attacks over the previous five months on C.R.E.A.M.
  Finance, bEarn, Bogged Finance, Uranium Finance, Meerkat Finance, SafeMoon, Spartan
  Protocol, BurgerSwap, and PancakeBunny.


  Total loss estimated at $6,300,000.'
