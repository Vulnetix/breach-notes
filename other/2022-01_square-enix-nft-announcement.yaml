source_name: '"Square Enix president knows people who ''play to have fun'' dislike
  NFTs, but he wants them anyway"'
source_url: https://www.pcgamer.com/square-enix-president-knows-people-who-play-to-have-fun-dislike-nfts-but-he-wants-them-anyway/
date_of_breach: '2022-01-01'
date_of_disclosure: '2022-01-01'
category: other
notes: 'In the announcement, Square Enix CEO Yosuke Matsuda apparently wrote with
  a straight face: "I realize that some people who ''play to have fun'' and who currently
  form the majority of players have voiced their reservations toward these new trends".
  He also spoke positively of the metaverse and NFTs in the announcement. Square Enix
  is the maker of popular game franchises including Final Fantasy, Dragon Quest, and
  Kingdom Hearts.'
