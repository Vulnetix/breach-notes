notes: 'The operators of a project called ETHTrustFund on Coinbase''s Base layer-2
  Ethereum blockchain have apparently rug-pulled the project. The ETHTrustFund project
  was a fork of the Olympus DAO project on Base, but there was months of inactivity
  on the project following its March launch. Then, on July 20, the developer deleted
  his Telegram and Twitter accounts and the project''s website, and suddenly moved
  the project treasury to a new wallet. The funds were then laundered through Railgun
  and Tornado Cash.


  Total loss estimated at $2,200,000.'
