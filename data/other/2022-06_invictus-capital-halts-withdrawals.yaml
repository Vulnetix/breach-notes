source_name: '"$135M offshore crypto fund group Invictus Capital suspends redemptions, attempts to re-organize"'
source_url: https://www.offshorealert.com/100m-offshore-crypto-fund-group-invictus-capital-suspends-redemptions-attempts-to-re-organize/
date_of_breach: '2022-06-22'
date_of_disclosure: '2022-06-22'
category: other
initial_attack_vector: Protocol collapse / insolvency
vendor_product: Invictus Capital
notes: Invictus Capital, the group operating several cryptos in the Cayman Islands and the British Virgin Islands, announced
  to investors that it would be suspending redemptions. The company cited exposure to both Terra and the Celsius project,
  both of which have gone under in recent months. According to the announcement, the group is pursuing restructuring. The
  group claimed to have over $135 million under management.
