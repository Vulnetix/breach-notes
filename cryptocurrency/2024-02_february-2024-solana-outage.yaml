notes: They were doing so well! After suffering a slew of outages during 2022, Solana had seemed to get their act together
  in 2023 with only one major outage. Now, however, Solana has gone offline again for five hours.With blockchains promising
  to become "world computers" upon which anyone can create projects ranging from mere toys to critical infrastructure, uptime
  is crucial, and a five-hour-long outage is devastating.
