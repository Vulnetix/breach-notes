notes: 'The CoinsPaid crypto payment platform, which provides payment services to various online casinos, reportedly suspended
  withdrawals under mysterious circumstances. The company later deleted a handful of tweets pertaining to the incident, which
  they ascribed to a "technical issue".After prominent Bitcoiner Jameson Lopp tweeted that the issue "look[s] more like a
  hack", CoinsPaid replied "Our team is aware of the issue... Please wait for the official announcement on this topic." Crypto
  researcher zachxbt responded, "The issue is you got hacked by North Korea that''s what lol", referencing the increasing
  suspicion that the Lazarus group may be behind the disruption. Sure enough, CoinsPaid later confirmed that they had been
  hacked for $37.3 million, and announced that they suspected the Lazarus Group was behind it.Some have been speculating that
  there are connections between this incident and the $60 million hack of the Alphapo crypto payments processor on July 22.
  Alphapo also provided services to various online casinos. Indeed, there seem to be connections between Alphapo and CoinsPaid,
  and they may in fact be operated by the same people.


  Total loss estimated at $37,300,000.'
