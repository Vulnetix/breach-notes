notes: 'If you''re named Rob Robb, do you have any choice but go into a life of thievery?Robb, also known as "pokerbrat2019",
  convinced at least 11 people to give him a total of $1.2 million, which he said he would use to develop various MEV bots.
  Instead of doing so, he pocketed the money, offering a litany of excuses for why the project was continually delayed.Robb
  had previously been convicted of a $4 million scam in 2002 after soliciting funds for an online gambling platform, instead
  using the money to buy a car and fund his own gambling.


  Total loss estimated at $1,200,000.'
