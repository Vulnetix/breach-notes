notes: 'Datenleck bei Postbank und Deutscher Bank / Kriminelle kopieren Bankdaten.
  Lahr (ots) - Hacker haben Daten von Kunden der Deutschen Bank bei einem Datenleck
  gestohlen. Auch die Tochtergesellschaft Postbank ist vom Datenklau betroffen. Die
  Diebe. Das nächste Datenleck hat die Deutsche Bank und die Tochtergesellschaft Postbank
  erwischt. Die Deutsche Bank und die Postbank informieren derzeit ihre Kunden über
  eine Sicherheitslücke bei einem Dienstleister, die zu einem unerlaubten Abfluss
  sensibler Daten geführt hat. Die IT-Kanzlei Dr. Stoll & Sauer fasst kurz zusammen,
  was bisher zum Datenleck bei Deutscher Bank und Postbank bekannt geworden ist:.
  Third-party company: Majorel.'
