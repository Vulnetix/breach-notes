notes: 'Have you ever gone out to karaoke and thought "man, the only thing missing from this perfect night is a blockchain"?
  No? Weird.Anyway, the South Korean Somesing platform — which is really more of a TikTok-but-just-for-song-covers clone than
  anything to do with karaoke — suffered a breach in which 730 million SSX tokens were stolen. These tokens are nominally
  priced at around $11.5 million, but around 2/3 of the stolen tokens were as yet undistributed and not a part of the circulating
  supply.


  Total loss estimated at $11,580,000.'
