notes: Pushback from fans led S.T.A.L.K.E.R. 2 creators to quickly reverse their decision to add NFTs to the game. The studio
  announced their NFT plans on December 15, which involved collectible cards, in-game items, having one's name added to walls
  or other scenery in the game, and even the possibility to have an NPC added to the game that resembled the NFT buyer. In
  subsequent updates the studio stressed that the NFTs would not be mandatory for gameplay, and later downplayed them further
  by saying that the NPCs they would add to the game "aren't even involved in the story". Fans were incensed, and the next
  day the studio scrapped "anything NFT-related" that was planned for the game.
