notes: 'A bitcoin holder reportedly fell for a social engineering attack after receiving communications from scammers posing
  as customer support for a crypto exchange and hardware wallet provider, according to crypto sleuth zachxbt. The thieves
  stole 783 BTC (~$91 million), which they then transferred through the Wasabi mixer to complicate tracing.


  Total loss estimated at $91,000,000.'
