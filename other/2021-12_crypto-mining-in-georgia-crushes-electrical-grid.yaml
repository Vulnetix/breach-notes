source_name: '"Georgia’s mountainous cryptocurrency problem"'
source_url: https://eurasianet.org/georgias-mountainous-cryptocurrency-problem?utm_source=dlvr.it&utm_medium=twitter
date_of_breach: '2021-12-28'
date_of_disclosure: '2021-12-28'
category: other
notes: Board chairman of Energo-Pro Georgia, an energy company serving the Svaneti
  region of Georgia, wrote, "This can no longer continue. No network can withstand
  the electricity consumption that is recorded there." He called out the illegal cryptocurrency
  mining happening in the region, which has damaged the infrastructure so badly that
  he predicted it would take four to five years to fix. Miners have been taking advantage
  of free electricity provided to residents of the region, but the chairman wrote
  that the company was "approaching the decision" to begin billing residents for electricity
  to try to thwart the miners. In 2019, the company had been forced to go door-to-door
  with police to shut down mining operations, and in the process removed about $1.6
  million worth of mining equipment.
