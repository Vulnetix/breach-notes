notes: The New York state Senate passed a bill putting a two-year halt on issuing new or renewing existing permits for crypto
  mining at fossil fuel plants — a practice that has been happening near Seneca Lake and elsewhere in the state. The bill
  will also begin an environmental impact study on such facilities.Next, the bill will go to Governor Hochul to sign or veto.
