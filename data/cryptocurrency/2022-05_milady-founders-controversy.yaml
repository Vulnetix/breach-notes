notes: The founder of the Remilia Collective and its popular "Milady Maker" NFT project, "Charlotte Fang", was discovered
  to have been a key player in a white supremacist cult known as Kali Yuga Accelerationism (abbreviated "kaliacc"). They were
  also tied to a group called "Systemspace", that is variously described as a suicide cult and as a 4chan trolling attempt
  that nevertheless tried to drive people to suicide. They also engaged in what they themselves described as "grooming" and
  "bullying" of young people into disordered eating and self-harm, and were apparently deeply involved with pro-ana online
  culture."Charlotte Fang" originally tried to deny the connection, attempting to cover up the connections between their online
  aliases and encouraging others to lie and also cover up any mentions of the alter ego. However, they eventually admitted
  to their past, writing that it was "toxic baggage that's hurting Milady community &amp; poisoning the vibe". They apologized
  for trying to hide the account, attempted to brush off their past actions as "trolling" that didn't reflect their "real
  views", announced they would be leaving the project team, and finished by saying they were "more bullish than ever for Milady".
