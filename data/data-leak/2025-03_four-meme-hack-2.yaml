source_name: '"Binance memecoin platform Four Meme exploited again — this time for
  $130K"'
source_url: https://protos.com/binance-memecoin-platform-four-meme-exploited-again-this-time-for-130k/
date_of_breach: '2025-03-18'
date_of_disclosure: '2025-03-18'
category: data-leak
notes: 'After suffering an $183,000 loss to an attack in February, the BNB-based Four.Meme
  memecoin launchpad has been hacked again, this time for around $130,000. Four.Meme
  aims to be BNB''s version of pump.fun, the popular Solana-based memecoin platform.Four.Meme
  acknowledged the latest theft on Twitter, writing that they intended to reimburse
  users who lost money.


  Total loss estimated at $130,000.'
