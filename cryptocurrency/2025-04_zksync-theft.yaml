financial_loss_usd: 500000
financial_recovered_usd: 4500000
notes: 'An attacker compromised an admin account belonging to the ZKsync Ethereum layer-2 project, which is built by Matter
  Labs. By doing so, they were able to steal approximately $5 million worth of the ZK token, which the project said were "the
  remaining unclaimed tokens from the ZKsync airdrop".ZK Sync offered a 10% "bug bounty" to the thief, who accepted and returned
  90% of the stolen funds.


  Total loss estimated at $500,000.'
