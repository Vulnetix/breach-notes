notes: 'A trader known by taylorRichie.eth agreed to swap their Morie NFT for a Doodle, in a trade they''d coordinated with
  a user on Discord. Because OpenSea doesn''t support trading one NFT for another, only buying and selling them for crypto,
  the traders had to use a different, less-known swap platform to perform the trade. Although taylorRichie.eth took precautions,
  like typing in the URL themselves instead of clicking a link, they were still fooled into signing a malicious transaction
  that transferred a different NFT in their wallet, a Mutant Ape, to the scammer. The scammer then quickly flipped the stolen
  NFT to another buyer for 22 ETH ($73,585).


  Total loss estimated at $73,585.'
