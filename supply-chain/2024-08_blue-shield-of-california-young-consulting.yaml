notes: 'Ransomware Hackers Steal Medical Insurance Data of 1M People. Young Consulting,
  which develops software for the stop-loss insurance market, is notifying 1 million
  individuals that their personal information was stolen earlier. Data Breach Notification
  , Data Security , Fraud Management & Cybercrime. An Atlanta-based software developer
  that works with people''s health data is notifying nearly 1 million individuals
  that their personal information was stolen earlier this year by attackers. A ransomware
  group called BlackSuit claimed credit for the attack and leaked stolen data. Third-party
  company: Young Consulting.'
