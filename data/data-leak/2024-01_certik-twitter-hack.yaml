notes: The Twitter account of the blockchain security company CertiK was hacked, then
  used to post tweets ostensibly warning of a massive crypto vulnerability and urging
  users to click a link to protect their wallets, but which instead linked the account's
  some 340,000+ followers to a site that would drain their wallets if connected.CertiK
  quickly regained control of the account and deleted the tweets, later explaining
  that an employee had been contacted by a "verified account, associated with well-known
  media". The journalist's account, apparently compromised, successfully phished the
  CertiK employee by sending what looked like a Calendly meeting scheduling link,
  but what was in fact a malicious link used to take over the CertiK Twitter account.Blockchain
  sleuth zachxbt criticized CertiK, which describes itself as a leading blockchain
  security firm, for not protecting against the attack, and asked if they would be
  reimbursing phishing victims.
