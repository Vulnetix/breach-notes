notes: 'NFT collector "Casper" discovered their wallet had been compromised, and an attacker had stolen around 114 NFTs worth
  around $600,000. The collector took to Twitter to urge people not to transact with his compromised wallet, and to ask OpenSea
  and other marketplaces to freeze the address. As of April 12, it was unclear how the wallet had been compromised. However,
  other wallets besides Casper''s had transferred NFTs to the same exploiter address, so they may not have been the only user
  affected.


  Total loss estimated at $600,000.'
