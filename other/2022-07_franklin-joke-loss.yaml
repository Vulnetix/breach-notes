notes: 'Bored Ape aficionado franklinisbored has apparently found a new source of
  entertainment by placing high bids on his own ENS domains with amusing names, causing
  a Twitter bot that announces ENS domain offers to tweet about it. After amusing
  himself by placing 100 ETH bids on joebiden.eth, elonmusk.eth, barackhusseinobama.eth,
  and donaldjtrumpjr.eth, he solicited suggestions on Twitter for what ENS domain
  he should create and then place a fake bid on next.Based on a follower''s suggestion,
  he created the ENS domain stop-doing-fake-bids-its-honestly-lame-my-guy.eth and
  placed a 100 ETH bid on it. To his surprise, another person came along and offered
  him 1.9 ETH (~$2,900). Apparently excited to receive a sizeable offer for a gag
  NFT, franklinisbored accepted the offer and took to Twitter to write about his good
  fortune: "Well this is the most surprising 1.891 ETH I have ever made. I owe it
  all to #ENS and @gweiman_eth''s creative idea. #Marketing101".Meanwhile, he had
  forgotten to cancel his joke 100 ETH offer, which remained active. The new buyer
  accepted the offer and sold the NFT back to him, pocketing 98 ETH in the process.
  Franklinisbored wrote on Twitter, "I was celebrating my joke of a domain sale, sharing
  the spoils, but in a dream of greed, forgot to cancel my own bid of 100 ETH to buy
  it back. This will be the joke and bag fumble of the century. I deserve all of the
  jokes and criticism." He also sent the 1.9 ETH back to the other person, with a
  message asking them to reverse the transaction. The other person replied, "No, thank
  you for the money though."


  Total loss estimated at $150,646.'
