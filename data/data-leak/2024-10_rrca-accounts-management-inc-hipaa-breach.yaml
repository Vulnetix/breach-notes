notes: 'RRCA Accounts Management Inc. (IL), a Business Associate, submitted a HIPAA
  breach notification to the HHS Office for Civil Rights (OCR) on 2024-10-18 for a
  breach affecting 115837 individuals. Breach type: Hacking/IT Incident. Information
  location: Desktop Computer, Network Server. This was reported by a Business Associate
  on behalf of a covered entity. Source: HHS OCR Breach Portal (HIPAA Breach Notification
  Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected
  health information (PHI) affecting 500 or more individuals.'
