notes: 'Kroll data breach exposes info of FTX, BlockFi, Genesis creditors. Multiple
  reports on social media warn of a data breach at financial and risk advisory company
  Kroll that resulted in exposing to an unauthorized third-party the personal data
  of some credit claimants. Kroll, who is facilitating claims for insolvent companies
  FTX , BlockFi , and Genesis Global Holdco , has confirmed that one of its employees
  was the victim of a SIM-swapping attack. Hackers stole the Kroll employee''s phone
  number and used it to gain access to some files with personal data of bankruptcy
  claimants. Third-party company: Kroll Inc..'
