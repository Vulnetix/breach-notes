notes: 'NorthStar Anesthesia patients may have been affected by breach - Becker’s
  ASC. Arietis Health, a medical billing company, recently filed a data breach notice.
  Medical billing company Arietis Health filed a data breach notice Oct. 2 with the
  Texas attorney general after discovering a hacking incident, law firm Console and
  Associates wrote on JDSupra on Oct. 3. The incident resulted in an unauthorized
  party being able to access consumers’ names, dates of birth, driver’s license numbers,
  state identification card numbers, addresses, Social Security numbers and protected
  health information. Third-party company: Arietis Health.'
