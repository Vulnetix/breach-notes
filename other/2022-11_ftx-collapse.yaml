notes: 'Aaaand there it goes.FTX announced that it had filed for Chapter 11 bankruptcy
  in the United States. Sam Bankman-Fried resigned as CEO.SBF had spoken about trying
  to raise additional funds. In leaked Slack messages, he had allegedly written that
  "One could maybe say, if they wanted to be optimistic, that we have a lot theoretically
  in and/or potentially for the raise". No one was actually saying this.


