notes: 'By manipulating the price of a low-liquidity, beta-stage stablecoin, an attacker
  was able to borrow all tokens in a Rari Fuse pool using the initial token as (inflated)
  collateral. They then swapped the tokens for Ethereum, and made off with more than
  $3 million.


  Total loss estimated at $3,000,000.'
