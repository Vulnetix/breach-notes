notes: 'Hacking, gone off the rails: Holiday travelers react to data breach · TechNode.
  We went to Beijing’s busiest train stations to ask travelers about the recent ticket-platform
  hacking incident. Train passengers may be riding into the Chinese New Year with
  concerns about data loss after thieves listed millions of train passengers’ information
  for sale on the black market. China’s official rail authority, China Railway, blamed
  a recent hacking on third-party ticketing vendors, often thought to be more convenient,
  though perhaps less secure, than the official railway ticketing platform, 12306.cn.
  Earlier this week, it was reported that China Railway moved to limit third-party
  apps’ access to train tickets.'
