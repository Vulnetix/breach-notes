source_name: '"Miami feds seize $34 million of bitcoin in fraud case. It’s one of
  largest seizures in U.S."'
source_url: https://www.miamiherald.com/news/local/article260097885.html#storylink=cpy
date_of_breach: '2022-04-04'
date_of_disclosure: '2022-04-04'
category: other
notes: A Floridian suspected of selling hacked account information for services including
  HBO, Netflix, and Uber had $34 million in Bitcoin seized by federal authorities.
  Prosecutors accused a suspect of a scheme from 2015–2017 in which he sold stolen
  account information on the dark web. Unusually, they filed a civil rather than criminal
  case against the defendant, and were able to seize the crypto in a default judgment.
  Tough day for those arguing that crypto is somehow inherently immune from government
  actions.
