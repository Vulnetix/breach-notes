source_name: '"Winding down of Binance Australia Derivatives on 21 April 2023"'
source_url: https://www.binance.com/en-AU/blog/all/winding-down-of-binance-australia-derivatives-on-21-april-2023-5937431074265361443
date_of_breach: '2023-04-05'
date_of_disclosure: '2023-04-05'
category: other
notes: Binance announced it would be closing its derivatives business in Australia
  "following recent engagement with ASIC", referring to the Australian Securities
  and Investments Commission. The subsequent day, Reuters reported that ASIC had withdrawn
  Binance's financial services license at Binance's request, related to an ongoing
  investigation into Binance. The investigation has been underway since at least February,
  and involves misclassification of some Binance retail customers as wholesale users.
  Though Binance has forfeited its license, the investigation is ongoing.Binance will
  continue to operate its spot exchange product in Australia, but customers will no
  longer be able to trade derivatives on the platform after April 21.
