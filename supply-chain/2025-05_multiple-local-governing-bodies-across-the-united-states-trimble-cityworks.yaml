notes: 'Chinese hackers breach US local governments using Cityworks zero-day. Chinese-speaking
  hackers have exploited a now-patched Trimble Cityworks zero-day to breach multiple
  local governing bodies across the United States. Trimble Cityworks is a Geographic
  Information System (GIS)-based asset management and work order management software
  primarily used by local governments, utilities, and public works organizations and
  designed to help infrastructure agencies and municipalities manage public assets,
  handle permitting and licensing, and process work orders. The hacking group (UAT-6382)
  behind this campaign used a Rust-based malware loader to deploy Cobalt Strike beacons
  and VSHell malware designed to backdoor compromised systems and provide long-term
  persistent access, as well as web shells and custom malicious tools written in Chinese.
  Third-party company: Trimble Cityworks.'
