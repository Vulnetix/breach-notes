notes: The crypto lending firm SALT announced that they would be halting withdrawals
  due to exposure to FTX. "I am sorry to report that the collapse of FTX has impacted
  our business," they wrote in a message to users. "Until we are able to determine
  the extent of this impact with specific details that we feel confident are factually
  accurate, we have paused deposits and withdrawals on the SALT platform effective
  immediately."
