notes: "In September 2025, SwissBorg, a Swiss crypto asset management platform, lost approximately $41 million worth of Solana (SOL) after threat actors compromised Kiln, the third-party staking infrastructure provider that managed SwissBorg's Solana Earn product. Attackers gained unauthorized access to Kiln's systems and drained the SOL staking pool. SwissBorg confirmed the funds belonged to customers participating in the Solana Earn yield product. The incident highlighted the risk of DeFi/staking yield products where customer funds are custodied with third-party infrastructure providers. SwissBorg committed to making affected customers whole."
