source_name: '"Blockchain.com Cuts 25% of Its Workforce Amid Crypto Bear Market"'
source_url: https://www.coindesk.com/business/2022/07/21/blockchaincom-cuts-25-workforce-amid-crypto-bear-market/
date_of_breach: '2022-07-21'
date_of_disclosure: '2022-07-21'
category: other
vendor_product: Blockchain.com layoffs
affected_count: 150
notes: The cryptocurrency exchange Blockchain.com announced they would be cutting 25% of their employees, or around 150 people.
  They attributed the decision to the crypto market conditions, as well as the need to compensate for financial losses — likely
  alluding to the $270 million loss they're facing due to a loan to the now-insolvent Three Arrows Capital crypto hedge fund.Blockchain.com
  also announced that they would close their Argentina-based offices, cancel plans to hire in several countries, and cut executive
  salaries.
