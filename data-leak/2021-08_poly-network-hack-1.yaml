financial_recovered_usd: 611000000
notes: Hackers stole approximately $611 million from the decentralized finance platform Poly Network in the largest cryptocurrency
  theft against a single platform to date. In a bizarre twist, the hacker returned the funds, and Poly Network offered them
  a position as a chief security advisor (though it is not clear if they accepted).
