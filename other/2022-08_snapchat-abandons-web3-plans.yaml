notes: Snap Program Manager Jake Sheinman tweeted that "As a result of the company restructure, decisions were made to sunset
  our web3 team. The same team that I co-founded last year with other pirates who believed in digital ownership and the role
  that AR can play to support that." Snap, the company behind Snapchat, had been working on a feature that would enable users
  to import their NFTs and use them as augmented reality filters.This news came amidst the announcement that Snap would be
  laying off 20% of its staff, a whopping 1,300 people.
