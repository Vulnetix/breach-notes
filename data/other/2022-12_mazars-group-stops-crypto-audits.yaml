source_name: '"Mazars Group suspends all work with crypto clients including Binance,
  Crypto.com, citing concerns over public perception of proof of reserves"'
source_url: https://www.cnbc.com/2022/12/16/mazars-suspends-all-work-with-crypto-clients-including-binance-cryptocom.html
date_of_breach: '2022-12-16'
date_of_disclosure: '2022-12-16'
category: other
notes: The accounting firm Mazars Group has ceased working with cryptocurrency clients,
  including Binance, KuCoin, and Crypto.com. A statement from the firm attributed
  their decision to "concerns regarding the way these reports are understood by the
  public".On December 7, a branch of Mazars Group had published a "proof of reserves"
  report for Binance — though it only accounted for Bitcoin, and did not reflect liabilities
  for Binance's lending product. On December 9, Crypto.com also published a "proof
  of reserves" report that had been produced by the firm.As of December 16, the Binance
  audit — which had been hosted on Mazar's website — had been deleted."Proof of reserves"
  reports have been offered by various cryptocurrency exchanges in lieu of proper
  audits, but have reasonably failed to reassure many customers of those exchanges.
  These reports do not involve the scrutiny that would be applied by a full audit
  — they only reflect a snapshot of assets at a point in time, and do not show a firm's
  liabilities.
