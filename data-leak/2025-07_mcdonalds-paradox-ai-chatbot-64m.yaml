notes: "In July 2025, McDonald's disclosed a breach affecting approximately 64 million job applicants whose data was stored on systems operated by Paradox, Inc., McDonald's third-party AI-powered hiring chatbot provider. The exposed data included names, email addresses, phone numbers, IP addresses, and chat logs from job application conversations. Paradox's automated chatbot system is used extensively by McDonald's to handle the initial stages of its high-volume recruitment process. This is one of the largest job applicant data breaches on record by impacted count."
