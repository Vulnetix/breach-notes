notes: 'More than $20 million in stablecoins and Ethereum were transferred from a wallet identified as belonging to the US
  government, and holding funds connected to the 2016 hack of the Bitfinex cryptocurrency exchange. While the government does
  occasionally shuffle cryptocurrency around, these funds were moved to a brand new wallet and then began to be shuffled through
  cryptocurrency exchanges — something that crypto sleuth zachxbt noted "looks nefarious".The government has not made any
  statements regarding the movement of assets.The following day, $19.3 million in tokens were returned to the original wallet.


  Total loss estimated at $1,200,000.'
