notes: 'Kiplepay informs users on potential indirect data breach through third-party
  payment gateway provider. KUALA LUMPUR: E-wallet service provider Kiplepay Sdn Bhd
  had informed its Kiple Visa Prepaid Card users yesterday via email of a risk through
  a recent third-party payment gateway provider data breach.'
