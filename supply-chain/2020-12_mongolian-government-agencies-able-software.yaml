notes: 'Chinese APT suspected of supply chain attack on Mongolian government agencies.
  Chinese hackers have compromised the update mechanism of a chat app used by hundreds
  of Mongolian government agencies. A Chinese state-sponsored hacking group, also
  known as an APT, is suspected of having breached a Mongolian software company and
  compromised a chat app used by hundreds of Mongolian government agencies. A roundup
  of the best software and apps for Windows and Mac computers, as well as iOS and
  Android devices, to keep yourself safe from malware and viruses. Third-party company:
  Able Software.'
