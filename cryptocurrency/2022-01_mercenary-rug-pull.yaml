notes: 'Mercenary was a short-lived play-to-earn game that promised "innovative tokenomics, to ensure the stability and longevity
  of the game''s economy". The project had invested heavily in advertising on Twitter and in cryptocurrency outlets like BSC
  News to attract new players. It launched only a week before the developers rug-pulled on January 27, draining more than
  $760,000 and deleting the project''s website and social media.


  Total loss estimated at $760,000.'
