notes: 'Sacramento Kings player De''Aaron Fox announced his "SwipaTheFox" NFT project in mid-December, and the "high utility
  NFT collection" went live on January 15. The project roadmap promised a metaverse basketball court, a scholarship to a University
  of Kentucky student, and chances to win all-star game tickets, as well as "much more to come". The project had over 100,000
  people in its Discord, and pulled in about 475 ETH (about $1.5 million at the time).Suddenly, on February 23, the project
  deleted its social media accounts and most of its Discord. Fox wrote in the remaining Discord announcements channel that
  "The time and attention that y''all deserve and that I wanted to give you all/what this project requires, was not known
  to me and I overstepped and stretched myself too thin, trying to do this project in the middle of an NBA season." He promised
  to send anyone who bought more than five NFTs (which would have cost ~0.4 ETH, around $1,300, if bought at mint price) a
  signed jersey (available for purchase online for around $100).The following day, after some attention was drawn to the rug
  pull, Fox released a Twitter statement that said basically nothing at all, and made no mention of reimbursing holders. Meanwhile,
  the floor price of the NFTs dropped to around 0.003 ETH ($8).


  Total loss estimated at $1,539,000.'
