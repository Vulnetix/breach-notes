notes: It's no big secret that there's a lot less money actually floating around in
  crypto than bogus "market caps" and other numbers would have you believe, but it's
  being put into stark relief as the various bankrupt crypto firms fight tooth and
  nail over any scrap of cash that may actually remain.In FTX's ongoing efforts to
  dig through the proverbial couch cushions in search of any funds that could be used
  to fill the gaping hole in its balance sheet, the firm has sued Voyager, a crypto
  broker that filed for bankruptcy in July, to try to recoup $446 million in funds
  that were "preferentially transferred" to Voyager when it filed for bankruptcy.The
  lawsuit alleges that Voyager served as a "feeder fund" that "solicited retail investors
  and invested their money with little or no due diligence in cryptocurrency investment
  funds like Alameda and Three Arrows Capital".
