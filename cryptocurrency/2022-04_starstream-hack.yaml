notes: 'Starstream, a defi project built on the Andromeda layer 2 Ethereum protocol, had its treasury drained. Blockchain
  security company CertiK reported that the treasury appeared to have contained around $4 million in STARS, all of which was
  stolen. Shortly after the hack, the attacker transferred 900 ETH ($2.9 million) to a crypto tumbler. Starstream had been
  audited by two security firms prior to the exploit.


  Total loss estimated at $4,000,000.'
