notes: 'Criminal background checker APCS faces data breach. Exclusive: The attack
  first affected an upstream provider of bespoke software. Exclusive A leading UK
  provider of criminal record checks for employers is handling a data breach stemming
  from a third-party development company. Access Personal Checking Services (APCS)
  has written to customers to notify them that their data has been compromised, according
  to emails seen by The Register , and it confirmed to us that Hull-based Intradev
  was the organization initially attacked. Third-party company: Intradev.'
