initial_attack_vector: Protocol collapse / insolvency
vendor_product: Hundred Finance
blockchain: ethereum
notes: Hundred Finance is a lending protocol that was exploited in April 2023 for around $7 million, and in March for over
  $6 million. Since then, they've worked with law enforcement and security contractors to recover the funds, but "imminent
  return of the stolen assets does not appear to be forthcoming."The project undertook a vote to shut down the lending service,
  and use remaining funds in the project treasury to try to compensate those who lost funds in the attack. The project also
  aims to distribute to victims of the hack claims on any funds that might be returned or otherwise recovered in the future.The
  vote passed with 99% of votes in support, effectively sunsetting the project.
