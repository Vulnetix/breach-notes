notes: 'Many had written off the Bored Bunny NFT project (and its subsequent spin-off NFT collections) as a rug pull. After
  releasing several new NFT collections that appeared to be little more than cash grabs, each less popular than the last,
  the team behind the project grew increasingly distant until going silent for over a month. Meanwhile, the team had pocketed
  over $21 million, largely thanks to the popularity the project had drummed up through influencer promotions from the likes
  of Jake Paul and Floyd Mayweather (both of whom, incidentally, are facing separate class-action lawsuits alleging impropriety
  in their promotions of crypto projects).Suddenly, the project creator resurfaced on March 29, with a tweet claiming that
  he had been absent for a month because he had been... reading emails. The team then announced they would be handing the
  project reins over to a community member, though there was no mention of the $21.1 million that had already been pocketed
  by the original team.The unexpected return came only days after the U.S. Department of Justice announced charges against
  two perpetrators of a different NFT rug pull, in which they stated unequivocally that "the same rules apply to an investment
  in an NFT or a real estate development. You can''t solicit funds for a business opportunity, abandon that business and abscond
  with money investors provided you."


  Total loss estimated at $21,100,000.'
