notes: Gary Vaynerchuk, an entrepreneur and now crypto/NFT personality, took to Twitter
  to express his frustration with some projects that airdrop their NFTs to big-name
  collectors and then market their projects by suggesting the person bought in of
  their own volition. There is no way for a person to prevent NFTs from being airdropped
  to their wallets, and if a person wants to get rid of them by burning or transferring
  them, they have to pay gas fees (averaging around $50 today on the Ethereum blockchain).
  In an exasperated Twitter video, Gary Vee said, "Hey NFT News and all the other
  accounts that take money from these projects that airdrop these products into my
  account and others accounts, and then say shit like 'Gary Vee owns this' or 'this
  person owns that' or 'this that'. Can you just stop doing that? It makes you look
  insane. This project is completely full of shit and is trying to trick people, and
  that sucks."
