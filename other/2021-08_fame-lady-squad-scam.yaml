date_of_breach: '2021-08-10'
date_of_disclosure: '2021-08-10'
category: other
vendor_product: Fame Lady Squad
blockchain: ethereum
financial_loss_usd: 1500000
notes: 'The "Fame Lady Squad" NFT project touted itself as a woman-designed and -developed project that would give back to
  women in the space, drawing support from high-profile individuals like Gary Vaynerchuk, and ultimately around $1.5 million
  in investments. Problem is, the three women who were supposedly running the project were a group of Russian men, accused
  by one of the individuals who uncovered the lie of trying to profit off American social causes. The group had a history
  of creating NFT projects based on false stories. One of their other projects, "Cyber City Girls Club", was intended to campaign
  to stop hate against Asians, and also originally purported to be run only by women (it wasn''t).


  Total loss estimated at $1,500,000.'
