notes: Approximately a month after halting deposits and withdrawals, citing liquidity issues and "recent market and financial
  conditions", the American crypto lender BlockFills has filed for bankruptcy. Filings in Delaware bankruptcy court reveal
  the company has between $50 million and $100 million in assets and between $100 million and $500 million in liabilities.
  The list of creditors include customers like 007 Capital and Artha Investment Partners, and the firm has a $4.75 million
  loan outstanding to fellow crypto lender Nexo. Also on the list of creditors are the Chicago Blackhawks, with whom BlockFills
  signed a sponsorship deal in 2022.BlockFills was backed by investors including Susquehanna and CME Ventures.
