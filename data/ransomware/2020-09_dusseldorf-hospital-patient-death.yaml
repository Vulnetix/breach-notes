initial_attack_vector: "Ransomware group exploited CVE-2019-19781 — a critical path traversal vulnerability in Citrix Application Delivery Controller (Citrix ADC / NetScaler) — to gain initial access to University Hospital Düsseldorf's network; the unpatched Citrix vulnerability had been known and widely exploited since January 2020"
