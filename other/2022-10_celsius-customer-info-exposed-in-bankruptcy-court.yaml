vendor_product: Celsius customer info exposed in bankruptcy court
notes: Celsius Network is undergoing bankruptcy proceedings after its impressive implosion earlier this year. The company's
  latest court filing is 14,532 pages long — because it contains the names and recent transactions of every user on the platform.
  Although the judge allowed Celsius to redact individuals' home and email addresses, the names and details of recent transactions
  are all publicly available — much to some users' horror.Among those listed in the court filing were Alex Mashinsky, his
  wife Krissy, and various other executives. The records show that Mashinsky withdrew $10 million from Celsius shortly before  the
  company's collapse, and his wife withdrew another $2 million. Chief Strategy Officer Daniel Leon also withdrew $7 million.
