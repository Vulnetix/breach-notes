notes: 'Khalil Foundation (DBA Khalil Center) (IL), a Healthcare Provider, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2024-12-22
  for a breach affecting 1153 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Network Server. Source: HHS OCR Breach Portal (HIPAA Breach
  Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured
  protected health information (PHI) affecting 500 or more individuals.'
