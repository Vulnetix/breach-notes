date_of_breach: '2022-04-12'
date_of_disclosure: '2022-04-12'
category: other
initial_attack_vector: Regulatory / legal action
vendor_product: Celsius ends Earn product in US
notes: 'Celsius announced that, in order to comply with United States regulations, they would no longer allow non-accredited
  investors from the U.S. to "earn rewards on" (that is, lend) their crypto using their Earn product. Earn advertises that
  people can "earn up to 18.63% APY, get paid weekly" by putting their crypto into a Celsius account, which Celsius then lends
  out in exchange for interest. There are, of course, no insurance protections for the user in case of losses. Non-accredited
  investors will now be limited to only using their Celsius account to exchange, borrow, or transfer crypto — not lend.Individual
  accreditation is based on net worth or income: only those with net worth above $1 million, or yearly income above $200,000,
  qualify. American Celsius users were largely unhappy with the change, with one writing, "Celsius Network making the rich
  richer. Shameful."'
