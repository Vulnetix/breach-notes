notes: Left in place for posterity's sake, but the inimitible Katie Notopoulos has determined that this "app" was all a well-executed
  prank in the post-ironic world that is web3.The Lonely Ape Dating Club project announced their plans to build a dating app
  specifically for owners of Bored Ape NFTs — NFTs featuring illustrations of apes that trade for an average of around 90
  ETH ($225,000). The app is not currently accepting signups from people who don't own a BAYC NFT, which raises more than
  a few questions about how successful a dating app will be when its pool of users seems to be overwhelmingly male, though
  perhaps I'm making too many assumptions about their sexualities. The app does promise plans to release a "Coin Digger" feature,
  which would "allow non-BAYC owners to connect with higher net worth individuals for mutual benefit", so perhaps that is
  their plan to solve that problem.Sadly, the project was cancelled in May 2022 due to "unforeseen circumstances" which I
  have to imagine were pretty foreseeable.
