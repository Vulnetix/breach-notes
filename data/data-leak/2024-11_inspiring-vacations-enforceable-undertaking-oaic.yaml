notes: 'In December 2023, Inspiring Vacations notified the OAIC of a data breach that
  occurred as a result of a publicly accessible Amazon Web Service (AWS) bucket containing
  personal information including contact, identity and limited health information
  of Australian individuals. In response to the incident, the OAIC conducted inquiries
  with Inspiring Vacations. The OAIC acknowledges that Inspiring Vacations provided
  information to demonstrate to the OAIC that it had taken steps to contain the incident,
  put steps in place to prevent customers experiencing further harm from the breach
  and that affected individuals were appropriately notified. Inspiring Vacations provided
  further assurance to the Australian Information Commissioner, and the community,
