source_name: '"MicroStrategy''s Bitcoin Maximalist CEO Saylor Hands Job to Deputy, Takes Executive Chairman Role"'
source_url: https://www.coindesk.com/business/2022/08/02/microstrategy-replaces-saylor-as-ceo-with-companys-president-saylor-to-become-executive-chairman/
date_of_breach: '2022-08-02'
date_of_disclosure: '2022-08-02'
category: other
vendor_product: Michael Saylor steps down as CEO
blockchain: bitcoin
notes: Bitcoin maximalist Michael Saylor announced he would be stepping down as CEO of MicroStrategy, which is ostensibly
  a software company but in recent years appears to be mostly a Bitcoin-purchasing company. Saylor is extremely pro-Bitcoin,
  with an emphasis on "extreme". In March 2021, when Bitcoin was at around $57,000, he urged people to "go mortgage your house
  and buy Bitcoin with it... if you've got a business that you love because your family works for the business and it's been
  in your family for 37 years, and you can't bear to sell it, mortgage it, finance it, and convert the proceeds into ... Bitcoin.
  If you're working for a company that's got $100m in the treasury, you ought to convince the CEO and the board of directors
  to convert the treasury into Bitcoin... that'd be worth billions to them."Unfortunately, that treasury strategy — which
  in his case also includes taking on more debt to buy more Bitcoin — is not currently working out so well for MicroStrategy,
  which reported a $918 million impairment charge on their Bitcoin holdings in their most recent earnings report. Saylor stepped
  down as CEO the same day.
