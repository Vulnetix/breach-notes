notes: "An attacker gained access to Tile's customer support system using credentials belonging to a former employee, then scraped millions of customer records and attempted to extort Life360 (Tile's parent company). Exposed data included names, physical addresses, email addresses, phone numbers, and Tile device IDs — no financial data, passwords, or location history was compromised. The attacker had access to tools for processing law enforcement data requests. Life360 reported the extortion attempt to law enforcement."
