notes: 'Water Bill Payment Breach Reported In Pompano Beach. A security alert for
  people in Pompano Beach. The city says a third-party software vendor used for online
  water bill payments has been compromised. The city says unauthorized access was
  gained to credit or debit card data used for payments made through the city''s website
  between August 27th and October 14th. Third-party company: Click2Gov.'
