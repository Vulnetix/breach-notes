notes: 'European Banking Authority hit by Microsoft Exchange hack. The EU body is
  one of the first major organisations to admit falling victim to the global email
  hack. The European Banking Authority''s email servers have been compromised in a
  global Microsoft Exchange cyber-attack. The EU body said personal data may have
  been accessed from its servers. And it had pulled its entire email system offline
  while it assessed the damage. Third-party company: Microsoft.'
