source_name: '"Winklevoss twins’ Gemini cutting 10% of its staff, saying ‘crypto winter’ is here"'
source_url: https://www.cnbc.com/2022/06/02/winklevoss-twins-gemini-citting-10percent-says-crypto-winter-is-here.html
date_of_breach: '2022-06-02'
date_of_disclosure: '2022-06-02'
category: other
vendor_product: Gemini layoffs
affected_count: 1000
notes: The Winklevoss twins, founders of the Gemini crypto exchange, announced to employees and in a public blog post on June
  2 that they would be laying off 10% of their workforce. They wrote that the crypto industry is "in the contraction phase
  that is settling into a period of stasis — what our industry refers to as 'crypto winter.'" According to CNBC, Gemini employed
  around 1,000 people, meaning that around 100 would lose their jobs.The announcement came on the same day that the CFTC announced
  a lawsuit against Gemini for allegedly making false or misleading statements.
