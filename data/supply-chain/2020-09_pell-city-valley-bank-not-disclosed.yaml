notes: Some Pell City utility customers may have suffered data breach (free content).
  City Manager Brian Muenger said the municipality has been informed by Valley Bank
  that some of the city’s customers may have had their data breached, specifically
  those that use lockbox. PELL CITY -- Some customers who pay the city of Pell City
  via paper check for their utility bills may have had their data breached according
  to the municipality and Valley Bank. Javascript is required for you to be able to
