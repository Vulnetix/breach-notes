category: other
initial_attack_vector: Exit scam / rug pull
vendor_product: Teddy Doge
blockchain: bsc
financial_loss_usd: 4500000
notes: 'The Teddy Doge defi project saw its token price plummet over 99% as 30 billion TEDDY were transferred from the project''s
  deployer and distributed to various wallets, which then converted the TEDDY to over 10,000 BNB ($2.56 million) and 2 million
  BUSD, a dollar-pegged stablecoin.Although the project admins blamed the theft on an outside attacker, writing on Telegram
  that they were "not certain whether it is a bug in our cross-chain bridge or a leaked developer wallet", that is a common
  refrain by developers who rug pull their own projects.


  Total loss estimated at $4,500,000.'
