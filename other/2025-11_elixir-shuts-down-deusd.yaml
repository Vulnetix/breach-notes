notes: After the defi yield platform Stream Finance announced a $93 million loss,
  Elixir announced it would be discontinuing its deUSD synthetic stablecoin. Stream
  Finance owes $68 million to Elixir, and holds around $75 million deUSD.Elixir has
  announced that they plan to allow deUSD holders to redeem their tokens for USDC
  through a process that will also eliminate the risk of Stream Finance cashing out
  their deUSD without repaying their loan. According to Elixir, "Stream comprised
  of 99%+ of the lending positions (and has decided to not repay or close positions)".
