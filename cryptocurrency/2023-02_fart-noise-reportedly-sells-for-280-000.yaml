notes: 'You thought NFTs were dead? Think again. Perhaps longing for the halcyon days when you could mint an NFT on Ethereum
  and smile in satisfaction at the carbon emissions you just blasted into the atmosphere, some Bitcoiners came up with Ordinals:
  the latest iteration of NFTs on Bitcoin, and certainly the most popular. If nothing else, I do have to give them credit
  for pushing some Bitcoin maxis into paroxysms of fury.Anyway, Bitcoin seems to be having its own little resurgence of NFT
  mania. On February 9, an "Ordinals Punk" — the Ordinals version of CryptoPunks — sold for 9.5 BTC (~$218,000). That record
  has now been broken by Inscription 2042, which is not an image but rather a 1-second-long audio recording of a fart sound.
  The NFT reportedly sold for 12.3 BTC (~$280,000), though it''s tough to verify given the lack of any sort of Ordinals marketplace.'
