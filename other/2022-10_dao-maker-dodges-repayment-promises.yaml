notes: 'In August 2021, DAO Maker (not to be confused with MakerDAO) was hacked for $7.38 million. The stolen funds were taken
  from users, rather than a project treasury, and 5,521 people lost an average of $1,250 each. DAO Maker promised to compensate
  impacted users with a mix of the USDC stablecoin and USDR: an IOU token that they promised users would be able to redeem
  a year later for 110% of its dollar value.Now that year mark is approaching, and a report from Rekt alleges that DAO Maker
  is trying to wiggle out of their promises through a governance vote, which they''ve framed as trying to "prevent major $DAO
  DUMP from USDR distributions". Meanwhile, they''ve deleted the post that explained the original distribution plan.Most members
  of the DAO today were not affected by the attack, and so stand to benefit from not honoring the payout. One voting option
  suggests that these users "had their chance" to cash out their USDR, apparently ignoring that people were holding out for
  the promised 110% redemption.Some whistleblowers have also claimed that team members have recently moved large quantities
  of DAO tokens to various wallets to vote. Some have also claimed that those team members recommended buying USDR tokens
  several months ago for below $1.10, as a safe arbitrage opportunity when they became redeemable for that amount.'
