source_name: '"Web3 Leaders Join Binance to Spearhead Web3 Industry Recovery Initiative"'
source_url: https://www.binance.com/en/blog/ecosystem/web3-leaders-join-binance-to-spearhead-web3-industry-recovery-initiative-5285759314040744618
date_of_breach: '2022-11-25'
date_of_disclosure: '2022-11-25'
category: other
notes: On November 14, CZ of Binance announced an "industry recovery fund", which
  he said would devote money to ending "further cascading negative effects of FTX
  [and] help projects who are otherwise strong, but in a liquidity crisis".In a blog
  post outlining the $1 billion initiative, Binance also divulged that "we have already
  received around 150 applications from companies seeking support under the [Industry
  Recovery Initiative]" — only a week and a half after it was announced.
