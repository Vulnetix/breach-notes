notes: Animal Jam Hacked, 46M Records Roam the Dark Web. Animal Jam, just the latest
  in a string of attacks on gaming apps, has adopted a transparent communications
  strategy after stolen data turned up on a criminal forum. The company behind the
  wildly popular kids’ game Animal Jam has announced that hackers stole a menagerie
  of account records during a breach of a third-party vendor’s server in October —
  more than 46 million of them, in fact. The company, WildWorks, said that it was
  unaware that the data had been compromised, until 7 million records turned up on
  an underground forum used by malicious actors to distribute lifted data, on Nov.
  11.
