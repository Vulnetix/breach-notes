notes: 'What Snowflake isn''t saying about its customer data breaches | TechCrunch.
  As another Snowflake customer confirms a data breach, the cloud data company says
  its position "remains unchanged.". Snowflake’s security problems following a recent
  spate of customer data thefts are, for want of a better word, snowballing. Ticketmaster
  was the first company to link its recent data breach to the cloud data company Snowflake
  , and loan comparison site LendingTree has now confirmed its QuoteWizard subsidiary
  had data stolen from Snowflake. Third-party company: Snowflake.'
