notes: Despite people periodically claiming that crypto is a panacea for the many issues that make it difficult for sex workers
  to get paid, the SpankPay crypto-based payments processor is calling it quits after their payment processor Wyre decided
  they didn't want to work with them, because their payment processor Checkout.com didn't want to work with them. As it turns
  out, it's tough to use crypto for censorship-resistance when you still need dollars at the end of the day.In a tweet announcing
  the shutdown, SpankPay reassured customers, "Rest assured your money is safe and we'll get it to you as soon as possible"
  — always a scary thing to hear from a crypto company.It seems that only the payments processing side of the business is
  shutting down, with projects including SpankChain and SpankMatch continuing to operate.
