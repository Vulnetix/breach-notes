category: cryptocurrency
initial_attack_vector: Social engineering attack
vendor_product: CityDAO Discord
blockchain: ethereum
financial_loss_usd: 92000
notes: 'Crypto investors who bought 40 acres of land in Wyoming in hopes of "building a city on the Ethereum blockchain" lost
  more than $92,000 to a Discord hack. Some clever social engineering and questionable security measures on Discord''s part
  allowed scammers to gain control of a CityDAO Discord moderator''s account, then send out fake announcements about a fake
  "land drop". The scammer received over 29.67 ETH (about $92,000).


  Total loss estimated at $92,000.'
