notes: 'CCSD says students, staff affected by third party data breach. The Clark County
  School District says a vendor it uses has experienced a data security incident.
  The school district, in a press release, notes the incident involves several other
  school districts and involves an older version of a Pearson educational program.
  559,8487 students who were enrolled between 2008 and 2019 along with a "smaller
  number" of staff members who were employed in the time period are also affected.
  LAS VEGAS (KSNV) — The Clark County School District says a vendor it uses has experienced
  a data security incident. Educational software provider Pearson is offering free
  access to credit monitoring services for individuals who were affected by the beach.
  Third-party company: Pearson Clinical Assessment (AIMSweb).'
