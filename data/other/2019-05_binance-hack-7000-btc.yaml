initial_attack_vector: "Coordinated attack combining phishing, viruses, and other techniques to steal API keys, two-factor authentication codes, and potentially other user information; attackers accumulated API keys and 2FA codes from a large number of Binance users over an extended period, then executed the withdrawal in a single large transaction that bypassed Binance's automated risk management systems by exploiting the user-level API permissions"
