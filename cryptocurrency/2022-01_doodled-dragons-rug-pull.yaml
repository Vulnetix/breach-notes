notes: 'A SolSea-verified NFT project on the Solana blockchain, Doodled Dragons, touted that they would distribute all profits
  "straight to charities protecting animals on the brink of extinction". They announced on Twitter that they would be donating
  $30,000, "our first donation", to the World Wildlife Fund. Two hours later, they tweeted, "actually. fuck that. our charity
  will instead now be... my bank account. cya nerds." They deleted the Twitter account shortly after.


  Total loss estimated at $30,000.'
