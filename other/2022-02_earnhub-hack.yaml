notes: 'EarnHub, a DeFi platform with its own rap song, suddenly saw 660 wBNB (around
  $284,000) disappear from their project. EarnHub wrote on Twitter that "A hacker
  was able to exploit our contracts and steal most of the tokens in certain pools,
  then sell them, draining our LP." However, blockchain security firm CertiK found
  in their analysis that the "hack" was likely to be a rug pull.


  Total loss estimated at $284,000.'
