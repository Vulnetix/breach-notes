source_name: '"Thala recovers $25.5M in crypto lost  through v1 farming vulnerability"'
source_url: https://cointelegraph.com/news/thala-recovers-25-million-exploiter-hacker-caught
date_of_breach: '2024-11-15'
date_of_disclosure: '2024-11-15'
category: data-leak
notes: 'The Thala Labs Aptos-based defi project suffered a $25.5 million theft when
  an attacker exploited a vulnerability in one of their smart contracts. They paused
  related smart contracts and froze tokens where they were able, ultimately freezing
  around $11.5 million in assets. After working with law enforcement and several blockchain
  security teams, they successfully negotiated the return of the assets, leaving the
  attacker with a "bounty" of $300,000.


  Total loss estimated at $300,000.'
