notes: 'It''s not much compared to at least three separate crypto Pokémon ripoffs since February that have each taken millions,
  but apparently the love of Pokémon still drew people in to the tune of $708,000.One might think the blatant rip-off of the
  Pokémon IP (which belongs to a notoriously litigious company) might have been a red flag, but nevertheless, people bought
  in to PokémonFi — a play-to-earn game that seems like a much worse version of the original thing.The project and tokens
  first launched in April. After apparently running off with the money, the project deleted its Twitter account, though its
  website remained live.


  Total loss estimated at $708,000.'
