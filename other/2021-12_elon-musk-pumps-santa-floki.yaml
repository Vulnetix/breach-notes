source_name: '"The Musk Effect: Santa Floki Coin Soared 18,800% In 2 Days Following
  Tesla’s CEO Tweet"'
source_url: https://cryptopotato.com/the-musk-effect-santa-floki-coin-soared-18800-in-2-days-following-teslas-ceo-tweet/
date_of_breach: '2021-12-25'
date_of_disclosure: '2021-12-25'
category: other
notes: On Christmas, Elon Musk tweeted a very cute photograph of his pet dog, Floki,
  wearing a Santa suit with the caption "Floki Santa". Creators of a memecoin called
  "Santa Floki" ($HOHOHO, of course) capitalized on this with a claim that he'd been
  tweeting about their coin, and the token surged by 18,840% in about 48 hours (from
  $0.000000012935 to a whopping $0.00000245). The value quickly fell back below this
  new high, and settled back to around the pre-tweet price not long after.
