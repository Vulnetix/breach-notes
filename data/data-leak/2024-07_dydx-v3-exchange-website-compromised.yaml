source_name: “DeFi Giant dYdX Says Its v3 Platform Is Compromised – Just as It's Reportedly Up for Sale”
source_url: https://www.coindesk.com/business/2024/07/23/defi-giant-dydx-says-its-v3-platform-is-compromised-just-as-its-reportedly-up-for-sale
date_of_breach: '2024-07-23'
date_of_disclosure: '2024-07-23'
category: data-leak
initial_attack_vector: DNS hijacking / domain takeover (front-end compromise)
vendor_product: dYdX v3 exchange website compromised
notes: Crypto exchange dYdX has announced that the website for their v3 exchange was compromised, and is urging people not
  to use it. This announcement came almost simultaneously with a report from Bloomberg that the company behind the exchange
  was looking to sell the software behind the v3 exchange, after they’d upgraded to what they call v4.The affected domain
  was hosted on Squarespace, which could connect this compromise to similar events earlier in the month affecting domains
  registered there.
