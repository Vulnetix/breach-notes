notes: 'Data security breach impacts City of Sioux City customers. SIOUX CITY -- A
  data security breach has potentially impacted more than 3,500 City of Sioux City
  customer utility and parking accounts. SIOUX CITY -- Another local eye clinic has
  been victimized by a malware attack on its computer systems. If you''re feeling
  generous this holiday season, particularly if you''re a senior, be wary of scammers
  who are looking to take advantage of that…. Third-party company: Click2Gov.'
