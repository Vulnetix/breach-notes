source_name: '"Genesis to Shutter Crypto Trading Desk for U.S. Market"'
source_url: https://www.coindesk.com/business/2023/09/05/genesis-global-trading-to-shutter-crypto-spot-trading-desk/
date_of_breach: '2023-09-05'
date_of_disclosure: '2023-09-05'
category: other
notes: Although Genesis Global Capital filed for bankruptcy in January 2023, portions
  of the larger business were not included in bankruptcy proceedings and continued
  to operate. One such portion was Genesis's U.S.-focused spot trading platform, at
  least until an email to clients announcing that their accounts would be closed at
  the end of the month."The decision was made voluntarily and for business reasons,"
  the email claimed.Genesis is a subsidiary of the Digital Currency Group (DCG) conglomerate,
  which has since the beginning of the year seen its Genesis platform enter bankruptcy,
  shuttered its TradeBlock subsidiary, and is reportedly approaching a deal to sell
  its CoinDesk crypto media outlet.
