vendor_product: Tether prints $1 billion
notes: Shortly after midnight on January 1, Tether added another $1 billion to its total supply. Although Tether claims that
  all of its supply is fully backed by actual currency, many (including legislators) have cast doubt on the veracity of this
  claim. Large additions to their supply such as this one, which have become quite a regular occurrence for Tether, raise
  further eyebrows, with commenters online speaking of them "printing" money. Some speculated that this recent move was an
  attempt to pump the value of Bitcoin, which had declined over the month of December — starting the month at about $57,000
  and ending it about $10,000 lower.
