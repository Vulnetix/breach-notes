source_name: '"Justice Department Investigation Leads to Takedown of Darknet Cryptocurrency
  Mixer that Processed Over $3 Billion of Unlawful Transactions"'
source_url: https://www.justice.gov/opa/pr/justice-department-investigation-leads-takedown-darknet-cryptocurrency-mixer-processed-over-3
date_of_breach: '2023-03-15'
date_of_disclosure: '2023-03-15'
category: other
notes: Law enforcement from the United States, Germany, and the European Union worked
  together to take down the ChipMixer cryptocurrency tumbler, which they allege had
  been used to launder $3 billion since 2017 related to "ransomware, darknet market,
  fraud, cryptocurrency heists and other hacking schemes". The US Department of Justice
  also charged an individual with money laundering, operating an unlicensed money
  transmitting business, and identity theft in connection with the project.According
  to the US DOJ, ChipMixer had been used to process, among other things, proceeds
  of the massive March 2022 Axie Infinity hack by a North Korean cybercrime group.US
  law enforcement seized two domains and a Github account tied to the organization,
  and German law enforcement seized ChipMixer's back-end servers and $46 million in
  cryptocurrency.
