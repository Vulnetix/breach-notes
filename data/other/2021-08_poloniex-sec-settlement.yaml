notes: Poloniex, a cryptocurrency exchange, agreed to pay more than $10.3 million in a settlement with the SEC. The SEC had
  alleged that Poloniex had flouted securities laws from 2017 thorugh 2019 by operating an unregistered trading platform.
  In the settlement, Poloniex neither admitted nor denied the charges.The US-based Poloniex was acquired in 2018 by Circle,
  then in late 2019 by an investment group that included Justin Sun. Sun moved Poloniex to the Seychelles and closed U.S.
  operations upon acquiring the platform.
