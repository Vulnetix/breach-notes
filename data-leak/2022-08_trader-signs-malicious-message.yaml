notes: 'An experienced crypto trader lost $470,000 to a hack when they signed a malicious message that permitted an attacker
  to drain all of their USDC stablecoins from their crypto hot wallet. Unlike most crypto hacks that involve approving malicious
  contracts, this hack was perpetrated when the trader was tricked into simply signing a malicious message. Signing a message
  tends to be a safer and more common action with crypto wallets, and so traders are not always as careful, though as this
  trader discovered, it can still have catastrophic impacts.


  Total loss estimated at $469,146.'
