notes: 'The defi protocol Prisma Finance was hacked for 3,257 ETH ($11.5 million). An attacker was able to take advantage
  of a flaw in the project''s smart contracts, allowing them to manipulate users'' positions and steal some of their collateral.
  Two other watchful attackers observed the attack strategy and replicated it, stealing a combined additional 173 ETH (~$610,000).Plasma
  paused the protocol after detecting the attack.The first attacker, who stole the bulk of the assets, sent an on-chain message
  to Prisma claiming that they had performed a "whitehat rescue", and inquired about returning the funds. In later messages,
  however, they asked the project to answer questions about their security practices and projects'' responsibilities to users
  to prevent attacks. The attacker then transferred the stolen funds to Tornado Cash — indicating their return is unlikely.In
  another message, the attacker was angry that Prisma had not expressed gratitude to them or remorse to their users, and was
  angry they had used terms like "exploit" and "attack" in their description of the incident. They demanded that the team
  reveal their identities, apologize, and thank the attacker in an online press conference.


  Total loss estimated at $12,000,000.'
