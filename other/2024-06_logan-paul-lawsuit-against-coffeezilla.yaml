date_of_breach: '2024-06-27'
date_of_disclosure: '2024-06-27'
category: other
notes: A year and a half after threatening to sue YouTuber Coffeezilla for his series
  of videos exposing influencer Logan Paul's (alleged) role in (allegedly) scamming
  his large following with a failed blockchain game, Paul has followed through on
  the threat. Although he acknowledges in the lawsuit that the project was definitely
  a scam, Paul says that he too was duped by several "conmen" who he'd brought on
  as advisers.In the lawsuit, Paul claims that Coffeezilla knowingly falsely accused
  Paul of being in on the scam in hopes of getting more attention on his videos. Paul
  is seeking more than $75,000 in damages.In January 2024, Paul filed suit against
  the advisers he's described as "conmen". He's also pointed the finger at them while
  defending a potential class action complaint from defrauded investors.
