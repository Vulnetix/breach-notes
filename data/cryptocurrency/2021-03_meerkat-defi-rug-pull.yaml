source_name: '"Binance Smart Chain ''copykat'' project loses $31 million in possible rugpull"'
source_url: https://cointelegraph.com/news/binance-smart-chain-copykat-project-loses-31-million-in-possible-rugpull
date_of_breach: '2021-03-04'
date_of_disclosure: '2021-03-04'
category: cryptocurrency
vendor_product: Meerkat DeFi
blockchain: bsc
financial_recovered_usd: 31000000
notes: The team behind the Meerkat DeFi protocol claimed they had been victims of a hack, but subsequently disappeared from
  the web after the equivalent of $31 million in Binance Coin (BNB) and BUSD was pulled from the project. Two days later,
  a developer for the project wrote that the project had been a "test [of] user greed and subjectivity", and aimed to "[help]
  users realize the potential danger in smart contracts [and] the subjectivity in the audit processes of audit companies."
  The developer wrote that all victims would be refunded. Some believed that the bizarre "experiment" explanation was to cover
  that Binance had stepped in to address the scam.
