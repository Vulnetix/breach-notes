source_name: '"''A Huge Scam'': Fans Who Bought Tekashi 6ix9ine-Backed NFTs Are Pissed"'
source_url: https://www.rollingstone.com/culture/culture-news/tekashi-6ix9ine-trollz-nft-scam-hack-1272511/
date_of_breach: '2021-10-28'
date_of_disclosure: '2021-10-28'
category: other
notes: '$100,000 to charity, governance power over the project funds, a boxing game,
  and weekly competitions and raffles were all promised as a part of the Tekashi 6ix9ine-backed
  Trollz NFT collection. However, the project crumbled shortly after it began, with
  creators removing the ability to mint new NFTs before the designated number were
  released, a takeover of a Discord bot funneling prospective buyers to scam links,
  and the rapper deleting any trace of his affiliation with the project. One buyer
  lost $40,000; around $4 million in total was poured into the apparent scam.


  Total loss estimated at $4,000,000.'
