vendor_product: Celsius customers send letters to bankruptcy judge
notes: Celsius customers have begun to send letters to the judge presiding over Celsius Network's bankruptcy case in the Southern
  District of New York. More than fifty letters have been entered into the docket since July 15, and new letters are continually
  being added.Many customers write of being convinced by Alex Mashinsky personally, particularly in his weekly "AMA"s where
  he regularly claimed that Celsius was a safe platform with substantial reserves that could cover any potential losses. Mashinsky
  often denigrated traditional banks, referring to Celsius as a better and safer option.Some of the letters are particularly
  heartbreaking, with customers referring to suicidal ideation or saying that they've been too ashamed to share the news of
  their financial losses with their family. One woman included a copy of an email she sent to Mashinsky and Celsius support,
  pleading for them to allow her access to her crypto, and including an ultrasound photo of a baby. "I do need the fund to
  pay for the hospital, doctor and baby items such as cot, clothes, nappies etc. I also need the fund to pay for school fees
  for my two other school aged children," she wrote.
