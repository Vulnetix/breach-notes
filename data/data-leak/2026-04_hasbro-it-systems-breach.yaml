notes: "In late March / early April 2026, Hasbro Inc. — the US toy and entertainment conglomerate (maker of Monopoly, Transformers, My Little Pony, Magic: The Gathering, Dungeons & Dragons, and numerous other major brands) — disclosed that its IT systems had been compromised in a cyberattack. Hasbro confirmed that data had been stolen and that some operations were disrupted, and warned that a full IT recovery may take time. Hasbro reported annual revenues of approximately $4.1 billion and employs approximately 7,000 people globally. The company is headquartered in Pawtucket, Rhode Island. At time of initial disclosure, Hasbro had not publicly identified the threat actor responsible, disclosed the nature of the stolen data, or confirmed whether a ransom demand had been made. The company engaged cybersecurity forensics firms to assist with investigation and remediation. Hasbro had previously suffered a breach in 2023 when an employee was found to have leaked confidential business information to an outside party. The 2026 breach is significantly more severe in scope, involving external attackers and confirmed data exfiltration. The incident highlights the ongoing risk of cyberattacks against major consumer goods and entertainment intellectual property holders, whose brand equity, game designs, licensing agreements, and entertainment content represent high-value targets for both financially motivated criminals and nation-state actors seeking intellectual property."
