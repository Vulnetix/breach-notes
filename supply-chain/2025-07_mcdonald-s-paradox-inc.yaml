notes: '''123456'' password exposed chats for 64 million McDonald’s job chatbot applications.
  Cybersecurity researchers discovered a vulnerability in McHire, McDonald''s chatbot
  job application platform, that exposed the chats of more than 64 million job applications
  across the United States. Updated title to reflect thats these are not 64 million
  unique applicants, but rather applications on the job chatbot. The flaw was discovered
  by security researchers Ian Carroll and Sam Curry, who found that the ChatBot''s
  admin panel utilized a test franchise that was protected by weak credentials of
  a login name "123456" and a password of "123456". Third-party company: Paradox,
  Inc..'
