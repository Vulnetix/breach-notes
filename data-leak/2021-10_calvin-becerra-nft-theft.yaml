notes: 'NFT collector Calvin Becerra fell for some social engineering on Discord: "Guys posing as buyers in Discord were helping
  me troubleshoot a problem we thought was happening... They walked me through language settings in my MetaMask and had me
  choose an option and took everything." The scammers obtained three of his "Bored Ape Yacht Club" NFTs (one pictured), which
  collectively valued around $1 million. Becerra successfully lobbied OpenSea, Rarible, and NFT Trader to block sales of the
  stolen NFTs, though some viewed the NFT exchanges'' intervention as a demonstration that these exchanges can indeed interfere
  with access to the blockchain.


  Total loss estimated at $1,000,000.'
