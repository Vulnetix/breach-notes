notes: 'Black Kite third-party breach timeline entry for Toronto Symphony Orchestra.
  Data breached: Names, email addresses, TSO Patron ID and information about TSO accounts
  (e.g. donor level, credit on account status, gift certificate status), personal
  information, demographic information (age range, gender, ethnicity), and opinions
  on the TSO. Use of third party: Mailing list provider. Third-party company: WordFly.'
