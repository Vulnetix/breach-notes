notes: The ThorChain project is in crisis amid news that the project is insolvent.
  In order to prevent what would effectively be a bank run and likely death spiral,
  the project has paused portions of the protocol while determining how best to handle
  the problem. According to Twitter user TCB, the project has almost $200 million
  in liabilities, with only $107 million in assets — assets which can be quickly withdrawn
  or depleted in the case of a panic.The team has announced that the pause will last
  for 90 days as they explore options to save the project.
