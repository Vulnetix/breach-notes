notes: 'Grace Lutheran Communities Falls Victim of ALPHV/Blackcat Ransomware Attack.
  Grace Lutheran Communities in Wisconsin, a provider of rehabilitation services,
  assisted living, independent living, and skilled nursing, has experienced Washington
  County Hospital and Nursing Home, Bay Area Anesthesia, Grace Lutheran Communities,
  and Cardiothoracic and Vascular Surgeons in Texas have reported breaches of the
  protected health information of patients. On February 17, 2024, Grace Lutheran Communities
  discovered that a ransomware group – ALPHV/Blackcat – had published some of the
  stolen data on its data leak site. Grace Lutheran Communities said it is committed
  to ensuring the privacy and security of patient data and is enhancing network security
  to prevent similar attacks in the future. Grace Lutheran Communities has yet to
  confirm how many individuals have been affected. Third-party company: Bowden Barlow
  Law, P.A..'
