notes: "On 8 June 2024, BlackSuit (rebrand of Royal ransomware / Conti successor) attacked Japanese media/gaming giant Kadokawa and its Niconico video platform. 254,241 individuals' data was confirmed leaked. Attackers threatened to release 1.5 TB of data; Kadokawa reportedly paid approximately $3 million ransom. Niconico was offline for nearly two months; Kadokawa's stock dropped 20%+ following the attack. Publishing operations, e-book distribution, and the Kadokawa Umbrella shop were disrupted."
