vendor_product: Lummis and Gillibrand solicit feedback on bill via Github
notes: After announcing their crypto-friendly proposed legislation earlier in June, Senators Lummis and Gillibrand have uploaded
  it to Github to solicit feedback, as was apparently widely requested of them by crypto advocates.As one might expect, apparently-unmoderated
  open comments from some of the most online people out there has been off to a chaotic start. The first comment on the proposal,
  by a user with a Pepe the Frog avatar, is titled "Taxation is theft!" and reads, "Why should we pay any taxes to a corrupt
  government that prints money out of thin air and gives it away for free! Eliminate the FED!!! BITCOIN FOREVER!"Another comment
  thread begins, "Feds are not looking post floppa" and accumulated over 100 replies containing photos of caracals within
  half an hour.A different person submitted a pull request replacing the entire text of the bill with "cryptocurrencies are
  banned lmao".On July 13, the creators of the Github repository removed all the issues and archived the repository, apparently
  bringing the experiment to its end.
