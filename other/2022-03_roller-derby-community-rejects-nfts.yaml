source_name: '"When NFTs came to roller derby, roller derby put up a fight"'
source_url: https://www.vox.com/recode/22992646/roller-derby-nfts-crypto
date_of_breach: '2022-03-24'
date_of_disclosure: '2022-03-24'
category: other
notes: After three roller derby stars announced an NFT project called "'Bout Time",
  the roller derby community was fairly united in its displeasure with the idea. Though
  the project intended to donate some of their proceeds back to the roller derby community,
  the overwhelming response appeared to be that engaging with NFTs was indefensible
  even if the project did provide money for the derby leagues. Most concerns seemed
  to revolve around the environmental impact of NFTs in general, as well as the scams
  that are rampant in the NFT world. After considering the feedback to their project,
  the three skaters announced that they would not be continuing with the project,
  which was due to mint on March 31. One of the project founders told Vox, "If this
  community doesn't want us to run this project, then we're not going to do this project
  for them. The whole reason was to raise money for the derby community, and they
  so strongly spoke out against us."
