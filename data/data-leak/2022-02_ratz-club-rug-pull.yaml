notes: 'Mexican VTuber Zilverk created an NFT project called Ratz Club, built on the Solana blockchain. On February 6, the
  project announced that a developer they had contracted drained all of the funds from the project wallet. The project lost
  about 1,300 SOL, or around $140,000. The project announced that Zilverk and another developer would be putting their own
  money back into the project, and that "you are going to be able to replace your Ratz with a new series of Ratz, all holders
  will receive the same amount of Ratz they had minted for free. (Since the Ratz you already minted are kinda are useless)."


  Total loss estimated at $140,000.'
