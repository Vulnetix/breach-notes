source_name: '"Wintermute claims Near backed out of $11M stablecoin redemption deal"'
source_url: https://cointelegraph.com/news/wintermute-says-near-protocol-reneged-usn-deal
date_of_breach: '2023-11-07'
date_of_disclosure: '2023-11-07'
category: other
notes: '"Public service announcement or ''how we are not really friends with Near
  Foundation and Aurora Labs going forward''", wrote Wintermute CEO Evgeny Gaevoy
  on Twitter. He launched into a thread accusing Near and Aurora of refusing to honor
  a previous agreement to facilitate the redemption of around 11.2 million USN, the
  de-pegged stablecoin of the Near network. Wintermute said they had helped FTX to
  sell that quantity of the USN tokens, providing them with dollars to disburse to
  creditors, under the belief that Near and Aurora would help them honor the USN redemptions
  at $1.However, Near later decided it would not honor the redemption, accusing Wintermute
  of trying to pull off an arbitrage trade with the distressed asset. They also, somewhat
  curiously, claimed that the funds that were provided to Wintermute by the FTX estate
  may have been the tied to illegal activities. Aurora also described Wintermute''s
  claims as "unfounded", and accused Wntermute of "tr[ying] to exploit the programme
  to profit from the purchase of distressed assets from the Alameda estate".Wintermute
  has promised to "pursue all legal avenues" against the Near Foundation and Aurora
  Labs.'
