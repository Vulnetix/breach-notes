source_name: '"Fake MetaMask Governance Token Soars 2600% and Gets Rug-Pulled"'
source_url: https://cryptopotato.com/beware-fake-metamask-governance-token-soars-2600-in-24-hours/
date_of_breach: '2021-12-28'
date_of_disclosure: '2021-12-28'
category: cryptocurrency
initial_attack_vector: Smart contract exploit / hack
vendor_product: MetaMask fake token launch
blockchain: ethereum
financial_loss_usd: 1800000
notes: 'Scammers took advantage of rumors that MetaMask, a popular Ethereum wallet, would be airdropping governance tokens.
  The scammers created a fake MetaMask token, $MASK, and managed to inject code into the popular DEXTools trading app to show
  the token as verified. The token reached over $9 million in traded volume before scammers pulled the liquidity, making off
  with about $1.8 million worth of Ethereum.


  Total loss estimated at $1,800,000.'
