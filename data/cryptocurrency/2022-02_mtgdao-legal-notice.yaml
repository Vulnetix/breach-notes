notes: 'The fledgling mtgDAO promised to deliver a "crypto NFT card economy" based around the Magic: The Gathering card game
  published by Wizards of the Coast. Needless to say, WotC sent them an email to inform them that their "intended use of Wizards''
  intellectual property, including its trademarks and copyrights, would be unlawful". This prompted mtgDAO to publish a 20-tweet-long
  thread about "why WotC is ngmi", where they accused WotC of "unfairly discriminat[ing] against web3 tech and web3 communities"
  by protecting their intellectual property. It''s unclear where mtgDAO will go from here — they wrote in the thread that
  they hope to "help [WotC] see something like mtgDAO, and web3 in general, as an opportunity and not a threat", but I suspect
  they will not have much luck convincing WotC to let them infringe upon their intellectual property out of the goodness of
  their own hearts. On February 15 the project said what was already pretty clear: "I don''t know shit about copyright law"
  and that "I''ll tell you that mtgDAO NFTs being IP infringement is not intuitive to me."'
