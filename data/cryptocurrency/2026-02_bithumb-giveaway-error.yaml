notes: 'The South Korean cryptocurrency exchange Bithumb disclosed that it had accidentally given its customers more than
  620,000 BTC (~$44 billion) in a promotional event gone wrong. Intending to reward each customer with at least ₩2,000 (~$1.40),
  the exchange accidentally rewarded each customer at least 2,000 BTC (almost $140 million).The exchange announced that they
  had recovered 99.7% of the erroneously awarded tokens, leaving around 1,860 BTC (~$130 million) unaccounted for.The incident
  has drawn further scrutiny from Korean regulators, who said that the error "has exposed the vulnerabilities and risks of
  virtual assets." Regulatory agencies in the country had already been cracking down on crypto firms following a $30 million
  hack of the Upbit crypto exchange in November 2025.


  Total loss estimated at $132,000,000.'
