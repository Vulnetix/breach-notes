source_name: '"SEC Charges Crypto Entrepreneur Justin Sun and his Companies for Fraud
  and Other Securities Law Violations"'
source_url: https://www.sec.gov/news/press-release/2023-59
date_of_breach: '2023-03-22'
date_of_disclosure: '2023-03-22'
category: other
notes: His (former?) Excellency Justin Sun has been charged by the US Securities and
  Exchange Commission for offering unregistered securities. His businesses, the Tron
  Foundation and two BitTorrent-related entities, were also named in the complaint.
  According to the SEC, Sun offered the unregistered securities TRX and BTT, and "fraudulently
  manipulat[ed] the secondary market for TRX through extensive wash trading". He also
  allegedly "orchestrat[ed] a scheme to pay celebrities to tout TRX and BTT without
  disclosing their compensation".Eight celebrities were also charged with violations
  of anti-touting law.
