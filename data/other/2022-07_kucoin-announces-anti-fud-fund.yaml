notes: Those in the crypto ecosystem have long claimed to embrace the principles of
  censorship resistance and freedom of speech, but apparently some of them draw the
  line at speech that's critical of them. Johnny Lyu, CEO of the KuCoin crypto exchange,
  announced on Twitter that the company would be creating an "Anti-FUD Fund" to combat
  "FUD" — an acronym for "fear, uncertainty, and doubt" that has come to be used to
  describe any criticism or tough questions directed at crypto projects.In his Twitter
  thread, Lyu outlines how the fund will "implement Anti-FUD education", "motivate
  and acclaim industry leaders and influencers who are always responsible, delivering
  trusted information", and "effectively trace FUDers who intentionally spread FUD
  and take legal actions against them if needed".Something tells me his list of "industry
  leaders and influencers" to "acclaim" won't include those who are rightfully skeptical
  of crypto.
