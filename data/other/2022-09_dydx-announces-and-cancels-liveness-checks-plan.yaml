source_name: '"dYdX Cancels $25 Deposit Bonus Campaign After Twitter Roasts Webcam ''Liveness Check''"'
source_url: https://beincrypto.com/dydx-cancels-25-deposit-bonus-campaign-after-twitter-roast/
date_of_breach: '2022-09-01'
date_of_disclosure: '2022-09-01'
category: other
vendor_product: dYdX announces and cancels "liveness checks" plan
notes: The decentralized crypto exchange dYdX announced on August 31 that they would give users $25 if they completed a "liveness
  check", which is accomplished by taking webcam facial scans that can then be compared with scans from other accounts on
  the exchange in an attempt to combat Sybil attacks.This infuriated many crypto users, who were horrified that dYdX would
  try to collect this kind of biometric data. "DYDX just nuked itself. I would never use this platform," wrote a prominent
  trader.On September 1, dYdX tweeted that "Due to extremely overwhelming demand of the $25 deposit bonus promotion, we are
  ending the campaign, effective immediately. Thank you to the many thousands of new users that onboarded to dYdX today. We
  truly underestimated the amount of interest the campaign garnered." They made no mention of the backlash against the liveness
  checks, but quietly removed the mentions of the system from their website.
