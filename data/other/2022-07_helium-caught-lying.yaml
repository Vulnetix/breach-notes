source_name: '"Web3 darling Helium has bragged about Lime being a client for years. Lime says it isn''t true."'
source_url: https://mashable.com/article/helium-lime-web3-crypto
date_of_breach: '2022-07-29'
date_of_disclosure: '2022-07-29'
category: other
vendor_product: Helium caught lying
notes: Helium, a network of wireless hotspots for low-power devices whose operators are incentivized by a crypto token, has
  been lying about its relationship with scooter rideshare company Lime. According to an investigation by Matt Binder in Mashable,
  Helium has been boasting that Helium is used by Lime on their website and describing them in press coverage as a prominent
  user of the network despite the fact that Helium and Lime never had a formal relationship. "Helium has been making this
  claim for years and it is a false claim", said a Lime spokesperson.Helium is a common name that comes up when people are
  pressed to provide examples of web3 use cases. The New York Times ran a feature on the company in February 2022, titled
  "Maybe There's a Use for Crypto After All", where Kevin Roose lavished praise on the company and wrote that they had "largely
  avoided the hype and inflated claims that surround many crypto projects" (oops) and repeated the false claim about a Lime
  partnership (double oops). Lime said that the Times never contacted them to fact-check the claim; meanwhile, Helium founder
  Amir Haleem prominently points people to the article with a pinned tweet.However, a recent Twitter thread by Liron Shapira
  drew attention to the fact that the company's total monthly revenue from network usage is only $6,500  — raising questions
  about the feasibility of hotspot operators actually earning much in the way of rewards (as the rewards are distributed based
  on network usage).Following the publication of Binder's article, Helium quietly removed Lime's logo from their website,
  along with that of Salesforce, a CRM software company. Salesforce also confirmed to The Verge that they had no partnership
  with Helium, and that the graphic on the Helium website where Salesforce's logo was displayed as a user of Helium was "not
  accurate".
