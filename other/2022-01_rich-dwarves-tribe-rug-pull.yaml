notes: 'The Rich Dwarves Tribe was an NFT project announced in December 2021, which
  minted in January 2022. The project had been heavily promoted by musicians including
  NeYo, Jason Derulo, BowWow, and Fred Durst. It promised a metaverse "tavern", giveaways,
  a crypto project incubator, and NFTs that would "mine coins for you". However, shortly
  after the project minted out, its creators disappeared with the funds and abandoned
  the project.


  Total loss estimated at $2,916,665.'
