notes: Travel company Trip.com has some perturbed crypto holders on its hands, after shutting down the "Trekki" NFT project
  it launched in June 2023. The company's dolphin-themed NFTs had come with a roadmap that promised eventual staking features,
  "travel to grow" and "travel to earn" mechanisms, and other developments, which have been cancelled. However, Trip.com promised
  that its discount coupon functionality would remain."Can't believe @Trip a multibillion company is also a rugged project,"
  wrote one person in response to the shutdown announcement.
