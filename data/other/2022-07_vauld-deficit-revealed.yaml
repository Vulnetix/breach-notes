source_name: '"Vauld issues letter to its creditors, disclosing $70 million shortfall"'
source_url: https://www.theblock.co/post/156901/vauld-letter-creditors-shortfall-70-million
date_of_breach: '2022-07-11'
date_of_disclosure: '2022-07-11'
category: other
notes: 'Crypto lending firm Vauld, which suspended withdrawals and announced they
  were considering restructuring on July 4, have disclosed to their creditors a shortfall
  of around $70 million. They explained this was due to mark-to-market losses relating
  to the declining pricess of Bitcoin, Ether, and Polygon, as well as exposure to
  the now-collapsed Terra stablecoin UST. They also attributed some of the shortfall
  to longterm loans that can''t be called back for another 3–11 months.Several weeks
  prior, Vauld had cut 30% of staff, slashed executive salaries, and began various
  other cost-cutting measures.Rival firm Nexo has said it is considering acquiring
  Vauld, though some have expressed skepticism that Nexo is in a position to afford
  such an acquisition.


  Total loss estimated at $70,000,000.'
