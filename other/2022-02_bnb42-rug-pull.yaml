notes: 'BNB42 was a "100% decentralized investment platform" that promised investors
  a 20% daily return on their investments. Unsurprisingly, that turned out to be too
  good to be true when the project owners deployed unaudited contracts that prevented
  anyone but themselves from withdrawing, and drained 6,445 BNB ($2.78 million) that
  quickly went to cryptocurrency tumblers. Around 6,000 investors lost money, presumably
  after being drawn by the unbelievable promises, like "earn 200% and double your
  investment in just 10 days". As is tradition, the project''s Twitter account and
  website were wiped shortly after the investors cut and run.


  Total loss estimated at $2,780,000.'
