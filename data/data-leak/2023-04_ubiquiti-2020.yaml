notes: 'In December of 2020, Ubiquiti suffered a breach at the hands of an employee.
  This employee masked his presence via a VPN and was able to clone the company&rsquo;s
  GitHub repository and alter logs in AWS to hide their presence and evidence of the
  breach. After the attacker leaked false details of the attack to a well-known security
  blogger, Ubiquiti&rsquo;s stock lost 4 billion dollars in value.


  Sourced from breaches.cloud'
