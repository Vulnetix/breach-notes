source_name: '"Users of Hong Kong Crypto Exchange Coinsuper Say They Cannot Withdraw
  Funds"'
source_url: https://www.coindesk.com/policy/2022/01/07/users-of-hong-kong-crypto-exchange-coinsuper-say-they-cannot-withdraw-funds/
date_of_breach: '2022-01-07'
date_of_disclosure: '2022-01-07'
category: other
notes: Users reported not being able to withdraw currency from their accounts with
  Coinsuper, a Hong Kong-based crypto exchange. Although trading has remained active
  on the platform to date, some users have said they have spent months trying to withdraw
  their funds, to no avail. A group have filed a complaint to the police. Communication
  from Coinsuper has been practically nonexistent, both to users and to their investors.
