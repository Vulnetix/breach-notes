notes: After India froze the assets of the WazirX cryptocurrency exchange due to suspicions
  they were enabling money laundering, suddenly no one wants to admit to operating
  it.Despite a 2019 blog post by Binance titled, "Binance Acquires India's Leading
  Digital Asset Platform WazirX to Launch Multiple Fiat-to-Crypto Gateways", Binance
  CEO Changpeng Zhao ("CZ") tweeted that "Binance does not own any equity in Zanmai
  Labs, the entity operating WazirX", and that besides wallet services and an off-chain
  transaction integration, "WazirX is responsible all other aspects of the WazirX
  exchange". These statements were disputed by Nischal Shetty, the founder of WazirX,
  who stated in no uncertain terms that WazirX was acquired by Binance. "Binance owns
  WazirX domain name. Binance has root access of AWS servers. Binance has all the
  Crypto assets. Binance has all the Crypto profits", Shetty wrote on Twitter.
