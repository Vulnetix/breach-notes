vendor_product: Vatican plans metaverse NFT gallery
notes: A press release from metaverse developer Sensorium announced a "VR and NFT gallery" that would host art and content
  for the Vatican. The project will allow VR, PC, and mobile interactions, and enable people to "build unique NPCs and communicate
  with them". That part is a promising prospect for anyone interested in watching the Roman Catholic Church try to deal with
  the challenges of moderating metaverse shenanigans, and made altogether more amusing by the fact that Sensorium's current
  collection of example metaverse avatars are all hypersexualized, apparently covered in oil, and wear skimpy or sheer outfits
  apparently made from mesh, latex, and various harnesses.For now it sounds like the project doesn't involve selling NFTs,
  which raises the question of why NFTs are required at all when the goal seems to just be to display artwork online — something
  the Vatican already does. Personally, until I can own the Popemobile in the metaverse, I'm not interested.
