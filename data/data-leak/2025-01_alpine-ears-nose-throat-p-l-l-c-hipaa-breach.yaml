notes: 'Alpine Ears, Nose & Throat, P.L.L.C. (CO), a Healthcare Provider, submitted
  a HIPAA breach notification to the HHS Office for Civil Rights (OCR) on 2025-01-17
  for a breach affecting 65648 individuals. Breach type: Unauthorized Access/Disclosure.
  Information location: Network Server. Source: HHS OCR Breach Portal (HIPAA Breach
  Notification Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured
  protected health information (PHI) affecting 500 or more individuals.'
