notes: 'A project called Squiggles generated an enormous amount of hype before its launch, with hundreds of thousands of members
  in its Discord and followers on Twitter. Just before the project launched on February 10 with its whopping 1 ETH initial
  mint price (around $3,100), a 60-page dossier was published that claimed to expose the people behind the project as the
  same group who had pulled off a long list of other NFT rug pulls: League of Sacred Devils, League of Divine Beings, Vault
  of Gems, Lucky Buddhas, Dirty Dogs, Sinful Souls and Faceless. The project, which was expected to generate around $20 million
  in sales, still enjoyed some trading volume, though YouTuber and crypto scam researcher CoffeeZilla has opined that millions
  of dollars in trading appears to be the project founders trying to generate hype with shadow wallets. CoffeeZilla also reported
  on the people behind the scam ring allegedly threatening those who exposed them, promising lawsuits, threatening to publish
  fake news stories accusing their families of crimes, and even saying they had put out hits on people. OpenSea delisted the
  project shortly after mint, and as of February 17, the NFTs were selling on the OpenSea alternative LooksRare for 0.1–0.2
  ETH (between $280 and $575).'
