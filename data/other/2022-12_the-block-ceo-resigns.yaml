vendor_product: The Block CEO resigns
notes: The Block is a cryptocurrency-focus media outlet that was originally founded in 2018 by Mike Dudas. In 2020, Michael
  McCaffrey became CEO of the company, and in 2021 he led a buyout to make the company employee-owned. Dudas says that at
  the time, he believed "McCaffrey's family was wealthy and loaned him money to buy out [his stake] and the VCs so the team
  could assume full independent ownership."Now it has come to light that McCaffrey had actually taken a series of loans amounting
  to $43 million from Sam Bankman-Fried, founder of the now-collapsed FTX exchange and Alameda trading firm. According to
  McCaffrey and various others at The Block, he was the only one who knew of the arrangement.The original $12 million loan
  was used for the company buyout. Another $15 million loan in January 2022 went towards company operations. A third $16 million
  loan was used... to buy personal real estate in the Bahamas.Meanwhile, The Block's disclosures page reads, "It is critical
  that The Block is fully transparent about our own financial holdings so as to avoid any appearance of bias or impropriety.
  The most valuable asset that we hold and strive to earn again every day is our reader's trust. Therefore, we have implemented
  a financial disclosure policy that is industry leading."
