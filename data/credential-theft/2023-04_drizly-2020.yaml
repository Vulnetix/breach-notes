notes: 'In July 2020, Drizly, an on-demand alcohol delivery service, suffered a data
  breach that exposed the personal information of over 2 million users data. The source
  of the breach was an executive&rsquo;s GitHub account that was the victim of a credential-stuffing
  attack. With access to GitHub, the attacker could find AWS credentials, reconfigure
  AWS security settings, and access a customer database, leading to the leak of 2
  million user records.


  Sourced from breaches.cloud'
