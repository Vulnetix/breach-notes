notes: 'Dish confirms ransomware attack allowed hackers to steal personal data | TechCrunch.
  Dish said a ransomware attack is to blame for an ongoing, multiday outage and warned
  that hackers exfiltrated data from company systems. U.S. satellite television provider
  Dish confirmed that a ransomware is to blame for an ongoing outage and warned that
  intruders exfiltrated data from its systems. The multiday outage , which began last
  Thursday and was confirmed by Dish on Monday, is affecting Dish’s main website,
  apps and customer support systems, along with the company’s Sling TV streaming and
  wireless services. Third-party company: DISH Network Corporation.'
