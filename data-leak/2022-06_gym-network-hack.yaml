notes: 'Attackers stole around $2.1 million from the GYM Network defi project after exploiting a bug in a recently-deployed
  contract that failed to check the identity of the caller. The attackers quickly transferred the stolen funds to the Tornado
  Cash cryptocurrency tumbler to cover their tracks.GYM Network promised to use the entire project treasury to bolster the
  price of their token, which tanked as a result of the massive sell-off. "We can''t promise that it will bring the price
  back to 0.20$ but we will use it All to recover this attack," they wrote on Telegram.


  Total loss estimated at $2,100,000.'
