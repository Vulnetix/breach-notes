notes: 'Lucky Star Currency was an NFT-focused project released by a group claiming to be made up of astrologists. The group
  was heavily promoted on Chinese news and Q&amp;A platforms. However, not long after its release, the contract creator withdrew
  more than 1.6 million LSC tokens and swapped them for approximately $1.1 million.


  Total loss estimated at $1,100,000.'
