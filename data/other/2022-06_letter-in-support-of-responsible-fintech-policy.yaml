notes: 'A group of 26 technologists (disclosure: myself included) have signed an open
  letter to U.S. lawmakers urging them to "take a critical, skeptical approach toward
  industry claims that crypto-assets ... are an innovative technology that is unreservedly
  good". The letter is an effort to push back against the well-funded crypto lobbyists
  attempting to influence U.S. lawmakers.The Financial Times writes, "While individuals
  have made similar warnings about the safety and reliability of digital assets, it
  marks a more organised effort to challenge the growing influence of crypto advocates
  who want to resist attempts to regulate the frothy sector."'
