source_name: '"President Of Sham United Nations Affiliate Convicted Of Cryptocurrency
  Scheme"'
source_url: https://www.justice.gov/usao-sdny/pr/president-sham-united-nations-affiliate-convicted-cryptocurrency-scheme
date_of_breach: '2022-03-18'
date_of_disclosure: '2022-03-18'
category: other
notes: Asa Saint Clair created an organization called the World Sports Alliance, which
  he falsely described to prospective investors as being closely affiliated with the
  United Nations (for some reason). Saint Clair convinced more than 60 people that
  they should invest in his IGObit digital coin offering, stating they would received
  guaranteed return on investment, but instead he just took the money and used it
  for his own purposes. Saint Clair was convicted on March 18, and faces a maximum
  sentence of 20 years in prison.
