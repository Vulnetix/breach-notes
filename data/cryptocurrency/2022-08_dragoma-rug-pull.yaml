notes: 'The Polygon-based Dragoma app promised to be a new move-to-earn game, the term for a category of web3 apps that promise
  to reward people in tokens when they exercise. This particular app promised to be a dragon-themed "adventure game" where
  users could hatch dragon eggs by walking 500 meters a day (about 1/3 of a mile) for 40 days.The project launched only days
  before it rug pulled. On August 7, the $DMA token dropped in price over 99% as funds were removed from the project and moved
  to exchanges. According to CoinDesk, around $3.5 million was taken. The project''s website, Telegram channel, and Twitter
  accounts were all taken offline.


  Total loss estimated at $3,500,000.'
