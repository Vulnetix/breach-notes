notes: Pudgy Penguins, a popular NFT project that somehow warranted a full-length New York Times article by Kevin Roose, apparently
  is trying something pretty shady. This was revealed by NFT whale 9x9x9, who has invested around 600 ETH (over $2 million)
  in the project and who said they tried to buy shares in the company a few months ago but ultimately rejected the deal Pudgy
  Penguins offered. 9x9x9 says the project's founders contacted them on January 4, offering to sell the company, at which
  point 9x9x9 discovered that they had split the company and were trying to walk away with the full profits and sell the shell
  of the company with 0 ETH in its wallet to 9x9x9 for 888 ETH.
