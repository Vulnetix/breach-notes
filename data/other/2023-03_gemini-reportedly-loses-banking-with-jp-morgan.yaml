source_name: '"JPMorgan Is Cutting Ties With Crypto Exchange Gemini: Source"'
source_url: https://www.coindesk.com/business/2023/03/08/jpmorgan-is-cutting-ties-with-crypto-exchange-gemini-source/
date_of_breach: '2023-03-08'
date_of_disclosure: '2023-03-08'
category: other
vendor_product: Gemini reportedly
notes: Both CoinDesk and Reuters have reported that JPMorgan Chase &amp; Co. will be ending its banking relationship with
  Winklevoss-led Gemini cryptocurrency exchange. Gemini responded to the reports by tweeting "Despite reporting to the contrary,
  Gemini's banking relationship remains intact with JPMorgan," though they notably made no statements about whether they expect
  that to remain true going forward.It's hard to say why JPMorgan might have severed ties with Gemini — it could be related
  to recent statements from regulatory agencies frowning on banks taking crypto companies as clients, although Coinbase noted
  that it continues to have an active banking relationship with JPMorgan.JPMorgan is not Gemini's only banking partner, so
  despite the blow to Gemini, this will not cut them off from banking.
