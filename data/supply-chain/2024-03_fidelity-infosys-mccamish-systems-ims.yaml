notes: 'First BofA, Now Fidelity: Same Vendor Behind Third-Party Breaches. The private
  information of more than 28,000 people may have been accessed by unauthorized actors,
  thanks to a cyber incident at service provider Infosys McCamish — the same third
  party recently responsible for the Bank of America breach. TechTarget and Informa
  Tech’s Digital Business Combine. TechTarget and Informa. Together, we power an unparalleled
  network of 220+ online properties covering 10,000+ granular topics, serving an audience
  of 50+ million professionals with original, objective content from trusted sources.
  We help you gain critical insights and make more informed decisions across your
  business priorities. Third-party company: Infosys McCamish Systems (IMS).'
