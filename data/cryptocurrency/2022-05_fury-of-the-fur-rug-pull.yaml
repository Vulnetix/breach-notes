notes: 'The Fury of the Fur NFT project was a collection of 3D models that sort of resembled bears. The project advertised
  that the models were "metaverse and game-ready", and the roadmap promised a merchandise store, animated series, "sandbox
  hideout", and card game.However, the NFT launch went poorly — fewer than 2,800 NFTs were minted out of the total supply
  of 9,671 NFTs. The project tried to relaunch but failed to drum up much more interest, so the creators apparently decided
  to call it quits — while keeping the money, of course. The project founder left a long message to the community, in which
  they said that they would be shutting the project and spoke at length about how difficult it had been for them.


  Total loss estimated at $303,000.'
