notes: On February 16, the NFT giant Yuga Labs announced it would be acquiring the Moonbirds NFT project. This adds to list
  of blue-chip NFT collections controlled by Yuga Labs, which already included their original Bored Ape Yacht Club and spin-off
  NFT collections, and the CryptoPunks and Meebits collections they acquired in March 2022. Decentralized!Anyway, after the
  acquisition was announced, prices for Moonbirds spiked, as was to be expected.What wasn't expected was a notable spike in
  trading in the days leading up to the acquisition announcement, in which some wallets began accumulating large amounts of
  Moonbirds and related NFTs. One such wallet purchased 80 Moonbirds, 71 Moonbird Mythics, 28 Oddities, and 13 Mythic eggs
  in the week leading up to the announcement, and enjoyed several hundred thousand dollars in profits after the acquisition
  was announced.
