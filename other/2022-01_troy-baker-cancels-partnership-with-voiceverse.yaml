vendor_product: Troy Baker cancels partnership with Voiceverse
blockchain: ethereum
notes: Voice actor Troy Baker faced some backlash in mid-January when he announced that he would be partnering with "voice
  NFT" project Voiceverse. His antagonistic tweet, that "You can hate. Or you can create." didn't go over so well at the time,
  and things worsened when it was discovered that Voiceverse had stolen work from another project and used it without credit.
  On January 31 he apologized again for the antagonistic tweet, and wrote that "After careful consideration, I've decided
  to not continue the partnership with VoiceVerseNFT". Voiceverse wrote in their own statement that the company had "mutually
  decided to end [their] partnership with Troy Baker".
