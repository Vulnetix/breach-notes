notes: Blu3DAO is a DAO that describes itself as "focused on empowering women, non-binary people, and allies to learn, earn,
  and play in web3 towards financial freedom". The group was the target of some negative attention two days prior, after an
  incident in which several members of Blu3 leadership accused a man of harassment at the Devcon Ethereum conference.On October
  11, a crypto developer advocate wrote a thread about the group, starting by saying "Most of the members of Blu3DAO are great
  people working towards a good cause. Despite this, there have been things around their finances that I personally have found
  questionable. I've refrained from calling them out &amp; it's something that has bothered me for a long time". She went
  on to allege that the group had solicited over $1 million in grant money from the Harmony community, misusing a personal
  relationship with a member of Harmony to continue to obtain grant funding while the group had paused grant allocations,
  and using funds to personally benefit the founders."I run an organization dedicated to advancing womens &amp; nb ppls careers.
  And this type of grifting only hurts everyone," wrote the developer advocate in her Twitter thread. She also wrote, "In
  the coming days they'll post some fraudulent report clearing them from wrongdoing. They're running an elaborate scam with
  many wallets. One of them is literally married to a decision maker at harmony. Lmaooo. Fuck the[m] scammers"Blu3DAO's founders
  responded to the allegations by claiming that they had only ever received $75,000 of the $1 million they were committed
  by Harmony, and that the funds were still in the DAO treasury. They also claimed that the Blu3 DAO members were never paid
  for their work, and that the money from Harmony was "flow-through reimbursements for scholars/hackers' travel expenses".
