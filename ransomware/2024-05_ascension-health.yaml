notes: "Black Basta ransomware group encrypted servers across a 12-hospital system. Initial access via a malicious file inadvertently downloaded by an employee. Attackers accessed only 7 of 25,000 servers but still exfiltrated PHI. EHR systems (MyChart) unavailable; hospitals reverted to paper charting and some went on diversion. Recovery took ~6 weeks. 5,599,699 patients notified. Third-largest healthcare breach of 2024. FBI and CISA had previously warned about Black Basta targeting healthcare."
