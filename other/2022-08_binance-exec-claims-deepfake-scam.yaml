vendor_product: Binance exec claims deepfake
notes: 'Binance''s chief communications officer, Patrick Hillman, has come out with a blog post claiming that "Scammers created
  an AI hologram of me to scam unsuspecting projects". (Hologram?) He claimed that scammers were using these meetings to ask
  token creators to pay a listing fee for their tokens, something that Binance also does, but has been more squirrely about.The
  only evidence Hillman provided was a redacted conversation via LinkedIn, where he denies meeting with someone, and they
  reply: "they impersonated your hologram. This person sent me a zoom link then your hologram was in the zoom". (Again, hologram?)
  Amusingly, Hillman waxes poetic about the importance of security at Binance throughout the whole post, while also including
  a LinkedIn screenshot with a name that''s blurred so poorly it remains completely legible.Hillman goes on to claim, with
  no further evidence, that "a sophisticated hacking team used previous news interviews and TV appearances over the years
  to create a ''deep fake'' of me". If so, this would be remarkable, as to date video deepfakes have mostly been limited to
  robotic-sounding and grainy pre-recorded Elon Musk impersonations, rather than anything that can respond naturally and quickly
  to alive conversation.Another possible explanation is that Hillman is trying to cover Binance''s collective ass after being
  caught taking listing fees for tokens they never list. But who''s to say, really — maybe deepfakers have made a considerable
  breakthrough with startling implications, and Hillman just didn''t feel it was important to elaborate on.'
