notes: 'Texas Tech University Health Science Center Reports Third-Party Data Breach
  Affecting 1.3 Million Patients | JD Supra. Recently, Texas Tech University Health
  Science Center (“TTUHSC”) confirmed a data breach after Eye Care Leaders, a third-party
  vendor of TTUHSC,. If you received a data breach notification, it is essential you
  understand what is at risk and what you can do about it. To learn more about how
  to protect yourself from becoming a victim of fraud or identity theft and what your
  legal options are in the wake of the Texas Tech University Health Science Center
  data breach, please see our recent piece on the topic here. Based on the information
  provided by Texas Tech University Health Science Center, the TTUHSC breach was the
  result of a data security incident at Eye Care Leaders, a third-party vendor TTUHSC
  relies on for Electronic Health Record management services. Third-party company:
  EyeCare Leaders.'
