notes: 'When a top cybersecurity firm gets hacked, what is the takeaway for the average
  netizen?. Cybersecurity firm FireEye said this week it had been breached by hackers
  for a foreign government. If so, what chance does the average person have?. If one
  of the biggest names in cybersecurity can be breached, what chance does an average
  person stand against hackers?. That''s a likely question after high-profile cybersecurity
  firm FireEye earlier this week said hackers breached its network and stole the toolkit
  it uses to probe customers'' systems to find weaknesses. Third-party company: FireEye.'
