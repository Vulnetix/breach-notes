notes: A Black woman attending the major Devcon Ethereum community event in Bogotá
  posted to Twitter a photograph of a man at the conference, writing, "Day 1 of Devcon
  and a group of us women got harassed by a gross guy! What did the Ethereum Foundation
  team do? Smiled and chatted with him for 10 minutes and let him go on his way! I
  feel horribly unsafe at this event. 👎 Take women seriously when they report harassment."
  Blu3DAO, a DAO with which she is associated and which describes its mission as "empowering
  women, non-binary people, and allies to learn, earn, and play in web3 towards financial
  freedom", later also tweeted that "we would like to formally address &amp; acknowledge
  that an incident has occurred at Devcon", referencing the claim.The man in the photo
  subsequently tweeted his version of events, in which he described encouraging the
  woman and her friends to jump up while taking a 3D photograph, and then gave them
  a thumbs-down gesture when they reacted in annoyance to him. He then claimed that
  they harassed him throughout the conference, by stalking him throughout the conference
  and posting his photo online with vague allegations of harassment.The woman later
  elaborated on the event that had precipitated her report to Devcon staff, saying
  the man had been "verbally boo'ing and taunting us" at the photo booth.It's a little
  unclear what actually happened at the event and who is at fault, something I don't
  intend to speculate on as a complete outsider. However, what's not unclear is the
  reaction from some people in the crypto community, who have used the incident (and
  their belief that the woman fabricated the harassment story) as evidence that all
  women, people of color, and "wokeness" are a blight on the crypto space. Various
  crypto enthusiasts have used the opportunity to denigrate what they view as a general
  issue of "feminazis", "purple hairs", or "SJWs" in crypto, and DAOs that aim to
  encourage gender minorities to engage with crypto. "Letting SJWs infiltrate into
  crypto was a huge mistake", wrote one person. "This is the woke crowd we didn't
  have to deal with last cycle. They came into crypto with their distorted vision
  of everything. [Crypto Twitter] got your back, mate."
