notes: The leaders of the Canadian anti-vaccine trucker protest communicated their plan to distribute the 21 Bitcoin (worth
  almost $1 million) to the truckers blockading the border. Instead of giving the truckers the money in a cash format they
  can actually use, the "professional orange-piller" in charge of the Bitcoin distribution has explained a multi-step plan
  to give truckers pieces of paper with seed phrases printed on them. The seed phrases will be placed into sealed envelopes
  along with instructions on how to create a Bitcoin wallet, which are then "numbered and squiggly random lines should be
  drawn on the envelope to help with later identification". The volunteers then plan to physically destroy the printer with
  shears and screwdrivers, to try to prevent attackers from pulling the seed phrases out of the device memory. Of course once
  the trucker has their seed phrase, they have to go through the multi-step process of gaining access to the Bitcoin wallet
  on their smartphone, and then figure out how on earth to actually use their newfound Bitcoins to, say, pay for fuel. Anyway,
  I think this all goes to show that the future of money truly is upon us.
