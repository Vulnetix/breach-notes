notes: 'Cupid Media Pty Ltd (Cupid) operates over 35 niche dating websites based on
  personal profile including ethnicity, religion and location. On 13 December 2013,
  the Australian Privacy Commissioner (the Commissioner) opened an own motion investigation
  into Cupid. This was in response to media allegations that personal information
  of Cupid users had been acquired by unauthorised persons, and were found on a server
  operated by hackers, which Cupid confirmed. The Commissioner’s investigation focused
  on whether Cupid took reasonable steps to protect user information from misuse,
  loss, unauthorised access, modification or disclosure. [1] After considering the
