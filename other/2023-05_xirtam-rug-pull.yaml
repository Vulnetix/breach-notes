notes: 'A project called Xirtam, built on the Arbitrum blockchain, raised 1,909 ETH (~$3.2 million) in several fundraising  rounds
  in April 2023. Then, on May 4, the project rug pulled. Founders drained the funds from the project, then deposited them
  into Binance. This turned out to have been a huge mistake for them, as Binance was able to freeze the stolen assets.On September
  6, Binance announced that they were working to return the frozen 1,909 ETH to the people who had purchased it in the funding
  rounds.


  Total loss estimated at $3,200,000.'
