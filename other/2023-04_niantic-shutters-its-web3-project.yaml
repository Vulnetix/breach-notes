source_name: Trading Post shutdown announcement
source_url: https://community.ingress.com/en/discussion/21379/thank-you-for-all-your-support-trading-post-ingress-community
date_of_breach: '2023-04-10'
date_of_disclosure: '2023-04-10'
category: other
notes: Niantic, the creator of the popular Ingress and Pokémon Go augmented reality
  games, announced it will be shutting down its "Trading Post" product for NFT trading
  cards that it had launched only months before. "Trading Post was an experimentation
  effort to explore the world of digital collectibles, and while we believe that web3
  has the potential to create meaningful experiences in the future, we plan to shift
  focus to other priorities," they wrote. Owners of the NFTs were told they have sixty
  days to "download" their cards, and that trading would be disabled in 30 days.The
  announcement seemed to come as a relief to many in the Ingress community, with commenters
  remarking on the "scammy" nature of NFTs. Some wrote that they liked the idea, but
  that the web3 factor felt like it was "shoehorned" in. "I'll miss the Trading Post,
  please never bring NFTs or in fact any blockchain into future projects, or if you
  do at the very very least make it actually matter to the thing it's being put into,
  but still preferably just don't," said one.
