source_name: '"Stablecoin Issuer Paxos Is Being Investigated by New York Regulator"'
source_url: https://www.coindesk.com/policy/2023/02/09/stablecoin-issuer-paxos-is-being-investigated-by-new-york-regulator/
date_of_breach: '2023-02-09'
date_of_disclosure: '2023-02-09'
category: other
notes: CoinDesk reported that the New York Department of Financial Services is actively
  investigating Paxos, which issues both the Pax dollar (USDP) and the considerably
  larger Binance USD (BUSD) stablecoins.It's not quite clear the extent of the NYDFS
  investigation, though it joins rumors (denied by Paxos) that they were also being
  investigated by the US Office of the Comptroller of the Currency (OCC), which regulates
  banks. Paxos has a provisional banking charter, which it received from the OCC in
  2021. It also has a virtual currency license, which is issued by the NYDFS.
