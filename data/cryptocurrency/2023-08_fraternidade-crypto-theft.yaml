notes: 'Brazilian blockchain gaming streamer Fraternidade Crypto says he lost his life savings after accidentally exposing
  his crypto wallet seed phrase during a livestream pertaining to Bitcoin and blockchain games. Presumably not realizing it
  was on the same screen he was streaming, he opened a text file containing a password for a gaming account so he could log
  into it. However, the file also contained his MetaMask private key, which was displayed to the roughly 70 viewers of the
  stream.Apparently realizing his mistake, Fraternidade Crypto ended the stream, and says he tried to relocate the crypto
  to a new wallet. It was too late, however, and someone watching had already taken the around 86,000 MATIC (~$50,000) and
  various NFTs in the wallet.Fraternidade Crypto posted an emotional video after the fact, explaining that the stolen funds
  were his life savings. He said he planned to file a police report, and also offered a reward for the return of the funds.Fortunately,
  he was able to recover the stolen MATIC, though he says he has not been able to recover the NFTs, which have "incalculable
  value as they are NFTs, estimated value of approximately 15k dollars still lost".


  Total loss estimated at $65,000.'
