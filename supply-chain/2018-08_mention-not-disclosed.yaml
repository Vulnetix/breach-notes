notes: 'Media monitoring app Mention suffers third-party data breach. Web and social
  media monitoring app Mention has revealed that a third-party provider has been hit
  by a data breach. Champs-Élysées, Paris. Mention was founded in the French capital.
  Image: Ioan Panaite/Shutterstock. Founded in 2012, Mention offers brands a media
  monitoring app to allow them to leverage filtered data for their overall strategies.
  Mention provides this service for customers such as Airbnb, Deliveroo, Microsoft
  and Adobe.'
