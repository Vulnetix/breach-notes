vendor_product: OpenSea ignores stolen artwork reports
blockchain: ethereum
notes: Artists going through the greuling process of reporting individual NFTs created without permission from their work
  reported tickets being automatically rejected. Artists were also required to provide personal information to OpenSea, who
  in some cases forwarded the personal information to the scammer behind the theft, opening the artist up to doxing and other
  harassment. Eventually, OpenSea disabled their contact form that had previously allowed artists to report stolen work.
