notes: A year ago, Andreessen Horowitz general partner Arianna Simpson wrote about the firm's investment into Irreverent Labs.
  Simpson had joined their first $5 million funding round, and Andreessen Horowitz led their $40 million Series A. The company
  had yet to produce any product, but successfully pitched Simpson on what she described as "some sort of chicken game".Now,
  the company has announced that the project will be paused "for the indefinite future", blaming "lack of clarity" and "regulatory
  confusion" in the United States. The company simultaneously announced "SOL 4 Cocks", in which they will repurchase the Mecha
  Fight Club NFTs for 18 SOL (~$380). The NFTs had originally minted for 6.969 SOL (~$290 on mint date).Irreverent Labs' website
  and social media now describe the company as an AI firm building "text to 3D and video prediction tools that facilitate
  the creation of AI-generated 3D content".
