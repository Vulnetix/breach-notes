notes: Nokia investigates breach after hacker claims to steal source code. Nokia is
  investigating whether a third-party vendor was breached after a hacker claimed to
  be selling the company's stolen source code. "Nokia is aware of reports that an
  unauthorized actor has alleged to have gained access to certain third-party contractor
  data and possibly data of Nokia," the company told BleepingComputer. "Nokia takes
  this allegation seriously and we are investigating. To date, our investigation has
  found no evidence that any of our systems or data being impacted. We continue to
  closely monitor the situation.".
