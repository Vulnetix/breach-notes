notes: 'Binance announced they had stopped "marketing to Israelis and all activities focused on Israel until we examine the
  issue of licensing." The "issue" in question seems to be that they don''t have a license at all: according to the Israeli
  Capital Market, Insurance and Savings Authority, they never received an application that would license Binance to do business
  in Israel.'
