source_name: '"DAO aims to raise $5M to resurrect Blockbuster Video"'
source_url: https://cointelegraph.com/news/dao-aims-to-raise-5m-to-resurrect-blockbuster-video
date_of_breach: '2021-12-25'
date_of_disclosure: '2021-12-25'
category: other
notes: A group called "BlockbusterDAO" emerged, with the stated goal of "liberat[ing]
  Blockbuster and form[ing] a DAO to collectively govern the brand as we turn Blockbuster
  into the first-ever DeFilm streaming platform". Ideas for the DAO's plans after
  buying the corporation included creating original films and also getting into crypto
  gaming, for some reason. Some outlets noted that it's unlikely Dish, the current
  owner of Blockbuster, would sell the corporation for any amount (and particularly
  for an amount $315 million less than what it bought them for ten years ago), but
  I suspect that minor detail is unlikely to slow the group down much.
