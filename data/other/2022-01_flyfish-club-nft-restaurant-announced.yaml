date_of_breach: '2022-01-07'
date_of_disclosure: '2022-01-07'
category: other
vendor_product: Flyfish Club NFT restaurant announced
blockchain: ethereum
notes: Gary Vaynerchuk announced plans for his New York City "NFT restaurant", Flyfish Club. The cheapest NFT, giving access
  to only parts of the restaurant, was listed at 2.5 ETH (at the time around $8,000); a full-access membership was listed
  at 4.25 ETH (around $14,400). However, the NFT only grants access to the restaurant. Patrons will still pay for their food
  and drink — and in real money, not crypto.
