vendor_product: Ape Kids Football Club tanks
blockchain: ethereum
notes: John Terry, an English football coach and former player, launched an NFT project called "Ape Kids Football Club" on
  February 2. Several players, including Tammy Abraham, Ashley Cole, and Jack Wilshere, all endorsed the project. The NFTs
  traded for around $650 shortly after the project launch, but as of March 9 were averaging a little under $75 apiece. At
  some point, Abraham, Cole, and Wilshere quietly deleted their endorsements of the project.The plummeting price is not the
  only problem the project has faced; shortly after Terry announced the project in January, he was threatened with legal action
  by the Premier League, and had to remove depictions of Premier League, UEFA and FA trophies, as well as the Chelsea logo,
  from the NFT illustrations.
