notes: 'This document is prepared as an enforceable undertaking under s 114(1) of
  the Regulatory Powers (Standard Provisions) Act 2014 (Cth) (the Regulatory Powers
  Act ). This undertaking is offered to the Privacy Commissioner (the Commissioner
  ) by: Oxfam Australia (ABN 18 055 208 636) Oxfam Australia ( Oxfam ) offers this
  enforceable undertaking under s 114(1) of the Regulatory Powers Act to address the
  matters within the scope of the investigation that the former Australian Information
  Commissioner (the Information Commissioner ) commenced on 10 September 2021 under
  s 40(2) of the Privacy Act 1988 (Cth) ( Privacy Act ). The Commissioner’s acceptance
  of this enforceable undertaking is not a finding that Oxfam has breached the Privacy
  Act or the Australian Privacy Principles ( APP ).


