notes: In October 2020, the SEC filed charges against anti-virus software magnate, two-time Libertarian presidential candidate,
  and all-around shady character John McAfee, as well as his bodyguard, Jimmy Watson Jr. They alleged that the two had promoted
  several initial coin offerings (ICOs) without disclosing that they were being paid to do so. The SEC also charged the pair
  with participating in a pump and dump scheme, where they secretly bought large amounts of a cryptocurrency token before
  hyping it on Twitter (where McAfee had millions of followers), then selling the tokens as the price increased.McAfee died
  by suicide in June 2021 in a Spanish prison, shortly before he was due to be extradited to the United States on tax evasion
  charges. His death kicked off a tornado of conspiracy theories by QAnon followers.Now, the SEC has wrapped up the investigation,
  finding his partner in crime responsible for the undisclosed promotion and pump and dump scheme. In addition to a $376,000
  fine, Watson is prohibited from any professional cryptocurrency trading.
