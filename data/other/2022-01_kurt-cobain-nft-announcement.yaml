source_name: '"New Nirvana NFTs to be launched to mark Kurt Cobain’s birthday"'
source_url: https://www.nme.com/news/music/first-nirvana-nfts-launched-mark-kurt-cobain-birthday-3143941
date_of_breach: '2022-01-22'
date_of_disclosure: '2022-01-22'
category: other
notes: An NFT group announced that they'd be releasing NFTs created from photographs
  of a 1991 Nirvana show they performed shortly before Nevermind rose to popularity.
  The NFTs go on sale on what would have been Kurt Cobain's birthday if he was still
  alive. The creators say they seek to "honor" Cobain by releasing these NFTs, which
  makes you wonder if they've ever heard Cobain speak before.
