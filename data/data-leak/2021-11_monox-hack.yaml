category: data-leak
initial_attack_vector: Software bug / unintentional loss
vendor_product: MonoX
blockchain: bitcoin
financial_loss_usd: 31000000
notes: 'A hacker stole $31 million from the liquidity pool provider MonoX by exploiting a bug in their smart contract software
  that allowed them to exchange a token for itself and artificially inflate the price. MonoX took the classic approach of
  those burned by crypto issues, and tried to get the cash back by... asking nicely.


  Total loss estimated at $31,000,000.'
