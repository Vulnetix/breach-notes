vendor_product: Uulala SEC settlement
notes: The company Uulala, which aimed to provide underbanked individuals with opportunities to build credit, settled with
  the SEC over charges that they ran an unregistered ICO that raised $9 million. Although they claimed to be using a "proprietary
  micro-credit algorithm" and proprietary database technology, the SEC said their algorithm was still under development and
  that they were using database technology belonging to another company. As a part of the settlement, Uulala disabled all
  $UULA tokens and asked crypto exchanges to disallow trading.
