source_name: '"FCA crypto crackdown brings warning list up to 12,200 firms"'
source_url: https://protos.com/fca-crypto-crackdown-brings-warning-list-up-to-12200-firms/
date_of_breach: '2023-10-09'
date_of_disclosure: '2023-10-09'
category: other
notes: The United Kingdom's Financial Conduct Authority (FCA) has added another 146
  entries to its "warning list" of unauthorized firms, including the crypto exchanges
  Huobi and KuCoin. The additions pertained to new regulations that require crypto
  firms who want to run promotions in the country to register with the FCA, and comply
  with regulations aiming to prevent misleading advertisements.The warning list was
  created to notify potential users of these firms, and to inform them that losses
  related to the use of those platforms won't be covered by the UK's compensation
  scheme.Huobi has claimed they don't operate or promote in the UK, while KuCoin gestured
  towards adjusting its practices in the UK. Firms on the warning list may be subjected
  to more serious enforcement actions in the future, including fines or even prison
  time.
