repos:
  - repo: local
    hooks:
      - id: validate-yaml
        name: Validate breach YAML against schema
        entry: bash -c 'cd scripts/validate && go run . ../../'
        language: system
        files: '\.(yaml|yml)$'
        pass_filenames: false

      - id: validate-rss
        name: Validate RSS XML feeds
        entry: scripts/validate-rss.sh
        language: script
        files: '(layouts/.*rss|hugo\.toml|content/_content\.gotmpl)'
        pass_filenames: false
