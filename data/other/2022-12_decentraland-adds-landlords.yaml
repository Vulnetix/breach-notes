notes: 'If the idea of dropping thousands of dollars to "own" a plot of "land" in
  the Decentraland metaverse doesn''t do it for you, have I got news for you: Decentraland
  has just introduced official support to allow its users to become a part of the
  rentier class. Exciting!In case you were wondering, I checked, and yes. Someone
  has already come up with the concept of metaverse mortgages.Personally, I''m excited
  to see other horrific parts of the system of homeownership get recreated virtually.
  Metaverse homeowners associations. Metaverse building permit red tape. Metaverse
  NIMBYs. Metaverse property liens. Metaverse neighborhood watch.'
