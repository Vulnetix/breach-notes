notes: 'The BNB Chain''s Venus Protocol lending protocol accumulated $2.15 million in bad debt after an exploiter manipulated
  the price of the Thena protocol''s THE token. THE had very low liquidity, and the exploiter took advantage of it to manipulate
  the THE price oracle by borrowing against THE, using the borrowed funds to buy more THE, and repeating — causing the price
  oracle to reflect higher and higher prices. The attacker was able to avoid a supply cap on Venus by "donating" the funds
  rather than depositing them in the standard way.While the exploit left the Venus Protocol with over $2 million in bad debt,
  it''s not clear if the attacker even made money from the exploit. The exploiter''s position was ultimately liquidated, collapsing
  the increase in THE price. However, it''s possible the exploiter took advantage of the price discrepancy elsewhere to profit.The
  Venus Protocol has had a number of issues in the past — notably in June 2023, when the team developing the BNB Chain had
  to intervene when the a thief borrowed $150 million on Venus against stolen tokens and then faced liquidation.


  Total loss estimated at $2,150,000.'
