notes: 'After crypto sleuth zachxbt noticed an apparent theft from the NoOnes peer-to-peer crypto trading platform on January
  1, CEO Ray Youssef was forced to acknowledge the theft. He claimed that the project''s Solana bridge had suffered a compromised,
  and explained that it had been taken offline for "exhaustive pen testing".Youssef emphasized that user funds were safe,
  which led to questioning from others on how that could be possible when nearly $8 million had been stolen. Youssef claimed
  he had reimbursed the stolen assets himself.


  Total loss estimated at $7,900,000.'
