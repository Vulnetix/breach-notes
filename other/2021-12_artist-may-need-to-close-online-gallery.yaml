vendor_product: Artist may need to close online gallery
notes: Comics artist Liam Sharp wrote on Twitter that he would likely need to close his DeviantArt gallery, which he has maintained
  for fourteen years, because his artwork keeps being minted as NFTs without his permission. He wrote, "I can't - and shouldn't
  have to - report each one and make a case, which is consistently ignored. Sad and frustrating."
