notes: Qantas confirms data breach impacts 5.7 million customers. Australian airline
  Qantas has confirmed that 5.7 million people have been impacted by a recent data
  breach, in which threat actors stole customers' data. On July 1st, Qantas disclosed
  that it had detected a cyberattack the previous day on a third-party platform used
  by a Qantas airline contact centre. While the company did not share any further
  details, BleepingComputer learned that the attack shared similarities with other
  attacks on the aviation industry linked to threat actors classified as Scattered
  Spider.
