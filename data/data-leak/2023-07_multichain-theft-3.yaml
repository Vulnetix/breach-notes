notes: 'Only five days after $130 million was emptied from the Multichain blockchain
  bridge, another $107 million in a wide range of assets has been taken. After the
  first theft, Multichain urged users to stop using the project and revoke contract
  approvals, but a large quantity of assets remained on the service.People are becoming
  increasingly suspicious that the Multichain thefts may be an inside job, not least
  because Multichain''s CEO suddenly disappeared in late May and hasn''t been located
  since.


  Total loss estimated at $107,000,000.'
