notes: Cryptocurrency scammers have turned to the crisis in Ukraine to provide fodder
  for their scams. Some have taken the tactic of pretending to be a person trying
  to escape the country and asking people via private message to send cryptocurrency;
  others have set up sketchy crowdfunding projects that claim they will send the money
  to various Ukrainian causes. One scam project tried to get people to buy "UkraineToken",
  with vague promises of "regular donations and support".Ukraine-themed NFT projects
  have also sprung up all over the place, promising to donate portions of proceeds,
  with very few avenues to distinguish the legitimate from the scams. Some existing
  NFT projects have created Ukraine-themed items to add to their collections. Other
  NFT projects that have nothing to do with Ukraine have tried to tempt buyers by
  claiming they will donate a portion of proceeds (5%, in one case) to Ukrainian war
  relief funds. Individual sellers have also tried to use the crisis to increase the
  sales of NFTs they own, promising to donate their profits.Needless to say, my advice
  if you're hoping to donate to relief would be to skip the cryptocurrency and NFTs
  altogether and pick any of the many verified relief funds out there.
