notes: 'Intel investigating leak of Intel Boot Guard private keys after MSI breach.
  Intel is investigating the leak of alleged private keys used by the Intel BootGuard
  security feature, potentially impacting its ability to block the installation of
  malicious UEFI firmware on MSI devices. Intel is investigating the leak of alleged
  private keys used by the Intel Boot Guard security feature, potentially impacting
  its ability to block the installation of malicious UEFI firmware on MSI devices.
  In March, the Money Message extortion gang attacked computer hardware make MSI,
  claiming to have stolen 1.5TB of data during the attack, including firmware, source
  code, and databases. Third-party company: Micro Star International (MSI).'
