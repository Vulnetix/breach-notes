date_of_breach: '2023-01-05'
date_of_disclosure: '2023-01-05'
category: other
notes: After a round of layoffs in August that impacted 20% of their employees, Genesis
  is laying off another 30% of their employees.Genesis is currently in a really bad
  spot, halting withdrawals from their lending arm in the wake of the FTX collapse
  and warning of bankruptcy shortly afterwards. The company owes $900 million to customers
  of Gemini, and Gemini's CEO recently sent an open letter to Genesis's parent company
  demanding the funds be returned.
