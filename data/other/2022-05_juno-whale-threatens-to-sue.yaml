source_name: '"Juno Blockchain Community Officially Votes to Revoke Whale’s Tokens"'
source_url: https://www.coindesk.com/layer2/2022/04/29/juno-blockchain-community-officially-votes-to-revoke-whales-tokens/
date_of_breach: '2022-05-01'
date_of_disclosure: '2022-05-01'
category: other
notes: The Juno community has officially voted to confiscate over 2.95 million $JUNO
  owned by one whale who they believe gamed the airdrop to obtain more than his fair
  share. This follows a long community discussion about his actions, and formalized
  a previous community poll on what to do. When the discussions began, the 2.95 million
  $JUNO to potentially be confiscated were worth a combined $121 million. However,
  the $JUNO price has dropped from the then all-time-high of around $40 to $11.30,
  putting the value of the tokens to be confiscated closer to $33 million.The whale
  has repeatedly appealed to the community not to revoke his tokens, even trying to
  claim that the Juno developers had been secretly selling off $JUNO and damaging
  the community. Unfortunately for him, he didn't succeed in swaying the community,
  who voted on April 29 to confiscate his tokens.The whale has threatened to take
  "legal action against each validator" if the community burns or locks the tokens
  that previously belonged to him, and which he claims to have been managing on behalf
  of clients in an investment scheme.
