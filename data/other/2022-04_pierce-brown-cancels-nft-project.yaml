notes: '"Don''t make your dystopian books our reality, Pierce," a fan replied to sci-fi
  author Pierce Brown''s announcement of an NFT project. Brown, the author of the
  bestselling Red Rising series of novels, announced an NFT project called "Solar
  Society" based around his work. Fan response was overwhelmingly negative, with some
  expressing concerns over environmental impact, and others dismayed at the negative
  effect they feel NFTs have had on creative communities.The day after the announcement,
  Brown released a statement saying that he had been drawn in by the hope that NFTs
  would allow him to avoid "big companies whose sole focus is strong-arming away the
  rights to projects they''ve never been a part of to turn a big profit." He wrote,
  "I felt that if I didn''t jump on it myself, someone else would, without the love,
  care, and artistry we believe in". He concluded that, given the response from his
  fans, he would not be continuing the NFT project. Some encouraged him to use the
  artwork that had already been created for merchandise or other non-NFT art sales.'
