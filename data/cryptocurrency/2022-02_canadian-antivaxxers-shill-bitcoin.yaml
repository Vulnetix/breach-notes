notes: A protest in Canada against COVID-19 vaccine requirements for truckers re-entering the country, known as the "Freedom
  Convoy" has tried to crowdfund in several ways. A GoFundMe campaign that raised over CA$10 million was taken down after
  terms of service violations. A campaign on the right-wing favorite GiveSendGo raised over CA$8.2 million, but funds were
  frozen after an injuction by the Ontario Attorney General. The GiveSendGo platform also catastrophically failed to secure
  sensitive user data, and suffered a huge leak of donor data including scans of passports and drivers licenses, which is
  being made available to journalists and researchers by the inimitable DDoSecrets.The protesters eventually turned to Bitcoin
  and other cryptocurrencies for crowdfunding, even appointing a "Bitcoin team lead" who rambled on in a livestream about
  not "being shackled by the censorship put in place by our legacy financial system", much to the confusion and annoyance
  of some viewers. One commenter asked, "Are we at a press conference for Freedom Convoy 2022 or having some guy shove Bitcoin
  down our throats?" As of February 9, the group claims to have raised $300,000 in Bitcoin, and $500,000 in other cryptocurrencies.
