notes: 'The DeltaPrime defi protocol was hacked for the second time in two months,
  losing $4.8 million in Arbitrum and Avalanche tokens. The attacker appeared to have
  exploited a flaw in one of the platform''s smart contracts that enabled them to
  borrow more than they put up in collateral.DeltaPrime paused the protocol on both
  Arbitrum and Avalanche, stopping the attacker from being able to steal more funds
  than they already had.DeltaPrime was hacked previously on September 16, losing $6
  million after a leaked private key enabled an attacker to mint a huge number of
  the platform''s stablecoin deposit receipts.


  Total loss estimated at $4,800,000.'
