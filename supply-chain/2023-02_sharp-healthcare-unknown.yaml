notes: Nearly 63K Impacted by Healthcare Data Breach from Exploited Web Server | TechTarget.
  Sharp HealthCare in San Diego suffered a healthcare data breach after an unauthorized
  third-party gained access to the organization’s web server, potentially exposing
  some PHI. San Diego-based Sharp HealthCare notified 62,777 patients of a healthcare
  data breach that may have exposed their personal health information. On January
  12, 2023, Sharp HealthCare discovered that an unauthorized party may have accessed
  information through its web servers.
