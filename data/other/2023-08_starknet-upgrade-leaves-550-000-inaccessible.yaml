vendor_product: Starknet upgrade leaves $550,000 inaccessible
notes: '"The wallets that did not upgrade in time will lose their assets," a StarkWare customer support representative said
  on Discord to an individual inquiring why they could no longer access their cryptocurrency. The company had been urging
  users to upgrade their wallet software for months, but not everyone expected they might lose access to funds if they weren''t
  carefully monitoring their wallet software''s social media channels.After user backlash over a cumulative $550,000 in funds
  that were inaccessible to people who hadn''t heard about the breaking change, Starkware re-enabled the ability for people
  to upgrade their wallets – leading some to question why it was ever disabled in the first place if it could be trivially
  re-enabled to prevent the loss of half a million in assets.'
