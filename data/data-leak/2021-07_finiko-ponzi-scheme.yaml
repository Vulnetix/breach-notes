notes: 'Finiko, a Russian operation that turned out to be a Ponzi scheme, collapsed
  in July 2021 after defrauding approximately $95 million from people. Investors,
  facing difficult economic conditions in Russia, were promised they could see returns
  of up to 30% a month.


  Total loss estimated at $95,000,000.'
