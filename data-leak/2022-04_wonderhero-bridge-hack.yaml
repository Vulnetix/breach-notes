notes: 'WonderHero is a mobile play-to-earn turn-based strategy game. Attackers were able to mint 80 million $WND after successfully
  exploiting the bridge linking the WonderHero play-to-earn sidechain and the BNB chain. The attacker was able to swap their
  stolen $WND for 750 BNB ($325,000), tanking the price of $WND to near zero in the process.


  Total loss estimated at $325,000.'
