notes: 'In a Valentine''s Day-themed stunt, the otherwise reputable Belvedere Museum
  in Austria decided to sell Gustav Klimt''s The Kiss as NFTs. But making one NFT
  was apparently not enough for the museum, which decided to section the digital copy
  of the artwork into 10,000 individual tiles. Although The Kiss is a very large piece
  of artwork, at nearly 6 feet on each side (180cm &#215; 180cm), this means each
  NFT buyer gets an NFT representing a scrap of the painting measuring 0.7 inches
  to a side (18mm &#215; 18mm), about the size of a U.S. penny. The Belvedere Museum
  has, somehow, estimated that each NFT will sell for €1,850 (about $2,100). If their
  dreams come true, selling all 10,000 NFTs would net them €18.5 million ($21 million).The
  website for the NFT sale explains a six-step process to obtain one of these NFTs,
  including the standard steps of connecting a wallet and joining the allowlist, but
  ending with "Dedicate your NFT to a beloved one", which involves sending... their
  loved one a form email, apparently. My heart goes out to anyone receiving an NFT
  for Valentine''s Day, much less a $2,000 one representing a portion of a painting
  smaller than a postage stamp. To anyone who thinks this is a good idea: I am begging
  you, please just buy your partner some flowers.'
