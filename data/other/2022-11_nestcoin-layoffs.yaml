source_name: '"Nigeria’s Nestcoin held funds from its investors on stricken FTX exchange"'
source_url: https://www.ft.com/content/d45310c9-4f8c-4349-b9bb-c8edb5d2863f
date_of_breach: '2022-11-16'
date_of_disclosure: '2022-11-16'
category: other
notes: Nestcoin, a Nigerian startup that both builds and invests products they hope
  will "democratis[e] access to economic opportunity for everyday people in frontier
  markets", has announced that they will lay off more than 50% of their nearly 100
  employees. Remaining employees will see their pay slashed by 40%, and the company
  CEO plans to take no compensation at all.Nestcoin had nearly all of the funds remaining
  from their $6.45 million funding round locked in FTX — approximately $4 million.
