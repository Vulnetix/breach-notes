category: "supply-chain"
initial_attack_vector: "Cl0p ransomware group exploited zero-day vulnerabilities in Accellion File Transfer Appliance (FTA) that ASIC used to receive and send documents; the vulnerability allowed unauthorized access to file transfer systems and exfiltration of files that had been submitted to ASIC"
