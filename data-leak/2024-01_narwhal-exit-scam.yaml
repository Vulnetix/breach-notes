notes: 'A cryptocurrency project called Narwhal appears to have rug-pulled, claiming that they were hacked. In a post on their
  Twitter account, they claimed that a "hacker attack" caused "significant losses to [their] community members", but urged
  followers to "maintain trust in the platform".However, investigation by the CertiK blockchain security firm suggests that
  the "hack" may have been an inside job, with much of the $1.5 million that was "stolen" going to wallets with links to the
  Narwhal team.The Narwhal project had launched in mid-December.


  Total loss estimated at $1,500,000.'
