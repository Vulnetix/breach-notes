vendor_product: South Korea moves to block unregistered exchanges
notes: The South Korean Financial Services Commission (FSC) reported to investigators sixteen unregistered crypto exchanges
  that were serving Korean users and hosting events marketing to Koreans. The exchanges include MEXC, KuCoin, CoinW, CoinEX,
  ZB.com, Bitglobal, Bitrue, Poloniex, BTCEX, Phemex, XT.com, Pionex, BTCC, DigiFinex, AAX, and ZoomEX.Although the FSC informed
  the exchanges they needed to register and report their activities, the exchanges did not comply. The FSC has moved to block
  access to these exchanges in the country, including by asking communications authorities to block access to the exchanges'
  websites. The FSC pointed to the risk of user data leaks and money laundering as motivations for their action.Those operating
  unregistered exchanges in the country could face up to five years imprisonment or a ₩50 million ($37,900) fine, and be barred
  from registering in the country for five years.
