source_name: Worldcoin Promised Free Crypto If They Scanned Their Eyeballs With “The Orb.” Now They Feel Robbed.
source_url: https://www.buzzfeednews.com/article/richardnieva/worldcoin-crypto-eyeball-scanning-orb-problems
date_of_breach: '2022-04-05'
date_of_disclosure: '2022-04-05'
category: other
vendor_product: Worldcoin reports
blockchain: ethereum
notes: New reporting from BuzzFeed News and MIT Technology Review described some of the issues that Worldcoin has been encountering
  on its mission to scan the eyeballs of the world population, in exchange for nebulous promises of crypto. Although "Orb
  operators" have been out and about scanning eyeballs in countries around the world, those who've agreed to be scanned have
  only been offered a voucher for Worldcoin tokens and a promise that they may, someday, be redeemable for $20. Meanwhile,
  the company appears to be flouting data privacy laws and endangering operators of these Orbs, who have encountered threats
  from angry uncompensated users, and some of whom have been detained by law enforcement. Those who have agreed to have their
  eyes scanned have accused the company of "stealing their eyes", and fear how their biometric data may be used.
