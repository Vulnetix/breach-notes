source_name: '"Alphapo hot wallets drained for $23 million, HypeDrop disables withdrawals"'
source_url: https://www.theblock.co/post/241048/alphapo-hot-wallets-drained-for-23-million-hypedrop-disables-withdrawals
date_of_breach: '2023-07-22'
date_of_disclosure: '2023-07-22'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: Alphapo
blockchain: ethereum, bitcoin, tron
financial_loss_usd: 60000000
notes: "The crypto payment processor Alphapo suffered a hot wallet hack on July 22 in which at least $60 million in Ethereum,\
  \ Tron, and Bitcoin was stolen. Alphapo processes payments for several gambling platforms including HypeDrop, Bovada, and\
  \ Ignition.HypeDrop disabled withdrawals on their platform, and wrote on Twitter that they were experiencing \"ongoing deposit\
  \ and withdrawal issues\" due to \"an issue on the cryptocurrency provider's side.\" \n\nTotal loss estimated at $60,000,000."
