vendor_product: FinSoul exit
financial_loss_usd: 1600000
notes: 'A metaverse gaming project called FinSoul promised users “sandbox worlds, multiplayer sports, leisure experiences,
  player socializing, MMORPG,” and other features. However, on October 10, the project team made off with $1.6 million, which
  they then tumbled through Tornado Cash.The team behind the FinSoul project was reportedly the same as the group who pulled
  off the much larger $31 million Fintoch exit scam in May. They used similar strategies, including using paid actors to pose
  as their executive team, to push the FinSoul scam.


  Total loss estimated at $1,600,000.'
