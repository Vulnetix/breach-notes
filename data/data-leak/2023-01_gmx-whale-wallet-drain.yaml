date_of_breach: '2023-01-03'
date_of_disclosure: '2023-01-03'
category: data-leak
initial_attack_vector: Smart contract exploit / hack
vendor_product: GMX whale wallet drain
blockchain: ethereum
financial_loss_usd: 3300000
notes: 'An apparent wallet compromise netted hackers 82,519 GMX tokens from a wallet belonging to a GMX whale. The hackers
  exchanged these tokens for 2,627 ETH ($3.18 million), then swapped the assets cross-chain.The sudden sale of such a large
  number GMX tokens (which are comparatively illiquid compared to much larger cryptocurrencies like Ethereum) caused the price
  to suddenly drop from ~$41.50 to ~$38 per token, though the token price recovered fairly quickly. GMX is the native token
  for the defi exchange of the same name.


  Total loss estimated at $3,300,000.'
