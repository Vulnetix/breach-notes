notes: Because apparently the vinyl figurines known as Funko Pops aren't a sufficiently useless collectible, Funko decided
  to get in on the NFT craze by releasing a Bob Ross "Digital Pop". Ross made major changes to his will just before his death
  to try to prevent people from merchandising his legacy, and many fans were outraged by the NFT project, which they believe
  is exactly the sort of thing he was trying to prevent from happening.
