notes: '50 Cent has claimed his Twitter account and website were hacked to promote
  a memecoin called $GUNIT. "I have no association with this crypto," the rapper wrote
  on Instagram.50 Cent also claimed in the post that "Who ever did this made $300,000,000
  in 30 minutes." It''s not clear where 50 Cent got this number, because the token
  has only done $19.8 million in volume. One wallet made around $722,000 off the token,
  and three others also made over $100,000.


  Total loss estimated at $1,000,000.'
