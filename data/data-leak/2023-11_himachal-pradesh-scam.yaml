source_name: '"Indian Police Arrest 8 More in $300M Crypto Scam: Report"'
source_url: https://www.coindesk.com/policy/2023/11/06/indian-police-arrest-8-more-in-300m-crypto-scam-report/
date_of_breach: '2023-11-06'
date_of_disclosure: '2023-11-06'
category: data-leak
notes: 'Indian police have arrested around eighteen people, including four police
  officers, in connection with a $300 million cryptocurrency scam that affected around
  100,000 people in Himachal Pradesh. Victims were invited to invest in a cryptocurrency
  called Korvio Coin (KRO), but later the scam incorporated other tokens as well.
  Around 5,000 government officials and around 1,000 police fell victim to the scam,
  with some themselves becoming promoters.The scam was allegedly orchestrated by Subhash
  Sharma, who has not been apprehended. This particular fraud was uncovered in September,
  but has been ongoing since as long ago as 2018.


  Total loss estimated at $300,000,000.'
