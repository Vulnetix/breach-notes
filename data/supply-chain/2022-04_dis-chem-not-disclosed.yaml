notes: Dis-Chem says it won't share more info on data breach that hit 3.6m clients
  | News24. In April an “unauthorised person” accessed 3.6 million customers’ first
  names, surnames, email addresses and cellphone numbers, after hacking into one of
  Dis-Chem’s third-party service providers. Pharmacy retailer Dis-Chem said it won't
  sharing further information on the data breach that compromised the personal details
  of 3.6 million of its customers. In April, an "unauthorised person" accessed customers'
  first names, surnames, email addresses and cellphone numbers, after hacking into
  one of Dis-Chem's third-party service providers.
