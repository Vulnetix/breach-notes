notes: '"Over the past year, it has become clear that NFTs are unlikely to be sustainable
  or profitable as a standalone business," wrote CEO Michael Rubin in an internal
  email explaining the decision to sell off Fanatic''s share in NFT company Candy
  Digital. Candy Digital has created NFTs in partnership with MLB, Stranger Things,
  WWE, and various Nascar teams.Fanatics purchased a 60% stake in Candy Digital in
  a $100 million Series A round in October 2021. Now, they''ve sold the stake to a
  group of investors led by Galaxy Digital for an undisclosed amount, in what Rubin
  wrote was "a rather straightforward and easy decision". He highlighted Fanatics''
  ability to "realize [when] things aren''t working", he wrote in the email.'
