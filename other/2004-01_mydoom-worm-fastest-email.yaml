notes: "MyDoom, discovered on January 26, 2004, remains the fastest-spreading email worm in recorded history — a record unbroken as of 2026. Within the first 36 hours, MyDoom was responsible for approximately 25% of all global email traffic, with 1.8 million copies sent in the first 168 countries. At peak infection rate, 1 in 12 emails globally contained MyDoom. The worm slowed global internet performance by an estimated 10% and reduced web load times by 50% due to network saturation. MyDoom installed a backdoor on TCP port 3127 enabling remote access for spam relay and later DDoS attacks. On February 1, 2004, the MyDoom.A variant launched a DDoS attack against SCO Group's website; MyDoom.B targeted Microsoft.com. MyDoom also spread via Kazaa peer-to-peer file sharing with disguised filenames. Estimated damages: $38 billion. The worm was believed to have been commissioned by spammers to create a botnet for bulk email operations — an early example of financially-motivated malware. Despite a $250,000 reward from Microsoft, the authors were never identified."
