notes: Digital artist Loish discovered more than one hundred instances where people had created NFTs from her art without
  her permission, and had to spend hours reporting each individual NFT as copyright violations. She wrote on Twitter, "NFTs
  are supposedly about authenticity but these platforms (that's you, @opensea) do less than the bare minimum when it comes
  to making sure that the images are being uploaded by their ORIGINAL CREATORS."
