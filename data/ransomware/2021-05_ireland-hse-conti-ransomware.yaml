notes: "On May 14, 2021, Conti ransomware operators attacked Ireland's Health Service Executive (HSE) — the country's entire national public health system — encrypting approximately 80,000 devices and all HSE IT systems. This was among the most disruptive ransomware attacks on a national health system in history. Ireland's entire national health IT infrastructure was shut down: hospitals reverted to paper systems, COVID-19 vaccination booking systems were taken offline, radiology and diagnostic imaging systems were inaccessible, and cancer screening programs were cancelled. The attackers demanded $20 million in ransom. The Irish government refused to pay. In a rare development, the Conti group voluntarily provided a free decryptor following a public backlash and claims the attack was unauthorized by senior leadership. Remediation took many months. The official post-incident review estimated total costs of over €100 million (recovery, lost productivity, IT upgrades). The initial intrusion occurred through a phishing email on March 16, giving attackers an 8-week dwell time to map the network before striking. The incident demonstrated how ransomware could effectively disable an entire nation's healthcare infrastructure."
