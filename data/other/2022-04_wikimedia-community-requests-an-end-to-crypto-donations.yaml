source_name: Requests for comment/Stop accepting cryptocurrency donations
source_url: https://meta.wikimedia.org/wiki/Requests_for_comment/Stop_accepting_cryptocurrency_donations#Reply_from_the_WMF
date_of_breach: '2022-04-12'
date_of_disclosure: '2022-04-12'
category: other
vendor_product: Wikimedia community requests an end to crypto donations
notes: 'Wikipedia editors and other members of the Wikimedia communities completed a three-month-long discussion about whether
  the Wikimedia Foundation (WMF) should continue to accept donations in crypto. The WMF, which is the non-profit that owns
  and operates Wikipedia and related projects, has accepted crypto donations via BitPay since 2014. They have been a small
  source of donation revenue — in the last fiscal year, the WMF received about $130,000 worth of crypto donations. "Crypto
  was around 0.08% of our revenue last year, and it remains one of our smallest revenue channels," wrote a Wikimedia Foundation
  staff member.The community member writing the closing summary of the discussion wrote that "Common arguments in support
  include: issues of environmental sustainability, that accepting cryptocurrencies constitutes implicit endorsement of the
  issues surrounding cryptocurrencies, and community issues with the risk to the movement''s reputation for accepting cryptocurrencies....
  Excluding new accounts and unregistered users, the tally is 232 to 94, or 71.17% in support of the proposal. These results
  indicate overall community support, with a significant minority in opposition. Thus, the Wikimedia community requests that
  the Wikimedia Foundation stop accepting cryptocurrency donations."'
