notes: Citing "ongoing market challenges and funding difficulties", the MakersPlace NFT platform announced it will be shutting
  down after six years of operations. The company had raised $30 million in funding in August 2021 from investors including
  Eminem, Sony Music, and Coinbase Ventures.They wrote in their announcement that, although they had some money left, the
  "prolonged downturn" in the NFT market was causing them to "anticipate significant challenges in securing further investment
  which would make it difficult". They said they would be returning unused funding to investors and shutting down most of
  the site's functionality immediately.
