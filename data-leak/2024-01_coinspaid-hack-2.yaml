notes: 'The crypto payments platform CoinsPaid was hacked for the second time in six
  months. This time, around $7.5 million in various tokens was stolen.In July 2023,
  an attacker stole $37.3 million from the CoinsPaid platform. CoinsPaid said at the
  time that they suspected the attacker was the North Korean Lazarus hacking group,
  which has been a prolific perpetrator of cryptocurrency thefts.


  Total loss estimated at $7,500,000.'
