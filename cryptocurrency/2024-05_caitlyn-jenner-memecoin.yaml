notes: Olympic athlete-turned-Trumpworld media personality Caitlyn Jenner has confused many by apparently launching a memecoin
  on pump.fun and heavily promoting it on her Twitter account with more than 3 million followers. Her original post featured
  a photo of her grasping hands with Donald Trump, with the text "make america great again!!! 🇺🇸 and we love crypto!".At first,
  people widely believed her account had been hacked, given how frequently celebrity token promotions turn out to be compromised
  Twitter accounts. Then, she began joining Twitter spaces and posting videos about the token, but with the emergence of more
  and more convincing deepfakes, even those didn't convince people that it was truly Jenner behind the token.Despite the confusion — or
  perhaps because of it — the token has been popular.The token launch was linked to Sahil Arora, a person allegedly connected
  to multiple celebrity rug pulls and pump-and-dumps. However, Jenner quickly turned on Arora shortly after the token's launch,
  posting on Twitter "FUCK SAHIL! He scammed us! BIG TIME!" and that "Sahil appears to be fully out".Jenner is not the first
  in her family to get mixed up with crypto. In October 2023, her stepdaughter Kim Kardashian was fined over $1 million for
  unlawful touting of a crypto security.
