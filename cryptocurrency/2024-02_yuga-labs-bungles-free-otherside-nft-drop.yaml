vendor_product: Yuga Labs bungles "free" Otherside NFT drop
blockchain: ethereum
notes: Some fans of Yuga Labs (the company behind Bored Apes and the much-anticipated Otherside metaverse gaming project)
  are questioning how much progress the company can really have made on the as-yet-unreleased flagship Otherside gaming project,
  if they managed to screw up an NFT design this badly.Yuga released a new NFT, intending to function as ship parts that could
  be combined to create a ship to be used in the game. Players who had completed an Otherside minigame would be eligible to
  mint these NFTs for free. However, the "free" NFT cost around $30 in gas fees to mint. Worse still, the parts were meant
  to be repeatedly traded and combined to make new parts and ships, leading fans to wonder why on earth they decided to release
  the project on a blockchain where each transaction often costs tens of dollars.Apparently realizing they'd made a mistake,
  Yuga first responded by announcing they would gift people free "Catalyst" NFTs to make it up to them. This only sparked
  further rage, though, as it was seen to dilute the value of the Catalyst NFTs and throw off incentives.Yuga later reversed
  course on this decision, instead deciding to reimburse the gas fees.This was not Yuga Labs' first gas-related fiasco, after
  they caused gas fees to spike into the thousands of dollars across the entire Ethereum network in April 2022 during the
  initial Otherside land sale.One observer wrote, "[W]hat's the plan for the marketplace in Otherside that is supposed to
  support millions of daily microtransaction? I'm afraid this means Otherside is much less developed than we would like to
  hope. These decisions are entry level mistakes, not mistakes we should see from the biggest company in the space developing
  a metaverse. If the Otherside mint wasn't an eye opener, then this wont be either."
