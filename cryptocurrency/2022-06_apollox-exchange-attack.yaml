notes: 'The ApolloX exchange suffered an exploit where an attacker was able to withdraw around 40 million $APX, which they
  were able to swap for around $1.5 million. This also caused the $APX price to drop by more than 50%.The exchange has announced
  plans to repurchase $APX to boost the price, so far spending $600,000 to do so.


  Total loss estimated at $1,500,000.'
