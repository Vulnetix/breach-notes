vendor_product: Decentraland has few users
affected_count: 38
notes: According to CoinDesk, the metaverse platform Decentraland is entertaining roughly 38 users a day these days. This
  isn't much for its "valuation" of $1.3 billion — although CoinDesk seems to be estimating this on "market cap". Its competitor,
  the Sandbox (also "valued" at around $1.3 billion), is doing a bit better — with a whopping 522 daily active users.Not only
  that, the most users Decentraland has ever had in one day is only 675; The Sandbox had 4,503 at one point.
