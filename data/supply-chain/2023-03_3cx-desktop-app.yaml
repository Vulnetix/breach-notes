notes: "Lazarus Group (North Korea, subunit Labyrinth Chollima) trojanized 3CX DesktopApp versions 18.12.407 and 18.12.416 for Windows and Mac. Delivered SUDDENICON downloader which fetched encrypted C2 from icon files hosted on GitHub, then dropped ICONICSTEALER browser info-stealer. 3CX serves 600,000+ companies with up to 12M daily users (Toyota, Mercedes, Coca-Cola, NHS). Double supply chain: initial infection traced back to compromised Trading Technologies X_TRADER software. Targeted cryptocurrency firms."
