date_of_breach: 2023-01-01
date_of_disclosure: 2023-01-01
date_of_customer_notification: 
category: supply-chain
initial_attack_vector: CircleCI's January 2023 breach (malware on engineer laptop stole session token) allowed attackers to access CircleCI customer secrets; Datadog's RPM package signing key was stored in CircleCI CI/CD environment variables and was exposed
