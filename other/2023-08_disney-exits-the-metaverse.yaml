source_name: '"Disney''s ''metaverse chief'' departs shortly after division shutdown"'
source_url: https://www.campaignasia.com/article/disneys-metaverse-chief-departs-shortly-after-division-shutdown/485682
date_of_breach: '2023-08-08'
date_of_disclosure: '2023-08-08'
category: other
notes: Disney has shut off the last light in its metaverse division, parting ways
  with "metaverse chief" Michael White. In February 2022, Disney's then-CEO described
  the metaverse as "the next great storytelling frontier". That sentiment appears
  to have been short-lived, because in March 2023, Disney cut its 50-person metaverse
  team, leaving only White.
