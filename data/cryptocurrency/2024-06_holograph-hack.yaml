source_name: '"HLG Down Over 60% as Exploiter Mints 1 Billion New Tokens"'
source_url: https://www.coindesk.com/tech/2024/06/13/hlg-down-over-60-as-exploiter-mints-1-billion-new-tokens/
date_of_breach: '2024-06-13'
date_of_disclosure: '2024-06-13'
category: cryptocurrency
initial_attack_vector: Smart contract exploit / hack
vendor_product: Holograph
blockchain: ethereum
financial_loss_usd: 1200000
notes: 'The Holograph tokenization project was exploited on June 13 after they took advantage of a flaw in a smart contract
  that allowed them to mint 1 billion HLG tokens. Notionally worth $14.4 million at the time the tokens were minted, relatively
  low liquidity meant that the introduction of a billion additional tokens crashed the token price by 80%. The attacker ultimately
  was able to cash out around 348 ETH (~$1.2 million).One of the addresses involved in the exploit appears to have contributed
  to the Holograph protocol, though it''s not clear if they took advantage of insider knowledge to pull off the heist.


  Total loss estimated at $1,200,000.'
