vendor_product: Coinbase rolls out politics feature
notes: When the "politics" were widespread civil unrest in the summer of 2020 triggered by the police murder of George Floyd,
  and pressure on the company to release a statement in support of Black Lives Matter, Coinbase CEO Brian Armstrong announced
  that there would be no political discussion or activism at work, and those who didn't like it could leave.Now, he's just
  announced that Coinbase will be "integrating our crypto policy efforts right into our app" by providing a rating of Congressmembers'
  negative or positive "crypto sentiment". He also said that they plan to "help pro-crypto candidates solicit donations from
  the crypto community (in crypto)", and wish to get their users to attend town hall events. "We've also added a very easy
  way for you to contact your member of Congress to urge them to support pro-crypto policies," Armstrong said in a video demonstrating
  the feature.
