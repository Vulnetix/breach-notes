notes: 'If it seems like you''ve been seeing a lot of Ethereum co-founder and figurehead
  Vitalik Buterin around Twitter lately, it may be due to the influx of hacked verified
  Twitter accounts that have been retrofitted to resemble Vitalik''s account. They''ve
  been used to share a litany of scam links to supposed Ethereum giveaways in celebration
  of "The Merge": the much-anticipated change to Ethereum''s consensus model that''s
  scheduled to happen on September 15.Most of the tweets say something like "To celebrate
  the Merge, Ethereum Foundation giving away 50,000 ETH!", and link out to various
  websites that invite people to send some amount of Ethereum with the promise that
  they''ll receive twice as much in return — a classic double-your-money scam.At least
  36 verified Twitter accounts were compromised and used for the scam, including the
  6 million-follower Cityarabia account that normally tweets for Arabic-speaking fans
  of the Manchester City football club. On the afternoon and evening of September
  14 alone, at least 195 ETH (~$314,000) was drawn in by the accounts and scam websites
  I found.


  Total loss estimated at $314,307.'
