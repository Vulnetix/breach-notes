source_name: '"Investor Purchases 330 Adidas NFTs Using Smart Contract - 328 More Than the Cap"'
source_url: https://cryptonews.com/news/investor-purchases-330-adidas-nfts-using-smart-contract-328-more-than-cap.htm
date_of_breach: '2021-12-17'
date_of_disclosure: '2021-12-17'
category: cryptocurrency
vendor_product: Adidas Sybil attack
blockchain: ethereum
notes: Anticipating that buyers would try to hoard items from a big-name NFT drop, Adidas decided to try to limit their NFT
  drop to two per buyer. They apparently didn't realize that there is no guarantee that one address = one individual, and
  a crafty blockchain engineer created a smart contract that generated additional smart contracts, each with their own address.
  These contracts snapped up NFTs, then transferred them to the engineer's primary wallet and self-destructed. The engineer
  was able to snag 330 NFTs.
