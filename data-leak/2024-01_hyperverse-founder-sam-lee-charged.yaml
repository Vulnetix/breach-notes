notes: US Attorneys in Maryland and the US Securities and Exchange Commission filed
  criminal and civil lawsuits, respectively, against Sam Lee, the co-founder of the
  HyperVerse cryptocurrency investment scheme, which has defrauded victims of between
  $1.3 billion and $1.9 billion depending on whose estimate you use. The US Attorneys
  have accused Lee of securities fraud and wire fraud. The SEC has accused Lee and
  a major HyperVerse promoter, Brenda Indah Chunga (aka "Bitcoin Beautee"), of securities
  fraud and offering unregistered securities.This is the second HyperVerse related
  criminal charge in recent days, following the arrest of promoter "Bitcoin Rodney".
