source_name: '"KlaySwap crypto users lose funds after BGP hijack"'
source_url: https://therecord.media/klayswap-crypto-users-lose-funds-after-bgp-hijack/
date_of_breach: '2022-02-03'
date_of_disclosure: '2022-02-03'
category: data-leak
notes: 'Some sophisticated hackers managed a BGP hijack on the servers powering KakaoTalk,
  a marketing and customer service application used by the South Korean KLAYswap cryptocurrency
  exchange. The hijacking enabled the hackers to serve malicious JavaScript that allowed
  hackers to intercept funds as a user initiated a transaction. Over a two-hour period,
  the hackers stole cryptocurrency totaling ₩2.2 million (about $1.9 million) from
  325 customer wallets. The exchange acknowledged the hack the same day, and promised
  to compensate affected users.


  Total loss estimated at $1,900,000.'
