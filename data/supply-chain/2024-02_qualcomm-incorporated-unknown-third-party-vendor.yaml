notes: 'February 2024 Healthcare Data Breach Report. There has been a fall in the
  number of reported healthcare data breaches for the second consecutive month, with
  59 data breaches of 500 or more records 59 healthcare data breaches were reported
  in February 2024, 10.6% fewer than in January. Across those 59 breaches, the records
  of 5,130,515 individuals were compromised, 41.7% fewer than in January. There were
  10.6% fewer breaches reported in February than in January, which followed a 22%
  reduction between December 2023 and January 2024. Over the past 12 months, an average
  of 64 healthcare breaches have been reported each month, and while February is well
  under that average, 22.9% more breaches were reported in February 2024 than in February
  2023. Third-party company: Unknown third-party vendor.'
