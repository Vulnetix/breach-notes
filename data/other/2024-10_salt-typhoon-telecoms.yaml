notes: "Chinese MSS-affiliated APT Salt Typhoon (FamousSparrow) breached at least 9 US telecoms including AT&T, Verizon, T-Mobile starting ~late 2022/early 2023. Accessed CALEA lawful intercept systems, obtaining near-complete list of wiretap targets. Harvested metadata (call/text timestamps, IPs, phone numbers) for 1M+ users primarily in DC area. Obtained audio recordings of Trump, JD Vance, Harris campaign staff. 200+ businesses in 80+ countries hit globally. Senator Warner called it 'worst telecom hack in US history.' Prompted CISA/FBI joint advisories Dec 2024."
