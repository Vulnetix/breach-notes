initial_attack_vector: "Attackers compromised BitGo's multi-signature co-signing service integrated with Bitfinex's wallet infrastructure; the exact initial access vector was never fully disclosed, but the attack involved manipulating Bitfinex's API to authorize fraudulent withdrawal transactions that BitGo's servers co-signed without detecting the anomaly"
