vendor_product: No one wants Chevrolet's NFT
blockchain: ethereum
notes: Chevrolet decided to create their first ever NFT, an illustration of a bright green 2023 Corvette Z06. The 1 of 1 edition
  NFT, titled "Own the Color", also would come with a "free" real-life souped-up version of the car, painted in the same color,
  and with the promise that the shade would never be used again on that model of car.The NFT went up for sale on June 20,
  with bidding scheduled to last for four days, and a starting bid of 206 ETH (around $240,000). Apparently collectors decided
  the NFT wasn't enough to justify dropping that kind of cash on a car that is expected to sell for around $90,000, because
  the auction received no bids.SuperRare, the marketplace used for the auction, explained that users must have missed the
  opportunity to bid "due to the craziness of NFT NYC" (a cryptocurrency conference that ran from June 20–23), and the project
  extended the bidding time by 24 hours. After the 24 hours had elapsed, they still had zero bids.
