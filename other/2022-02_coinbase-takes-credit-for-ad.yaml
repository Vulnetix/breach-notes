notes: 'Coinbase CEO Brian Armstrong embarked on a 12-tweet-long thread congratulating
  Coinbase employees for coming up with the bouncing QR code Super Bowl ad. He wrote,
  "I guess if there is a lesson here it is that constraints breed creativity, and
  that as founders you can empower your team to break the rules on marketing because
  you''re not trying to impress your peers at AdWeek or wherever. No ad agency would
  have done this ad."Unfortunately for him, CEO of The Martin Agency Kristen Cavallo
  showed up with receipts: "It was actually inspired by presentations our agency showed
  your team on 8/18 (pages 19-24) and 10/7 (pages 11-18) with ad concepts for the
  Super Bowl with floating QR codes on a blank screen."I guess if there is a lesson
  here it is that if you''re going to take credit for someone else''s idea to try
  to make your team sound good, maybe you shouldn''t also use it as an opportunity
  to dunk on the people who actually came up with the idea.'
