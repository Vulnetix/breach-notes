notes: I've largely stopped covering crypto Discord compromises because they occur
  so frequently it would drown out everything else. OKHotshot has been keeping count,
  though, and according to them, at least 101 servers have been compromised in the
  month of July. Four of the projects — EY3KON, Tasty Bones, Universe by Barnabe,
  and Angry Dinos — were each compromised twice in that month.
