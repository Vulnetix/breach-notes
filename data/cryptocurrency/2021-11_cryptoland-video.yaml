notes: Signs unfortunately point to this being an actual, real project rather than satire, but the video purporting to advertise
  it dunks on cryptobros harder than most satirists have managed to. A campy 3D-animated video with strong Fyre Festival vibes
  is complete with scenes of its cryptobro main character uncomfortably hitting on a female employee of "Cryptoland", and
  walking around with an anthropomorphized coin who is apparently named "Connie" (so like... con?), and performing in a terrible
  musical number. The project's founders say they've already spent more than a year and employed 30 digital artists to produce
  their 3D-animated pitch, but it doesn't appear that they've put the same effort into making their ideas a tangible reality.
  They own no land on which to have started construction on their various attractions, or to park the Lamborghinis they promise
  to provide. One thing they have done, though, is list parcels of land on this apparently as-yet-imaginary island in Fiji
  for sale — for the low, low price of 319 ETH (about $1.2 million).
