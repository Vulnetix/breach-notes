source_name: '"First NFT Collection from Paramount Global and RECUR Partnership to Drop with Star Trek on April 9"'
source_url: https://intl.startrek.com/news/first-nft-collection-from-paramount-global-and-recur-partnership-to-drop-with-star-trek-on
date_of_breach: '2022-04-06'
date_of_disclosure: '2022-04-06'
category: cryptocurrency
vendor_product: Star Trek NFT announcement
blockchain: polygon
notes: Star Trek announced the creation of "Star Trek Continuum", a part of Paramount's new NFT platform. They state that
  the project is "accessible to everyone [with $250 to throw around] and allows another expression of fandom [by giving us
  their money]". The press release attempts to drum up FOMO by writing, "there will never be more of these designs created
  and the minting window will only be open for 24 hours" — however, it also talks about how this is "Season 0" and the platform
  will be used for "future seasons of Star Trek™ NFTs."
