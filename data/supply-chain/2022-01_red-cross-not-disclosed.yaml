notes: |-
  On 19 January 2022, the International Committee of the Red Cross (ICRC) disclosed a sophisticated
  cyberattack that compromised personal data on more than 515,000 highly vulnerable individuals whose
  information was held as part of the Restoring Family Links programme — a global effort to reconnect
  people separated by conflict, disaster, and migration. The data was hosted on servers maintained by
  a third-party contractor in Switzerland.

  The actual intrusion began on 9 November 2021, nearly two months before discovery. Attackers exploited
  CVE-2021-40539, a critical authentication bypass and remote code execution vulnerability in Zoho
  ManageEngine ADSelfService Plus (CVSS 9.8), which had been publicly known and patched since September
  2021 but remained unpatched on the ICRC contractor's systems. The vulnerability allowed the threat
  actor to achieve unauthenticated RCE and establish persistent access to ICRC's contact database
  environment, going undetected for approximately 70 days.

  Post-incident forensic analysis revealed a highly targeted operation: malicious files were crafted
  specifically to execute only on ICRC's servers, verified using the targeted servers' MAC addresses.
  Most of the malware was custom-built to evade existing anti-malware defenses. Detection ultimately
  came only after ICRC deployed advanced endpoint detection and response (EDR) agents as part of a
  planned security enhancement programme.

  The compromised data covered individuals from at least 60 Red Cross and Red Crescent national
  societies, including missing persons and their families, detainees, unaccompanied or separated
  children, and other people receiving ICRC services following armed conflict or natural disasters.
  Additionally, login credentials for approximately 2,000 ICRC and Red Crescent staff and volunteers
  were exposed.

  The ICRC did not formally attribute the attack, but Palo Alto Networks researchers had previously
  linked campaigns exploiting CVE-2021-40539 to APT27 (a Chinese state-sponsored threat group), and
  Microsoft similarly reported Chinese state actors exploiting the same flaw. The ICRC described the
  attack as "state-sponsored" in a February 2022 update, calling it a "targeted" and "sophisticated"
  operation rather than opportunistic. The organisation publicly appealed for the stolen data not to
  be shared, sold, or weaponised, citing the life-threatening risks to the displaced and vulnerable
  people involved.

  The breach prompted widespread criticism of the contractor's failure to patch a months-old critical
  vulnerability and highlighted systemic risks when humanitarian organisations entrust sensitive data
  to third-party infrastructure providers. The ICRC was forced to temporarily shut down the Restoring
  Family Links digital system.

