source_name: '"SEC Charges FinTech Investment Adviser Titan for Misrepresenting Hypothetical
  Performance of Investments and other Violations"'
source_url: https://www.sec.gov/news/press-release/2023-153
date_of_breach: '2023-08-21'
date_of_disclosure: '2023-08-21'
category: other
notes: Titan Global Capital Management, an investment advisory firm, has been charged
  by the SEC for violations of securities laws, including misrepresenting potential
  investment performance, making misleading disclosures pertaining to crypto custody,
  failing to impose limits on employees' crypto trades, and more.Titan advertised
  "annualized" performance results of up to 2,700% on its Titan Crypto trading strategy,
  which the SEC says was misleading because it failed to include material information
  about how the performance was calculated. Titan had based the calculation on three
  weeks of performance, assuming it would continue for a full year.Titan has agreed
  to a cease-and-desist order, censure, and over a million in disgorgement and penalties.
