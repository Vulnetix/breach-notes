notes: 'Crypto sleuths Coffeezilla and zachxbt teamed up on an investigation into
  YouTuber and crypto promoter KSI, accusing him of pumping up interest into the XCAD
  project and then dumping tokens priced at $850,000 shortly after, when some of his
  millions of followers had likely bought in and pumped the price.Although the token
  dumping occurred in March 2022, zachxbt waited until now — when KSI returned to
  his dormant Twitter account — to release the evidence he''d collected.KSI had previously
  claimed to followers that he was "holding his bags", meaning not selling the XCAD
  tokens he''d purchased or been given. zachxbt determined this to have been a lie.
  The XCAD founder later came to KSI''s defense, claiming he had bought more tokens
  than he sold, as though that somehow justifies the behavior.


  Total loss estimated at $850,000.'
