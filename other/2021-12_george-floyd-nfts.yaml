source_name: '"The latest horrible NFT project co-opts George Floyd’s image"'
source_url: https://www.inputmag.com/culture/george-floyd-nfts-floydies-racism
date_of_breach: '2021-12-13'
date_of_disclosure: '2021-12-13'
category: other
notes: Someone released a collection of poorly-made pixel art NFTs depicting the late
  George Floyd, whose murder by a police officer in May 2020 set off protests around
  the world. There was no apparent link to his family or any social justice charity;
  this was just a scam to make money off of the memory of a murder victim. One entry
  in the collection depicted Floyd as a police officer; another styled him as a Despicable
  Me minion. "To the people who think I'm super-racist, I would say I'm just an opportunist",
  said the creator.
