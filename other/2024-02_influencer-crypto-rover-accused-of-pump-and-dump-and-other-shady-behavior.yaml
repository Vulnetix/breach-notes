notes: A popular cryptocurrency influencer known as "Crypto Rover" has been accused
  by blockchain sleuth zachxbt of shady behavior, including accepting promotional
  payments from crypto projects and then not following through on his end of the deal,
  dumping tokens after promising followers he would hold, and secretly purchasing
  tokens for memecoin projects before pumping the price by posting about them.Zachxbt
  outlined various incidents, including how Crypto Rover purchased "Stoned Pepe" tokens
  before posting to his hundreds of thousands of followers that he thought the token
  would "do at least a 10x", and claiming that he had inside info on the project.
  He also detailed how Rover had taken a $10,000 payment and 1% of the supply of a
  new token that he promised to promote, then never promoted — despite promising the
  team that he could "pump projects from 1/2m to 10m easy".After zachxbt published
  his research, Rover deleted his Telegram channel.
