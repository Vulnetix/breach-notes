initial_attack_vector: Regulatory / legal action
vendor_product: Binance delists privacycoins
notes: 'Seeming to bow to regulatory pressures, Binance announced they would delist various privacycoins including Monero,
  ZCash, and MobileCoin for some regions. Privacycoins are tokens that aim to obscure more of the information involved in
  a transaction, in contrast to the very public nature of the wallet addresses and transfer amounts of most cryptocurrency
  transactions.Binance did not list the jurisdictions in which it would be ending privacycoin trading, but users in France,
  Spain, and Poland all reported receiving alerts. This suggested it could be related to the recent passage of the MiCA crypto
  legislation in the European Union. The resolution states: "The operating rules of the trading platform for crypto-assets
  shall prevent the admission to trading of crypto-assets that have an inbuilt anonymisation function unless the holders of
  those crypto-assets and their transaction history can be identified by the crypto-asset service providers operating a trading
  platform for crypto-assets."In late June, Binance announced that they had reversed their decision, and would continue to
  offer the tokens.'
