source_name: '"What happens when a secretive blockchain company buys your game studio"'
source_url: https://www.gamedeveloper.com/business/what-happens-when-a-secretive-blockchain-company-buys-your-game-studio
date_of_breach: '2024-10-22'
date_of_disclosure: '2024-10-22'
category: other
vendor_product: Forte Labs game studio acquisitions
affected_count: 100
notes: Sometime in 2023, blockchain firm Forte acquired game studios Phoenix Labs and Rumble Games. However, it would be a
  year before this came to light, because according to a report from Game Developer, Forte demanded secrecy from employees.
  (Forte refutes this). In both cases, some employees believed that Forte was funding their development, but didn't find out
  until later that Forte owned the companies.Both studios had several games in progress, and two of Phoenix Labs' games were
  explicitly designed for younger players. Developers reportedly voiced discomfort with incorporating blockchains into the
  games, selling digital items to children.Later, Forte pulled the plug on several in-development games at both studios. Then,
  Forte shut down Rumble in 2024, laying off all employees. Forte also laid off over 100 people from Phoenix Labs that year.
