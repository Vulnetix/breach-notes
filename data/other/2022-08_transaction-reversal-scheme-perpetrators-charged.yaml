source_name: '"Three Members Of Miami Crew Charged With Defrauding Banks And Cryptocurrency
  Exchange Of More Than $4 Million"'
source_url: https://www.justice.gov/usao-sdny/pr/three-members-miami-crew-charged-defrauding-banks-and-cryptocurrency-exchange-more-4
date_of_breach: '2022-08-23'
date_of_disclosure: '2022-08-23'
category: other
notes: The U.S. Attorney's Office of the Southern District of New York announced charges
  against three men responsible for a scheme in which they stole millions from cryptocurrency
  exchanges and traditional banks. The group used stolen identities to buy cryptocurrency
  from various crypto exchanges, then convinced the banks that the fraudulent transactions
  were, well, fraudulent. The banks would refund the transactions to the thieves,
  who would then make off with both that and the cryptocurrency they had purchased.The
  three men were charged with wire fraud, bank fraud, and identity theft charges,
  and face potential decades in prison if convicted.
