notes: In a decision that makes you wonder if there was one single queer person in
  the room during the branding meetings, Hostess has announced $TWINKcoin snack cakes.
  The limited-edition product "is a play on the current cryptocurrency frenzy and
  features coin-shaped cakes", or, as most people would call them, cake-shaped cakes.
