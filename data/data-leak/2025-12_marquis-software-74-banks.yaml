notes: "Marquis Software Solutions, a provider of core banking and analytics software to community banks and credit unions across the United States, disclosed in December 2025 that a breach had exposed customer data from 74 financial institution clients. Exposed customer data included names, home addresses, phone numbers, Social Security numbers, Tax Identification Numbers, financial account information, and dates of birth. The breadth of this breach — affecting customers of 74 separate financial institutions through a single vendor compromise — exemplifies the systemic risk of software supply chain attacks on community banking infrastructure."
