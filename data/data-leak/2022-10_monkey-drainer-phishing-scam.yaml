notes: 'A phishing scammer called "Monkey Drainer" stole around 700 ETH (~$940,000) in 24 hours on October 25, according to
  blockchain sleuth zachxbt. The scammer used malicious phishing sites to trick users into signing transactions that then
  drained cryptocurrencies and NFTs from their wallets. Some individual victims lost crypto valued at hundreds of thousands
  of dollars, and others lost NFT collections. Zachxbt estimated the total amount solen by Monkey Drainer to be around $3.5
  million.


  Total loss estimated at $3,500,000.'
