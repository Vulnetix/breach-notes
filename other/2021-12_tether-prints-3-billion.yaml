date_of_breach: '2021-12-04'
date_of_disclosure: '2021-12-04'
category: other
notes: Tether minted more than $3 billion in a two week span. This brings the total
  amount of USDT (which is pegged to the U.S. dollar) to 76 billion, and much of it
  was minted this year. If Tether actually had reserves to back this up, as they claim,
  they would be one of the largest banks. However, as the Financial Times reported,
  in March 2021 "the stablecoin that used to say it was 100 per cent backed by cash
  reserves is in fact... 2.9 per cent backed by cash reserves".
