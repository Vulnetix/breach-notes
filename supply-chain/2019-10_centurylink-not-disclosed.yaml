notes: CenturyLink customers may have had data exposed in 'security incident'. The
  company says the incident involving a third party vendor may have exposed contact
  information. GOLDEN VALLEY, Minn. — Some CenturyLink customers are receiving notifications
  about a recent "security incident" that may have compromised customers' contact
  information. An email sent to customers states the "information security incident"
  involves a third-party vendor; as a result, customer information was "inadvertently
  made publicly accessible online," possibly including names, addresses, phone numbers,
  email addresses and CenturyLink account numbers.
