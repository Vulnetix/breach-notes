notes: 'Crypto researcher Tayvano posted a Twitter thread about a massive, mysterious wallet draining operation that has siphoned
  more than 5,000 ETH (~$9.88 million at today''s prices) as well as other tokens and NFTs from wallets across more than eleven
  blockchains since December 2022. The operation appears to target more sophisticated crypto users, but the mechanism of attack
  is unclear. The researcher hypothesized that "someone has got themselves a fatty cache of data from 1+ yr ago &amp; is methodically
  draining the keys as they parse them from the treasure trove", but emphasized that that was only speculation.


  Total loss estimated at $9,877,350.'
