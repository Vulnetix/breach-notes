notes: |-
  Kettering Health (an Ohio-based health system operating multiple hospitals and care sites) was notifying
  current and former patients of data exposure resulting from an Interlock ransomware attack. The breach exposed
  patient personal and health information. Kettering Health worked with cybersecurity firms and law enforcement
  to investigate and remediate. HHS OCR was notified. See also the primary Kettering Health Interlock record.
