notes: "In April 2026, ShinyHunters disclosed that they had breached Anodot (an Israeli AI analytics company acquired by Glassbox in November 2025), maintaining access 'for some time.' By stealing authentication tokens from Anodot's systems, they accessed Snowflake environments of over a dozen downstream Anodot customers. ShinyHunters then launched extortion campaigns against victim companies. ShinyHunters also confirmed they attempted to pivot into Salesforce from Anodot but failed. This incident mirrors the 2024 UNC5537/Snowflake campaign and reflects a recurring pattern of supply chain compromise via SaaS integration platforms to gain downstream access to Snowflake data environments."
