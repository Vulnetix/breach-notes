source_name: '"JPEX cryptocurrency exchange named in 83 complaints to Hong Kong police
  over virtual assets worth HK$34 million"'
source_url: https://www.scmp.com/news/hong-kong/law-and-crime/article/3234797/jpex-cryptocurrency-exchange-named-83-complaints-hong-kong-police-cases-involving-virtual-assets
date_of_breach: '2023-09-17'
date_of_disclosure: '2023-09-17'
category: other
notes: '"We believe that the platform will not collapse," wrote JPEX, amidst apparent
  collapse. JPEX is a Hong Kong crypto exchange that was advertising more than 20%
  APY on various staking products.The JPEX cryptocurrency exchange was the subject
  of a September 13 consumer warning by the Securities and Futures Commission (SFC),
  who said they were promoting services to Hong Kong residents without proper licensure.
  The following day, attendees of the Token 2049 crypto event observed that JPEX had
  abandoned the booth they''d rented. Then, JPEX hiked their withdrawal fees to as
  high as $999, and limited withdrawals to $1,000.According to the South China Morning
  Post, customers have filed at least 83 complaints about the exchange, pertaining
  to crypto assets priced at $4.3 million. Hong Kong police have disclosed they are
  investigating the firm.JPEX released a statement that the SFC was "exerting undue
  pressure on our platform", and asserted that the watchdog should "bear full responsibility
  for undermining the prospects" of the crypto industry in the region. Later, they
  accused their "partnered third-party market makers" of "maliciously fr[eezing] funds".
  They announced that, as a result, they would be pausing their Earn product. They
  also suspended their platform''s gaming feature.'
