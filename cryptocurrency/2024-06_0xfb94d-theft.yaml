notes: 'A victim lost $11 million in Aave Ethereum (aEthMK) and Pendle USDe tokens after signing several permit phishing signatures.
  Permit phishing is a technique in which scammers convince a victim to sign a transaction that grants broad permissions,
  allowing the scammer to then drain assets from the wallets.


  Total loss estimated at $11,000,000.'
