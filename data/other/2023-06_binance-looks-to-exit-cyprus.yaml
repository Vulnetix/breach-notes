source_name: '"Binance''s Cyprus unit seeks deregistration as crypto service provider"'
source_url: https://www.reuters.com/technology/binances-cyprus-unit-seeks-deregistration-crypto-service-provider-2023-06-14/
date_of_breach: '2023-06-15'
date_of_disclosure: '2023-06-15'
category: other
vendor_product: Binance looks to exit Cyprus
notes: Although Binance's Cyprus arm was only registered in October 2022, the company is already looking to deregister in
  the country. According to Binance, they're pulling back in smaller EU countries in order to "focus on our efforts on fewer
  regulated entities in the EU", where they will need to come into compliance with the recent MiCA legislation by the time
  it comes into effect.
