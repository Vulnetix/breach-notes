source_name: '"Tech Startup Wants To Gamify Suing People Using Crypto Tokens"'
source_url: https://www.vice.com/en/article/v7d7x3/tech-startup-wants-to-gamify-the-us-court-system-using-crypto-tokens
date_of_breach: '2021-10-26'
date_of_disclosure: '2021-10-26'
category: other
notes: Tech startup "Ryval", which is formally launching in 2022, announced its plans
  to allow "everyday Americans" to bet on the outcomes of civil lawsuits, potentially
  raising funds for the parties. While the company is spinning this as "mak[ing] access
  to justice more affordable", I have considerably less faith that allowing crypto
  investors to decide on who and what is worthy of a lawsuit (or at least which lawsuits
  are likely to be "profitable" to them) will somehow introduce more equality into
  the American legal system.
