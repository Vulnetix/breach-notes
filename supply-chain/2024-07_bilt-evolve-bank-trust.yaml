notes: 'Affirm says cardholders impacted by Evolve Bank data breach. Buy now, pay
  later loan company Affirm is warning that holders of its payment cards had their
  personal information exposed due to a data breach at its third-party issuer, Evolve
  Bank & Trust (Evolve). Affirm is a fintech firm that provides consumer-friendly
  alternatives to traditional credit options. It also offers point-of-sale financing,
  virtual cards on a mobile app , and a fully integrated physical card called the
  ''Affirm Card.''. Evolve is a large financial services provider specializing in
  retail and commercial banking, payment processing, and banking-as-a-service (BaaS).
  Third-party company: Evolve Bank & Trust.'
