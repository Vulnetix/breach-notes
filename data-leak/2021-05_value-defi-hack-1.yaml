notes: 'Attackers exploited a bug in Value DeFi''s smart contract to drain $10 million out of the platform, in a second attack
  in six months. In November 2020, the platform had lost $7 million to a flash loan attack, after bragging about their "flash
  loan attack protection". The group was also discovered to be using a paid actress to pretend to be one of their co-founders.


  Total loss estimated at $10,000,000.'
