notes: "DaVita Inc., one of the largest kidney dialysis providers in the US, disclosed a ransomware attack on April 12, 2025. Intrusion began March 24, 2025 and was eradicated April 12. Interlock ransomware group claimed responsibility, alleging theft of 20+ TB of data containing 200+ million rows of patient data. Official breach report confirmed 2,689,826 individuals affected; data included names, addresses, SSNs, dates of birth, and dialysis lab results. Attackers used Rclone to exfiltrate data via encrypted channels. DaVita disclosed via SEC 8-K under Item 1.05 (material cybersecurity incident). Multiple class action lawsuits filed."
