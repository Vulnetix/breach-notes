source_name: '"I just lost over $35k to scammers. Beware out there."'
source_url: https://www.reddit.com/r/defi/comments/skqvit/i_just_lost_over_35k_to_scammers_beware_out_there/
date_of_breach: '2022-02-04'
date_of_disclosure: '2022-02-04'
category: data-leak
notes: 'A person using the TraderJoe DeFi platform to yield farm encountered issues
  when trying to "harvest" their rewards. They tweeted at the platform (&#64;traderjoe_xyz)
  to get support, only to receive a reply from a very similarly-named account (&#64;traderjoe_xyz_)
  asking them to message them. The trader did so, and when the scammer instructed
  them to connect their wallet to supposedly help the dev team troubleshoot, they
  did. When the scam account blocked them, they realized what they had done, and saw
  that the scammer had drained the holdings in their wallet and liquidated all of
  their active positions.The trader reported that they lost more than $35,000. They
  wrote in a Reddit post, "I was unemployed and literally solely yield farming to
  hedge my student loan. I deposited almost the same amount of my debt, and was leveraging
  the fact that the return I was getting was higher than my loan''s APR. While trying
  to earn $8-9 more, I lost $35k and my financial freedom."


  Total loss estimated at $35,000.'
