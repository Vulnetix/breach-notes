initial_attack_vector: Missing authentication vulnerability in a conference app built by third-party provider CrowdComms — the app allowed any user to log in as any other attendee using only an email address, with no password required, exposing profile data including personal mobile phone numbers for hundreds of MPs, ministers, journalists, and conference delegates
