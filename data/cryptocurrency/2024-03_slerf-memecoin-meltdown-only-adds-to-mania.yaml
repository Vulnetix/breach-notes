notes: 'People have gotten really into memecoin trading on Solana recently. Like really into it. Someone decided they''d hop
  on the bandwagon with "Slerf", a sloth-themed memecoin they said would launch with a 50% presale.Thanks to the aforementioned
  frenzy, the project managed to raise $10 million in the presale. However, things went sideways when the developer accidentally
  burned the $10 million by sending them to an address where they would be permanently inaccessible. "oh fuck", the developer
  wrote ominously on Twitter, before explaining their mistake.Some speculated that the screwup may have been a marketing ploy,
  in which case it was very successful, because the token went on to post more than $2.7 billion in trading volume over a
  24-hour period — more than the entire ETH trading volume in that period. The monumental error by the developers seemed to
  have no damper on the overall frenzy around memecoins, or even produced the opposite effect.Surely this trend won''t end
  badly.


  Total loss estimated at $10,000,000.'
