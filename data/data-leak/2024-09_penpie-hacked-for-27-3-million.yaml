notes: 'The defi protocol Penpie was exploited for 11,113.6 ETH (~$27.3 million) by an attacker who exploited a flaw allowing
  them to withdraw unearned "rewards". Although the protocol claimed to have been audited by two blockchain security firms,
  they later disclosed that the smart contracts containing the bugs had not been fully audited.The team behind Pendle (the
  platform on which Pendie is built) detected the attack and paused Pendle an hour after the attack began, which they claim
  prevented another $105 million from being stolen.Members of the Penpie team filed complaints with Singaporean police and
  the US FBI. They also attempted to negotiate a "bug bounty" via on-chain and social media messages to the attacker, but
  the hacker seems uninterested and has continued to transfer funds between various crypto wallets and launder funds through
  Tornado Cash.


  Total loss estimated at $27,348,259.'
