notes: 'Someone had a not so fun end to the year when they fell victim to a phishing attack and had around 275,700 LINK drained
  from their crypto wallet. Those tokens are priced at around $4.4 million.The attack was perpetrated by the Pink Drainer
  group, which had recently compromised the Twitter account of Compound Finance to try to lure its more than 250,000 followers
  into authorizing the malicious drainer. It''s not clear if that''s how this wallet was drained, however, as Pink Drainer
  uses numerous strategies to attract victims.


  Total loss estimated at $4,400,000.'
