notes: "Major crypto exchange Deribit suffered a hot wallet compromise that resulted in a $28 million theft. The exchange\
  \ halted withdrawals to perform security checks, but urged that customer funds were safe and that the loss was covered by\
  \ company reserves.Deribit is also among the primary creditors of failed crypto hedge fund Three Arrows Capital, which defaulted\
  \ on an $80 million loan from the exchange. \n\nTotal loss estimated at $28,000,000."
