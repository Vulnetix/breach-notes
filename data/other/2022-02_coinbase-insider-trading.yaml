date_of_breach: '2022-02-08'
date_of_disclosure: '2022-02-08'
category: other
notes: In early February, Coinbase listed the Aventus token ($AVT) on its exchange
  and added support for Pawtocol ($UPI). Shortly before these announcements, someone
  created a new crypto wallet and spent more than $350,000 buying AVT. The listing
  news didn't result in much of a price bump for AVT, so the trader tried again —
  cashing out the AVT and putting it into UPI in advance of that announcement. They
  found success with this trade, ultimately making a profit of around $734,000. The
  timing of the trades, combined with the relatively unknown nature of $AVT prior
  to the announcement, strongly suggests someone had insider knowledge of the upcoming
  announcement.
