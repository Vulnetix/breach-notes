notes: "Frontier Communications (a major US telecom serving 25 states) detected unauthorized access on 14 April 2024. RansomHub claimed responsibility and threatened to leak 5 GB of stolen data. Final notification count was 751,895 individuals with names and Social Security numbers confirmed compromised; RansomHub claimed over 2 million records including addresses, DOBs, and credit scores. Frontier filed SEC 8-K on 15 April 2024 and notified affected customers in June after conducting investigation. Three class action lawsuits filed."
