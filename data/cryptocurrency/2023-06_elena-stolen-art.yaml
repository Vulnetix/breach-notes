notes: 'Web3 influencer Elena announced she would be launching an NFT collection titled "Atomic Ordinals", which would be
  inscribed on the Bitcoin blockchain. She claimed that the 200 images "fus[ed] my love for medicine and artistic expression
  fueled by a passion for emerging tech and education." She wrote, "I''ve spent countless hours pouring my heart and soul
  into each piece 🥺" The NFTs were set to mint for 0.05 BTC, meaning the collection would have earned her around 10 BTC ($300,000)
  if it minted out.As it turned out, Elena had actually directly copied the pixel art from various sources. When accused of
  copying it, she published a screen capture video claiming to show that she had created the artwork "pixel by pixel", but
  people were quickly able to find the true sources of the artwork.Eventually, she came as close to an admission as she is
  apparently going to get in an announcement that she would be pausing the sale: "I have heard your concerns about the art
  and I will be working to fix the file quality and any images that might be seen as ''copied'' as they were only retraces
  and I never had any ill intent whatsoever."'
