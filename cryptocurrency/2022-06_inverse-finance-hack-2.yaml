notes: 'A hacker was able to perform an oracle manipulation attack enabled by flash loans to siphon crypto worth around $1.26
  million from Inverse Finance. The loss to the protocol was higher, at around $5.8 million. The attacker has already moved
  most of the stolen funds to the Tornado Cash cryptocurrency tumbler.Inverse Finance is a borrowing and lending protocol
  that was hit with a different oracle manipulation attack in early April, which resulted in a $15.6 million loss.


  Total loss estimated at $5,800,000.'
