source_name: '"Bored Ape Yacht Club creator buys CryptoPunks and Meebits"'
source_url: https://www.theverge.com/2022/3/11/22973394/bored-ape-yacht-club-cryptopunks-meebits-nft
date_of_breach: '2022-03-11'
date_of_disclosure: '2022-03-11'
category: other
notes: Nothing really says "decentralized" like one company controlling the priciest
  and most popular NFT collections! Yuga Labs, the company behind the popular Bored
  Apes Yacht Club NFTs, announced they had purchased CryptoPunks and Meebits from
  LarvaLabs. CryptoPunks is one of the oldest NFT collections, and, along with Bored
  Apes and Meebits, ranks among the priciest collections on the market. Yuga Labs
  is also the owner of the popular Bored Ape Kennel Club and the Mutant Ape Yacht
  Club projects.
