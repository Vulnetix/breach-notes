notes: 'Crypto sleuth zachxbt observed $21 million in "suspicious outflows" from SBI
  Crypto, a crypto mining subsidiary of the Japanese SBI Group. The money was quickly
  laundered through instant exchanges and Tornado Cash, in ways zachxbt observed were
  similar to tactics of North Korean crypto thieves.SBI Crypto has not made any public
  statements addressing the apparent theft.


  Total loss estimated at $21,000,000.'
