notes: The MarginFi decentralized lending project on Solana has been at the epicenter of some major drama recently, amid concerns
  around oracle problems, withdrawal failures, and accusations that the project has not been paying out its promised rewards.
  Much of this came from a Solana staking pool, SolBlaze; MarginFi responded by describing their allegations as a "hit piece"
  and "misinformation".On April 10, CEO Edgar Pavlovsky tweeted that he had resigned from MarginFi, publicly calling that
  he "d[idn't] agree with the way things have been done internally or externally". Pavlovsky had been criticized for his response
  to the controversy around MarginFi, in which he had been argumentative and insulting, tweeting things like "take your money
  out, go fuck yourself" to those who accused him and MarginFi of malfeasance.Amid the chaos, more than $210 million in TVL
  has exited the protocol.
