notes: 'Largest US propane distributor discloses ''8-second'' data breach. America''s
  largest propane provider, AmeriGas, has disclosed a data breach that lasted ephemerally
  but impacted 123 employees. AmeriGas servers over 2 million customers in all 50
  U.S. states and has over 2,500 distribution locations. This month''s data breach
  was reported by the propane giant to the Office of the New Hampshire Attorney General.
  This month, AmeriGas has issued a data breach notification letter to the New Hampshire
  Attorney General''s Office. Third-party company: J. J. Keller.'
