notes: 'On December 7, the Harmony blockchain began encountering a bug that ultimately caused around 150 million of the project''s
  $ONE token (priced at around $2.2 million) to be erroneously minted and distributed to 79 wallets. Most of the recipients,
  who were anonymous, quickly sold their unexpected windfall.The bug was fixed about a week later. There has been a dispute
  since then between Harmony employees and a consultant who was involved in identifying the bug, and the consultant has been
  accused of delaying action to profit from the excess tokens. The consultant also balked at destroying some of the tokens
  he mistakenly received.The consultant claims that he didn''t profit from the bug, and objected to a Harmony employee coming
  after him to destroy the excess tokens when he''d done little towards others who profited from the error. He did, however,
  say later that he had destroyed the tokens.According to the consultant, a Harmony employee claimed that he had filed reports
  to the FBI and IRS about the consultant''s behavior, and had the consultant banned from the annual ETH Denver event.


  Total loss estimated at $2,200,000.'
