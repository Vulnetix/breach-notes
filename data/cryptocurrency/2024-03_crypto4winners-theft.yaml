notes: A investment firm called Crypto4Winners announced in their Telegram channel that "Our investigations lead us to suspect
  an individual of committing fraudulent acts that may have compromised the integrity of assets. It is also possible that
  the current and historical data at our disposal has been tampered with, with a high degree of sophistication."The company
  had paused withdrawals the previous day, and has not re-enabled them. They also have not disclosed the amount that was allegedly
  stolen.Crypto4Winners claims it has earned 377% returns on customer investments since 2019, producing 3–20% monthly returns.The
  company is co-owned by Luc Schiltz, who was sentenced to six years in prison in 2017 for defrauding victims of over $1.5
  million through various investment frauds. He was released after two years, and quickly started the Crypto4Winners project
  after.
