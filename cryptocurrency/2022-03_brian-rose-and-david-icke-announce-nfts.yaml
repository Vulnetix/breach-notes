notes: 'Conspiracy theorists Brian Rose and David Icke are together known for their April 7, 2020 interview where Icke attempted
  to draw unsubstantiated links between the rollout of 5G cellular technology and the COVID-19 pandemic. Independently, Icke
  is also known for many other conspiracy theories, including the antisemitic theory that an interdimensional race of reptilian
  creatures form the Illuminati, and control humans through fear.Rose, for his part, runs a show called Brian Rose''s DeFi
  Real, where he has published episodes like "Create your Career in Crypto: How to Become a DeFi Influencer, Educator &amp;
  Fund Manager", and "The Next 100x Coins: How to Pick the Big Crypto Winners". As for the Rose and Icke duo, not only have
  they teamed up to broadcast COVID-19 conspiracy theories, they''ve also turned that project into NFTs, with a 100-item collection
  consisting of several-minute-long portions of their COVID-19 conspiracy TV series. Although all of the NFTs were given away,
  only a single NFT has experienced any trading so far.Personally, I''m shocked to see the conspiracy theorists and crypto
  communities overlapping in this way.'
