source_name: '"Japan''s DMM Bitcoin says over $300 mln of cryptocurrency lost"'
source_url: https://www.reuters.com/technology/dmm-bitcoin-says-bitcoin-worth-about-482-bln-yen-leaked-2024-05-31/
date_of_breach: '2024-05-31'
date_of_disclosure: '2024-05-31'
category: data-leak
notes: 'A Japanese cryptocurrency exchange called DMM Bitcoin has announced that they
  suffered an "unauthorized leak" of 4,502.9 bitcoin (~$308 million) from a company
  wallet. They''ve provided very little in additional details around how the loss
  occurred, or who may have been involved. They have taken some of their services
  offline as they investigate the incident.The company claims it will replace the
  lost funds with help from other companies in their group.This is one of the largest
  cryptocurrency thefts in recent history, rivaling the roughly $320 million theft
  from the Wormhole bridge in February 2022 and the $477 million theft from FTX in
  November 2022.The DMM hack was later attributed to a North Korean state-sponsored
  cybercrime group.


  Total loss estimated at $308,000,000.'
