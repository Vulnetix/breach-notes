category: "other"
initial_attack_vector: "Attacker used spear phishing SMS (smishing) to social engineer a Retool employee into providing credentials and a Google Authenticator TOTP code, then used the synced OTP tokens from Google Account cloud sync (newly enabled feature) to bypass MFA and access Retool's Okta admin, then Google Workspace and internal systems"
cve: []
vendor_product: "Google Authenticator (cloud sync feature); Okta"
