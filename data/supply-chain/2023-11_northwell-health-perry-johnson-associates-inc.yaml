notes: 'Console & Associates, P.C.: PJ&A Reports Data Breach Exposing Social Security
  Numbers and PHI of an Unknown Number of Northwell Health Patients. /PRNewswire/
  -- Millions of Northwell Health patients are being notified that their Social Security
  numbers and other confidential information were compromised. MARLTON, N.J. , Nov.
  13, 2023 /PRNewswire/ -- Millions of Northwell Health patients are being notified
  that their Social Security numbers and other confidential information were compromised
  following a data breach at Perry Johnson & Associates ("PJ&A"). The data breach
  lawyers at Console & Associates, P.C. are investigating claims on behalf of anyone
  affected by the PJ&A / Northwell Health breach, hoping to fully inform them of the
  risks they face in the wake of the breach as well as their legal rights. Third-party
  company: Perry Johnson & Associates, Inc., (PJ&A).'
