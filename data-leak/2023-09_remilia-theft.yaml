notes: 'A developer working on an NFT project spearheaded by Remilia, the DAO behind the Milady NFT project, stole around
  $1 million from the group by diverting fees generated by their new Bonkler "experimental finance art project". According
  to leader Charlotte Fang, the developer "also seized codebases and coordinated with two others on the team in an attempt
  to seize control of our social media, followed by demands for a significant portion of our treasury, including the NFT reserves."
  Fang stated that they believed they knew the thief''s identity and had filed a lawsuit against them, and promised that they
  "will now be dealt with through the heavy hand of the law".Remilia is a very controversial group, particularly after it
  was exposed that leader Charlotte Fang was a major figure in a white supremacist cult known as Kali Yuga Accelerationism
  (abbreviated "kaliacc"), and involved in a 4chan suicide cult.Fang announced the theft on September 11 in a tweet accompanied
  by a glitch art image derived from a photo of the Twin Towers engulfed in flames and smoke shortly after the 9/11 terrorist
  attacks.


  Total loss estimated at $1,000,000.'
