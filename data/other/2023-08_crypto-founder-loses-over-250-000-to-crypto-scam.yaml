financial_loss_usd: 273000
notes: 'Bryan Lawrence, the leader of a crypto project called Glow Token, recently shared that he''d fallen victim to scammers
  impersonating employees of the Crypto.com exchange. Lawrence said that scammers promised to list Glow Token''s FLARE token
  in exchange for more than $250,000 in "security deposits". Crypto.com later contacted Lawrence, asking him to stop falsely
  claiming that his token would be listed on Crypto.com, and alerting him to the apparent scam.Lawrence is now suing Crypto.com,
  although this may be challenging given they apparently weren''t behind the scam. Lawrence has also said that he has sold
  his house to pay for legal costs.


  Total loss estimated at $273,000.'
