source_name: '"Crypto Exchange Finds a New Source of Revenue: ''Inactivity Fee''"'
source_url: https://www.bloomberg.com/news/articles/2022-07-05/crypto-exchange-finds-a-new-source-of-revenue-inactivity-fee
date_of_breach: '2022-07-06'
date_of_disclosure: '2022-07-06'
category: other
vendor_product: Bitstamp
notes: The cryptocurrency exchange Bitstamp announced its plans to charge a €10 (~$10.17) monthly fee to inactive users outside
  of the US who had account balances below €200 ($203.38). The exchange explained that "keeping inactive accounts on the books
  is a cost", and that users could buy or sell crypto, make deposits or withdrawals, or sign up for staking to avoid the fee.The
  plans enraged some of their users, who called the company a scam and questioned the decision to charge only the users with
  the least funds. Following the backlash, Bitstamp walked back the decision to impose the fee.
