source_name: '"Coinbase Users Across Georgia Milk Price Bug for 100x Profit"'
source_url: https://blockworks.co/coinbase-users-across-georgia-milk-price-bug-for-100x-profit/
date_of_breach: '2022-09-02'
date_of_disclosure: '2022-09-02'
category: other
initial_attack_vector: Software bug / unintentional loss
vendor_product: Coinbase bug
affected_count: 1000
notes: Some Coinbase customers in Georgia (the country, not the state) took advantage of an hours-long price bug where a misplaced
  decimal point altered the exchange rate of the Georgian Lari (GEL) to 100x its actual value. Users were able to sell their
  cryptocurrencies for GEL to receive, in some cases, thousands of dollars more than the trades were worth. According to Blockworks,
  some users exchanged $150 worth of crypto for $15,000, more than three times the national average salary in the country.Some
  users who took advantage of the bug and withdrew funds to their bank accounts found their accounts frozen shortly after,
  when Coinbase noticed the error and began working to claw back the funds. According to Coinbase, about 1,000 users took
  advantage of the error.
