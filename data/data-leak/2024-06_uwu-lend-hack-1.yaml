notes: 'The defi lending protocol UwU Lend was hacked for around $20 million. After
  various blockchain security firms observed suspicious outflows of funds, the protocol
  acknowledged there had been a "situation" on their Twitter account, and wrote that
  they had paused the protocol while they were investigating.UwU Lend was founded
  by Michael Patryn, aka Omar Dhanani, aka "0xSifu" — a co-founder of the ill-fated
  QuadrigaCX exchange and ex-con. He also pseudonymously ran the defi cryptocurrency
  project Wonderland until his identity was revealed after the protocol suffered a
  meltdown.


  Total loss estimated at $20,000,000.'
