notes: 'A blatant clone of the extremely popular Bored Ape Yacht Club project, called "Baller Ape Club" and on the Solana
  blockchain, went live after much anticipation. Shortly afterwards, its creators made off with $2.6 million and deleted their
  websites and social media. The same group had pulled off one rug pull already, stealing around $150,000, and later went
  on to do a third rug pull in January 2022.


  Total loss estimated at $2,600,000.'
