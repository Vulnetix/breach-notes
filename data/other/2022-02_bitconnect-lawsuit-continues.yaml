notes: An appeals court found that a legal claim could continue to be pursued against some of the major voices that promoted
  Bitconnect online. Bitconnect was a Ponzi scheme that collapsed in early 2018, defrauding investors of $2 billion. This
  claim, should it succeed, could set a frightening precedent for those irresponsibly hyping cryptocurrency schemes in online
  videos and other promotions.
