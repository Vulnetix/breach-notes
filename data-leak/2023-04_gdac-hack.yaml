source_name: '"S. Korean Crypto Exchange Gdac Hacked for Nearly $13M"'
source_url: https://www.coindesk.com/tech/2023/04/10/s-korean-crypto-exchange-gdac-hacked-for-nearly-13m/
date_of_breach: '2023-04-10'
date_of_disclosure: '2023-04-10'
category: data-leak
notes: 'Hackers made off with 61 BTC, 350.5 ETH, 10 million WEMIX, and 220,000 USDT
  from a hot wallet belonging to the South Korean cryptocurrency exchange GDAC. Altogether,
  the assets are notionally worth around $13 million. The stolen assets represented
  23% of funds custodied on the GDAC exchange.GDAC halted deposits and withdrawals
  shortly after the attack, and stated that they had reported the exploit to South
  Korean law enforcement to investigate.


  Total loss estimated at $13,000,000.'
