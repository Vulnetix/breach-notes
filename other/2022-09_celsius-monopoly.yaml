notes: After what USA Strong Head of Sales &amp; Partnerships described as "months
  and months" of work, apparently the company had decided they had sunk too much effort
  into the Celsius-themed game of Monopoly to scrap the project, and opted to push
  ahead. What could be more fun to any of the large group of users who have significant
  funds locked up in the platform than gathering around the table to play "Celsiusopoly",
  which they can buy for $99 (if they have that kind of money to spare). The center
  of the board is adorned with the Celsius logo and the slogan "Do Good. Then do well",
  and there is a "HODL Mode activated" square that might have been a lot funnier before
  the company involuntarily activated "HODL mode" for all its users.If you were wondering
  who might decide to sell such a product, well, USA Strong's founder and CEO is none
  other than Krissy Mashinsky, wife of Celsius founder Alex Mashinsky.Both the announcement
  tweet and the game product page were taken down shortly after the announcement,
  likely due to the less-than-enthused response from Celsius users.
