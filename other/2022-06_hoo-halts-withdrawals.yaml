source_name: '"Announcement of Withdrawl on Hoo"'
source_url: https://help.hoorhi.shop/hc/en-us/articles/7639261299353
date_of_breach: '2022-06-19'
date_of_disclosure: '2022-06-19'
category: other
notes: The Hong Kong-based cryptocurrency exchange Hoo announced that they would be
  pausing withdrawals, after so many customers tried to withdraw their crypto that
  they began to run out of funds in their hot wallet. The company assured customers
  in a blog post that the pause was temporary and that withdrawals would resume in
  24–72 hours once transfers from a "backup multi-signature wallet and other assets"
  were complete, leaving one to wonder what those other assets might be. The blog
  post finished by stating, "The platform is trying to reconfigure medium- and long-term
  assets in an orderly and reasonable manner. Please don't worry and there will be
  no loss of your assets."
