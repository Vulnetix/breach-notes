notes: 'The Solana-based defi portfolio tracker Step Finance lost 261,854 SOL (~$28.7 million) when a thief gained access
  to treasury and fee wallets. It''s not yet clear how the attacker was able to steal the funds, although Step Finance posted
  to Twitter that the theft occurred via a "well known attack vector". Step wrote that they were working with cybersecurity
  firms and law enforcement to address the incident.


  Total loss estimated at $28,700,000.'
