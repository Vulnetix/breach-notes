      notes: On April 7, 2026, ChipSoft — a Dutch healthcare IT company providing Electronic Patient Dossier (EPD/HiX) software to approximately 80% of all Dutch hospitals — was hit by a ransomware attack that knocked its website and cloud infrastructure offline. Z-CERT (the Netherlands healthcare CERT) confirmed the ransomware incident and advised all healthcare institutions to disconnect VPN connections to ChipSoft and monitor network traffic as a precaution. At least 11 hospitals took patient portals offline. ChipSoft confirmed a 'data incident' involving 'possible unauthorized access' and could not rule out that patient data was accessed or stolen. Hospitals affected by system outages included Sint Jans Gasthuis (Weert), Laurentius (Roermond), VieCuri (Venlo), and Flevo Hospital (Almere). Major hospitals including Rijnstate, Antoni van Leeuwenhoek, and Franciscus stated patient data remained secure. The group behind the attack was not identified at time of disclosure. The incident is a critical supply-chain-style attack affecting the majority of Dutch hospital patient record infrastructure.
      source_name: ChipSoft Ransomware Attack - Dutch Hospital Patient Records Software
      source_url: https://www.bleepingcomputer.com/news/security/healthcare-it-solutions-provider-chipsoft-hit-by-ransomware-attack/
    - category: supply-chain
      cve: []
      date_of_breach: "2026-04-03"
      date_of_disclosure: "2026-04-03"
      malware: TeamPCP Cloud Stealer
      notes: In early April 2026, Cisco disclosed that attackers leveraged credentials stolen through the March 2026 Trivy supply chain compromise (attributed to TeamPCP / UNC6780) to penetrate Cisco's internal development and build environment. The malicious GitHub Action plugin from the Trivy compromise was used to steal credentials and data. More than 300 GitHub repositories were cloned, and AWS keys were allegedly stolen. Exposed material reportedly includes source code tied to AI-related projects, with some repositories allegedly connected to corporate customers. Dozens of developer and lab workstations were impacted. Cisco's Unified Intelligence Center, CSIRT, and EOC teams contained the breach. TeamPCP (also tracked by Google GTIG as UNC6780) is the same threat group behind the LiteLLM/PyPI → Mercor breach (March 2026) and the Trivy → European Commission AWS breach (March 2026). The group has been conducting a series of supply chain attacks targeting developer platforms including GitHub, PyPI, NPM, and Docker using their 'TeamPCP Cloud Stealer' infostealer.
      source_name: Cisco Source Code Stolen via Trivy Supply Chain Attack (TeamPCP)
      source_url: https://www.bleepingcomputer.com/news/security/cisco-source-code-stolen-in-trivy-linked-dev-environment-breach/
