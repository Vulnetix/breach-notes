source_name: '"Victorian man vanishes after receiving about $500,000 in cryptocurrency
  account error"'
source_url: https://www.abc.net.au/news/2024-02-25/mildura-man-vanishes-after-half-a-million-dollar-crypto-typo/103500432
date_of_breach: '2024-02-24'
date_of_disclosure: '2024-02-24'
category: other
notes: 'When businessman Kow Seng Chai transferred AU$99,500 (~US$65,000) to a cryptocurrency
  account on the Australian OTCPro cryptocurrency trading platform on January 25,
  he received an unexpected windfall thanks to an extra 0 erroneously added to the
  amount. When he saw the AU$995,000 ($650,000) in his account, he set to work, cashing
  out the excess funds through multiple withdrawals of the maximum amount.OTCPro didn''t
  notice their error until February 4, by which point Chai had already disappeared.
  They were able to recoup some funds that Chai had left in the OTCPro account, putting
  their total loss at around AU$490,000 (US$320,000).A judge issued an injunction
  to try to prevent Chai from leaving the country, and issued a freeze on his assets.
  However, a freeze may be ineffective depending on if and how Chai has laundered
  the funds.


  Total loss estimated at $320,000.'
