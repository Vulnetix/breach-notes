source_name: '"Almost 10,000 images of tennis balls plunge up to 90% in value as Australian Open appears to ditch NFTs"'
source_url: https://www.theguardian.com/sport/2025/jan/14/almost-10000-images-of-tennis-balls-plunge-up-to-90-in-value-as-australian-open-appears-to-ditch-nfts?CMP=aus_bsky
date_of_breach: '2025-01-13'
date_of_disclosure: '2025-01-13'
category: cryptocurrency
vendor_product: Australian Open apparently scraps its NFT project
blockchain: ethereum
notes: Holders of any of the several thousand "AO ArtBall" NFTs may be disappointed as the Australian Open appears to have
  abandoned the project aimed at tennis fans. The first NFTs originally sold for 0.067 ETH (~$275 at the time), and another
  round were minted for 0.23 ETH (~$450 at the time). However, the sale prices of the NFTs have steadily dwindled since early
  2023, and recent sales have been for 0.003 to 0.0075 ETH (~$10–$25).Buyers were told they could use the NFTs as a sort of
  fan pass, receiving access to a Discord, and earning ground passes and behind-the-scenes access for finals weeks. There
  was also a scheme in which NFT holders could redeem access to passes to matches.However, the Australian Open seems to have
  let the project — launched at the peak of NFT hype — peter out, with no mention of redeeming passes, and project websites
  still promising a 2024 update. The Discord has been shut down.
