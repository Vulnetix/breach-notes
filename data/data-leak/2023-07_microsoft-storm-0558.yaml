notes: "In July of 2023, Microsoft disclosed a compromise of Exchange Online that\
  \ targeted &ldquo;25 organizations &hellip; including government agencies as well\
  \ as related consumer accounts of individuals likely associated with these organizations.&rdquo;\
  \ The vector of compromise was several validation flaws in the Microsoft-hosted\
  \ Exchange Online and AzureAD services.\nAs part of the Cyber Safety Review Board\
  \ investigation of this incident, CISA issued a number of findings citing Microsoft&rsquo;s\
  \ negligence in securing their cloud infrastructure and make recommendations to\
  \ both Microsoft and all cloud service providers.\nFrom the CISA press-release:\n\
  \n\u201CCloud computing is some of the most critical infrastructure we have, as\
  \ it hosts sensitive data and powers business operations across our economy,\u201D\
  \ said DHS Under Secretary of Policy and CSRB Chair Robert Silvers. \u201CIt is\
  \ imperative that cloud service providers prioritize security and build it in by\
  \ design.&quot;\n\nSourced from breaches.cloud"
