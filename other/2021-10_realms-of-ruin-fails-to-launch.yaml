vendor_product: Realms of Ruin fails to launch
blockchain: solana
notes: Six popular young-adult fiction writers attempted to launch an NFT project where they created a base universe, and
  participants would contribute their own stories (which they would mint as NFTs) that would be added to the official storyline
  if the authors liked them enough. Questions around who would own copyright, how teenagers (the target audience) would obtain
  cryptocurrency and mint NFTs, and environmental impact led the creators to shutter the project only five hours after the
  launch announcement went out.
