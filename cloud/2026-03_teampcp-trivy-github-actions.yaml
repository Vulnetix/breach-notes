initial_attack_vector: "TeamPCP (UNC6780) exploited a misconfigured GitHub Actions workflow in Aqua Security's Trivy vulnerability scanner repository, compromising the aqua-bot service account to execute an imposter commit attack that force-pushed malicious code to 76 of 77 version tags across aquasecurity/trivy-action and aquasecurity/setup-trivy"
cve: ["CVE-2026-33634"]
vendor_product: "Trivy (open-source vulnerability scanner by Aqua Security); GitHub Actions"
