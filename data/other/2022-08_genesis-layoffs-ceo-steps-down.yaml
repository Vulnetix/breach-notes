vendor_product: Genesis layoffs, CEO steps down
notes: Crypto broker Genesis is laying off 20% of their employees and reshuffling their leadership in the wake of a several-hundred-million
  dollar loss related to the Three Arrows Capital implosion. With 260 employees, the 20% workforce cut will affect around
  50 employees. Genesis also announced that their CEO Michael Moro would be "stepping down".
