notes: 'Cyber-attack affects over 460,000 online store accounts. The compromised information
  included, customer name, address, phone number, email address, gender, date of birth,
  purchase history, clothing measurements, credit card information. The popular online
  stores in Japan, UNIQLO Japan and GU Japan, recently revealed that it suffered a
  cyber-attack that affected more than 460,000 of its customers. Fast Retailing ,
  the parent company behind the UNIQLO Japan and GU Japan online stores, stated the
  unknown hackers allegedly accessed its customers’ accounts from April 23, 2019,
  to May 10, 2019, following a credential stuffing attack. According to Fast Retailing,
  the compromised information included, customer name, address, phone number, email
  address, gender, date of birth, purchase history, clothing measurements, and credit
  card information. Third-party company: not.'
