notes: According to a report from The Information, MoonPay executives including CEO
  Ivan Soto-Wright pocketed $150 million from their $555 million Series A funding
  round completed in November 2021. MoonPay is a crypto payments platform known for
  its NFT "concierge" service popular among celebrities, and for the various allegations
  of undisclosed promotion leveled against it related to some of those celebrity deals.According
  to The Information, MoonPay never disclosed that $150 million of the Series A funding
  was used to purchase shares from insiders including Soto-Wright, and never went
  to the company. Several weeks after the funding round, Soto-Wright purchased a $38
  million Miami mansion.
