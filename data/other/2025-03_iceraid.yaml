source_name: '"ICERAID: Report Immigrants, Get Paid In Crypto"'
source_url: https://www.therage.co/iceraid/
date_of_breach: '2025-03-30'
date_of_disclosure: '2025-03-30'
category: other
notes: A project called "ICERAID" has emerged, promising to reward "intelligence gathering"
  on "suspicious activities" by photographing supposedly criminal behavior by undocumented
  immigrants to law enforcement. The project has been advertised by right wing personalities
  including Laura Loomer and Matt Gaetz, the latter of whom promised ICERAID lets
  people "ping the cops faster than you can say 'sanctuary city'."An instructional
  video posted to social media by the platform encourages people to "do [their] patriotic
  duty" by going to a District Court in a blue state, then "Secretly snap a photo
  of the judge. Don't let the bailiff see you." The video shows a person uploading
  a photograph of Judge James Boasberg, who is presiding over the Trump administration
  deportation flights case, and reporting him for "terrorism".The project has been
  likened to Stasi programs in which citizens were paid to spy and report on their
  neighbors.The founder of ICERAID, Jason Meyers, claims that he had had conversations
  with the White House about the project, although the website for the tool states
  it is not affiliated with any government agency and is not a website of the US government.
  Meyers has faced several enforcement actions resulting in disciplinary penalties
  over his involvement in security sales, and in 2014 was permanently banned by FINRA
  from broker-dealer activities after misappropriating investor funds. Meanwhile,
  multiple users have complained about not receiving their promised ICERAID tokens,
  and the project reportedly changed its terms after the token presale to reduce the
  amount of money buyers would earn for participating.
