notes: Bitmain, the manufacturer of popular Bitcoin mining equipment (known as ASICs), is apparently in such dire financial
  straits that it can no longer pay employee salaries. Local media reported that all "bonuses and incentives" were nixed by
  the Beijing-based company, and the firm is considering cutting all wages by 50%. They also wrote a letter to employees,
  informing them that they would not be paying out September salaries until a review later in the month.
