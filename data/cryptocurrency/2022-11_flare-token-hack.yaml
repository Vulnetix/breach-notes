notes: 'Exploits and rug pulls of random tokens on BNB Chain are fairly commonplace, but typically the amount of money lost
  is fairly minimal. In this case, exploiters or insiders were able to siphon 3.9 billion $FLARE from the Flare project, which
  they swapped for just under $17 million.This serves as a good example of how theft amounts shouldn''t be naively calculated
  based on the token price before the theft × the number of tokens stolen. $FLARE was priced at around $18.25 before the attack,
  and a naive calculation would place the theft amount at $71 billion. However, the lack of liquidity caused the token price
  to plummet to $0.0000018, and the attacker ultimately ended up with around $17 million.


  Total loss estimated at $17,000,000.'
