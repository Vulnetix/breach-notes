notes: "In May 2025, Nationwide Recovery Services (NRS), a healthcare billing and accounts receivable management vendor, disclosed a data breach affecting over a dozen healthcare provider clients. Confirmed affected organizations include: TRG Medical Imaging, Smile Solutions of Goodlettsville, Duncan Regional Hospital, MAK Anesthesia, City of Chattanooga municipal health, Swedish Edmonds Hospital, Erlanger Western Carolina Hospital, Rhea Medical Center, Radiology Chartered, Northeast Georgia Health System, Shore Medical Center, UChicago Medicine Medical Group, Vitruvian Health, and Harbin Clinic. For all affected patients, the breach exposed names, Social Security numbers, dates of birth, financial account information, and detailed medical information. The broad impact across 14+ healthcare organizations from a single vendor breach illustrates the systemic risk of healthcare revenue cycle management outsourcing."
