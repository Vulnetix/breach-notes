notes: 'An exploiter was able to create a fake version of the $GNUS token on the Fantom blockchain, then bridge the tokens
  to Ethereum and Polygon where they were then sold as though they were authentic. They were able to drain $1.27 million from
  the project''s liquidity pools.GNUS.ai (short for "Genius", not a reference to the animal) is one of many AI-related blockchain
  projects that has sprung out of the recent AI hype. This particular one promises to allow people to "utiliz[e] unused cycles"
  on various computing devices for computation-intensive AI systems, using cryptocurrency for payments.


  Total loss estimated at $1,270,000.'
