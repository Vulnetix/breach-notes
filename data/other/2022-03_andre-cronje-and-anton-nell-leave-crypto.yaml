vendor_product: Andre Cronje and Anton Nell leave crypto
notes: Andre Cronje and Anton Nell, the prolific developers of around 25 defi projects including yearn.fi and the new Solidly
  exchange, suddenly announced on Twitter that they would be quitting defi and shutting down their projects. "Unlike previous
  'building in defi sucks' rage quits, this is not a knee jerk reaction to the hate received from releasing a project, but
  a decision that has been coming for a while now", wrote Nell. The sudden announcement caused several tokens associated with
  the projects to plunge in value. Some people were quite upset with the two developers, with one Twitter user writing, "People
  lock up billions of dollars for 4 years and dev announces it's being terminated in a month. Defi truly is the future of
  finance." Others were confused by the statement that the decision was a long time coming, when one of their projects, Solidly,
  had launched only a month before.
