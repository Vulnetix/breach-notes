notes: 'BianLian Threat Group Claims Responsibility for Cyberattack on Tennessee Eye
  Clinic Network. Politzer and Durocher, PLC, which does business as Optometric Physicians
  of Middle Tennessee (OPMT), has recently reported a hacking incident to the HHS
  The BianLian threat group has claimed responsibility for a cyberattack on Optometric
  Physicians of Middle Tennessee, patient data was stolen in a cyberattack on Somerset
  Dental Las Vegas, and a breach at Advarra has affected Moffitt Cancer Center patients.
  Third-party company: Advarra..'
