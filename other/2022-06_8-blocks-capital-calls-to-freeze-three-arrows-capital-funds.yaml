vendor_product: 8 Blocks Capital calls to freeze Three Arrows Capital funds
notes: 8 Blocks Capital is a Hong Kong-based trading firm. In a Twitter thread, Danny Yuan explained that 8BC had been using
  3AC's trading accounts to reduce their trading fees. He wrote, "We had known them since 2018, thought they were competent
  and didn't think they were degen enough to lose billions and not employ basic risk management."When 8BC contacted 3AC to
  make a withdrawal on June 13, they never received a reply. "We didn't think much of it at the time. After a while, the market
  stablized so we no longer needed the funds. We thought maybe they were just busy." The following day, 8BC noticed $1 million
  missing from their accounts. When they tried to contact 3AC, they again received no response.According to Yuan, "What we
  learned is that they were leveraged long everywhere and were getting margin-called. Instead of answering the margin calls,
  they ghosted everyone." He called on platforms that still have assets from 3AC to freeze those assets, "so that those who
  3AC owes can be paid back in the future after legal proceedings."
