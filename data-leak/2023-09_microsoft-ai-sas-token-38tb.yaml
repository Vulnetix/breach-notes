initial_attack_vector: "Misconfigured Azure SAS (Shared Access Signature) token published to a public GitHub repository by Microsoft AI researchers; the SAS token was configured with 'full control' permissions on an entire Azure Blob Storage account rather than read-only access to a specific folder — granting any GitHub visitor read, write, and delete access to all 38TB of data in the account"
