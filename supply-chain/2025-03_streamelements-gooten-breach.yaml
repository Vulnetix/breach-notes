notes: "StreamElements, a platform for live streaming tools and creator merchandise, disclosed in March 2025 that a third-party vendor breach had exposed customer data. The breach originated at Gooten, StreamElements' merchandise fulfillment partner used to handle print-on-demand and merchandise shipping for content creators. Exposed data included creator and fan names, home addresses, phone numbers, and email addresses. StreamElements notified affected users and has since moved to alternative merchandise fulfillment providers. The incident highlighted the risk exposure of content creator platforms that pass fan shipping addresses to fulfillment vendors."
