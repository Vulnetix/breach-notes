date_of_breach: '2022-01-25'
date_of_disclosure: '2022-01-25'
category: other
vendor_product: John Lennon NFT announcement
blockchain: ethereum, polygon
notes: Julian Lennon maintains a private collection of Beatles memorabilia, including clothing worn by his late father John
  Lennon, and other items from other members of the band. He announced plans to sell each item as "an audio/visual collectible,
  with a personal narration from Julian", but the announcement notes that "the items themselves are not up for auction...
  Lennon will continue to own the only physical counterpart". Starting prices for each item range from $4,000 to $30,000.Lennon
  said, "I've been collecting these personal items for about 30 years, and I was getting a bit fed up with them being locked
  away in a vault, where I've had to keep them because I didn't want them to get damaged... I actually felt very bad about
  keeping all that stuff locked away." Apparently photographing the items and displaying them digitally somehow was not possible
  until NFTs came along?
