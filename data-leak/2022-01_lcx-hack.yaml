source_name: '"LCX loses $6.8M in a hot wallet compromise over Ethereum blockchain"'
source_url: https://cointelegraph.com/news/lcx-loses-6-8m-in-a-hot-wallet-compromise-over-ethereum-blockchain
date_of_breach: '2022-01-08'
date_of_disclosure: '2022-01-08'
category: data-leak
notes: 'The Liechtenstein-based cryptocurrency exchange LCX suffered a $6.8 million
  loss when one of its hot wallets was compromised. Assets including ETH, USDC, EURe,
  and LCX were moved to an Ethereum wallet belonging to the attacker, then quickly
  tumbled using the Tornado Cash mixing service.


  Total loss estimated at $6,800,000.'
