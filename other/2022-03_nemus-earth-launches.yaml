notes: 'A project called Nemus Earth has emerged, offering to sell you an Ethereum NFT to become a "Guardian" of the Brazilian
  Amazon rainforest. The project has lofty plans to create a "protective belt" in the Brazilian Amazon to try to protect it
  from deforestation. The project''s whitepaper goes on to explain that "economic activity is required" on the land that they
  will purchase, and outlines a plan to employ the Indigenous people in the area to farm Brazil nuts on an abandoned plantation
  the project intends to "revitalize". The project describes a "co-op" for the local people that will "unlock generational
  wealth for these communities", though there appear to be no plans for these people to actually join the community of "Guardians"
  or have any say in the project''s governance. Other economic activity planned by the project apparently involves "sustainable
  forestry", "empower[ing] local police authorities", something involving drones, and of course generating carbon offsets
  for other projects.The whitepaper also addresses that the project will be built on the Ethereum blockchain. There is a section
  about "pros &amp; cons of Ethereum", which has one section: gas fees. Apparently the project based on environmental conservation
  has decided to simply gloss over the enormous energy consumption, emissions, and electronic waste stemming from the Ethereum
  blockchain.The project opened its second round of minting on March 3, and is offering its NFTs for mint prices between 0.06
  ETH and 19.44 ETH ($150 to $50,000).'
