notes: "Freedom Mobile, one of Canada's largest wireless carriers (owned by Shaw/Rogers), disclosed in December 2025 that a third-party vendor had been compromised, resulting in the exposure of customer data. The exposed information included customer names, home addresses, dates of birth, phone numbers, and account numbers. Freedom Mobile notified affected customers and the Office of the Privacy Commissioner of Canada (OPC) as required under PIPEDA breach notification obligations."
