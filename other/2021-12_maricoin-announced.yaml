source_name: '"First LGBT+ cryptocurrency bets on ''changing the world''"'
source_url: https://www.reuters.com/markets/currencies/first-lgbt-cryptocurrency-bets-changing-world-2021-12-31/
date_of_breach: '2021-12-28'
date_of_disclosure: '2021-12-28'
category: other
notes: Founders say they aim to help the LGBTQ+ community with a Spanish cryptocurrency
  project, "Maricoin". The team plans for the currency to be used for payment in a
  network of businesses have signed an "equality manifesto" promising to be queer-friendly.
  Critics of the project feel it's little more than pinkwashing, and many have criticized
  the name, which is based on a Spanish slur.
