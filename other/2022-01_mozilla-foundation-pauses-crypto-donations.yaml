notes: Someone on the Mozilla Foundation's social team inexplicably thought that tweeting "Dabble in @dogecoin? HODLing some
  &#35;Bitcoin &#38; &#35;Ethereum? We're using @BitPay to accept donations in &#35;cryptocurrency" would go over well with
  their supporters. Unsurprisingly it did not, and it also earned them scathing replies from the founder of Mozilla and the
  designer of the Gecko browser engine (upon which Firefox is built). Mozilla tweeted on January 6 that they were "listening,
  and taking action", and that they would review "if and how our current policy on crypto donations fits with our climate
  goals", pausing cryptocurrency donations in the meantime.
