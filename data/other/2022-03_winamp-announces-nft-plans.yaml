notes: A week after LimeWire emerged from cryostasis to announce it would become an NFT platform, Winamp decided to jump in
  as well. Winamp was a Windows media player that first launched in 1997, and was sold for a hefty sum to AOL in 1999, before
  fading into obscurity after facing tough competition from iTunes in the early 2000s. Although Winamp has been promising
  new versions of the software since its 2014 sale to Radionomy, only a single beta release in 2018 has ever materialized.
  However, on March 16, the Winamp Twitter account announced "the auctioning of Winamp Original Skin as 1/1 NFT AND the launch
  of Winamp Foundation". The Winamp Foundation, they wrote, would "collect money to help musicians across the world to make
  the music they love". The response on Twitter was overwhelmingly negative, with a top comment reading, "It is incredible
  how you took decades of good will nostalgia and removed it with a single tweet."
