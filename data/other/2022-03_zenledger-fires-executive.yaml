notes: New York Times reporter Ron Lieber began fact-checking a story in March about a deal between crypto tax software firm
  ZenLedger and the Internal Revenue Service. Lieber ran into trouble fact-checking the claims of ZenLedger COO Dan Hannum,
  who told a compelling story of being arrested as a juvenile, then turning his life around and earning college degrees, working
  at several major Wall Street firms, and becoming a crypto millionaire. Lieber discovered that Hannum had never earned the
  degrees he claimed, nor worked at the Wall Street firms he listed. He also found no evidence that Hannum had ever managed
  $100 million in assets like he said, nor that he had made so much on crypto that he was paying "millions in taxes" alone.After
  Lieber put these questions to ZenLedger, the company fired Hannum. ZenLedger founder Pat Larsen was cagey around the circumstances
  under which Hannum was hired, and an outside spokesperson for the company laid the blame on a bad referral and a federal
  background check that returned "no flags regarding his education or work history". A venture capital firm that invested
  in the company reported that they "did more due diligence than a traditional venture capitalist would have done" on the
  company but had not checked Hannum's background.
