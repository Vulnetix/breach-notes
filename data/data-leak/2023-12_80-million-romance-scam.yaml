source_name: '"Four Individuals Charged for Laundering Millions from Cryptocurrency
  Investment Scams"'
source_url: https://www.justice.gov/opa/pr/four-individuals-charged-laundering-millions-cryptocurrency-investment-scams
date_of_breach: '2023-12-13'
date_of_disclosure: '2023-12-13'
category: data-leak
notes: 'Four individuals who helped launder money through shell companies and various
  bank accounts have been charged in connection to an $80 million "pig butchering"
  cryptocurrency scam. The scam reportedly involved at least 284 transactions, though
  it''s not clear how many victims were involved.


  Total loss estimated at $80,000,000.'
