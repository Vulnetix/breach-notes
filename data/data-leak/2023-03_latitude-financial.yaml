notes: "Attacker stole employee credentials and used them to access Latitude Financial's data held by two service providers including DXC Technology. 14 million records affected across Australia and New Zealand: 7.9M driver license numbers, 53K passport numbers, 6.1M customer records (names, addresses, DOBs, phone numbers). AUD $76M remediation cost. Australian Privacy Act investigation launched. Latitude refused to pay ransom. Biggest data breach in Australian financial sector history."
