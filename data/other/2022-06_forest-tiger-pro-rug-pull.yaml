notes: 'The TIGER project was supposed to be a DAO aiming to "support global technical teams" and protect wild animals and
  the environment. The project was broad-ranging, and had NFT, gaming, and defi components. Beginning on June 2, the project
  rug pulled 64,171 TIGER tokens notionally worth around $4.52 million. The TIGER token dropped by more than 50% following
  the first rug pull transaction, and transactions continued for another 20 days.


  Total loss estimated at $4,518,000.'
