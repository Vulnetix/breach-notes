notes: "Dollar Tree and its subsidiary Family Dollar disclosed in November 2023 that Zeroed-In Technologies, a third-party HR analytics vendor they used, suffered a data breach between August 7–8, 2023. Approximately 1.98 million individuals were notified — primarily current and former Dollar Tree and Family Dollar employees. The stolen data included names and Social Security numbers. Zeroed-In Technologies provides workforce analytics software used by retail companies to analyze employee data. The breach occurred at the vendor level; Dollar Tree/Family Dollar systems were not directly breached. This was one of several notable third-party vendor breaches in the retail sector in 2023, illustrating the ongoing supply chain exposure created by sharing sensitive employee data with HR technology vendors."
