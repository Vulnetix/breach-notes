notes: Ruja Ignatova, also known as the "Cryptoqueen", is a serial fraudster who has
  been on the run since 2017. In 2019, she was charged in absentia by U.S. authorities
  due to her connection with the OneCoin ponzi scheme.OneCoin was a Bulgarian ponzi
  scheme in which investors bought packages of "tokens" with which they would supposedly
  "mine" cryptocurrency. Despite advertising as a decentralized cryptocurrency, OneCoin
  in reality was centralized on the company's servers. The scheme attracted around
  $4 billion in investments since its creation in 2014, and several people associated
  with the project have pled guilty to money laundering and fraud charges.
