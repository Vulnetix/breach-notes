baseURL = 'https://breachnotes.vulnetix.com/'
languageCode = 'en-us'
title = 'Breach Notes'
paginate = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "An open record of real-world cyberattacks — who got hit, how, and what it cost them."
  author = "Breach Notes Project"
  hacker_imagery = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    identifier = "ransomware"
    name = "Ransomware"
    url = "/ransomware/"
    weight = 1
  [[menus.main]]
    identifier = "data-leak"
    name = "Data Leaks"
    url = "/data-leak/"
    weight = 2
  [[menus.main]]
    identifier = "supply-chain"
    name = "Supply Chain"
    url = "/supply-chain/"
    weight = 3
  [[menus.main]]
    identifier = "credential-theft"
    name = "Credential Theft"
    url = "/credential-theft/"
    weight = 4
  [[menus.main]]
    identifier = "other"
    name = "Other"
    url = "/other/"
    weight = 5