date_of_breach: '2022-01-02'
date_of_disclosure: '2022-01-02'
category: other
vendor_product: Matt Damon advertisement
notes: '"Fortune favors the brave", said Matt Damon as he walked past images of mountain climbers, the Wright brothers, and
  astronauts. "History is filled with ''almosts''. With those who almost adventured, who almost achieved, but ultimately for
  them it proved to be too much. Then, there are others — the ones who embrace the moment and commit." Evidently the point
  of the ad was that the "brave" people who "commit" to pouring their money into crypto will make history, and granted that
  will likely be true, though it is also likely it will not be for the reason Mr. Damon would like you to believe.'
