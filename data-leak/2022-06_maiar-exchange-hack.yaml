source_name: '"Decentralized Crypto Exchange Offline After Hacker Steals $113M"'
source_url: https://www.vice.com/en/article/88q45a/decentralized-crypto-exchange-maiar-offline-after-hacker-steals-dollar113m
date_of_breach: '2022-06-05'
date_of_disclosure: '2022-06-05'
category: data-leak
notes: 'Hackers were able to discover and exploit a bug in the decentralized exchange
  Maiar, stealing assets notionally worth $113 million. Maiar developers took the
  exchange offline soon after discovering the exploit, but not before the hackers
  made off with 1.65 million EGLD (the native token of the Elrond blockchain, on which
  Maiar is built). The sale of around $54 million of the pilfered EGLD caused the
  token to plummet from $76 to $5 on the Maiar exchange.Maiar''s founder and CEO has
  claimed that "most exploited funds have been either recovered in full, or will be
  covered by the Elrond Foundation", though it''s not clear how (or if) any of the
  funds were recovered.


  Total loss estimated at $113,000,000.'
