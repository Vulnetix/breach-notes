source_name: '"Crypto-Mining Data Center Compute North Files for Bankruptcy Protection"'
source_url: https://www.coindesk.com/business/2022/09/22/crypto-mining-data-center-provider-compute-north-files-for-bankruptcy-protection/
date_of_breach: '2022-09-22'
date_of_disclosure: '2022-09-22'
category: other
notes: Compute North has filed for Chapter 11 bankruptcy, in what may be a blow to
  the crypto mining industry. Compute North is a major datacenter provider, and have
  deals with crypto mining companies including Marathon Digital, Compass Mining, and
  others. Compute North had just raised $385 million in February through a Series
  C equity round and debt financing.
