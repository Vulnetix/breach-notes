notes: 'NeoNexus was a metaverse NFT project that raised about 25,000 SOL (worth around $2.2 million today; previously worth
  $3.5 to $4.5 million). The project had sold various "property NFTs", and had plans to create other NFTs representing things
  like characters and vehicles.On March 21, the project''s founder Jack Shi wrote on Twitter, "It is with a heavy heart that
  we must inform you that we can no longer continue healthy development of the NEONEXUS project. We would like to hand over
  the project to our community, or a community-selected party for takeover if that''s feasible / possible." Going into more
  detail on Discord, he said the project had run out of money, which he blamed on waning interest in Solana NFTs.The reaction
  to the announcement was overwhelmingly negative, particularly given the project''s founder''s apparent habit of bragging
  about his luxury cars. Many users described the abrupt shutdown as a rug pull, and one user even mentioned looking into
  a class action suit against the project team.


  Total loss estimated at $2,200,000.'
