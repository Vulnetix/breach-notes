source_name: '"Hackers breach social media accounts of Lara and Tiffany Trump"'
source_url: https://www.politico.com/news/2024/09/03/lara-tiffany-trump-social-media-hack-00177261
date_of_breach: '2024-09-03'
date_of_disclosure: '2024-09-03'
category: data-leak
notes: 'The Twitter accounts belonging to Lara and Tiffany Trump were compromised
  and used to announce a fake launch of the (unfortunately real) World Liberty Financial
  project that their family has been promoting. Donald Trump''s son Eric tried to
  warn people of the scam, but in doing so retweeted the scam tweet containing the
  malicious token address.The posts were deleted and accounts were locked down very
  quickly by Twitter, but not before approximately 2,000 people bought around $1.8
  million of the fake token.


  Total loss estimated at $1,800,000.'
