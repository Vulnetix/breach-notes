notes: After less than five hours of deliberation, a jury convicted Sam Bankman-Fried
  of seven fraud and money laundering charges. The conviction followed a five-week-long
  trial which culminated in Sam Bankman-Fried himself taking the stand, only to appear
  evasive and sullen as he told prosecutors he couldn't recall many significant events
  from his time as FTX CEO.Sentencing is scheduled for March 28, 2024, though scheduling
  could be affected by factors including whether the US decides to continue pursuing
  an additional five charges also set to be tried in March.
