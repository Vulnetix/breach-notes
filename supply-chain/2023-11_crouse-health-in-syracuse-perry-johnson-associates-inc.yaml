notes: 'NY AG Issues Consumer Alert Regarding PJ&amp;A Healthcare Data Breach | TechTarget.
  New York&#039;s Attorney General issued a consumer alert about the recent PJ&amp;A
  healthcare data breach. New York Attorney General Letitia James issued a consumer
  alert to warn New Yorkers about the potential impacts of a data breach that occurred
  at Perry Johnson & Associates (PJ&A), a medical transcription company. As previously
  reported , PJ&A discovered a data breach in early May that impacted nearly 9 million
  individuals, making it one of the largest breaches reported to HHS in 2023 so far.
  Northwell Health, New York’s largest healthcare provider, was one of the organizations
  impacted by the breach. Crouse Health in Syracuse, New York was also impacted by
  the breach. In total, 4 million of the 9 million individuals impacted were New Yorkers.
  Third-party company: Perry Johnson & Associates, Inc., (PJ&A).'
