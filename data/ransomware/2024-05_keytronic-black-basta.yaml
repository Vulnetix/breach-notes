notes: "Keytronic, a printed circuit board assembly (PCBA) manufacturer based in Spokane, WA, was hit by Black Basta ransomware on May 6, 2024. Operations in the US and Mexico were halted for approximately two weeks. Black Basta exfiltrated ~530 GB of HR, finance, engineering and corporate data and published it on their leak site. Total losses exceeded $17 million: ~$2.3M in direct costs and ~$15M in lost revenue. A SEC 8-K filing disclosed the incident. This is a notable manufacturing/OT sector incident with significant documented financial impact."
