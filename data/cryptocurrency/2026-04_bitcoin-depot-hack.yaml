notes: 'Bitcoin ATM operator Bitcoin Depot has disclosed a March 23 hack in which attackers stole 50.903 BTC (~$3.67 million)
  from company wallets. According to the company''s disclosure with the SEC, the exploiters gained access to the company''s
  IT systems and wallet credentials, allowing them to steal the assets.Bitcoin Depot is the largest operator of crypto ATMs
  globally and in the United States, with approximately 8,700 kiosks in the US and 9,200 worldwide.


  Total loss estimated at $3,665,000.'
