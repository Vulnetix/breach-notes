notes: Digiconomist released numbers for 2021, showing that during 2021, Bitcoin consumed 134 TWh in total — comparable to
  the energy consumption of Argentina. The report also claims that Bitcoin was responsible for 0.54% of global electricity
  consumption, and consumed about 89% more energy in 2021 than in the previous year.
