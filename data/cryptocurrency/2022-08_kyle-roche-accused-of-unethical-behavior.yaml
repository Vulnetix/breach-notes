notes: An anonymous whistleblower website called "CryptoLeaks" has alleged that Ava Labs, the company behind the Avalanche
  blockchain, paid lawyers to sue competitors and obtain confidential information through legal discovery. The site includes
  secretly recorded videos of Kyle Roche, a founding partner of the Roche Freedman law firm which has filed class action lawsuits
  against numerous companies including Solana, Binance, and others. In some of the surreptitiously recorded videos, Roche
  is visibly drunk."A pact was formed that involved Ava Labs granting Roche Freedman a massive quantity of Ava Labs stock
  and Avalanche cryptocurrency (AVAX), now worth hundreds of millions of dollars, in exchange for Roche Freedman agreeing
  to pursue a hidden purpose," the site claims.The site does include video clips of Roche saying some surprising things, although
  the clips are very short and devoid of context. The whole thing should be taken with a grain of salt.Ava Labs founder Emin
  Gün Sirer dismissed the claims on the site as "conspiracy theory nonsense". Roche published a statement about the " numerous
  unsourced false statements and illegally obtained, highly edited video clips that are not presented with accurate context",
  in which he said that his statements about filing class action suits at the behest of Ava Labs were "false, and were obtained
  through deceptive means, including a deliberate scheme to intoxicate, and then exploit me, using leading questions. The
  statements are highly edited and spliced out of context."
