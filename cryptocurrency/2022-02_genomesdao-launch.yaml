notes: GenomesDAO has created a platform which they promise will allow people who wish to sell their genetic data to have
  more control over it. They write that genetic data is "data that can be exploited in ways we cannot even imagine yet" and
  go into a list of these possible exploits — and this is apparently why you should definitely entrust it to a company building
  in a space known for its endless hacks. The company promises to help users earn money through selling access to their genome
  — though of course this isn't until step five in their roadmap. They're currently at step two or step three, depending on
  which version of your roadmap you look at; both steps seem focused on creating cat NFTs out of your genetic data for some
  reason.
