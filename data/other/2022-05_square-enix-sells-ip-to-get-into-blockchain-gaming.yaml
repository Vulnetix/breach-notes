source_name: '"NFT Market Collapses Just As Square Enix Sells <i>Tomb Raider</i> To
  Bet Big On Blockchain"'
source_url: https://kotaku.com/nft-market-collapse-square-enix-ubisoft-sega-konami-sca-1848878945
date_of_breach: '2022-05-03'
date_of_disclosure: '2022-05-03'
category: other
notes: Video game company Square Enix, the creators of titles including Deus Ex and
  Tomb Raider, agreed to sell off the intellectual property rights to those games,
  as well as other games and their respective game studios. The move, they said, was
  so they could invest more heavily in "blockchain, AI, and the cloud". This didn't
  come as an enormous surprise, as in January, Square Enix CEO announced these intentions
  in a letter that acknowledged that that (apparent subset) of players who "play to
  have fun" wouldn't be thrilled with their blockchain plans.The sale agreement announcement
  came at a tough time for Square Enix, as it was published the same day as a report
  from the Wall Street Journal that "NFT Sales are Flatlining".
