source_name: '"Up to $150 million at risk as two Australian bitcoin schemes go bust"'
source_url: https://www.theage.com.au/national/victoria/up-to-150-million-at-risk-as-two-aussie-bitcoin-schemes-go-bust-20240411-p5fj62.html
date_of_breach: '2024-04-12'
date_of_disclosure: '2024-04-12'
category: other
notes: 'NGS Crypto, which sold "crypto mining packages" to interested investors, has
  been put into receivership. The Australian firm encouraged customers to set up a
  self-managed super fund — a type of retirement fund — to achieve returns they said
  were powered by crypto mining. The firms advertised returns of up to 16% annually,
  and promised that investors would receive 100% of their initial investment back
  at the term''s completion — even "in the unlikely event that crypto mining becomes
  unprofitable".NGS and its associated business is believed to have pulled in around
  AU$62 million (US$42 million) from around 450 Australians.


  Total loss estimated at $42,000,000.'
