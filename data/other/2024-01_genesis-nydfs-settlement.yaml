source_name: '"Genesis Global Trading to pay $8 million in settlement after New York''s
  regulator found cybersecurity failings"'
source_url: https://www.theblock.co/post/272369/genesis-global-trading-agrees-to-leave-new-york-and-pay-8-million-settlement
date_of_breach: '2024-01-12'
date_of_disclosure: '2024-01-12'
category: other
notes: After the New York Department of Financial Services accused the Genesis cryptocurrency
  platform of cybersecurity failures that made it vulnerable to criminal activity
  and hacking threats, Genesis has reached an $8 million settlement with the agency.The
  failures included poor anti-money laundering programs, deficiencies around filing
  suspicious activity reports, and poor cybersecurity.The NYDFS action is only one
  of Genesis' many worries these days, as it undergoes bankruptcy proceedings and
  is facing various other legal woes.
