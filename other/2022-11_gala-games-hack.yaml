source_name: '"Report: GALA token exploit resulted from public leak of private key on GitHub"'
source_url: https://cointelegraph.com/news/report-gala-token-exploit-resulted-from-public-leak-of-private-key-on-github
date_of_breach: '2022-11-03'
date_of_disclosure: '2022-11-03'
category: other
vendor_product: Gala Games
blockchain: bsc, ethereum
notes: There was some brief panic on November 3 as someone minted a huge number of $GALA tokens in what appeared to be an
  exploit. $GALA is the native token of Gala Games, a platform for distributing blockchain-based games. It turned out that
  the pNetwork project had discovered a vulnerability in the pNetwork bridge, which could have allowed someone to drain the
  entire pool. pNetwork decided to undertake their own "white hat" attack, draining the funds before a malicious exploiter
  could do so.However, the Huobi crypto exchange has claimed that pNetwork's actions were not white hat, and that they profited
  $4.5 million from their actions. pNetwork rebutted that they had not made any money from the operation, and threatened to
  sue Huobi over the accusations.Some traders who attempted to "buy the dip" and profit from the plunge in value of the GALA
  tokens were also upset with Huobi, when they found that the exchange had replaced their tokens with new, worthless $pGALA
  tokens.
