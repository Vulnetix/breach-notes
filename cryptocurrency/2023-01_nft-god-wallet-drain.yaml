notes: 'According to NFT GOD, his computer was infected with malware when he clicked a sponsored link in a Google search when
  he went to download the streaming software OBS. This is similar to an attack in April 2022 where scammers stole millions
  using malicious Google ads.According to NFT GOD, not only did the hackers drain his crypto wallet of his NFTs and crypto,
  including his beloved Mutant Ape, but they also hijacked his accounts to send out phishing links to his substantial followers.The
  person who purchased the stolen ape (for 16.65 ETH, ~$25,800) said he was willing to sell the ape back to NFT GOD for the
  same price they paid for it, which seemed to be taken as good news by NFT GOD.


  Total loss estimated at $25,800.'
