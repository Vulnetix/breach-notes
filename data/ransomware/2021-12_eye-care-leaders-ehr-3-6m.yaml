notes: "On 4 December 2021, Eye Care Leaders — a provider of electronic health records (EHR) and practice management software specifically designed for ophthalmology practices — suffered a ransomware attack that included deletion of database tables and audit logs. The deliberate deletion of logs made it extremely difficult to determine the full scope of data access. Multiple ophthalmology practices across the US that used Eye Care Leaders' myCare Integrity platform were forced to notify their patients. Eventually approximately 3.6 million patients were notified across dozens of ophthalmology practices. Affected practices included Lifetime Vision Care, Ohio Eye Alliance, Sacramento ENT, and many others. Exposed data included names, Social Security numbers, dates of birth, driver's licence numbers, financial account numbers, health insurance information, medical history, prescription information, and clinical notes. The breach is significant for the attackers' use of audit log deletion to cover their tracks — making HIPAA-required breach forensics extremely difficult and creating uncertainty about the full extent of data exfiltration. Multiple class-action lawsuits were filed. HHS OCR opened investigations. The case highlighted a supply chain vulnerability: a single EHR vendor serving hundreds of small ophthalmology practices creates concentration risk where a single breach affects all clients simultaneously."
