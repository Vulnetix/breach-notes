source_name: "Qantas Salesforce Breach via ShinyHunters Vishing - 5.7M Customers"
source_url: "https://www.bleepingcomputer.com/news/security/shinyhunters-behind-salesforce-data-theft-attacks-at-qantas-allianz-life-and-lvmh/"
date_of_breach: "2025-07-01"
date_of_disclosure: "2025-08-01"
