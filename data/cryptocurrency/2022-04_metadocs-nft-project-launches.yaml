date_of_breach: '2022-04-25'
date_of_disclosure: '2022-04-25'
category: cryptocurrency
vendor_product: MetaDocs TikTok video
blockchain: ethereum
notes: Buy the $570 NFT and you'll get access to "celebrity doctors" who have amassed followings on apps like TikTok. Promising
  to "provide access quality doctors without all the usual red tape", the project has lofty dreams including one day providing
  metaverse diagnoses with remote examinations delivered using haptic suits... somehow.Whether they actually get close to
  that dream very much remains to be seen. The project has faced several setbacks, including complaints from doctors whose
  likenesses were used without permission, and lack of any telemedicine license that would allow doctors to actually provide
  remote medical services. The project has also faced criticism for hosting "Ask a Doc" chats where physicians answered various
  questions without clarifying they weren't providing medical advice, for listing "physicians" in their whitepaper who were
  still completing residency, and for pledging to donate its first $1 million in revenue to an autism-related charity which
  has promoted the false claim that vaccines cause autism and has described autism as a disorder that needs to be "cured".
