notes: 'Freeway, a financial scheme where users buy "Superchargers", which are crypto
  "simulations" that promise to pay out rewards of up to 43% annually, seems to have
  taken the off-ramp. The project announced to its users that due to "unprecedented
  volatility in Foreign Exchange and Cryptocurrency markets in recent times", they
  would be pausing their Supercharger program. The project reportedly halted withdrawals
  on more than $160 million worth of assets.Worryingly, the company also removed all
  mentions of its team from their website, and reportedly removed an attestation to
  the company''s financial backing as well.The day before the project announced the
  pause, crypto whistleblower and researcher FatMan published a Twitter thread urging
  people to withdraw funds immediately because he believed they were operating a Ponzi
  scheme. "In my opinion, it''s likely that Freeway will collapse within the next
  few months and that all depositors will lose everything."


  Total loss estimated at $160,000,000.'
