source_name: '"Fusaka Mainnet Prysm Incident"'
source_url: https://prysm.offchainlabs.com/docs/misc/mainnet-postmortems/#fusaka-mainnet-prysm-incident
date_of_breach: '2025-12-04'
date_of_disclosure: '2025-12-04'
category: other
notes: 'Ethereum validators running the Prysm consensus client lost around 382 ETH
  ($1.18 million) after a bug resulted in delays that caused validators to miss blocks
  and attestations. Though the bug had been introduced around a month prior, it did
  not affect validators until Ethereum completed its "Fusaka" network update on December
  3. Around 19% of Ethereum validators use the Prysm consensus client, which is developed
  by Offchain Labs.


  Total loss estimated at $1,180,000.'
