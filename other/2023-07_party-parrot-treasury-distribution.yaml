notes: You almost have to hand it to the Party Parrot team, they really figured out how to take advantage of ostensibly "decentralized"
  governance to line their own pockets. After raising $80 million in an "IDO" — initial DEX offering — in September 2021,
  the project is now embarking on a governance "vote" that would cash out the project treasury and distribute it to PRT token
  holders.  However, the project team also unilaterally decided to unlock tokens held by the team in November 2022, meaning
  that the project now has access to 80% of the token supply — the same tokens that will decide the outcome of the vote.If
  the vote passes, and it likely will given the massive supply of tokens available to the team, the team will have just decided
  to distribute around $60 million in remaining funds to themselves, leaving $12 million to the token holders.One commenter
  on the proposal described the move as "a pure financial crime". Another wrote, "The community has already explained in painstaking
  detail why we're not interested in this. The pro-rata value is an extreme lowball and fails to account for many of the team's
  misuses of the treasury without the community's consent. The team also prematurely unlocked the team and VCs' vesting tokens,
  so they are the majority token holders, making this vote meaningless and a total farce."
