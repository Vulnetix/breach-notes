notes: On May 4, 22-year-old Zerebro founder Jeffy Yu published a blog post introducing
  "legacoins" — a version of memecoins he said would be used to "define the legacy"
  of those who had died. Several days later, Yu's Twitter account announced that a
  "deadman's switch" had triggered the launch of his own "legacoin", $LLJEEFFY. Elsewhere,
  a video appeared to record Yu's suicide, and an obituary describing him as a "martyr
  of imagination and creativity" appeared on Legacy.com.It wasn't long, however, before
  people began to speculate that Yu had faked his death. Wonderland CEO Daniele Sestagalli
  published a letter he said he had privately received from Yu, where he confessed
  to faking his death and described it as his "only viable exit from persistent harassment,
  blackmail, and threats". Others noted that wallets belonging to Yu had been cashing
  out $ZEREBRO tokens priced at around $1.3 million.Reporters from the San Francisco
  Standard ultimately located Yu at his parents' house, where he was "agitated and
  shocked that he had been found after some routine internet searches", and "declined
  to talk about the false report of his death or how he may have benefited financially
  from it."
