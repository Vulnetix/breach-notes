notes: Scammers created a project on OpenSea with Louis Vuitton branding, which invited individuals to visit an external site
  to mint exclusive NFTs. They placed a blue checkmark on the project profile image to try to trick people into believing
  the project was verified, and they were able to manipulate the floor price to make it appear at a glance as though the NFTs
  could be traded for tens of thousands of dollars more than they cost to mint.The project airdropped these NFTs to NFT whales,
  causing some trackers used by people who follow and imitate whales' behavior to believe the whales themselves had minted
  the NFTs. The site then used a random counter to make it appear that the NFTs were quickly selling out, causing people to
  quickly mint their NFTs in fear of missing out. One NFT collector recounted her experience falling for the scam, buying
  five of the NFTs for a total of 0.6 ETH (~$1700) in hopes of striking it rich on a newly-launched project before it became
  widely known.An examination of the website source code shows that the project is reusing code from a different scam based
  around World Cup themed NFTs.
