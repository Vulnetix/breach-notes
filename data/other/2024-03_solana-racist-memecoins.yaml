notes: Solana memecoin trading has been booming lately, with people making money by speculating on tokens themed around various
  memes and jokes. Amid an explosion in trading innocuously-named meme tokens like dogwifhat has also been a rise in blatantly
  racist tokens, named after racial slurs, featuring racist caricatures, or named after antisemitic conspiracy theories.The
  tokens became so popular that projects showing newly-released tokens, like DEXScreener, became full of such tokens. DEXScreener
  released a statement on Twitter to say that "We'll be reviewing our token profile moderation policy in the coming days.
  We won't be the gatekeepers of what happens on-chain, but we're definitely not here to spread hate." The replies to the
  tweet were, predictably, full of people accusing DEXScreener of "censorship" and "going woke".
