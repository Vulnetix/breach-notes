initial_attack_vector: Exploitation of a chain of three software bugs in the Facebook "View As" privacy feature — the interaction of a misconfigured birthday video composer, a flawed video uploader that incorrectly generated access tokens with mobile app permissions, and a logic error that generated tokens for the viewed user rather than the viewer allowed attackers to harvest OAuth access tokens for approximately 50 million accounts without knowing account passwords
cve: []
vendor_product: Facebook Login / Facebook platform
