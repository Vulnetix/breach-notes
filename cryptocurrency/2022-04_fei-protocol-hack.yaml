notes: 'A hacker attacked multiple Rari liquidity pools relating to the Fei Protocol, exploiting a known re-entrancy vulnerability
  that exists on forks of the Compound protocol. The attacker stole more than $80 million from the projects.Fei Protocol tweeted
  that they had paused borrowing to avoid further thefts, and offered a $10 million bug bounty if the hacker returned the
  money.


  Total loss estimated at $80,000,000.'
