vendor_product: Binance.US class action filed
blockchain: terra
notes: A group of people who put money into Terra (UST), the stablecoin that collapsed in May, have filed a class action lawsuit
  against Binance.US. Binance.US is a crypto exchange that operates within the US, managed independently from Binance, which
  is not available to US customers due to fears that it would run afoul of US securities regulations.The lawsuit argues that
  UST is an unregistered security, and that as a result, Binance.US was violating securities laws by listing it. The lawsuit
  also alleges that Binance.US misled investors, leading them to believe that UST was more stable than it actually was. More
  than 2,000 investors have joined the lawsuit.
