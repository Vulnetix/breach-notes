vendor_product: Wonderland developer exposed as Michael Patryn
notes: Sifu, the pseudonymous chief developer of the Wonderland protocol, was revealed to be Michael Patryn, previously known
  as Omar Dahani. Patryn was a co-founder of the Canadian exchange, QuadrigaCX, which stole $169 million in customer funds.
  In the mid-2000s, Patryn admitted to several crimes including credit fraud, theft, bank fraud, and burglary.Wonderland founder
  Daniele Sestagalli had also been kept in the dark about the identity of his collaborator until finding out about a month
  ago. He opted to keep this information to himself, and claims it was because he believes in second chances. After the information
  became public, Sestagalli began a vote on whether Patryn should be replaced.
