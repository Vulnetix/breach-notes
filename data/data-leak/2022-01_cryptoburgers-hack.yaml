notes: 'The value of the $BURG token associated with the CryptoBurgers game suddenly
  plummeted after being hacked shortly after launching earlier that day. The game
  allowed users to earn cryptocurrency by flipping burgers... yes, really. A bug in
  the smart contract allowed an attacker to use flash loan attacks to drain $BURG,
  netting them around $770,000 as of that evening. The CryptoBurgers team announced
  they would be contacting Binance to try to recover funds, and the team would be
  creating a new smart contract and token. Hope the next one goes better!


  Total loss estimated at $770,000.'
