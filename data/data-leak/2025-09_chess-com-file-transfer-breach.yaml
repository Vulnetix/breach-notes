notes: "Chess.com, the world's largest online chess platform with over 100 million registered users, disclosed in September 2025 that a third-party file transfer provider had been compromised. The breach exposed an unspecified subset of Chess.com user data. Chess.com notified affected users and relevant data protection authorities. The specific vendor and data types exposed were not publicly detailed at the time of disclosure."
