notes: 'Uber suffers another data breach after law firm’s servers attacked. This is
  the third time in six months that Uber has been the victim of a data breach. Uber
  has found itself in the middle of yet another data breach, this time as a result
  of private driver data being stolen from a third-party law firm. Genova Burns, a
  mid-sized law firm based in New Jersey, has written to the affected Uber drivers
  that confidential information belonging to them, such as their social security and
  tax identification numbers, have been stolen in a data breach of its IT systems.
  Third-party company: Genova Burns.'
