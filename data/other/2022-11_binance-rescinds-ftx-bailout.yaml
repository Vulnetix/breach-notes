notes: It's over as quickly as it started, and it started pretty dang quickly. Binance walked away from the non-binding letter
  of intent that Binance signed to acquire FTX, which doesn't come as a huge surprise given how much they couched the announcement
  in caveats that it was subject to due diligence and that Binance could exit any time.According to Binance, "As a result
  of corporate due diligence, as well as the latest news reports regarding mishandled customer funds and alleged US agency
  investigations, we have decided that we will not pursue the potential acquisition of FTX.com."FTX is really up a creek.
  Reports suggest that the hole on their balance sheet is looking like $8 billion, a circumstance that is certainly not improving
  as FTT prices continue to plummet.There is still no news about what will happen to Alameda, but the SBF-owned quant firm's
  website has ominously been taken offline.
