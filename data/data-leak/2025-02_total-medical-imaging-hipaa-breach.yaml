notes: 'Total Medical Imaging (FL), a Healthcare Provider, submitted a HIPAA breach
  notification to the HHS Office for Civil Rights (OCR) on 2025-02-28 for a breach
  affecting 27000 individuals. Breach type: Unauthorized Access/Disclosure. Information
  location: Network Server. Source: HHS OCR Breach Portal (HIPAA Breach Notification
  Rule, 45 CFR §164.400–414). The OCR portal lists all breaches of unsecured protected
  health information (PHI) affecting 500 or more individuals.'
