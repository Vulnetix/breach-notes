notes: A hacktivist group calling themselves the Belarusian Cyber Partisans managed
  to gain access to the entire passport records of Belarus last year. On August 30,
  they began selling NFTs created from the passport data of various Belarusian officials,
  including the country's authoritarian president, Alexander Lukashenko. Other passports
  include those of the head of the Belarusian KGB, Lukashenko's press secretary, and
  the country's prime minister.The group is selling the NFTs for between 0.2 and 6.5
  ETH ($300–$9,700), and say that all proceeds will go towards "our work in hitting
  bloody regimes in minsk &amp; moscow".OpenSea took down the NFT collection shortly
  after it was published.
