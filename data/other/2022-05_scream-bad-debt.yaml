source_name: '"DeFi lender left with $35 million bad debt after quoting depegged stablecoins at $1"'
source_url: https://www.theblockcrypto.com/post/147046/defi-lender-left-with-35-million-bad-debt-after-quoting-depegged-stablecoins-at-1
date_of_breach: '2022-05-16'
date_of_disclosure: '2022-05-16'
category: other
initial_attack_vector: Software bug / unintentional loss
vendor_product: Scream bad debt
blockchain: fantom
financial_loss_usd: 35000000
notes: 'The defi lending protocol Scream may have taken the "stable" in "stablecoin" a bit too literally when they hardcoded
  the prices of the Fantom USD (fUSD) and DEI stablecoins. In the past few weeks we''ve seen many stablecoins wobble, and
  when fUSD and DEI followed suit, Scream ended up in trouble. Users were able to take advantage of the inaccurately high
  price to borrow other stablecoins on the cheap, leaving Scream with $35 million in bad debt. The platform''s reserves of
  other stablecoins were completely drained; meanwhile, Scream users holding fUSD or DEI can''t withdraw.


  Total loss estimated at $35,000,000.'
